body:
  text: 東林列傳卷十七江陰陳鼎撰明葉向髙傳葉向髙字進卿福建福清人生而倭患方棘母逃外家産於敗厠遂名曰厠六嵗就外傅稱奇童萬厯七年舉於鄉踰三年成進士選翰林院庶吉士授編修轉南京國子監司業二十五年以左春坊左中允典試南京明年陞右庶子兼侍讀掌坊事充東宮侍班官指示明切光宗甚喜向髙長髯于思風來拂動光宗私謂内侍曰此飛鬚先生也既陞南京禮部右侍郎再轉吏部復攝户禮二部事時户工二部以神帛費争向髙告冢宰曾同亨兩部皆朝廷外帑争無益不如量費而縮之同亨以為然省費以萬計居三年考滿北上意不欲行遂請告歸不允先是光宗之未冊立也妖書獄起首輔沈一貫借以傾次輔沈鯉及禮部右侍郎郭正域向髙遺書一貫勸其平心和氣恬風波為止水化荆棘為周行一貫大恚以故淹南中者十二年從此聲望益重三十五年一貫與鯉同罷乃以向髙為禮部尙書兼東閣大學士時秉政者朱賡故事首輔為政次輔唯諾而已向髙有所商確悉直言賡亦無忤也未幾賡卒李廷機以人言避位向髙獨相者七年當是時神宗倦勤萬㡬廢弛諸大典率阻隔中外有釜鬵之憂其大者福王受封乆不之國光宗日在危疑且出閣講學乆輟至於大僚空虚考選沈滯謫籍永錮宣索過多邊餉靳發礦稅不撤言官數被逮繫間有傳諭外難奉行向髙才智敏妙言辭敷暢時或中官立待還奏口占授書反覆詳盡上讀之心開有時觸忤乆亦為霽前後言比年陛下毎謂時事艱難臣謂陛下自為難也若一下徳音則壅滯立通廢弛立解天囘地轉更無停留雷動風行誰敢淤遏此政無難又言古稱帝王大節曰愛惜人才曰待士有禮而人臣尊君輒謂之天若藴隆惔焚天澤不加何以奠位髙卑清寧世界往時朝廷有奏輒報閣中疏掲甚稀今外廷章奏十九留中不得已轉望閣臣至有一事而數十掲者愈瀆愈輕愈繁愈厭天下責望臣等彌甚當時而臣等感動精神無加昔日真病不敢言病宜去不敢言去真不能為不敢言不能為悒鬱無聊中焦如火終歸誤國又言今天下南直隸及浙江湖廣各省洪水渰没至今未退百萬生靈轉徙流離無有還定之日而征𣙜之令未除土木之工未艾織造之困未舒六曹九卿朝廷所倚綱維庶務也年來寥落晨星近累牘連章稱病求去應聽與否當速賜處分使進退分明公私交便至於卿寺科部諸臣亦復如是太倉軍國之命老庫懸罄業已多年各處轉輸朝不謀夕那移馬價冏藏俱空日者薊鎮報警羽檄紛馳撫臣請餉計臣告窮彼此傍徨莫知所措不識明嵗何以支吾言官條陳事關兵食槩不見報臣惟有鬱結愁思無聊以死以七尺之軀還之陛下償此一官而已豈復有他䇿哉上感動為蠲江南租稅留稅銀賑濟而考選之命亦下遼東稅監髙淮以暴虐為遼人所逐上怒欲罪遼人向髙力言淮貪惡乃詔淮歸又欲逮繫同知王邦才等又欲嚴追淮遺稅餘銀向髙具掲極言恐揺動人心而追銀之議乃寢蓋萬厯三十六年也明年向髙又言天下治亂必有其形朝政清明庶官輯睦則治法紀凌遲人心囂競則亂今天下治耶亂耶即如近日進言諸臣意見稍分門户遂立藩籬既樹釁隙彌開始而臭味繼而參商又繼而水火始而旁觀繼而佐鬭又繼而操戈株連蔓引枝節横生暮跖朝夷好莠自口使盡言無諱之朝憂白馬清流之禍陛下一切涵容無所可否當去不去當留不留當決斷不決斷聚之使争養之使閧奏牘日多事端日起職此之由夫人自譽為君子無益也天下後世以為君子則真君子矣見詆為小人無傷也天下後世以為小人則真小人矣臣望諸臣和衷以事上陛下明斷以肅下則議論分明人心震肅其夏以病告值萬夀節復入直再疏求去懇言時政又掲請賑山西福建災傷釋以礦稅繫獄滿朝薦及王邦才等先是諸王婚禮費不過數萬潞王上弟也僅八萬福王以愛故至二十萬至是瑞王且婚引福王為例部臣不敢言向髙力争乃寢未幾以人言求去堅辭票擬上不允請益堅時上病目慈聖太后遣人問故上對閣臣難我為所惱耳慈聖諭閣臣僅一人當好語慰留之於是命大璫宣諭者三不受命值南郊分獻乃强出時内𫝊擬嚴㫖催進户部金花買辦銀兩向髙言金花銀正供也當如數進買辦銀浮費也太倉所積幾何尙能堪此封還原㫖力争自是嵗省度支二十萬復請發帑金助邊其北直隸山東河南四川陜西福建進供稅銀以二分解部一分賑荒上皆從之三十八年正月復疏言今日聖徳未光世道可憂者大端有二曰時政壅塞議論煩多時政之壅也如痞隔之病使人困悶而不聊生議論之煩也如霍亂之病令人昏憒而不自覺時有風霾牛妖之異復言天下有必危必亂之道蓋有數端而水旱災傷邊冦盗賊物怪牛妖尚不與焉承平日乆一也上下隔絶二也士大夫好勝喜争三也多藏厚積必有悖出之釁四也風聲氣習日下不可挽囘五也臣恐宗社之憂有萬億於遼東者矣時自仲春至孟夏乆不雨向髙密掲陛下臨御將四十年惟是礦稅一事為此受多少煩言忍多少閒氣招天下後世多少議論其實所積之物皆歸無用乃將巍蕩聲名被其玷缺臣實痛之又言九卿諸臣為災民請命至切至苦不知曾經御覽否諸臣遺書責臣不為力請臣伏枕殘生叩閽無路惟有愧死尚復何言陛下引咎責躬齋心精禱而雨澤猶慳風霾轉甚狂飈怒號震撼天地陛下即深居髙拱亦動於中夫人情當窮迫之後何事不可為一旦相聚為亂近迫國門此時下蠲賑之令人亦不感即欲用兵無人用命為今之計止大發帑金分道賑濟庶幾稍救所以然者欲使恩出自陛下耳上又從之當是時向髙杜門者三乞休者七上慰留者三宣諭者一始復入直而争論淮撫李三才及顧憲成之事起乃歴舉君子小人之辨為上别白言之初承天有䕶陵碑文凡陵役有司不得擅捕顯陵守備太監杜茂縱役藺光裕肆惡巡按御史史記事下承天知府勞謙捕治因而相激茂遂遣人哭訴於皇太后及上前言謙捕去人皆剜目折脛備極楚毒上大怒命錦衣衛逮謙及府中僚佐向髙請毋輕發楚俗剽悍深所當慮且知府擅捕守陵人誠違制然承天人闌訴諸惡於御史御史暫拘洩衆忿旋即奏聞此權宜法令御史不下知府人情擾亂矣今復逮謙衆必大閧上驚陵寢祖宗湯沐地聖子神孫當世世加厚無動揺之上意解復以危言動諸大璫事乃免考三年滿加太子太保文淵閣大學士䕃一子中書舍人三辭不允乃拜命明年當考察京官孫丕揚為冡宰列四黨於訪單分散註款向髙以非故事止之不聽已而御史鄭維芳劉國縉造匿名書傾王圖而金明時别有訐疏主事秦聚奎復有捨死報國疏於是朝論紛然至謂察典當改以上素信丕揚不為動而察疏乆閣向髙屢請不報已而北察疏發而南察尚留中屢請方得南中臺省劾北察疏又至以向髙搆金御史為言上欲重處之向髙言察竟矣毋再起争端擬㫖責讓終歸不究上從之仍令文書官告以委屈寛宥意復問更有何言惟附奏感謝而已是秋皇貴妃王氏薨光宗母也力請厚其喪儀明年連疏乞罷語過戅上疑其要挾不報疏再上上遣鴻臚官宣諭而去志益決又密掲考選不下臣必掛冠徑去上不得已發至私第行之故事下吏科至是明示歸重且冀言官稍息議論也而議論愈囂向髙婉轉撑持補苴調劑即内臣亦云自在閣臣他人做去此公獨當其苦亦實錄也明年命典會試時閣中止向髙一人上命章奏送闈中票擬又為增試額五十人不為例先是福王之國定於是春復借言土田錢糧未備易期明年向髙封還御札謂王行必難緩又密掲再三上意稍動而南御史竟劾向髙不宜主試事於是注籍求去上不允六月武弁王曰乾上書告奸人孔學等謀不利於東宮私刻木為聖母皇上像釘其目為巫蠱語多涉坤翊宮向髙密掲言此奸徒所為當静處之勿為所動動則紛擾上覽曰乾疏震怒至於擲翻御案左右莫敢近忽自言如此大事閣臣何以無言近侍乃以閣掲進上覽畢威頓霽櫝藏之已而向髙復語大璫曰乾疏勿發恐以疑似影響驚動宮闈事愈難處惟速定福王之國期以釋天下之疑上深以為然尋用他事置曰乾於理當是時人情震懼謂其禍倍於往年妖書賴閣臣鎮定處危疑若無事而中外大安初向髙有密掲請福王之國引景王留邸皇考危疑為戒礦稅之行欲竭天下膏髓以予福王語甚危激外廷不得而知也至是上傳諭福王所謂田土并錢糧皆祖宗成例卿昨掲言及景王朕思皇祖時皇考與景王比肩今名分已定皇太子又有皇孫何猜疑之有卿又言及礦稅此舉為三殿非為福王卿輔弼重臣不得過為疑忌宜即出贊襄向髙疏謝臣小人也過計思慮故前掲云然賴陞下為臣剖析臣復何辭但皇考當時雖名分未定然講讀不輟今東宮輟講業已八年不奉天顔聞已乆矣福王時節入宮毎月兩次皆人所知親疎懸殊又遷延留滯之國無期悠悠之口實難家諭小則巷議私談大則妖言惡語蔓延不已將陛下父子兄弟間有難處之事此廷臣所以苦口力争不能自己豈真疑陛下與福王有他端哉莊田一事外議謂王借此極難題目以圖淹乆至於礦稅天下實以此疑皇上此在聖心必自明白上再諭福王朝謁傳免己乆日期明諭不必再疑天下始暁然知向髙之力言於上也當是時福王乆不入宮本所素知姑借外廷謾語以動主聽以速王行已而上復以皇太后稀齡為言遲且二年衆駭為中變向髙佯不省請上預慶即遣王行上大忤遣文書官傳諭朕所謂賀聖母稀齡者乃四十二年之國擇吉乃四十三年也卿何謬誤至此向髙封還御札謂陛下夀聖母而實留王人謂孝事之盛心乃䁥留愛子之私計且潞王聖母愛子也亦在外藩福王在國上表稱賀有何不可上覽奏徘徊歎息次日傳諭福王來春就國向髙奏謝且感且泣中官亦私相語曩者閣臣盡如是事定乆矣以延鎮三大捷功加少保兼太子太保武英殿大學士改户部尚書力辭不受復以一品滿加少傅兼太子太傅建極殿大學士改吏部尚書廕一子尚寶司丞時福王之國雖得命莊田猶取盈四萬頃向髙疏減其一又諷王自辭其一四十二年慈聖太后崩撰遺詔明著婚封典禮皆已定期並得釋楚宗蠲稅額之半一日鄭貴妃遣人來言曰先生全力為東朝願分少許惠顧福王向髙正色曰此正老臣全為王處人稱萬嵗千嵗及吾輩云百嵗皆虚語耳皇上夀登五十不為不髙稱此寵眷時啟行資贈倍厚宮中如山之積惟意所欲若時移勢改常額外絲毫難得况積年口語可畏一行氷釋且得賢聲老臣為王何所不至皇貴妃聞言大慟卒如期行向髙送之郊外殷勤垂涕而别先是禮臣定儀注别皇太子四拜坐受無他語向髙密啟皇太子必當加意皇太子深然之及見王欲答拜福王固辭乃立受答其二握手哭别送至宮門福王大喜上與貴妃偵知亦大喜已而送太后喪徒步至土城詣山陵題主舊屬次輔至是特遣向髙異數也禮畢遂請省墓上仍不從堅請乃允加少師坐蟒賜馳驛又令暫留數日因疏勸用人舉政特薦鄒元標等上遣内臣䕶行圖其邑山川以歸踰二年張差事起上歎曰葉向髙在事不至此光宗即位起於家未至熹宗立再遣行人趣行當是時南昌劉一燝以次輔當國蒲州韓爌肩隨之與老璫王安同心輔政安固光宗伴讀協主移宮者也宵人不便間一燝於向髙謂不欲其速入十一月向髙至首請發帑金二百萬濟邊念遼陽始禍由撫臣李維翰輕率進兵推官鄭之范尅削軍需奏請逮治為故總兵戚繼光請補贈諡上皆從之未幾王安見殺一燝以人言去國恩禮甚薄檢討繆昌期極言於向髙始獲優㫖一燝去而時局又一變矣初熊廷弼有功遼陽言路齮齕之去袁應泰敗一燝起廷弼田間為處分諸抨擊者以明賞罰廷弼至遼與遼撫王化貞隙化貞故向髙癸丑門生愚而輕信謂西部可用主進戰廷弼争之朝論右王而左熊化貞遺書向髙有麟閣奇勲唾手以授老師等語已而棄廣寜遁竟陷廷弼同逮諸惜熊材者疏論遼事遂有門生誤老師之說給事中侯震暘疏糾諸輔以不能主張責向髙向髙覩人情向背各半漸有去志王安死魏忠賢益横魏廣微附之有中魏外魏之稱忠賢以向髙耆舊猶未敢失禮向髙亦曲為彌縫如救章允儒周宗建之廷杖髙攀龍劉宗周文震孟之重處其功居多玉牒成進中極殿大學士復以光宗實錄三鎮捷功加特進光祿大夫上柱國兼支尚書俸辭不受又以六年滿進太傅又不受汪文言者歙人也原名守泰故王安客居中用事安死避揚州逮入倖免死改名文言再入京機警有口辯游歴公卿間得授制敇中書兵部郎中鄒維璉改吏部或疑文言與魏大中為之維璉同鄉不恱疏劾二人並及僉都御史左光斗忠賢以安故欲殺文言下詔獄向髙謂文言之用其失在臣凡再申前說文言僅受杖去而左副都御史楊漣二十四大罪之疏上中外遂如水火矣方漣疏之未出也光斗贊之甚力昌期曰擊内者只在呼吸間耳一不中而國家隨之况今日内無張永外無楊一清可幾倖乎光斗黙然疏竟入向髙亦不以為然尋九卿科道疏連上衆意當乘此決勝促向髙為助不應止具掲稱忠賢朝廷寵眷已隆盛滿難居宜聽歸私第保全終始掲入拂内意向髙懼思有以自解而流言自是起矣會工部郎萬燝以陵工經費不給疏請内府發銀上大怒廷杖之向髙疏救不從燝竟死而御史林汝翥以畏杖潛逃羣璫圍向髙第大索傳汝翥為其甥也乃具掲自明言中官圍閣臣第二百年所無臣若不去何顔見士大夫上為收囘中官向髙遂移居郊外再疏乞歸加太傅廕子遣行人䕶行賜銀幣蟒服夫廪陛辭之日上慰諭為國愛身以待召用向髙去文言再逮死且借以起大獄同事輔臣劉一燝韓爌俱先後削奪冡宰趙南星遣戍楊漣左光斗等拷死詔獄獨向髙恩眷屢加優渥出格慶陵功成再加上柱國而内實嫉之蓋因魏廣微之㸃將録首以李三才配水滸晁蓋次即向髙配水滸宋江逆璫不得不忌之耳又明年以憂憤卒贈太師以勲爵例特加柎楄諡文忠向髙前後乞歸共一百二十九疏在神宗時獨相七年嚴主霽威廷笞絶迹大本既定朝野宴如善因事就功每杜門求去上必借一事慰之初為釋滿朝薦等三人又為允㸃閣臣二人及再相熹宗封疆外虧虺蝎中據養亂者在先決防者在後故其求去之疏有曰年來人情分别門户一起一伏互相猜防以臣持論稍平欲共留之以彌縫撑拄其間不思世路如水微風鼓之而成波疾風激之而成浪欲水之平當息其風以今日之風而求波浪之靖即馮夷海若亦縮手無計舉天下士大夫無智愚賢不肖皆並歸於競進有不遂意則怨謗横生令人轉思昏夜乞哀之為恬淡臣無伐毛洗髓之術為之蕩滌更换其能以空言維之乎第使臣脫然而去天下之人或以愚鈍如臣尚然知足萬一有所感動而少抑其躁競之心是臣去賢於留也又嘗歎昔事神宗以手代口雖甚觸忤怒亦即平請亦即允今日與内臣執辯以口代手閣中一片地幾成口舌塲雖勝必不繼復難措手矣後卒如其言所著有蒼霞諸稿行世外史氏曰熹宗之朝羣奸擾攘百佞森立即使周公為政安能輔此童昏之君制此虎狼之衆哉况臺山先生乎然臺山在而調䕶清流尚可苟延國脈至臺山去而有明亡矣韓爌傳韓爌字象雲山西蒲州人萬厯二十年進士選翰林院庶吉士授編修歴中允庶子掌春坊事再遷禮部右侍郎侍讀學士四十七年副史繼偕總裁會試教習庶吉士光宗即位以禮部尚書兼東閣大學士入閣亡何上崩爌偕諸大臣受顧命時方從哲為首輔當李可灼進紅丸從哲既不能止反擬㫖賞可灼銀五十兩文幣二表裏舉朝皆為不平明年禮部尚書孫慎行上疏引春秋許世子不嘗藥之義以責從哲比之弑君廷臣交章力攻爌謂國家有大體以先帝聖明而目之曰弑筆之於史何以示後且爌等皆受顧命不能力止均之罪也安得獨坐即具疏白之從哲得善去而以可灼戍邊即慎行不以為異議也尋進太子太保户部尚書文淵閣大學士再以登極恩加少保吏部尚書進武英殿再加少傅進中極殿三年以山東平妖功加左柱國少師兼太子太師時魏忠賢客氏用事盡反初政爌持正不稍貶徇羣臣阿逆賢意希進者忌爌與首輔葉向髙等不為已用乃造天鑒同志㸃將諸錄以傾之四年楊漣上疏極論忠賢二十四大罪臺諫相繼論劾而上任忠賢益堅向髙調劑之不能得遂力請去爌為首輔會上不豫爌入對言聖躬闗係甚重伏望慎起居逺婦寺清心寡慾以攝養為先上頷之而忠賢之黨方以三案起大獄殺諸正人爌不肯奉詔則輒下中㫖行之切責爌黨䕶言官爌求去又不聽先是詞臣文震孟上國勢綦艱疏忠賢恚嗾上杖之時首輔葉向髙在告爌與忠賢力争始降級調外及是會吏部尚書趙南星都御史髙攀龍以謝應祥事為奸黨所訐踉蹌去國爌上疏言一日而去兩大臣臣民失望且御批徑發不復到閣攀龍一疏經臣票擬又蒙御筆改移大駭觀聽有詔切責爌覩朝政日壞閹勢日張中外䝉蔽終不可與共事而顧秉謙魏廣微輩日夜搆爌於忠賢所假票擬逐爌而奪其位爌乃上疏自劾曰臣備員中書咎愆日積即南北用兵軍需匱絀不能資廟略以佐邊籌冦災頻告徵發繹騷不能軫民艱以培邦本詰戎宜先營衛而觀兵禁掖無從紓宵旰之憂忠直尚稽還朝而搒掠朝堂無以囘震霆之怒以至後先多官之黜降諭㫖中出之變更在聖明祇肅紀綱乃中外懼興黨禍而臣既不能先時深念有調劑之方又不能臨事挺持為封還之戅斯皆罪狀之大著者請亟褫臣官仍治臣罪以為輔理溺職之戒疏入竟予告去臨行復疏謝有左右前後務近端良重綸綍以重仕途肅紀綱以肅朝宁等語忠賢銜之益甚爌單騎出都門忠賢意猶未釋矯㫖削籍已而借黄龍光請停刑一案坐贜二千餘兩捕其家人死杖下爌悉斥田宅以償猶不給親友為醵金完之爌由是棲止先墓忠賢必欲殺之會熹宗崩得免愍皇帝即位以閣臣多不稱職令廷推舊臣僉舉爌楊維垣力沮之不聽遂復召為首輔進中極殿大學士陛見慰勞甚至尋御文華殿諭以票擬務消異同二年正月上以邊警召爌及吏部尚書王永光入對平臺時廷臣頗憂毛文龍跋扈袁崇焕銳欲除之上因與爌等造膝密語左右莫得而聞也上素惡門户温體仁以枚卜不與訐錢謙益去之毛九華任贊化亦訐體仁他事體仁言九華贊化皆謙益死黨故誣臣以報謙益上怒切責贊化爌救曰言官有聞入告但新進小臣不諳大體乞寛之宥贊化亦安體仁上因謂進言者多懷私意不憂國而植黨自名東林於朝廷何益爌退復具掲言人臣不可以黨事君人君亦不可以黨疑臣但當論其才品臧否職業脩廢因而黜陟孰敢不服若戈矛妄起於朝堂畛域横分於宫府非國之福也上嘉納之先是上在藩邸素惡逆賢之黨及首惡既誅即欲定附逆諸臣罪案閣部僅以數十人入告上怒曰魏忠賢一人耳茍非外廷逢迎何遽至此乃手列諛誦贊道速化條目命爌等密議並下建祠稱誦諸疏指示曰此紅本媚璫實錄也卿盡案入之議既定於是大學士臣爌臣標臣龍錫吏部尚書臣永光刑部尚書臣允升左都御史臣于汴上奏曰人臣首戒無將天討用章有罪祖制内官不許干預政事重交結近侍之律於以防内外而肅宮府杜奸萌而窒亂源法至嚴也逆璫魏忠賢狡譎多端兇頑無忌始焉小忠小信祇便身圖繼而作福作威漸干國政内則妖姆客氏窺覘禁密結為腹心外則逆臣崔呈秀揣度機情助其羽翼戕宮妃而戮忠直盜帑藏而弄兵權已邀無等之三封將議逼尊之九錫迫逐藩邸播棄宗臣建生祠以卜人心遣内鎮而連邊將陰謀叵測僭勢顯成磔辟已服上刑爰書具列逆狀誠如聖諭所謂首逆之罪當先正者也至首發大難禍始教猱或倒身怙終勢成騎虎有如動揺母后倡和逆封鐡劵金章覆題恐後腴田甲第請給争先或引聖經以慫惥中傳或攘史職而抹殺直筆墨縗朝會忍此罪魁緹騎鋃鐺大興詔獄修睚眦以殘軀命不難殺人媚奸供嚬笑而効爪牙總是酬恩報怨至於一人而創祠幾地一事而諛誦連章祠省直祠邊鎮祠京邸未巳也而且祠之國學頌碑文頌奏章頌鄉錄未已也而且頌以絲綸此聖諭所謂首開諂附傾心擁戴者也又有徑竇旁通網羅密布腹藏鱗甲搆青蠅貝錦之䜛意慘鏌鋣釀白馬清流之禍即占風望氣莫可端倪而覆雨翻雲難逃指視斯又潛施鬼蜮之毒而更巧避彪虎之名此聖諭所謂雖未祠頌而陰行贊導者也以上諸人罪案各殊法律亦異或已經褫逐不盡厥辜或謬附摧傷當追始禍遵明聖諭擬法依律無枉無徇三尺無私天誅不貸四凶畢竄國法用申惟是大憝既罹不赦之條而羣小宜開自新之路或事闗題覆牘尾列名或身在封疆委蛇濟事或城守任於捍禦或編摩効有劑調而又或生平才守俱優敭歴猷勞夙著此聖諭所謂事本自公而勢不得已素有才力而隨人㸃綴須當原其初心或可責以後効或與昭洗免臚姓名因明罰敇法之嚴條兼赦過宥罪之寛政也疏入報可於是忠賢客氏而下坐死者崔呈秀等六人劉志選等十九人坐戍者魏廣微等十一人逆孽魏志徳等二十八人城旦者顧秉謙等一百二十七人削籍者徐應元等三十二人閒住者黄立極等四十三人上自為諭冠之名曰欽定逆案頒示天下當是時大憝斬除識者謂宜嚴治黨與以副朝廷錯枉之權以昭千萬世人臣之戒而猶謂失於過縱於是言官交章劾王永光本黨逆閹不稱冡宰以頌閹之人定附閹之人庇覆良多王永吉言之尤力上怒下爌等議罪爌救之言永吉不宥永光必不敢居位上乃赦永吉奪俸一年㝷以皇子生推恩加爌太傅力辭許之時起王象乾督宣大撫西邊款成有日矣而宣大撫臣張宗衡抗疏請戰上召爌等問所宜從爌言宗衡前亦嘗請款今忽變其説前後矛盾胷中似未有成算請下督臣及三鎮撫按議之上又舉汰兵裁驛二議問爌爌言汰兵不過當清占冒及增設浮兵若衝地額兵固不可汰也驛遞疲累當責按臣核減以蘇民困其所節省當即蠲之民以示徳意上然之初熊廷弼既誅遺骸未收御史饒京以為言不許其子兆璧復詣闕泣訴爌謂廷弼不死於封疆而死於門戸使誅廷弼者按失守之律與同事諸人一體伏法廷弼九原亦當目瞑乃先以無影之賄懸坐楊漣左光斗魏大中等為清流阱陷又以刋書惑衆借題徧殺身死之後尙坐贓十七萬兩辱及妻孥長子兆珪迫而自刎斯則廷弼死未心服海内才臣義士亦多憤惋特以封疆之故未敢訟言於陛下之前耳臣等竊平心論之自有遼事以來徼倖營私之輩不知凡幾廷弼再任經略不取一金錢不通一餽問終日焦唇敝舌與人争言遼東如其家事似猶此勝於彼魏忠賢盗竊威福士大夫為爵祿所誘靡然從風廷弼一長繫待決之人屈撓則生抗違立死乃終不改其剛强自遂之性以致獨膺顯戮慷慨赴市其俠腸猶未盡冺臣總不敢深言而傳㫖已逾三年收葬原無禁例則聖明必在垂仁臣等所以娓娓於此者以兹事雖屬封疆於邪正本末陰有闗係陛下天縱聖哲或未以臣言為深謬也疏入上感動乃許收葬時廷臣齮齕東林者争撼逆案欲援引一二人以漸翻案而爌力持之惡爌者日衆會袁崇煥已殺毛文龍議者皆以為功其冬我兵入大安口取永平薄京師上逮崇煥下詔獄詞連錢龍錫幾坐死中書加尙寶卿原抱奇露章劾爌上雖薄抱奇而心是其言爌遂乞休疏再上馳驛歸十七年正月流賊渡河破蒲州憤鬱而卒年八十矣外史氏曰東林無韓葉二賢不特無噍類並三族而禍之矣委宛於中調燮於内其功鉅矣余故以二君子為東林宰翁正春傳翁正春字兆震侯官人舉萬厯七年鄉試屢上春官不第循例署龍溪教諭二十年舉進士第一授翰林院修撰奉使冊封周藩歴中允庶子少詹事兼侍讀學士三十八年陞禮部左侍郎充日講官尋署部事時神宗髙居大内大僚多不㸃用羣臣疏請考選起廢凡數百上皆不報會十一月壬寅朔日食正春上言日者衆陽之宗本不宜蝕况仲冬律中黄鍾於卦為復乃隂極陽生之候有此虧蝕其變尤甚臣考萬厯三十年來八嵗之間日食者三前兩嵗為四月朔是純陽之月也今嵗為十一月朔是又陽生之月也夫以純陽蝕則陽既受侵以陽生蝕則陽益寖弱豈非陽徳實虧故上天垂象乎君徳象日宜照臨不宜藏閉宜發揚煦育不宜收斂摧抑皇上自萬厯二十年後財貨日斂聚人才日剝落㫖意日留中至今已極矣一切請補大僚推考選起廢棄皆不省而横征逮繫者終不止致黄扉紫閣寥寥孤曜六卿九列三五晨星閶闔徒號天聽愈逺天下不見陽和舒育之氣而冰凝之象獨堅夫日之食與更只在一時皇上之寢與行亦只在一念誠鑒於天變之不可不畏而翻然轉移舉從前缺失立見施行將日中之治行天變可挽囘矣不報又言欽天監奏十一月壬寅朔日食差至三刻厯法果按成法而差當如前代嵗差之法隨時修改以合天道今官生輩於理數未精安望脗合宜訪求精通厯學之人如原任按察使邢雲路兵部郎中范守已照先年給事中樂濩例改授京堂又翰林院檢討徐光啟原任工部員外李之藻皆精厯數又大西洋歸化之龎迪莪能三拔等有推彼國厯法測驗推步足備采用請令光啟對譯與雲路等參討修復然厯法疎密莫顯於交食真偽莫逃於測驗觀象臺年乆滲漏地勢失平儀器欹斜與天度不合宜及時修造並擇天文生陰陽人等疏入亦留中三十九年八月萬夀節倣古人金鑑錄之意獻萬夀八箴清君心遵祖制振國紀信臣僚寶賢才罷聚斂恤民命重邊防帝雖不能用然心善之王恭妃之薨也乆停不擇地正春力請之乃命偕中貴人徃既得吉矣中貴有所附以地廣費繁難之正春作色曰妃誕育元良他日國母也詎以天下儉乎奏上得報可初代王無嫡子御人裴生鼎渭已奏立為嗣已妾張氏有寵次進妃生鼎莎復援宗藩要例請改正李廷機為禮部主鼎莎謂裴未經奏選渭不立也至是王兩子争襲廷議以鼎渭長宜立下禮部正春曰均庶立長宜也然訟父得立是有兄弟無父子矣請以爵予長子之子而以前所立者為將軍則兄弟之倫正而父子之恩亦不至掃地識者韙之時倭冦未息琉球國遣使入貢正春言中山已服於倭今使臣多倭人物雜倭器其心巧譎絶之便即不然亦宜詔福建撫臣按驗量留土物以見恭順使臣如例給賞不必入朝帝是之當是時皇太子輟講已九年福王之國無期瑞王婚禮亦乆不舉廷臣章滿公車總不得命正春以職掌所關屢疏上請至引天時祖制人情反覆入告至是復連上三疏其請開講曰東宮輟講日乆控陳愈切槩置不聞意臨御日乆静攝多年視天下事無一足為吾急者遂并大本之地子孫之計而亦緩之乎其何以對列聖慰四海臣民且天下亦多事矣元日風二日火宮府釜鬵之形朝紳水火之象閭閻困敝内外交訌是尙可泄泄從事乎夫皇上四十年金甌不宜學倦於勤而東宮之為人子可知皇元孫九齡岐嶷將䝉養其正而東宮之為人父可知陛下聰明天縱奈何於目前大事遲疑如此請之國曰藩封一事中外竭蹷以待乃吉期至今未定夫親王典禮有先時而備者有臨時而催者督之早民不能堪督之遲又恐一時貽誤今之國無期百司何以為準也請婚期曰髙皇帝詔民男十六以上女十四以上許及時婚配况帝子天孫顧乃聁積李於深宮嗟摽梅於邃閣盛事猶未舉哉宜亟舉行上承聖母歡心下衍宗支大慶倘仍逾時不舉是國家為愆禮臣子為溺職臣所大懼也皆不報四十年八月順天府鄉試進士鄒之麟分校搜中落卷童學賢等為御史馬孟禎等所糾孫居相復發科塲積弊追論庚戌湯賓尹韓敬事正春議覆學賢黜革之麟降閒散官而給事中趙興邦亓詩教謂正春不叅論主考為徇私於是考官郭淐朱延禧各疏引罪正春議分别罰治未上給事中孫振基欲并議庚戌事遂疏論正春及吏部尚書趙煥等正春言賓尹庚戌事與臣今日先後不同時鄉會不同事臣安敢於詔㫖外擅議請終養囘籍有㫖一并議奏詩教復叅正春支吾首䑕正春具辯益求去大學士葉向髙言年來禮部事最繁正春止一人獨任言者猶未見亮益見大臣任事之難得㫖慰諭正春疏謝條塲議八事四十一年再知貢舉四月改吏部左侍郎掌詹事府日講如故以母老再疏請假歸養許之天啟元年起禮部尙書協理詹事府事四年都御史楊漣劾太監魏忠賢二十四大罪舉朝交章攻之正春亦上疏論劾有㫖以沽直不諳切責遂抗章乞歸明年御史陳朝輔希忠賢意叅正春年踰七十母近百齡猶夜行不休時正春罷歸乆矣袁鯨復論正春呈身門户為東林巨魁又明年母夫人百嵗正春率子孫為夀鄉閭榮之九月以勞疾卒崇禎初諡文簡正春在禮部最乆職舉政脩為人峻整終日無狎語倦不傾倚暑不裸裎目無流視見者肅然起敬其教龍溪時芝生學宮又有五色雲之異遂魁天下有明三百年間職官領廷對者二人曹鼐以典史正春以教諭而正春鄉試居榜末為尤奇云外史氏曰明代之事全敗壞於神宗其不即亡者未至荒淫耳若夫既以聚斂為事加之般樂怠傲而剛愎自用抑君子而尙僉佞未有不當其身而見禍者也觀兆震先生諸疏其亦危矣噫若無東林諸賢在朝執持天下事豈可料哉東林列傳卷十七
