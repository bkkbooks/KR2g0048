body:
  text: 東林列傳卷六江隂陳鼎撰明孫承宗傳孫承宗字稚繩直𨽻高陽人生而沉塞果毅不苟訾笑為諸生嘗授經易水雲中仗劍遊塞下從飛狐拒馬間直走白登又從紇干清波故道南下結納其豪傑與戍將老卒周行營壘訪問要害扼塞以是曉暢敵情通知邊事舉萬厯三十二年進士第二人授翰林院編修十二載遷左春坊中允歷左諭德司經局洗馬與鄒元標趙南星高攀龍諸君子交極契熹宗即位遷左庶子充日講官拜詹事府少詹事加禮部右侍郎協理詹事府事日講如故承宗為史官不造請權要不徴逐遊宴持重自守泊如也神宗末有東宫梃擊之變御史劉廷元以風癲蔽獄閣臣吳道南密以問承宗承宗曰事關東宫不可不問事關皇宫不可深問龎保劉成而下不可不問也龎保劉成而上不可深問也獨皇上能了此須中堂密揭之耳如其言而梃擊之獄定四十五年內計忌者議左承宗於外掌院劉一燝力持之乃止熹宗初御講筵內閣戒講官講章宜簡要講畢勿多獻替承宗曰中堂當擇講官不當擇講章與其擇講章寧去講官可也會同官李光元亦上書爭之得勿改既逆璫造孽欲斥東林諸賢承宗密言執政力護之璫亦疑其同黨勿顧也當遼事初起朝議倚熊廷弼足以辦敵承宗曰未也當大事須置身天宇之外俯視所營乃能洞晰情勢使敵在我目中今身為遼事所圉惴惴焉懼敵人之入我室發我屋曽暇及藩籬之外乎一城挑三河虎皮驛破不能救枝斫膚剝而曰護其根本樹其能久乎既而廷弼去瀋陽陷遼陽又陷經略袁應泰自焚死乃即家再起廷弼經略遼東寧前道王化貞為巡撫化貞主戰而廷弼主守兩人遂相惡交相謗也上敕廷臣議經撫去留至欲專任化貞而我兵已度三坌矣於是羣推承宗為兵部添設侍郎專主東事天啓二年正月我兵略廣寧化貞棄城走閭陽廷弼見而唾之惶遽焚棄右屯以西四百里與監軍道高出張應吾邢愼躡化貞後入關以屢逃懦夫倡為退守關門之説舉朝洶洶上乃拜承宗兵部尚書兼東閣大學士入直凡九日即以閣臣暫掌部事承宗因上目前切要疏其略云年來兵多不練餉多不核以將用兵而以文官招練以將臨陳而以文官指發以武略備邊而日增文官於幕以邊任經撫而日問戰守於朝此皆因循誕謾之失也今天下急務在收拾人心而欲收人心在大振天下之氣又云以文統武自是敝法以極不知武之文統極怕文之武更屬極敝之法故臣謂今天下當重武之權而重武之權在去文吏之擾又云國家京營兵十萬日添官以為兵害而不少添其餉營兵上等之餉不當募兵下等之餉何能為練當如募兵之法列餉為三等而以遞升遞降之法簡拔清汰環城為營每城建三營營可八千有竒建營之法即以陳法為之令什什伍伍在營如陳在陳如營升其伉健者為親軍而老弱拊營姑任之為老家此宋初升籍之法也永平為陵京重鎮為山海後徑不可不再設巡撫不可不設總兵與山海薊鎮為鐺腳之勢盧龍薊門諸州縣宜倣各邊之法城各設守將一員築壘於必爭之地使鎮戍接連墩營相望關西州縣處處設兵雖各為城守其實於東則若以山海之兵分布於各城以為老營於西則若以京師之兵分布於各城以為突騎一片石而西戚繼光故壘在焉可按其蹤而加修葺畿南涿易以及通州當清理額兵兼募新兵天津北平若京東皆可屯田以屯撥遼人以渠限敵馬以租給軍餉此三便也當是時邊警日急長安一夕數驚閣部大臣瞪目屏足苟幸旦夕無事言官如蜩螳沸羮莫適為公家計承宗乃上章請下熊廷弼於理與王化貞同讞又請逮給事中明時舉御史李達以懲蜀之招兵致冦者又請詰責募兵監軍諸臣以警有位之骫骳者上皆允之而側目者衆矣兵部尚書王在晉代廷弼經略遼東而王象乾先以兵部尚書行邊總督薊遼習知西邊部落西人亦愛之而在晉之出也深倚象乾謀用西人以襲廣寧象乾教之曰得廣寧不可守也為罪滋大重關設險衛山海以衛京師此穩著也在晉乃請築重關於山海關八里鋪費一百二十萬關門僚佐袁崇煥沈棨孫元化力爭不能得皆奏記內閣承宗請身往決之加太子太保賜蟒玉銀幣抵關閲新城詰在晉曰新城成即移舊城之四萬兵以守乎曰當另設兵承宗曰如此則八里內守兵八萬矣一片石而西北不當有守乎其戰兵即守兵乎抑另有戰兵乎築關在八里內新城之背即舊城之址也舊城之品坑地雷將為敵人設抑為新兵設乎新城可守則安用舊城如不可守則新兵之四萬倒戈舊城之下將開關延入乎抑閉關以委敵乎曰關外有三道關可入承宗曰若是則敵至而兵逃如故也安用重關曰將建三寨於山以待潰卒承宗曰兵未潰而築寨以待之是教之潰也若是則又安用重關且敗兵入三道關敵不可尾而入乎人心一潰不又為全遼之續乎曰將於八里內南負山北抵海掘溝二十里以限敵馬承宗曰徐中山之經度斯地也左山右海砂少土多故扼要為關今將踐砂鑿石火燒水激而成河不亦難乎成祖棄大寧諸城而獨守遼東以大寧退有薊門天險遼西非遼東不可守也今不為恢復大計乃畫關而守畿東有寧宇乎在晉語塞而止承宗出關親覽形勝還至建昌遇雨留七日條奏關東西形勢事宜凡十餘疏無慮數十萬言上皆報聞還朝極言在晉不可恃改在晉南京兵部尚書盡逐逃臣張應吾等而八里鋪築城之議罷經略缺承宗自請督師上大悅以原官督理軍務賜尚方劍坐蟒承宗乃辟職方主事鹿善繼王則古為贊畫請帑八十萬以行既至關首定兵制以三千人為一營十五營為三部兵不離將將不離帥使教肄分而稽核便修築關城南防海口北防角山安大炮於望海臺以為橫擊頓萬人於三道口之石城以為突騎置炮臺十一於北水關外以防外瞰此守關之大略也汰副總兵以下數百人罷真定保定河南踐更之卒以實中原三輔承宗之議大約謂守寧逺所以守關門屯大兵於山海以次第戰守於法為正為實東連西結分布於覺華彌串廣鹿於法為竒而正虛而實又謂西部必不可用遼之遺民必不可棄關內之遼民當使籍土著關外之遼人當使籍卒伍關外十三站之義民諸不附敵者當收置寧逺覺華以遼人守遼土以遼土養遼人此今日之大計也請置大將以馬世龍佩平遼將軍印行授鉞之禮節制三部罷監陳之官更定儀注總兵官以賔禮接經撫不戎服跪階下移咨朝鮮國王李琿激以同仇之誼犒毛文龍於東江令復四衛檄登帥沈有容進據廣鹿而自以春防詣登萊商度進取之計時朝廷方急遼不許也劉愛塔者遼人也為金復都督改名劉興祚至是內附會我兵去廣寧道臣萬有孚欲挾西部襲殺遼人以為功承宗不許全活者千餘人設六館以招徠天下豪傑三年春進諸將將吏而問之曰汝等數言按視寧逺何以屢更衆曰請戒期承宗曰以明日往何如衆皆愕翼日即出關抵前屯總兵趙率教以空糧買馬置牛屯練修舉大加慰勞以所乘輿豫之自前屯一日馳至中右質明抵寧逺登其城喟然而歎復由盧山夜抵中右乃還治所當是時魏忠賢用事興內操使中官胡良輔劉朝等犒邊已寓中人觀兵之意承宗力言其不可有旨報聞募關以西遼兵數千人遣魯之甲將三千人出守中後所遣王楹將三千人出守中右所又念寧逺城大而瑕檄祖大夀移覺華島兵七百人於城中命大夀司版築汪翥司窑造計日舉事又以土官招撫主守客兵訓練主戰立兩遊擊於要地専備應援又移拱兔市場於興水堡遣左輔領精騎出哨中右鎮撫闌入一步即以掠論於是我軍不得恣意屯牧方遼事之殷也承宗有請人不得不從及邊警漸息中外解嚴於是朝議籍籍謂承宗用撫臣閻鳴泰嶽和聲及大將馬世龍為非是御史潘雲翼首劾去鳴泰以張鳯翼代之鳯翼復主畫關退守之説承宗力爭請勿設撫臣以撓戰守不聽先是虎部中竊出盜掠趙率教捕斬四人道臣萬有孚詬之督臣王象乾欲斬率教以悅西人承宗力爭乃免而王楹之城中右也護其兵出採木西部朗素邀之中伏而死蓋萬有孚陰主之承宗怒遣馬世龍引大軍從大槃嶺壓其巢五部恐逺徙三百里外象乾恐其敗欵也教素朗縳我逃人為殺楹者以獻而增其賞千金承宗曰人各有能有不能此象乾之所能而非臣之所能也因極論西部不可用欵不可恃通官與當事之説不可憑會象乾以憂去遂自劾乞罷譴又請勿推經略總督以一事權皆不聽承宗在關四年前後復大城九堡四十五練兵十一萬立車營十二水營五火營二前鋒後徑營八弓弩火炮軍五萬輕車千輛偏廂車千五百輛沙唬船六百馬駝牛騾五萬甲胄器械弓矢火藥藺石渠答鹵楯合數百餘萬闢地四百里招回遼人四十餘萬遼兵三萬屯田五千頃獲零級一千八百有竒故事積級二百五十準一大捷承宗勿敘也論功加太子太師與閣臣皆世錦衣千戶而魏忠賢則世襲錦衣都指揮使加恩三等撫臣張鳯翼因遼撫居遼之説恨承宗刺骨與萬有孚潘雲翼嗾人極論馬世龍之罪以撓之又承宗素不悅於魏廣微及魏忠賢再遣劉應坤胡良輔等犒師承宗待之又倨會是年九月遵詔巡喜峰古北口請以十一月入都門賀萬夀節與廷臣面商進兵事宜廣微奔告忠賢曰樞輔擁兵數萬來清君側兵部侍郎李邦華為內應公等為虀粉矣忠賢繞御床而哭上南郊回趨內閣擬諭次輔顧秉謙奮筆曰無旨擅離汛地祖宗法所不宥兵部馬上差人傳樞輔馬首即東午夜開大明門召兵部尚書趙彥入分三道飛騎止之又矯諭九門守閹孫閣老若入齊化門便鎖綁進來時承宗已至通州聞命即日還鎮具疏入奏亦不牽連引謝忠賢遣人偵之一襥被置輿中後車惟鹿善繼從意稍解而廣微又嗾崔呈秀徐大化李蕃連章劾之比之王敦李懷光會師失利於桞河哨將李承先魯之甲皆死於是臺諫交章劾承宗遂罷歸兵部尚書高第代之為經略復申守關之議承宗即家移書爭之不聽盡撤關外兵棄軍糧數十萬石哭聲震原野而寧前道袁崇煥獨不聽撤愍皇帝即位王在晉入為兵部尚書恨承宗不置抗疏極論馬世龍及茅元儀熒惑樞輔敗壞關事逮世龍逐元儀又嗾新進臺諫交口詆承宗以沮其出崇禎二年冬我兵入大安口取遵化將薄都城舉朝洶駭謂非用承宗不可詔起承宗原官改兵部尚書駐通州仍入朝陛見時十一月七日也十五日上知承宗抵近郊召見平臺慰勞畢曰卿不須往通為朕調度京城此時即煩卿去面諭首輔韓爌即擬敕來事權要隆重賜尚方劍自京營總協及坐門大小文武公侯駙馬伯下至總兵皆以軍法從事承宗承旨而出漏下二十餘刻周閲都城四十里五鼓而畢即出閲重城乃乘月巡濠塹度險阻是日夜半內閣傳奉聖旨卿等傳輔臣承宗星夜往通料理敕書隨後補給承宗夜宿重門質明門啓聞後命遵旨即行事祕人莫得知知者亦莫之敢指斯其故難言之矣中外聞承宗之出也皆驚愕尚書李騰芳鄭以偉講官羅喻義要衆伏闕請留承宗聞之疾馳出宣武門宿僧舍明日抵通總兵楊國棟以軍禮見承宗受而不辭曰吾以安衆也兩城中保鎮及京兵相半命國棟兼統之時上以流言忽置袁崇煥於法島帥祖大夀中軍何可綱等率所部萬五千人東潰自通之南二十里趨張灣渡河承宗遣飛騎追三百餘里弓刀反向僅及其尾大壽傳語曰事已至此當出搗東巢歸以待命耳承宗密請調馬世龍撫諭又代為大夀别白上俱如所請即命移鎮關門承宗即日戒途東發方世龍之追大夀於關門也令二將捧上手詔往大夀懼有變密授指揮下譟而出關世龍追及之於歡喜嶺單騎入其營傳閣部撫諭諸將諸將皆羅拜王承胤率所部先去曹文詔踰墻走大夀妻左氏使人語大夀曰孫公大人再貰若死兵潰何不死城下以謝孫公今來此吾以大炮待汝耳大壽意奪於其妻而又恐諸將之賣已也乃受詔斂兵以待命數日承宗再蒞關門而人心乃大定三年正月大夀入關謁承宗列所統騎步三萬於教場行誓師之禮乃遣死士沿海入報中朝始知關門無恙也及四城之復自為露布奏聞上親告廟布告中外加承宗太傅廕一子世襲錦衣衛指揮僉事賚白金五十蟒衣一襲三疏力辭上允辭太傅承宗還治所關政一新時梁廷棟為兵部尚書惡馬世龍不受中制令所善部郎丘禾嘉監其軍誣世龍坐視三屯不救承宗爭之廷棟益不悅故超拜禾嘉為遼撫孫元化亦以言兵超拜登撫承宗連章求罷弗許既而朝議皆欲聽其去以遼委禾嘉而上不從承宗十一疏乞休上遣中書詣關門宣諭視事四年正月八日承宗出關由前屯寧逺抵松錦十六日由三道關一片石歷石門燕河遍閲三協十二路由石塘路過平谷經盤山入薊州而還條次東西邊政分八疏入奏上嘉納行之未幾而有凌河之墮承宗抗疏乞休疏十七上乃許乘傳歸已而追論長山之敗坐矯旨復城欲中以危法上不許命冠帶間住削寧錦敘功世廕承宗上言臣願陛下治臣進兵敗衄之罪不宜以兵潰缷罪於進兵使天下以禦敵為戒也臣願陛下治臣不能禦敵之罪不宜以兵困卸罪於復城使天下以復城為諱也崇禎九年我兵破定興鹿善繼死之賦詩六十四章哭焉後二年九月圍高陽承宗部勒子弟城守十一月破城坐北樓叱衆家丁速去我死此我兵挾至城南三里橋欲降之叱曰我朝廷大臣城亡與亡死耳無多言以葦席布地望闕叩頭取弓弦自縊死從承宗死者次子鉁四子鋡五子鑰六子鈰七子鎬孫之沆之滂之澋之浩之瀗兄子鍊鏘從孫之徹之渼之泳之澤之渙之瀚皆力戰死事聞上震悼忌之者猶在事僅復原官豫祭葬後追贈太師諡文忠外史氏曰嗚呼痛哉在朝諸臣皆無心肝者其必去先生而用此輩犬豕豺狼者何耶嗚呼痛哉天耶人耶吕維祺傳呂維祺字介孺河南新安人父孔學稱仁孝維祺少能文究心理學聞鄉先正孟雲浦之風私淑之著知非針心法吟萬厯四十一年進士授兖州推官清獄囚罷驛夫行保甲法擒黃河巨盜三十餘人立山左大會置學田注邵康節孝弟詩以教學者修孔廟仲子廟議正祀典黜季孫子叔疑盆成括立子思專祠以次子襲謂孔子至尊子思且不敢稱宜改先賢忠為子蔑子先儒安國為子國子皆奏行之擢吏部稽勳主事歷考功文選員外郎驗封郎中執法不附當熹宗未登極前二日諸閹導之幸小南城鹵簿具矣維祺亟偕同官臺省見政府危言阻之乃止遂抗疏謂調護聖躬近御不得干預政事防微杜漸不可一步輕動魏璫聞而銜之天啓元年假歸立芝泉講會從遊者甚衆璫焰方熾指為東林黨人毁書院去程朱位維祺祀伊洛七賢其中與李日暄輩講誦不輟會城建璫祠維祺移書諸紳戒勿與璫益恨四年推考功郎中竟矯旨别推焉崇禎元年起尚寶司卿升翰林院提督四譯館太常寺卿疏陳八漸如留中改票慎刑點陪免進講棄言官慎宴遊寡嗜欲上嘉納之三年升南京戶部右侍郎總督糧儲陛辭上目送之顧輔臣曰此臣如何使之南輔臣曰南糧匱窘非此臣不可時南京倉庫如洗軍糧壓欠至一二年脫巾鼓噪毆管餉司官焚科臣房屋維祺署大司農事心憂之設會計簿晝夜稽核搜北部借南糧二百六十四萬疏爭之搜杭嘉蘇松等府侵南部抵漕折銀八萬五千餘兩劾布政莊廷臣等抵之搜各省未納二百三十六萬兩及藩工銀十三萬四千兩又隱匿布絹紗銀二十四萬兩劾布政董承詔等抵之查出戶司書手韓文綜等侵欺南糧百餘萬庫書夏汝清等侵欺銀四千九百餘兩勒限究追修建三十六倉五場清完屯糧八十八萬有竒請開新舊爐鼓鑄獲利八萬七千二百九十兩有竒前此倉米不足一月越三年存糧一百五十餘萬可二年之用折色原銀九千餘兩壓欠應支三十八萬越三年存銀二十八萬紙贖公費約積一萬五千餘兩除修倉助餉學田優賞外存銀五千一百兩分毫不以入私維祺又以國用未敷民力已竭請將舊逋量折量蠲并罷北直河南江北米豆折色加賦及改金衢徽紹四府水兌折色人皆便之會上遣內臣監視戶工九邊兵馬錢糧紛紛四出維祺首疏抗論仍責相臣首鼠不言繼而南北始有公疏上亦允罷惟以北部借餉請暫寬稅例一年緩解并免蕪稅南京加稅議格不行內監織造額外苛索力爭不克凡三疏乞休不允六年升南京兵部尚書參贊機務留都軍政廢弛冒濫驕玩維祺申令整飭嚴禁將官餽送不受一花一果揭示優恤軍士十六條盡革打點需索每隊置小牌每營置大牌各書姓名使什長𨽻隊長隊長𨽻總衛相習如臂指乃課武藝勤操練裁冒軍八千餘名察姦吏陳天翥等侵餉一萬二千餘兩正法備硝黃二十五萬斬流冦諜者十餘人賊遂西遁復三疏乞休不允而維祺居南久絶長安交際權貴多失望八年大計致仕尋以拾遺革職遂歸侍父洛陽宅立伊洛會初維祺在南京立豐芑會及門楊以任等二百餘人講程朱正學著孝經本義至是在洛及門姚賡唐等亦二百餘人而著孝經大全或問成進呈御覽命下所司較止有芝十八莖生於庭內閣臣巡撫交薦復職而維祺終不出新城庳薄維祺首捐四千金倡修適有土賊王之典之變維祺率家丁鄉勇平定之邑賴安堵又值大飢維祺檄搢紳士民出家財設粥大賑四小賑七繪河洛災荒圗上之十四年冦陷宜永逼洛城福王在城中維祺以大計動之不從冦至維祺守北城縋家丁殺賊數人總兵王紹禹通賊殺守堞者遂潰家人勸更衣弗聽勸縋城弗聽勸避民舍弗聽賊執下雲梯掖出西城道遇福藩奮首曰王生死命也名義至重毋自辱至周公廟見大冦不跪怒曰汝日請兵勦我今復何如維祺厲聲曰我為兵部尚書恨無兵馬殺汝狗彘今日惟有一死耳不辱聖賢不愧天地生為正人死必為正神吾何畏汝耶左右欲生之維祺更嫚罵曰生尚書不值一錢北向拜皇帝哭曰君恩未報臣力已竭又西向拜辭父母延頸就刃遂死事聞上哀之贈太傅諡忠節豫祭葬造祠蔭子入監維祺少失恃育於祖母牛氏牛守節事之至孝天啓中旌表建節孝坊崇禎時父孔學以捐粟一千石錢二百千賑一萬七百人御史題請建旌義坊至維祺殉難人謂忠孝節義理學亷能皆出一家云外史氏曰先生之學問先生之材能先生之功績久已彰著於天下天下人皆知之而天子獨不知耶乃不用以為相而反用蠅營狗苟之溫體仁周延儒輩嗚呼此天下所以亡也汪喬年傳汪喬年字歲星浙江遂安人天啓二年進士授刑部主事璫數使人招之拒不赴東林諸賢被難喬年陰為調護歷郎中恤刑江南丁內艱服闋補都水司郎中在道改守青州青故雄郡賦繁胥猾屬邑徴解例有添搭錢喬年悉罷去永著為令政尚勤敏案牘無巨細手自裁斷夜秉燭繼之廊廡置土銼十餘具薪米兩造自炊候鞫是非立決贖鍰止供解額無敢索民一錢者崇禎三年舉天下卓異第一明年登州變其帥下令無躪青州尺土紆道去時觀軍大璫體擬督府喬年獨與抗禮璫不能奪六年擢山東布政司參議分巡登萊諸郡生平氷蘗自凜至是凡僚屬贈遺悉受不辭人莫喻其意及至萊城郭新破守禦空虛盡出所受資市馬募兵修濠湟治器械殘郡復完以親老乞終養歸裝惟書史數簏而已居父喪復起備兵河東十一年詔廷臣舉邊才方逢年時為禮部薦喬年長才真品操守無玷升參政督學陜西治行又第一十四年升陜西按察使時巨冦方張歲復大祲喬年積穀平糴勸秦晉督撫以下及巨室協助全活億萬計夏特簡都察院右僉都御史巡撫陜西未受敕聞李自成將窺關即日赴商洛與士卒露處設險堵擊八月返西安未旬日張獻忠冦鄖西亟移駐山陽遏之九月總督傅宗龍敗沒關中大震即軍中以喬年為總督代之當是時冦逼門庭悍帥不率命宗龍全軍皆覆而餉竭兵虛所向奔潰無固志中外洶洶無能為朝廷設一䇿者喬年雖以清望被命一歲數遷然三秦之徑盡矣時敕印未至即舊署調固原臨洮及團練總兵賀人龍等三鎮兵臘月騎始集簡兵儲糧為進討計而兵部屢檄促出關乃傳檄米脂令發逆闖祖塋得一蛇斬以徇誓師祭纛十五年正月督師赴河南時賊圍總兵左良玉於郾城縣老寨屯襄城喬年議搗其巢留步兵火器營於洛陽精騎倍道兼進二月抵襄城賊舍良玉以數十萬衆逆戰人龍等三帥未陳先奔諸軍遂潰喬年仰天曰此吾死所也率標兵千餘人入襄城拒守城無守具賊炮矢如雨圍七晝夜火藥矢石皆盡援兵不至俄大雨雪城崩喬年腋中流矢率副將張一貫黨威監紀孫兆祿等巷戰手馘數賊被創引刀自剄未死賊執詣韓家莊大罵不屈賊怒割其耳鼻舌乃死居民憐其忠瘞莊後賊退改殮面如生事聞遣官護櫬歸喬年生平清苦自勵蒞官祇二老僕隨行所屬供帳悉叱去其去青也青人尸祝之與范文正同祀以所撰訓民書供几案間時喬年尚無恙民有疾病疑難籲之輒應庭有稿木祀之日垂實纍纍人至今神之外史氏曰前朝祇重書生而奴𨽻武辨視士卒如犬豕後雖稍加噓植有小卻言者即刺刺不休而軍心失矣當其末年流冦猖獗軍卒皆以天命有歸見輒奔潰縱孫吳復生亦不能將也嗟乎况先生乎又掣之臺諫乎東林列傳卷六
