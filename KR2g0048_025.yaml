官兵進勦乙丑以李養正為南京刑部尚書壬申雲南官兵恢復霑平命備紅夷贈袁應泰兵部尚書給豫祭廕贈殉難土司彭象都督僉事山東巡撫趙彥奏捷獻俘己丑左都御史鄒元標致仕修撰文震孟上國勢綦艱疏奉旨調外南京兵部尚書魏養蒙卒陳道亨代之是月有龍見於北花房河中長尺許詔放黑龍潭十一月癸巳朔加貴州巡撫李橒為兵部侍郎右僉都御史巡按史永安太僕寺少卿仍舊任戊戌慶陵工成俘何若海等至京磔於市贈徐可求右都御史豫世廕庚子俘徐鴻儒等至京磔於市十一月辛丑擢趙南星為左都御史房壯麗為工部右侍郎兼右僉都御史總理河道甲辰册封光宗選侍劉氏為貞靖賢妃信王生母也皇弟由模追封簡懷王皇妹追封悼懿公主戊午發帑金五萬兩賑遼民戍李可灼於邊辛酉以楊述中為兵部侍郎總督貴州進朱燮元為兵部侍郎總督四川湖廣左副都御史馮從吾罷發帑金三十萬兩充黔餉十二月甲子册封光宗選侍李氏為莊妃暹羅入貢丙寅宗室慎䤰首登進士科命授京職著為令己巳貴陽圍解以山東平命存恤孟氏子孫修復孟廟癸未以何熊為南京吏部尚書朱光祚為副都御史協理戎政敘平妖功加趙彥兵部尚書餘升賞有差辛巳停各衙門添注官核四川文武功罪廕恤勘議有差恤廣東死事將士丙戌南給事中歐陽調律請舉建文廟祀並修實録下禮部議辛卯旌表節烈三年春正月壬辰朔甲午五更火星犯房宿北第一星庚子玉牒成葉向髙等各進秩有差織造中官李實訐有司不行屬禮工部尚書姚思仁劾之不問再恤建言散秩諸臣御史溫臯謨劾黃嘉善崔景榮張鶴鳴章下所司乙巳山東妖賊平己酉命朱國楨顧秉謙朱延禧魏廣微俱以禮部尚書兼東閣大學士入閣辦事紅夷入澎湖壬子鳳凰集開封大騩山撫臣以聞癸丑月犯鍵閉星戊午斥鄭養性居逺方己未大學士孫承宗為中部大將馬世龍請尚方劍允之二月癸亥考察京官丙寅山東蓬萊地震陳必謙再糾鄭養性劉廷元戊辰追恤征妖將士張榜等五十七人命顧秉謙朱延禧同知經筵日講并實録總裁己巳以盛以𢎞為禮部尚書兼翰林院學士改李長春為户部尚書升張輔之為南京工部尚書辛未鄭養性請居杭州乙亥貴州副總兵劉超大敗安賊於陸廣河參將秦民屏復敗之於乾溝破其五寨丁丑賜平遼總兵毛文龍尚方劍戊寅命太監劉朝胡良輔紀用陶文班賞關門暹羅入貢辛巳永平城樓災火藥盡焚壬午以鍾羽正為工部尚書乙酉贈死難孟子嗣孫博士孟承光為太僕寺少卿母孔氏加號貞淑子𢎞略為太常寺丞僕習天壽為百戶己丑御史周宗建劾魏進忠郭鞏責令回話貴州官軍敗績於陸廣起李三才為南京戶部尚書三月乙未月犯畢宿第一星丙申南丹州土官莫俊隂黨安酋其祖母韋氏殺之詔旌其義丁酉紫荆妖民趙思武聚衆為亂推官花紹序擒之以陳大道為戶部尚書李宗延總督倉場壬辰松江地震左都御史趙南星申明憲職詔所司永遵乙巳薊鎮天鼓鳴有星隕大如車輪火光四燭丙午登萊地震辛亥命鑄平遼參謀錦衣衛僉事關防給毛雲龍禁抄機密重情雲南逆賊祿千鍾犯尋髙武定曲靖官軍禦却之甲寅禱雨銀定入犯擊敗之黃梅熊宣等作亂擒之詔釋江南罪宗決姦細杜茂丁巳登萊水兵出海琉球入貢夏四月庚申朔京師地大震辛酉命肅朝儀壬戌盜入神武門獲之釋江西罪宗丙寅諭各督府選將材戊辰遣官祭孟廟己巳朱國祚致仕庚午旌韓莊王妃董氏慈節韓王亶嵴賢孝改建羅一貫祠於甘肅賜額精忠辛未兩廣總督胡應台進西洋練習火器者命教肄京營戊寅蠲薊州草場租庚辰停三部總理戊子貴州巡撫王三善奏大水塘之捷朝鮮國王李琿為其姪倧所篡巡撫登萊袁可立請討之督餉侍郎畢自嚴言討之非計當俟請貢輸誠東征效力徐許其封耳報可己未大理少卿范濟世請加封李選侍詔切責之逮失機總兵杜文煥五月庚寅朔禮部尚書盛以𢎞致仕壬辰順義王卜失兔遣使入貢己卯御史宋師襄追論劉朝之罪命捕餘黨下有司庚子詔選淨身男子一千人河決雎陽以林堯俞為禮部尚書天暑慮囚四川永寧大捷奢崇明父子敗走紅崖丁未册封才人張氏為裕妃贈山東死難滕縣知縣姬文胤為太僕寺少卿六月庚辰朔詔再選淨身男子一千人御史劉之鳳請罷內操不許秋七月辛卯南京大內火奢寅父子敗走龍場賜遼東死事諸臣祠額己亥史繼偕致仕甲辰光宗實録成丁未鍾羽正致仕以王舜鼎為工部尚書辛亥命劉孔昭襲封誠意伯甲寅廕王體乾魏進忠弟姪為錦衣指揮世襲廷臣爭之不報乙卯何熊祥罷董漢儒丁憂歸以趙彥為兵部尚書八月己未朔內使王文進毆殺戴忠下司禮監刑部尚書孫瑋請下法司不聽莊士元棄市以王舜鼎為工部尚書甲子火星犯南斗魁第一星乙丑發帑金十萬兩餉關門丙寅御史胡良機請罷內操不聽丁未命朱國楨釋奠太學戊辰王象乾言束把孩諸部叩關請撫賞發帑銀十萬太僕銀十萬給之壬申獲安賊黨何中蔚等獻俘磔之廕四川死難總兵楊愈副使李維周推官郭象儀等癸酉奬諭蜀王以捐金助工也甲戌趙彥回部理事吏部會推王紀降旨切責丁丑四川鎮平堡地震朝鮮昭敬王妃請封下部議之戊寅復宗人充輔國中尉辛巳命恭順侯吳汝孕等查京營甲申姦人韓宗功伏誅九月戊子朔余懋學罷陳道亨致仕壬辰豫魏學曾諡廕癸巳給事中陳良弼陳言著鎮撫司打問大學士葉向髙揭救不允乙未松潘地震向髙乞歸不允良弼奪俸半年命南居益回部管事升國戚王朝寵為都指揮僉事丙申李宗延為户部尚書主事談謙益薦妖人宋明時詔送薊遼總督軍前試之甲辰大星犯軒轅乙巳大學士吳道南卒贈少保諡文恪丁未周應賓罷壬子諭留首輔葉向髙癸丑吏部尚書張問達致仕冬十月辛酉毛文龍奏復金州及滿浦吕城壬戌給事中方有度參毛文龍袁可立當罷不聽癸亥魏廣微入直供事甲子敘平妖功進趙彥太子太保廕錦衣僉事世襲己巳皇第一子生旋殤給事中熊奮渭請給遼陽死事諸臣諡允之辛未葉向髙請停刑不許癸酉以趙南星為吏部尚書甲戌再請停刑貴州兵克安賊碗哈羊雀等屯斬獲甚衆乙亥京師地大震丁丑命停今年決囚海運輸粟十萬石餉毛文龍軍己卯皇第二子生慧妃范氏出辛巳上以皇子生告太廟是日日生重暈暈旁生左右珥甲申夜火星犯壘壁陳西南第五星閏十月辛卯以蕭雲舉為禮部尚書葬神宗清惠順妃李氏於銀錢山乙未沅陵民家牛生犢一身二首三尾又玩坪溪民家産豕長喙豬身人足隻眼戊戌以孫瑋為吏部尚書管左都御史事張經世為戶部尚書總督倉場毛文龍報董骨寨之捷己亥宣延綏寧夏甘肅三鎮捷祭告郊廟壬寅皇子生詔赦天下丙午以毛文龍言建龍王廟於鹿島封顯應王庚戌以李起元為南京戶部尚書起楊漣為左僉都御史乙卯雲南地震盜入順天府庫四川仁壽縣長山裂聲如雷長七里衡三尺深不可測十一月丁巳朔冬至躬祀上帝於南郊以太祖髙皇帝配封王升為新城侯子國興為指揮同知甲子以喬允升為刑部尚書李起元總督三邊乙丑慶陵饗殿成戊辰册慧妃范氏為皇貴妃己巳準張國柱襲封安鄉伯孫瑋進太子太保甲戌陜西賽平諸番族貢馬哈唎慎部朗素貴英等糾三十六家挾賞犯中右所參將王楹出擊遇伏死之京師傳言上欲親征乙亥陜西鳳縣大鼠有肉翅飛而害稼割其腹得粟一升朝鮮入貢楊述中免乙酉録貴州搗巢解圍功右都御史朱燮元等進秩有差十二月丙戌朔泰寧三衛貢馬乙丑太白晝見戊戌京師地大震陜西韓城妖人劉買得作亂擒之丙午逐妖人宋明時丁未册封成妃李氏南直應天蘇松鳳泗淮揚滁州等處同日地震己酉停推薊遼總督歸經略庚戌補給先臣楊繼盛全葬賜魏進忠名忠賢提督東厰乙卯命黎惟祺襲安南都統使旌天下節孝貞烈東林列傳卷末上
