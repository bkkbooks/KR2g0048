body:
  text: 東林列傳卷末上江隂陳鼎撰明附熹宗原本本紀上熹宗達天闡道敦孝篤友章文襄武靖穆莊勤哲皇帝諱由校光宗第一子也生於萬厯三十三年十一月甲申日母選侍王氏是為孝和皇太后神宗以元孫生詔告天下萬厯四十八年九月乙亥朔光宗崩遺詔皇長子嗣位諸臣入臨請見皇長子時選侍李氏踞乾清宫要封皇貴妃不令出良久方御寢門諸大臣擁至文華殿叩慰畢請即位不許諭禮部具儀注大學士劉一燝奏今乾清未淨殿下宜暫居慈慶吏部尚書周嘉謨奏殿下今日之身社稷神人所託即詣乾清哭臨必俟臣等至始發皇長子首肻兵科給事中楊漣語司禮中官王安外事緩急在諸大臣調護聖躬是內臣事因勉以忠義安力任之諭大臣率欽天監相視山陵首輔方從哲票擬賞李可灼白金五十兩紵絲三表裏是日皇長子居慈慶宫丙子頒大行遺詔丁丑大臣請選侍移宫戊寅御史王安舜以首輔方從哲擬賞可灼非是特糾可灼擅進紅丸之罪改旨奪俸一年御史左光斗請肅清宫禁御史鄭宗周請誅崔文升令旨下司禮監查勘己卯選侍未有移宫期從哲欲緩之楊漣力爭即日移仁夀殿中官王永福等八人皆鄭貴妃李選侍所私也盜乾清珠寶下詔獄訊之獄具永福及劉進忠鄭穩山劉尚禮薑升劉遜棄市盧相趙進忠戌邉庚辰皇長子即皇帝位大赦天下改明年為天啓元年以是年八月至十二月屬之泰昌辛巳諭德張鼐上養身養性勤學敬天法祖親賢納諫信令恤民持體十事報聞壬午給事中惠世揚劾方從哲十大罪從哲自辨求去不允諭尊光宗元妃郭氏才人王氏為皇后議諡癸未御史袁化中再糾方從哲誤國甲申上皇祖大行皇帝諡恩賚扈從慈慶宫文武諸臣丁亥上皇祖妣孝端皇后尊諡孝端上皇祖妣皇貴妃尊諡孝靖頒詔天下允禮臣請開經筵擇講官允給互市沙什台吉冠帶己丑上大行皇帝尊諡庚寅命寶源局仍鑄泰昌通寶錢命設督運糧餉官給關防命中官李實織造浙江逮遼柬總兵李如柏李如楨如柏自縊辛卯給事中楊漣劾兵部尚書黃嘉善一籌莫展宜加誅斥癸巳蘭州黃河清江西大水甲午廕中官魏進忠兄釗錦衣千戶封乳母客氏為奉聖夫人官其子侯國興為錦衣衛正千戶丁酉發帑金五十萬修慶陵戊戌收淨身男子三千人御史賈繼春疏請安選侍遼東總兵賀世賢與我兵戰於灰山己亥赤氣映天如赭良久乃散御史左光斗因賈繼春言疏陳移宫之由請安選侍庚子諭戶部東事未平加𣲖不能遽免其災傷地方加意撫恤辛丑諭內閣曰朕昔幼沖皇考選侍李氏恃寵驕恣氣毆聖母以致懷憤感疾崩逝朕寃憤莫伸惟抱終天之痛皇考大漸閣部諸臣入內問安選侍威挾朕躬傳封皇后用手推朕向大臣靦顔口傳至今含赧因避其毒暫居慈慶李氏使李進忠劉遜等傳每日章奏先奏聞李氏方與朕覽仍思即日垂簾聽政處分御史左光斗他日必為武氏之語朕思祖宗家法甚嚴從未有此規制朕今奉養於􅎪鸞宫仰遵皇考遺愛凡爾外廷誤聽李黨浮議未悉朕心之厚也李進忠田詔等盜庫情真致干憲典豈謂株連卿等可傳示部院遵行故諭御史馮三元等劾經略熊廷弼專工作而尚威刑命解任聽勘壬寅黃嘉善罷冬十月甲辰朔命寧晉伯劉天錫攝享太廟丙午葬神宗孝端皇后於定陵孝靖皇后遷袝賑江北水災官客氏弟客光先為錦衣衛正千戶丁未擢袁應泰為兵部右侍郎兼右僉都御史經略遼東壬子遵遺詔加恩東宫講官丙辰祧英宗神主丁巳賞九邊軍士己未神宗及孝端皇后主升祔於太廟允禮臣請選大婚庚申以孫如遊為禮部尚書兼東閣大學士入閣辦事辛酉御經筵甲子御史賈繼春安伸田珍以如遊由中旨入閣非故事請收回成命不聽減雲南貢金額二千兩以後勿征以崔景榮為兵部尚書丁卯􅎪鸞宫災戊辰命大臣公舉風力科臣勘遼東功罪癸酉發帑金一百八十萬兩犒邊十一月甲戌朔頒天啓元年大統厯丙子上聖母孝元皇后孝和皇后尊諡命編修劉鴻訓給事中張國祥使朝鮮丁丑撤回天津採取銀魚內官專敕內監選后及妃嬪甲申允給事中張其庭奏免畿輔加派一年命給事中朱童蒙往遼東勘廷弼功罪乙酉諭大臣不得輕於求去言官不得任意雌黃務協恭盡職以全國體命撫按嚴核驛遞戊子發京營選鋒三千戍石塘堡辛丑命泰寧侯陳良弼攝祀上帝於圜丘癸卯賜袁應泰尚方劍給事中周朝瑞特紏賈繼春十二月甲辰朔命輔臣撰敕奬楊漣奏寢之戊申御史方震孺疏述三朝艱危帝是之乙卯詔曰朕沖齡御極內外清平不意外廷邇來忽生謗讟輕聽盜犯之訛傳釀成他日之實事不得不申諭避宫始末以釋羣疑九月初一日皇考賓天入臨諸臣即請見朕李選侍阻朕於暖閣以司禮官固請始出旋使李進忠促回至於再三方朕蒞乾清宫進忠牽衣不放繼又遣人要之宫門不欲使御文華殿此卿等親見當時景象安乎危乎果當避宫乎不當避宫乎爾刑部及各衙門欲行庇護之私妄借安選侍為題目是非淆亂豈曰忠謀輔臣義在體國為朕分憂何不代傳諭言屏息紛擾君臣大義何在如初一日視皇考入殮選侍又阻朕於暖閣司禮監官以大臣言再四陳請方許初二日朕送皇考梓宫於仁智殿行禮未畢邀朕再行朝見方許回慈慶宫扈從大臣科道官所親見明是威挾朕躬垂簾聽政之意朕蒙皇考派之照管原非住彼宫飲膳衣服皆皇祖皇考所賜與選侍無與獨其侮慢陵虐有闔宫所共見而不忍言者皇考既知其故親臨慰勸并使宫官喻解而選侍以毆崩聖母自知有罪使人時來探朕不許與聖母宫人一言有即致罪此朕年來苦衷外廷不能盡知前刑部執奏父母之恩猶天地仁人孝子用心固然朕以故停其封號以慰聖母在天之靈奉養優厚敬遵皇考遺愛該部亦可仰體朕心矣乃大小臣工惟知私於李黨責備朕躬不顧大義卿等其知之南京軍士鼓噪燒科臣晏文輝公署方從哲罷庚申以少詹事徐光啓兼監察御史練兵以周應賓為南京禮部尚書丙寅録宋儒張載十四世孫文運為奉祀給冠帶己巳命各處府州縣皆立武學天啓元年春正月癸酉朔大風雪命擇日開講甲戌穆廟竒妃葉氏薨宴朝鮮陪臣允禮臣請有犯廟諱御名者悉改之己卯發帑金五十萬兩充遼餉庚辰親享太廟辛巳諭閣臣孫如遊出視事都給事楊漣乞歸允之甲申御文華殿講讀乙酉詔選淨身男子一千五百人入宫丙戌土星逆犯井宿命鑄提督陵工內監關防丁亥準栁祚昌襲安逺侯戊子命大學士韓爌相度定陵庚寅補大選贈劉元震禮部尚書廕一子入監趙煥太子太保廕一子中書舍人給巡方印信我兵攻撫順破二十餘屯以原任總兵薛永壽管甘州西路事壬辰逮寧夏總兵王如金補給名臣伍文定等七十三人諡從禮部左侍郎周道登請也甲午御史方震孺言人心不平者三一曰國本之爭二曰門戶之説三曰移宫之事請召對不允乙未賜瑞王桂王惠王莊田丁酉帝始冠戊戌增收淨身男子二百人刑科給事中暴謙貞劾李徵儀宫應震劉文炳趙興邦章下所司辛丑定知經筵及講讀侍班官發帑金五十萬充慶陵工費壬寅御史王心一劾客氏魏進忠不報二月癸卯朔戍陳槐以冒認國戚故也我兵攻香爐山克之甲辰言官請復當朝口奏及召對之典從之乙巳日暈見於遼陽旁有珥如月赤白色又如環四面各有形如日又化為青虹如弓與日相背自辰至午始滅丁未遣大學士劉一燝祀先師孔子發盔甲器械於遼陽詔選淑女罷漕運總兵官修國子監廟舍考稽生儒戊申親祭社稷壬子陜西固原軍餘李文等以妖言聚衆伏誅癸丑我兵薄奉集堡乙卯狂人張道安冒衛士服入朝班癲言命衛司雜治因飭朝儀戊午我兵攻虎皮驛尋至王大人屯己未初開經筵加贈大學士于慎行少保豫廕壬戌頒泰昌錢式甲子安仁草場火庚午楊鎬李如楨論死陜西臨洮地震辛未嚴禁左道閏二月癸酉朔免肅藩貢馬南京吏部尚書沈應文罷丙子大風霾丁丑荆王由樊捐祿二千兩餉遼戊寅命大學士劉一燝詣慶陵相視懸宫己卯久旱禱雨復遼東科舉乙酉風霾如前戒諭羣臣辛卯髙𢎞圖張慎言為賈繼春訴寃嚴旨奪俸詔天津興屯務癸巳火星逆入氐宿甲午御經筵風霾諭羣臣修省是日日生交暈左右珥黃白相接白虹亘天起孫瑋為南京吏部尚書魏養蒙為南京户部左侍郎兼右僉都御史總督糧儲丙申除建文忠臣齊泰親屬戍籍得歸者三十三家并黃子澄親戚戍者亦如之戊戌昭和殿災加朵顔衛頭目格特穆爾阿布喇勒俱指揮僉事海州吳金祖叛總兵李光榮擒之辛丑斥賈繼春為民給事中蕭基極論姚宗文閲視之誤升副總兵賀世賢為總兵三月辛亥大風揚塵四塞乙卯我兵入渾河至頭目屯甲寅圍瀋陽乙卯下瀋陽總兵尤世功賀世賢及援遼川浙總兵陳䇿童仲揆管糧同知陳輔堯自在州知州段展諸將吳文傑雷安民戚金袁見龍鄧起龍張名世周敦吉石砫土官秦邦屏等皆死之辛酉恤三路陳亡將士劉綎王宣杜松各贈少保豫諡廕潘宗顔光祿卿董汝礪張文炳各僉事餘贈廕有差壬戌我兵下遼陽巡按御史張銓兵備副使何廷魁崔儒秀同知冒日乾都指揮徐國能等死之袁應泰自焚死西路綽哈陷長安堡癸亥補給四川天全六番招討使楊愈詔命丙寅詔廷臣舉謀略出衆者丁卯命修神宗實録海州四衛皆破起舊經略熊廷弼為兵部右侍郎升楊愈為五軍營總兵官協理京營事務庚午發帑金一百萬兩餉遼夏四月壬申朔日有食之癸酉浚都城濠安南入貢初禁抄發軍機疏檄命薊遼總督文球攝經略事日中有黑氣摩蕩將暮赤星見東方以李宗延為右僉都御史協理戎政遼東巡撫薛國用薦用白養粹乙亥以薛國用為兵部右侍郎兼右僉都御史經略遼東是日午刻寧夏洪廣堡風霾大作墜灰如瓜子踰時而止日將入作紅黃色外若炊煙日光所射如火延綏孤山城陷三十丈入地二丈五尺丙子命天津督餉侍郎李長庚回部管事以王化貞為右僉都御史巡撫廣寧丁丑防海戊寅兵部尚書崔景榮請演火器於都門外併分道募兵四川妖僧政神作亂擒之辛巳山西懷延二衛地震癸未誅降賊廢紳黃衣南京工部尚書丁賓致仕甲申詔舉邊才添設職方郎中主事各一員命鑄經略遼東巡撫天津巡撫通州三處關防乙酉發盔甲弓矢器械火藥等項給廣寧以援遼逗遛逮保定總兵郭增輝丙戌發帑金十萬兩築山海邊墻戊子山西開平龍門二衛地震己丑倭犯澎湖禦却之癸巳逮遼東陳逃贊畫劉國縉監軍道牛維曜海蓋道康若乾等甲午緝獲通夷提塘官劉保下詔獄命鑄援遼兵將關防給總兵王威乙未命御史傅宗臯總兵楊于茂招練新兵丁酉起兵部尚書王象乾凃宗濬俱以太子太保兵部尚書原官起用象乾總督九邊宗濬提督京陵軍務戊戌册張氏為皇后己亥恤遼陽死事諸臣張銓大理卿尤世功陳䇿少保各賜諡廕崔儒秀何廷魁光祿寺卿賜諡廕童仲揆都督同知吳文傑周敦吉戚金鄧起龍秦邦屏都督僉事等官未幾銓再贈兵部尚書儒秀廷魁同贈大理寺卿庚子鑄選將募兵關防磔劉保於市並誅其子五月壬寅朔册王氏良妃段氏純妃御史張捷請罷內操不報甲辰風霾四塞乙巳御史王允成請恤録廢籍顧憲成等章下所司丙午敘延鎮監市勞賞卜失兔阿不害等有差丁未黔苗平宣捷集廷臣議兵餉緩急戊申兵部尚書崔景榮罷以王象乾代之辛酉固原寧夏援遼兵潰逮逃官河南布政司馮盛明河北道副使吳瑞徵乙丑宥永戍石星子石應竒回籍戊辰杭州火災蠲本年春運織造諭祭遼陽陳亡將吏己巳