body:
  text: 御製題東林列傳東林講學始以正而終以亂馴致與明偕亡陳鼎叙為列傳其序曰梁溪諸君子講學東林天下從之皆尚氣節重名義及國亡帝后殉節效在五十餘年之後亡國有光於明為烈嗚呼是邪說也不可以不闢君人者以顯承祖業致太平安民物為有光耳不能守祖業徒以國亡殉節為有光有是理乎即如東林諸人始未嘗不以正其後聲勢趨附互相標榜糅雜混淆小人得而乘之以起黨獄是開門揖盜者本東林之自取迄明亡而後已何取乎帝后殉節為有光哉鼎此邪說不惟為明君良臣之罪人亦實為正人君子之罪人夫正人君子豈有不願其國祚之久長民物之安泰者哉且厯代名臣莫如皋夔稷契伊望蕭曹房杜王魏韓范富歐是皆非講學者也而其致君澤民實蹟古今爭誦之漢室黨人已開標榜之漸激而致禍即宋之周程張朱其闡洙泗心傳固不為無功然論其致君澤民之實蹟如向之所舉若而人者安能並肩齊趨乎而蜀洛之門户朱陸之氷炭已啓相攻之漸蓋有講學必有標榜有標榜必有門户尾大不掉必致國破家亡漢宋明其殷監也夫至國破家亡黎民受其塗炭者不可勝數而方以死節殉難者多為有光於古收講學之效則是效也徒成其為害真所謂國家將亡必有妖孽而已陳鼎此書獨以裒集紀述本末粲然觀者或可資論世之助以為萬世之戒故録而存之而其邪說背理則不可不揭正以詔為政者故題之簡端乾隆戊戌孟夏月欽定四庫全書史部七東林列傳傳記類三總録之屬提要臣等謹案東林列傳二十四卷國朝陳鼎撰鼎江隂人明萬厯間無錫顧憲成與髙攀龍重修宋楊時東林書院講學其中欲以主持清議為己任一時聲氣蔓延趨附者幾遍天下互相標榜自立門戶而流品亦遂糅雜而不可問天啓中魏忠賢亂政附閹諸人因東林以起黨獄一時誅斥殆盡籍其名頒示天下至崇禎初既定逆案始大加收録死者追恤生者擢用而魏崔餘黨尚在競思翻案議論糾紛小人之反覆其間者又各借東林之名以張其氣𦦨是非蜂起水火交爭彼此報復迄明亡而後已是編所載一百八十餘人蓋即本於東林黨人榜及沈㴶溫體仁等雷平蠅蚋諸録以節義炳著者彚載於前餘亦分𫝊並列臚叙事蹟頗詳其中碩士端人固所不乏而依草附木者實繁有徒其流品混淆非但難語於宋之道學諸儒亦未可擬於漢之黨錮而樹幟分朋干撓時政其患卒隱中於國家足知黨論一開貽害必有不可勝言者此書仿龔頤正元祐黨籍傳之例各加紀述於諸人之姓名履貫無不本末粲然俾讀者論世知人得以辨别賢姦而推原其致弊之所以然其亦可為炯鑒矣乾隆四十三年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀東林列傳原序前朝梁溪諸君子講學東林垂五十年天下靡然從之皆尚氣節重名義及國亡帝后殉社稷公卿百職以及士庶人百工技藝婦人女子皆知捐軀效節殺身成仁講學之功效在五十餘年之後亡國有光於明為烈余懼史之失傳也乃囊筆奔走海內舟車所通足跡皆至計二十餘年廉訪死難死事忠臣義士得四千六百餘人節婦烈女在外托其事實作忠烈傳六十餘卷稿成欲上之史館攜詣京師寓崇文門夜為偷兒胠去僅存姓名録五卷蓋目録也自慰忠義猶得藉以不泯每思先梓以傳於世奈貧故勿能焉慨自東林講學以來風氣頓回賢良疊出奈崔魏煽禍逆璫熾虐繼之逆案諸奸揚灰播燼反指東林為邪為黨終之哲愍兩朝斬艾放逐殆無虛日至於國亡之後學者竟以東林為禍窟緘口結舌不敢道焉或有耆老齒及者後生小子輒搖首頓足其畏也若洪水猛獸決逸而來逃死不暇局勢之變乃至於此余也深為太息今春寓梁溪惠山倪高士祠繹行笈亂稿得若干人皆東林諸賢也因窮愁羇旅中編東林列傳二十四卷嗚呼前朝待士之隆越三代其得士之報亦越三代矣然非東林諸君子講明聖學闡發義理激揚廉恥烏能視國如家視君如父趨義如流視死如歸踵相接而肩相摩耶嗚呼非講學之成效歟有何可畏哉然是傳忠烈中五十之一耳若觀殉難諸賢姓名録則知有明忠烈之盛軼漢晉而超唐宋遠矣嗚呼學之不可不講也江隂陳鼎識凡例一東林書院本在無錫城東弓河上宋政和間楊龜山先生從京洛南旋僑寓於此與諸賢講學十有八年之所也歷南宋元明久已傾廢至正德嘉靖間邑先達邵二泉乞休居鄉在城南别建東林書院祀龜山及諸賢於內與門人華雲等講學於中故列傳首龜山次從遊之羅仲素喻子才尤延之李兀德蔣良貴胡德輝六君子次即列二泉以其為東林發軔之賢也一東林書院自宋至明久湮故址至萬厯中鄉先生顧涇陽昆季罷官歸求弓河故址與同里高景逸重復興起而龜山之講堂遂還舊觀四方學者始集故是傳首列涇陽昆季次即景逸起於萬厯止於崇禎至於本朝人物以俟後之君子一是傳皆本七録及東林黨人榜并熹宗實録七録者曰天鑒曰雷平曰同志曰剃稗曰㸃將曰蠅蚋曰蝗蝻七録所載或百餘人或二三百人或多至五百餘人黨人榜者逆璫魏忠賢於天啓五年十二月乙亥朔矯旨頒示天下禁錮東林諸君子生者削籍死者追奪或逮問追贓之文告也又有前鋒及後徑二榜皆載清流姓名余則按其姓氏稽其仕籍或趨其里居叩其父老詢其子孫或考之記聞核之志述采之史傳國冊諸書而為編次其或姓名雖載七録生平無所建白未遭逆害并有人品不甚端者概不入一七録所載不盡東林人也雷平録或謂出於沈㴶本欲聳上盡逐諸賢以罷去而輟蠅蚋録則出於溫體仁剃稗録或謂出於陳演或曰出自楊維垣有孫黨昆黨秦黨楚黨齊黨趙黨鄒黨東林黨浙黨之目㸃將録則出於魏廣微蝗蝻録則出於阮大鋮又有續㸃將録續蠅蚋録則併七録而盡歸東林矣或曰續蠅蚋録及蝗蝻録乃復社諸君子也計二千二百五十五人惟兩陜滇中無人七録所載有與東林毫無干涉者以睚眦私忿而並入焉彼既以為東林而害之余即以為東林而進之一東林弓河書院毁於逆璫髙景逸顧庸菴兩先生移建於錫城東門內更名道南終崇禎朝講學甚盛從遊者益衆主席者亦不一其人而其分則為復社又分而為幾社數千人然講者聽者或無功業於世或鮮道德於身徒事口舌講論誦說乃或偶踵東林之門或偶聽講於東林或出些微少資於東林或假肄業於東林以博科第或附影射於東林以求名髙或執役服於東林以志求食或入鄉賢名宦不可得而借足於東林或甘阿勢求榮以趨承而邀福於東林者究之聖賢之學性命之理茫然不知曰我東林也我祖我父東林也居然欲附於大賢之列國人皆曰不可諒諸君死而有知自亦以為不可余固以為不可也槩不入一是傳不分朝代及科第先後總以死難死節諸君子行狀相類者彚集於前餘則因其比而列之則死殁之先後歲月之參差概不能一一是傳七録及黨人榜所載者或前是而後非或始君子而終小人或言伯夷而行盜跖蓋棺之後論其人品則或死有餘辜誅之不足者或並非清流而逆璫誣為清流言行皆不足取法者概嚴不入一是傳名教所關流為二氏者即屬東林亦嚴擯之或先從二氏而卒歸儒者則進之如熊開元姜埰方以智輩本清流人物也及其老而為僧故不入如章如金等幼本黃冠及長歸儒又從事理學故進之一是傳啓禎兩朝事大都備十之七八矣若刪去一二則東林始末不彰焉且死節諸君子炳若日星豈可湮沒況有關於東林者乎故不敢遽去也讀者幸諒之一是傳實有清流人物或至其籍問其子孫則飄零異地詢之父老則凋謝無存搜之載紀又乏其著述考之史傳竟無其故事故無從立傳惟附於諸君子傳中而已如曹于汴鄭三俊等皆清流人物也俱不得其事實倘有見聞確者請示我以便續入集中一是傳史家體也每多慷慨激烈之言牢騷不平之語怨天尤人之句然不如是則無以示勸懲慰幽憤矣非若理學家言一味溫厚和平牖人於中庸之道也若飣餖先生指為激烈斥為怨尤則請先讀二十一史知史家體裁而後可也
