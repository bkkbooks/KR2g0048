body:
  text: 東林列傳卷二十四江隂陳鼎撰明馮元飇傳馮元飇字鄴仙寧波人年二十一與兄元颺同舉於鄉天啟壬戍成進士初授揭陽縣令歳旱衆請嚴事海神元飇移牒曰神無功德於民而南面設仗如王者僭非法聚薪將焚之既而澍降有米艘税數千元飇悉蠲之為輸助資忤璫罷歸崇禎初擢户科給事中首請停天下増賦百四十餘萬又䟽論錢法五弊謂臨清山海九邉等處宜聽人輸銅如中鹽例設官鼓鑄而統其事於兵部則邉餉易給將卒皆可彈壓矣時楊嗣昌督師山永上平賊䇿請天下有礦處聽民開採以散賊衆元飇廷折之曰此乃聚賊何謂散乎及嗣昌在閣部麋兵餉無算上一日以賦絀為憂元飇曰此兵戸不相核耳即如勦餉一事初擬用兵十二萬故措餉二百萬今所報兵數不滿八萬則溢餉已百萬矣誠欲覈餉不如覈兵上為竦然元飇在垣中久遇事奮發其所批䋲當路若周延儒温體仁王應熊輩侃侃不少借十年東宫出閣預選講官六人宫諭項煜編修楊廷麟䟽讓黄道周内閣張至發怒其沽名遂出揭言之奉有矯譲之㫖元飇抗言道周疾俗已甚閉門却掃人皆重之特以數忤執政引嫌褁足而東宫講讀二臣獨能篤信舉知退然自下正使其言不必用自足俯勵末俗増輝盛典為大臣者宜深嘉歎風勵百僚而閣臣一揭若大不快於其言者乃并遷怒道周臣恐天下後世有以議閣臣之得失也䟽出人多韙之然忌者益衆久之稍遷太常元飇屢請外遂出為南京太僕寺卿陞通政司召入為兵部右侍郎時天下事日壊將卒偷不可復使邉帥起債倍於曩時自元飇佐樞而詗事者數懷重賄探之卒不得其門去故上以是信元飇而元飇實積勞善病方為都給事時嘗侍文華殿忽踣仆折齒上惻然命糾儀者勿問也然以世恩遇主知自矢盡瘁十五年秋上既誅長夀陳新甲顧廷臣無可任樞宻者一日召諸大臣並馬遊西苑賜宴明德殿元飇時以左侍郎攝尚書與焉既下馬殿前上臨門南面立閣臣班於階諸尚書立階下上命元飇前元飇以位次不敢越辭上曰無嫌再命前乃進叅諸閣臣次上握元飇手語曰知卿固世家祖父兄弟受國恩宜善自力元飇頓首謝宴畢因論兵事良久出御馬佳者百餘匹及内製火箭次第示元飇元飇為辨其良楛上曰大司馬缺久無踰卿者元飇以多病不任劇遜謝久之既疾發乃舉劉餘佑攝部事又舉張國維上用國維尋罷去卒用元飇為兵部尚書而用倪元璐為戸部尚書兩人素相得又皆以經濟負天下望至是同日命下中外相慶上聞之喜甚語於朝曰昔堯命四佐舜舉五臣朕得此兩人不為少矣而小人大忌之謂東林再出門戸愈勁而天下事壊矣攻之者甚衆一日元飇至戸部堂與元璐聮坐面令吏書對簿吏書半匿不敢出元飇呵責之元璐以是得汰尺籍浮餉三百餘萬耗蠧之費一時為清元飇乃請自各軍副將而上由廷推叅游而下督撫薦舉於以核成無旁溢使上從之而兵部請寄賄鬻之費亦於是盡矣當是時上倚元飇出輔臣上有宻㫖一夜嘗數發元飇亦慷慨誓破賊乃請以督師孫𫝊庭堅壁潼闗總鎭左良玉堅壁㐮陽西則應蜀北則扼闖東顧鳯皖鳯皖之兵扼淮保定之兵扼河剋期會師戒勿浪戰俟賊饑困聮絡土寨漸蹙而取之廷臣多言不戰則賊益張兵久易懦元飇謂將士習懦益久未經行陣宜致賊而不宜致於賊自遼難以來催戰覆轍可為殷鑒一日質争於上前曰皇上若必以戰遲速為利鈍請先下臣獄俟一戰勝斬臣謝之耳上無以奪也而廷臣猶力請不已將以逗留為督師罪元飇手書與𫝊庭戒毋輕鬭且示白髙兩將不可任元飇既謝病𫝊庭撓於衆議趣出闗中兩將先逃師遂大潰而是時我兵方攻山海闗朝議倉皇欲檄天下兵元飇强起入見曰賊若據河北宻邇三輔則憂在旦夕今獨毖飭闗内急使河北軍衛三輔毋事紛擾為也已而元飇病益劇上賜瓜果遣醫眕視咸云不可治乃允歸元飇因舉都御史李邦華南兵部尚書史可法自代而廷議乖剌卒用張縉彦元飇謝病出都不數月而都城破元飇聞愍皇帝之變與兄天津巡撫元颺以不獲從死為恨日夕悲慟九月朔日元颺先卒越九日而元飇死年四十有七外史氏曰愍帝朝食禄者大都皆為妖狐之魂所慿視正人君子之讜言如冷風敗葉之過耳勿聽也狂吠之聲囂然於國中不虚其社而不輟白谷出闗之戰余深悲夫鄴仙先生之言不幸而中也黄忠昌傳黄忠昌字長倩山東即墨人舉天啟二年進士為人重名義不苟為依附初授雄縣知縣時逆璫魏忠賢用事雄近京師故多中官徃來有忠賢子姪廕錦衣衛指揮者干政民弗堪置諸理左右訹以危詞宗昌曰吾奉天子法而以奸容耶又中官之黨殺人朝貴多為解不聴憤曰是其氣焰足以論死况又殺人終令抵罪以能調清苑知縣是時逆璫勢愈張三輔郡縣争建忠賢生祠如恐不及宗昌言於知府方一藻故不授工以稽緩之及璫敗清苑獨無祠初璫惡宗昌倔强欲以東林殺之密使人言於一藻令劾罷而不果會熹宗崩乃已崇禎元年擢授山西道監察御史先是熹宗崩於八月二十二日三殿成叙功行賞於是月二十一日矯㫖加銜者六十一人宗昌憤之入臺班即具疏言權奸大惡無如矯㫖人臣玷染無如偽官矯㫖雖細法所必誅偽官雖賢千載共棄逆璫弄權竊柄隂謀叵測屏除異已誅鋤善良彼豈一旦而無忌若是率由懐禄固寵之輩阿諛苟容嘗先意逢迎遂啟其好大喜功之心因生其矯竊問鼎之漸如向者寧逺報㨗不過敵人解圍自去非能斬將搴旗復有寸土乃虛張聲勢命爵論功即朝臣一毫無與者皆遷官廕子錫幣賚金濫至百餘人國家名器盡為逆璫收羅心腹之具然此距先帝升遐之時尚有旬日雖欺罔擅行猶曰禁勿之事誰敢與知至於三殿工成之日正先帝大漸之時豈有安閒出詔之理縱曰彌留一息不肯以昏亂示人何不聞此日召我皇上付托大寳及命大臣申諭軍國重務而乃諄諄以不急之事加恩於虚縻官爵之人此薄海内外所不敢信也今首惡既磔羽翼當翦凡加銜陞爵諸臣出自魏氏者皆魏氏官非我皇上官也奥援既失猶戴偽器以立於堂堂堯舜之朝此亦良心盡失不可以為人矣又曰臣以新進小臣非不知元氣當培攻擊宜緩第在肆虐之時則宜進保元氣之説以與逆璫抗在今昌言不諱之日邪氣不盡除元氣終不可復疏上奉㫖言叙功冐濫乆宜澄汰盡著察核以憑裁奪易矯偽為冐濫則票擬者之舞文也宗昌再疏争曰臣前指逆璫矯㫖多官仰戴偽銜故舉叙功時日彰明較著者言之非糾冐濫也謂冐濫者固可誅即非冐濫者而受賞於此時是誰賞之耶亦非糾與殿工無渉者也謂無渉者固可誅即與殿工有渉者而命官於此時是誰命之耶蓋冐濫之罪猶可寛矯偽之罪不容逭臣披肝灑血以糾大奸閣臣乃以冐濫概之臣竊疑焉得毋閣臣素戴逆璫見臣所刺有隠然心動者耶否則前日所出之㫖閣臣與逆璫表裏故見臣疏囁嚅不敢出口耶否則力庇所私切狐兔之悲耶不然何判然不侔若是也㫖謂矯偽冐濫就中無甚分别倘知矯偽有人何妨指出不必堅争票擬宗昌曰此奸人廣樹我敵也遂指霍維華黄克纉等六十一人疏上閣票果以人數太多不必概詆置之宗昌喟然歎曰人臣立言論是非不論多寡矯偽衆益可憂乃恨多乎由是愈慷慨建白又糾逆黨餘孽張我續等五人又糾智鋌等九人上皆允行而忌之者衆矣二年春禮部右侍郎周延儒夤縁入閣而禮部尚書温體仁其隂鷙倍於延儒二人交相妒又交相比也御史任贊化疏糾體仁下詔獄宗昌繼糾及延儒責令回話疏再上衆謂禍且不測會皇子生得免奪俸半年既而體仁與錢謙益閣訟事起宗昌疏糾體仁留中不下先是楚岷王為校尉彭侍聖及善化王長子企鋀等所弑其事隠莫能白法司與按撫鞫問三四年莫得要領乃命中官駙馬各一人前徃就訊次年命宗昌廵按湖廣方擬會勘聞遵化失守廵撫洪如鐘提兵入援宗昌轉餉給軍移文鄖撫梁應澤督本標兵與洪會乂選武襄等處民兵為殿又聞鎮筸五靖兵素驍勁以其地逺移駐岳州嚴檄督發其兵剋期以進兩撫既出抽調空虚邊苗柯陳俱思蠢動又多方安輯之慮師行餉缺又具啟藩王助其不給又徧檄郡縣括新舊贖鍰佐之又察出黔鹽私鬻應入官者萬金催漕米二十四萬餘石以濟軍需自冬徂春心力畢竭於援師而題報一無温綸則當國見忌之故及勘岷事盡得其實復奉㫖責問前諸臣失出之罪宗昌疏糾一道臣一知府一同知受賄庇逆而上以宗昌失糾於先降四級調用忌者意猶未厭復以清苑逋賊連及宗昌候訊者十年會詔蠲逋乃得釋十五年冬即墨被圍率士民登陴固守仲子基中流矢死明年左都御史李邦華薦之禾及用又明年三月京師陷宗昌聞變哀號將欲南奔以土賊圍城不得出家居二年病卒方仲子基之嬰城中鏃而死也妻周氏妾郭氏兩劉氏慷慨同殉一時稱為五烈邑中有王生者國變杜門養母母死即自經遺書吿子曰吾身為親之子即為君之臣天地大經無貴賤一也我生不辰當兹酷亂貪㣲生而害義不可以為臣然親不忍遺故寧蹈不臣之罪以養母服母䘮而殺身不可以為子然君不忍後故寧蹈不子之罪以殉君是余之苦心余之大罪也識者聞其義烈而傷之王生名羲如字御赤亦即墨人曽執弟子於顧憲成外史氏曰先生昌言諤諤以攻逆黨是高楊左魏之後勁也使天下知有君子小人之分者皆先生之力耳劉同升傳劉同升字孝則一字晉卿江西吉水人少有至性居父應秋䘮鄒元標來弔見其哀毁語人曰吾儕講學不如劉孝子之一哭也時遂稱為劉孝子云讀書刻勵以古人自命文非班馬書非鍾王弗好也屢困塲屋有謂不宜専力於古者弗應乆之至天啟辛酉舉於鄉上疏為父應秋請䘏典戊辰再上疏請易名賜諡文節甲戍刪宋史期以三年丁丑上春官篋無他卷攜宋史自隨而已同行者私竊誚之是年登進士第一蓋思陵特擢之也在翰林獨行已志黄道周曰劉殿撰養其身以有為中立不倚者也然小人輒指曰此東林之餘波也將大不利於國家矣戊寅楊嗣昌奪情入内閣服緋上任諸臣交章劾之俱被嚴㫖申飭同升憤然上疏曰臣備員侍從待罪二年每見皇上至孝永慕廟祀致誠頒行孝經小學風勵天下臣仰窺淵源宣𢎞教化竊惟朝廷所以為四方觀望賴有倫紀以為之維也是謂大經原本大經變通其制使倫紀之立萬世勿墜是謂大權權者權乎其經未有離經而言權者也是故孝子有終身之䘮而聖人制三年之禮非過於情之禮而不及於情之禮也縱有弗類必無毁制而忍於情天性然也臣於楊嗣昌有不忍言而不容不言者敢昧死為我皇上陳之臣官史官也依阿淟涊以附閣臣則愧良史上負聖明下負所學日者䇿試諸臣簡用嗣昌良以國事多艱焦勞宵旰如人亟欲疾去雜試諸方以冀一效聖明之用心亦甚苦矣都門喧𫝊謂嗣昌縗絰在身姓名不祥非若軍旅可以凶事行之也臣所以隱忍未發意嗣昌亦人子也良心不昧父死謂何必且哀痛惻怛上告君父辭免綸扉庶幾善體聖意曲盡輿情夫邦政之權亦非輕於揆地也辭綸扉而掌邦政亦可效於時艱也何乃循例再疏遽入辦事服緋安忍叛禮滅親垂之史册萬世唾詈𫝊之邊徼四裔竊笑以為國家乏人如此大臣自處如彼何以彈壓折服遐邇之心哉夫人有所不忍而後能及其所忍有所不為而後可以有為臣於嗣昌以其所忍覘其所為嗣昌之失而志短也臣已逆知其後矣何也成天下之事在乎志勝天下之任在乎氣志敗氣餒鬼神瞷之必有非恒之災動乎四體病則為狂魄已先奪如此其人即欲有所用於天下而必不能有所用於天下明矣嗣昌清夜平旦試一捫心何以對其父鶴志氣餒敗不知何如即廷辯餙非盡昧本心而清夜平旦亦痛心疾首悔其志之短而心之失也嗟乎彼其之子自忘其父而臣猶責之亦不足責之甚也且嗣昌自號聞人豈其見不及此無奈伎倆已窮苟且富貴兼樞部以重綸扉之權借綸扉為解樞部之漸和議非他票擬由已將與方一藻高起潛數輩結連邊撫敷同罔功掩敗為勝嵗糜金繒立心如此何所底極獨不畏堯舜在上共驩難欺而欲以袁崇煥之故智用於今日不見皇上之處崇煥不動聲色而忽奮乾斷乎曩自皇上切責而嗣昌不可以為臣今又一旦忽易墨縗而嗣昌不可以為子若猶附和黨諛緘口全軀不惟臣以為不可天下後世亦皆以為不可臣不及逺引古昔近如李賢奪情人望頓失張居正奪情身名不終夫物未有本實先撥而傾折不隨之者也豈非志敗氣餒已事之明証哉國家亦何賴焉當賢居正時抗言而犯其鋒者先臣羅文毅倫鄒忠介元標是二臣者初入班行直節報主臣生二臣之鄉志二臣之學當言不言顔面何施且臣念及先臣應秋而不禁哽咽也先臣起家及第五載講幄疏納忠争册立講冠婚東封議起力排和戎後忤趙志臯等遂嗾羣小陷以不測皇考深憐忠直皇祖特鑒清操得免身家之危卒至憂憤而殞伏遇皇上登極賜諡文節臣一介書生欽蒙皇上特恩親裁進士第一寵錫隆盛感激涕零父母髮膚竭盡思報臣之一家皇祖所保全之一家也臣之一身皇上所生成之一身也兢兢勵志惟恐有負知遇欲尸黙充位義之所不敢出也瀝血拜疏冐犯新命罪無所逃然生死榮辱皆是致身之地臣亦遑恤其私也伏乞皇上廣擇芻蕘折衷典禮勒令嗣昌終䘮守制庶幾綸扉不玷倫紀無斁疏上謫福建按察司知事遂至東林講學月餘而往壬午召復職未赴甲申聞思陵殉社稷一慟幾絶卧病吐血卒所著有詩文二集刪改宋史五經四書註大全合編明名臣𫝊明文選明詩選文苑英華刪選金陵遊覽志音韻彚編金石寳鑑録等書行世外史氏曰先生之劾嗣昌也義嚴而詞雅余故具録其語以為後之進言者法嗟乎當思陵之朝賢材不乏也奈何以嗣昌不祥之夫而玷辱綸扉耶獨惡嗣昌與石齋先生廷辯引不如鄭鄤之言以支餙不特志敗氣餒其亦䘮心亡恥之甚矣而何可以當國哉乃思陵不察反咎石齋者何耶又恨嗣昌不自量力而請督師及至軍中手足無措一籌莫展惟日與門下客以形家言相度山川曰某地葬可封拜也某地葬可科第也某地葬可豐腴也此豈軍旅之事乎督師宰相之舉動應如是乎或進兵機正言則掩耳而不欲聞如有惡鬼附之者安得不亡人天下乎嗟乎志敗氣餒烏足以負荷軍國大事哉先生之言若操左劵矣章正宸傳章正宸字羽侯會稽人崇禎四年進士改庶吉士以鄉會試俱冠經有名閣臣温體仁私招之不徃出為禮科給事中王應熊與田戚畹通降中㫖入閣不由廷推廷臣莫敢言正宸疏諌曰豈有枚卜降中㫖者在皇上出此必為特用易感恩却衆議則衆絶窺伺顧天下事未有不順人情而可以有濟者也而應熊亦惟非人情故不可用夫徇情與順情名同而實異振作與操切事近而用殊今廷臣縱乏人奈何使傲狼之夫賛平成之治哉上怒下詔獄鎮撫曰新進妄言耳無他肺腸正宸仰而歎曰新進直言則有之未妄也時詞臣馬世竒為解於應熊應熊遽離坐擲茗椀去及登車乃歎曰壊天下者東林諸公也不殺正宸無以破門戶之固會科臣荘鰲獻等力疏救革職既而應熊敗起戶科是時體仁務刻深結曹王諸内侍毛舉苛細至軍國大事概置不問科道官箝嘿每諛曰聖朝無闕正宸益以此責望輔臣甫復官拜疏瀝謝痛言左右闒茸宰執上下皆惜身家保禄位與内侍相闗通名為線索其言不可聞上親舉筆圈其疏付閣票㫖令通行嚴飭於是閣臣内侍皆切齒曰此東林之餘孽也不可不急除之值襄陽吿警遂充襄藩冊封欲令賊殺之使事竣復命復以蘓松缺糧額遣督蘓松糧欲以遲誤殺之又復命乃於十一年火藥局災進䇿災之疏直劾閣臣以為火於五德為禮臣象也臣失職則禮教不修故火災今臣之無禮於君也甚矣夫陛下未嘗以沽名市德疑大臣也而大臣以揭救錢謙益鄭三俊則先為沽市之語以嘗陛下是無禮也史􅒇被劾而曰時局夫在唐虞為唐虞之時在桀紂為桀紂之時今在上何如主而偶不遂意則動稱曰時是又無禮也在官無私營張檉芳徑欲借城工以復銓職藉非陳啟新早為叅白則天下疑考功大法可金錢貿也是又無禮也磨勘試卷該科職掌今閣臣即舊科臣也有批抹而無糾叅是骫法也骫法亦無禮也諸正宸所劾皆直指嗣昌國觀而上方嚮意嗣昌因諭曰輔臣不必苛求然終韙其言十五年元日上朝賀畢宣閣臣延儒上殿東向長揖稱先生曰先生其輔朕朕將端冕以求之正宸聞之歡呼入頌聖徳且㣲責延儒以巧佞難報稱累數千言上深歎賞呼漢子而延儒為正宸會試主考見其疏大恨嘗就正宸握其手歎曰朝廷事大家可為何必執意見以與物忤正宸悚然曰亦惟視為大家事故不敢徇以私耳延儒色變既而欲復舊輔馮銓以冠帶銓延儒主考也正宸復争之延儒大怒曰吾固無望於汝矣而欲我亦如汝耶會上驟用修撰魏藻徳入閣召對中左門語不合延儒遂摭前事并責之謂把持枚卜下獄幾不測輔臣賀逢聖疏救之得遣戍均州十七年三月太常呉麟徴以掌科陞任薦正宸自代命甫下而京師陷正宸同左都劉宗周縗絰哭杭州責浙撫黄鳴俊起兵勤王而以丁艱歸廬墓又一年江南下大哭三日别墓逃入深山不知所終外史氏曰先生當應熊嗣昌國觀延儒輩羣犬亂吠之時而進以堂堂正論宜攖不測之禍矣非江夏其不免乎余幼好黄老術嘗訪道於終南遇先生於鐵崖嶺幅巾方袍雙眸炯炯静坐草廬叩其聲越音也余以為神仙中人矣因再拜而求長生之學先生曰噫子過矣道自軒皇設教以來至今存者何人耶老耼死者也荘周死者也若不見於南華乎一有秦佚之弔一有門人請葬此二君而死者又何有於長生乎况子年不滿二十英英之氣逼人盍從孔孟之道以盡彛倫則孔孟至今在焉其為長生也與天地同矣又何黄老之足云余叩首承教立志逃楊歸儒先生止余數日教以程朱誠敬之學曰出則可以致澤隠則可以獨善俾虚靈不昧常存天壤豈非長生乎又何黄老之足云喬可聘傳喬可聘字君徴寳應人天啟二年進士授中書舍人是時魏忠賢勢方張即請告終養崇禎改元補前官可聘性儉約居官謝絶干謁舉止畧如諸生同朝惟嚴事黄道周劉宗周而親善倪元璐馬世竒陳龍正皆世所謂東林黨人也中書事少日夜相切劘學問講求性命之㫖尤汲汲以政治得失人才邪正為慮吏部左侍郎張㨗嘗力薦吕純如為本部尚書帝以純如在逆案中有㫖不許給事中吕黄鐘遂薦㨗可聘乃上疏曰臣謹按逆案者陛下所欽定亂臣賊子無父無君之案百世不可改易者也顧臣聞道路之言羣小方輿金載寳謀欲攘臂搤掔乗間以翻此案今觀㨗舉純如黄鐘即舉㨗彼倡此和相倚為奸則前言果大騐矣陽消隂長其害安窮此臣之所大懼也竊謂羣小猶黨逆於溷濁之世而黄鐘獨黨逆於清明之朝㨗罪浮於逆案諸人黄鐘罪又浮於㨗若不早折其萌則凡在案中者必彈冠相賀耽耽逐逐而來大禍自此始矣疏上可聘聲望大著黄鐘乃外轉閣臣温體仁頗畏忌可聘遣所親㣲諷之曰喬君但到門投一刺臺省可立得也可聘笑曰某區區七品官耳安敢登宰相之堂哉竟不徃凡滯留中書者十年始考授監察御史因陳官守言責疏帝嘉勞焉每覧疏中肯綮處輒御筆以硃圈之先後共六十四圈宣付史館蓋前此未有也巡按浙江浙中士大夫下訖吏民俱揺首相戒勿犯喬御史其見憚如此可聘為人恭謹外剛而内和不尚刻礉詭激之行以鈎取聲譽雖與東林諸人還徃及其臨事是非可否率皆直道而行不肯雷同附麗嘗出巡金華舟阻水漲求縴夫不得蘭溪縣知縣盛王贊持手板立雨中大聲曰村民方事東作縣令請以身代役可聘立乗肩輿冐雨去人疑王贊必得罪而可聘卒慰薦之在籍右侍郎蔡奕琛故與温體仁同里相厚善為東林諸人所惡會有以弈琛私書上聞者下可聘勘報可聘平心決之或勸深文以入弈琛罪可聘拒曰發人私書前賢所恥且某奉三尺法不可故縱獨可周内耶都御史陳乾陽又以私人屬可聘可聘不聴乾陽亦私銜之遂坐他事降應天府知事累遷大理寺正悉謝病不就福王南渡仍起御史掌河南道印數言宜罷厰衞停燕飲君臣交儆早決大計以圖中興之治皆不省外轉御史黄耳鼎承馬士英阮大鋮風㫖疏訐都御史劉宗周所牽連朝士甚衆得㫖嚴詰可聘言宗周開誠布公此社稷臣也耳鼎厭薄外轉連章誣罔株引善類非人臣體請以耳鼎所轉瑞昌道換臣為之事得中止最後上疏論治兵其畧曰用兵有權權在我欲戰則戰欲守則守欲和則和如注矢石於高墉之上皆我所得而操縱也權不在我譬千鈞之牛受制三尺之童弭首而下之行止不能自持矣國家殷憂方甚亦有知今日用兵之權者乎請先言戰唐安史之亂徴兵囘紇是時肅宗親統六師與李郭收復中原特借之以為犄角之助事已兵休酬以金帛而已本朝自罹㓂變􅑫幸敵㓂争衡遂致燕雲山左坐視淪没此時始欲厲兵秣馬侈言恢復豈可得乎此戰局之異於唐欲戰不得戰也請次言和宋北狩之後偏安江左是時高宗勵精圖治諸大將屢奏戰功南人氣勝金人膽落是以王倫輩得成和議耳基業甫就我兵積弛從未斬將搴旗讋服四逺顧専恃尺一之詔一介之使俾彼强鄰就我戎索此和局之異於宋欲和不得和也然而天下大計可知己昔曹操百萬敗於赤壁苻堅投鞕斷流敗於淝水勢非不强兵非不衆然而長江大河波濤洶湧雖衆且强無所用之是故於守為易因上防河事宜且曰當此危急之秋宴然自謂無事議和不成必將大舉及今綢繆猶患其晚乃徒狃偏安苟且旦夕即不能光復大業獨不念祖宗締造之艱乎疏上亦不報我師下江南可聘棄官歸以老壽終於家嘗自言始讀王文成公全書奉教於劉念臺先生知有知行合一之學已又與陳幾亭游知有居敬窮理之學晚節讀宋諸儒語録知有四通八逹理一分殊之學其後益潛心朱子始知有存養性情主一無適之學所著有自警篇及訓子諸書文藏於家先是温體仁故忌可聘然數語人曰喬使君清正君子未可没也黄耳鼎既被劾即造可聘門謝罪終其身不敢怨可聘之正已格物多𩔖此外史氏曰東林尚學聖賢然流於氣節者多矣余謂氣節者豪傑之大端非聖賢之全體也豪傑者狂簡之謂歟先生言遜行簡以約自處不驕不卑其狷者也歟華允謀傳弟允誼華允謀字汝翼無錫人弱冠舉萬歴庚子孝亷壮遊東林非濓洛關閩之書不讀非孝弟忠信之言不言窮治六經而騐之身心惟恐不合尤潛心易理凡卦爻靡不體認於身心及任寶應縣教諭日與二三同志研求性命之學心誠口苦聞者悚然諸生中有争地終嵗不解者服其教各讓不取乃即其地築堂三楹顔曰興讓率諸生有志行者講習其中立規約束尤以正人心辨是非為急曰是非明而好惡公好惡公而賞罰當賞罰當而勸懲備從善去惡返正易邪之念決矣嘗謂弟允誼曰今之學者稍著科第官爵一念便落利字將究竟無所不至蓋此念即患得患失之根此根不除而一生功力左旋右轉總成無父無君種子其言痛切如此允誼深佩其兄之教遂成名儒又云人知身不妄動易心不妄動難而不知心不妄動易身不妄動難也人知静坐之以心檢身而不知静坐之以身涵心也皆獨得之語為先儒所未發高攀龍稱其為人純然若赤子退然若處子至辨義而趨毅然若勇夫猛士千萬人而不惴人所滔滔而騖之者必深愧之人所昧昧而違之者必深嗜之人嘲之以為迂以為腐而不知其所圖維皆千秋之事也年至中嵗遂卒著有三易粹精春秋傳戴記纂疏諸書藏於家外史氏曰先生之學純如矣皎如矣足可以為師表矣惜乎中嵗而殁使天假以年又不知其何如之造詣也東林列傳卷二十四
