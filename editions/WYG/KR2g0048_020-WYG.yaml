body:
  text: 東林列傳卷二十江陰陳鼎撰明侯恪傳侯恪字木庵歸德人御史執蒲之中子也萬厯四十七年進士天啟間為編修與楊漣繆昌期諸人遊漣條上忠賢二十四罪有言昌期趣恪代其稿忠賢怒謀殺之而其假子鎮撫司田爾耕素善恪進曰是人頗以詩賦謬名公卿間而能書米芾書翁必無意曲宥之耶忠賢顧謂爾耕兒試為我招之爾耕退詣恪話故舊恪故喜飲酒與嬉笑飲酒酣爾耕促膝附耳言公方以楊繆故重得罪我為公畫計某月日吾魏公誕辰公自為詩書之言未得竟恪大怒推案起酒羮覆爾耕衣上淋漓爾耕低頭慚恧己而乃大發怒去會魏廣㣲以大學士知貢舉而恪為其下校官廣㣲心嗛恪恪所薦鄭友𤣥宋玫卷輒有意摧抑之以語挾恪恪力争曰人生貴識大義恪豈戀一官負天下才哉語侵廣㣲而忠賢里人子御史智鋋亷知之乃劾恪罷官忠賢矯㫖令恪養馬恪即日掛冠去未幾忠賢誅故得免崇禎初起為庶子與輔臣韓爌詞臣姚希孟更削三朝要典頒定逆案遷南祭酒考祖制定監規疏陳六事太學諸生聞之曰是嘗與魏相争鄭友𤣥宋玫者耶願入成均者近萬人明興三百年來未之有也後宋玫終工部侍郎仗節死友𤣥以御史直諫被謫當世名恪為知人恪生平善為詩每賦詩輒飲而前後慮天下事有不當意則又感憤日夜縱飲以病請歸尋卒年四十三所著遂園詩二十卷李自成破歸德詩卷在掠中子方岳奮身往賊中搜得之負以過河得存長子方鎮有才名城破死外史氏曰先生尊人為朝廷骨鯁直臣而先生之直又如矢焉然幾不免於虎口矣乃卒以天下事感憤而殁不能以老夀終人皆惜之金士衡傳金士衡字秉中長洲人舉萬厯二十年進士授永豐知縣父應徵故亷吏居恒不營生産及士衡為令有父風吉水鄒元標候之舟次見其卧具敝敗因餽以二布大歎服而去由是兩人遂相友善二十七年用卓異徵閱三年擢南京工科給事中是時中使四出以採礦監稅為名所在恣暴民不堪命士衡上疏曰曩者採於山𣙜於市今則不山而採不市而𣙜矣此曹刑餘小醜市井無籍不知宗社逺謀一旦假以利權貪饕無饜如楊榮倡釁於麗江髙淮肆毒於遼左孫朝造患於石嶺此其尤著者也陛下深居内廷目不覩閭閻飢莩之色耳不聞士女齎咨之聲朘削殆盡而猶耽耽逐逐不知顧恤夫今天下亦多事矣水旱之虞盜賊兵燹之警所在有之蕭碭豐沛之間河流泛溢破城決隄平陸滙為巨浸居民化為魚鼈顛沛流離之衆易為生亂忍復横征巧取以蹙之哉是故一𣙜採也及今議罷猶可以安易危以泰傾否其權在上不在下設或因循不止獸窮則攫鳥窮則啄其權在下不在上權不在上而國家之禍有不可言者矣陛下停止之諭不啻再四奈何明詔之而明格之重天下疑也夫始而疑中而駭終而相顧太息以為紿己太甚得毋羣起而以不肖之心應陛下歟語云信者國之寶需者事之賊惟陛下果斷而力行之則宗社幸甚不聴於是我大清兵方謀取遼陽舉朝莫以為虞士衡獨憂之因上疏曰滇南之有鳯騰霄粤東之有文彞此籓籬之患癬疥之疾也遼左之有大敵此門庭之患心腹之疾也今謀取遼而舉朝泄泄不為之計夫神京資薊遼為臂肘薊鎮又仗遼左為犄角遼危則薊鎮不得獨安薊鎮危則京師不得宴然而髙枕此忠臣義士所以褰裳投袂不能自己者也既而甘肅地震復上疏曰臣聞天反時為災地反物為妖前此湖廣以風雷冰雹告順天以隂霾晝晦告豐潤以地陷告四川以星變告遼東以天鼓告山東山西以牛妖人妖告今甘肅又以天鳴地裂山崩川竭告矣陛下謂此治徵乎亂徵乎若明知其亂而泄泄從事是以天下戲也夫天下者祖宗櫛風沐雨百戰而得之天下也傳至陛下何以屑越若此邇者邊軍告匱望闕門而號泣者不可億數而大内所積朽腐充斥自若也陛下何不出帑金數十萬分給九邊俾荷戈枕戟之夫藉有宿飽即驅之効死疆圉何不可之有自稅使之出也有年於此矣小民藜藿不飽短褐不完蕭條困苦棄墳墓捐溝壑言之痛心酸鼻而縱横掊克者日夕不止譬有尫羸垂絶之夫責以肩重而行千里其果能乎哉夫古之鹿臺西園瓊林大盈非不富且厚也然而無濟緩急此覆輈之遺轍己事之明鑒也陛下若復遷延其間則兵已困矣民已殫矣外則敵人乗虚而深入内則山海之嘯聚草澤之窺伺一夫狂呼羣起響應當此之時上下離心其誰為陛下捍禦者土崩瓦解莫可收拾轉盼旋踵大事且去然後陛下悔之亦無及矣又不聽士衡在南京諸科臣闕員不補每兼掌六科事章奏數上中間危言極論約畧相類聞者為之撟舌不敢下而士衡卒不顧也逮神宗既棄羣臣不十餘嵗而天下大亂浸淫以訖於亡殆不出士衡所揣云三十八年擢通政司㕘議既與鄒元標友善又數稱巡撫李三才可大用朝中目為東林黨魁竟中忌者以考察降浙江鹽運司同知不赴閱十年用元標薦復起兵部郎中進尚寶卿至太僕少卿天啓間忤璫斥為東林遂引疾歸卒於家士衡再世仕宦生産不踰中人所居屋僅完壁亦絶不措意先是楊應龍伏誅土酋安疆臣邀據故所侵地總督王象乾不許士衡嘗劾象乾起釁最後象乾弟象恒以巡撫抵吳意弗謂善也已亷知士衡清介狀始稱說不置吳中自是遂兩賢之南京有妖人劉天秩之獄兵部用匿名書株逮甚衆士衡又嘗上疏固争凡無辜得免者數百人其居官平恕且侃侃不阿蓋如此外史氏曰先生之慮天下國家瞭如指掌矣奈何不用其言而卒棄其人俾老死􅅵畝此我朝之所以興而有明之所以亡也馬孟禎姜習孔列傳馬孟禎字六符桐城人幼孤授徒奉母與同里左光斗相友善萬厯二十五年舉鄉試主考官葉向髙竒之為延譽聲名大振明年成進士知江西分宜縣悉心撫字會以逋賦被督民恐失孟禎亟相戒輸納不數日立辦三十四年行取授廣西道御史孟禎性剛直遇事敢言既為言路益慷慨思樹立首論輔臣朱賡誤國及王錫爵徇私滅公狀有㫖切責又言京堂官冒濫劾姚文蔚陳治則王永光又以災變疏請御朝開講亟發章奏遴補部院大臣并召用鄒元標趙南星皆不報石埭人孫大功居京師力能通權貴以採生割幼自恣孟禎亷得實坐院署立捕之中貴再四請不聽卒按論如法巡太倉銀庫例進羨金萬餘奏罷之曰國家何事不可取贏稍崇節儉清冒濫即可得數十萬何争此羨為時諸臣為稅監誣陷逮繫甚衆至是㕘將李獲陽斃獄孟禎言獲陽已不可復生在衛獄尚有同知王邦才卞孔時知縣滿朝薦在刑部獄則有知縣李嗣善本皆循良適遭羅織久困囹圄將為獲陽續至楚宗一案羣奸誣搆除已就戮外見發髙墻甚多孰非髙皇帝子孫尤聖心所宜矜恤亦不報代王庶子鼎渭鼎莎争立孟禎援祖制有嫡立嫡無嫡立長之制謂今宗藩一書不知刻自何年何人私改増減夫代府諸宗已不能以嫡之一字曲庇鼎莎而說者因渭母裴氏未經奏選欲以濫妾之子加鼎渭此可據乎請嚴查核則渭莎之當立不當立自明部覆從孟禎等議立鼎渭為代世子四十年順天鄉試進士鄒之麟分校於中書于發藻房搜中落卷童學賢等孟禎發其奸學賢坐黜之麟降閒散官給事中孫居相因追論湯賔尹韓敬庚戌會闈事敬以不謹閒住戸科商周祚欲并罪知貢舉吳道南孟禎言場事勘議己明不宜波及公正大臣且有道南之言而查號簿因查號簿而居相得聲其罪則道南為發奸非欺蔽時服其公明年巡視長蘆鹽政四十二年按山東福王之國奏請贍田二萬山東應給四千四百餘頃王意欲奪民膏腴孟禎不可計租準值如故事王左右復誘王遣承奉至登萊覈田郡邑騷動孟禎列其暴横狀謂會典所載各王府不許占買民業其欽賜地畆租稅例赴州縣上納不許輒自收責煌煌祖制世世守之陛下誠愛王俾之厚實亦宜予以美名漢之河間東平可法也況山東東連遼海西則河漕疾騎抵都不過三日可使卧榻間卒有震驚不可測之憂乎臣寧負福王不敢負陛下王就國初由舟行已欲改從陸孟禎復止之請待奏報王不懌而止當是時國是日非廷臣各倚門戸京察大典南北各以意為去留互相攻擊孟禎言銓政失平科道外推不當任私意疏㕘顧天竣蕭雲舉等又論荆養喬熊廷弼訐奏宜勘與吳亮嗣宫應震等議不合出為廣東副使辭不赴天啓初薦起南京光祿寺少卿轉太僕寺丁内艱魏忠賢竊政諸東林善類斥戮殆盡御史王業浩劾孟禎倚恃權奸且與左光斗善削奪為民光斗被逮時詣孟禎以子孫為託孟禎慨然曰吾事也以孫女許配其孫之乾崇禎改元王永光尚為吏部尚書故嘗為孟禎論劾欲得一通問孟禎笑曰吾老婦乃復以趨時屈節耶遂不起姜習孔字素臣浙江遂安人家貧力學舉萬厯三十五年進士授湖廣沅陵知縣沅故三楚邊境地連黔蜀苗猺雜處習孔加意撫循邑苦養馬累民充役者多蕩産力請免遂著為令未期丁外艱服闋補涇縣稅契例有羨餘習孔置帑中備公用縣門井泉甘冽禁民不得汲習孔榜門曰臣門如市臣心如水聽其汲取民至今便之調繁無錫邑衝事繁晝夜判決無留牘時邑人顧憲成髙攀龍創東林書院講學習孔政事之暇往復講論無虚日所拔士馬世竒等皆為名臣以治行髙等擢南京吏科給事中省垣例受民詞習孔首禁絶五總省篆再巡京營司内外計典夙弊為之頓革復奏蠲南直隸鋪設三殿銀百六十餘萬有以羨言者不為動也時魏忠賢擅政習孔疏論魏良卿等世襲又薦髙攀龍及文震孟孫慎行等奉聖夫人客氏出居外已有㫖復入奉侍科臣倪思輝朱欽相具疏争帝震怒御史王心一申救並得罪習孔抗疏畧曰客氏乳哺之勞臣豈不仰體第皇上卜吉遣行明知其不宜久居宫闈也以出宫為是必以復入為非能斷大義於前即當割小恩於後三臣雖稍煩聒而一念忠樸實愛君父臣非為三臣惜實為國家惜耳疏入以不諳事姑免罪尋陞南京大理寺丞當是時璫燄益張攀龍及楊左諸人皆死御史曽應瑞希璫意以習孔嘗薦用攀龍等不知其人視所舉有㫖削職追奪誥命崇禎改元復原官廷臣交章論薦補原職陞南鴻臚寺卿謝病歸外史氏曰兩先生立朝直言侃侃為東林表帥一時宵小無不畏憚尚肯容之乎乃一逐不起亦知天下事不可為矣故甘老於田間也梅之煥傳梅之煥字長公兵部右侍郎國楨從子也父國森舉鄉薦早卒之煥從其母劉居山東之沈莊倜儻雄駿年十四為諸生臺使者按部閱武騎馬横絶教場使者怒命與材官角射執弓腰矢射九發九中中輒一軍大呼射畢長揖上馬竟去使者不懌而罷縣西龍潭絶壁下瞰之煥指曰誰能下此潭不足縮者同游漫應曰能再問之如初輒舉手推墮之鶩没泅水僅而得免旁人皆懾讋之煥談笑不改色人以此異之萬厯三十一年與楊漣同舉於鄉明年成進士選翰林院庶吉士之煥在翰林語則矯首厲角坐則掀髯鼓掌視館閣諸公低頭緩步暖姝相向者恒目笑不自禁也居七年出為吏科給事中即上封事言方今天下民窮餉缺㓂横兵疲大小臣工兵農錢穀之司日夜講求猶懼不給言官舍國事而争時局部曹舍職掌而建空言羣天下盡為虚文所束縛輦轂之下京營之兵馬入衛之班軍戸部之錢糧皆有費無用有名無實種種弊蠧動曰舊例不可省是太祖髙皇帝之例耶抑成祖文皇帝之例耶有作意整頓者不曰生事則曰苛求事未就而謗興法未伸而怨集何怪豪傑灰心庸人養拙付國事於不可為也臣請陛下嚴綜覈以責實事通言路以重紀綱別臧否以惜人才臣所言者不過老生之常談能真實舉行未必非對症之藥也之煥既扼腕時事疏屢上不見省又於門戸一無所附麗居六年出為廣東按察司副使分守惠州惠獄多寃拷一連十累嵗不得決閉門周視案牘期旦日會堂下據案呼囚明舉其刑書云何隨時發遣獄成於手中迅疾如神嶺表多盜用沈命法分行收捕即時伏辜惠州豪沈烈女於水擒得就烈女死地撲殺之瘞其女於蕭烈婦墓旁刻碑以誌焉宦家子倚父勢為奸擒治之不可得使人曉諭其父令子就理寃民如牆而立甲乙丙以次質對盡反其侵掠則縛勢家子痛笞之曰用以謝郷人并以謝而父也卒自改行為善士海㓂袁八老掠潮州殺守吏潮非之煥所部自請往剿嚴兵扼海道絶饋運斷樵汲散免死牌數干首服者接踵八老懼遁降于閩後之煥督學山東八老率舟師援遼謁之煥于登州語之曰海上之役不得望見顔色今何以在此八老泥首謝曰畏公天威是以走閩今日敢不為公死乎其為劇㓂畏服如此天啟元年召入為通政司㕘議遷太常寺少卿三年陞都察院右僉都御史巡撫南贛丁母憂歸里未幾逆閹之難作先是楊漣為兵科都給事中㕘預顧命建白移宫及為左副都御史案劾魏忠賢罪狀羣小嗾閹興大獄逮漣拷死言官摘抉漣黨以之煥為首指漣就徵日之煥往送執手慟哭誣之煥在省中受賄牽連即訊當是時緹騎四出之煥自分必逮而獄久不決每頓足曰我豈不野貓頭豈若閹忘我耶野貓頭者蓋平居與漣相爾汝之辭也己而又曰主少國危朝家事壊於璫兒媪息之手大丈夫當刺血草奏告於二祖十宗撼承天門痛哭引歐刀自剄北闕下肯低頭駢首作圜扉中一片血耶短衣襆被馳馬北上親知股栗莫敢遏信陽故人王思延止之曰壯哉遂與子永別强為我少留痛飲信宿而去越日邸報至坐追贓遣戍思延笑曰可以歸矣之煥跨馬歸據鞍􅔵􅔵如有失也愍皇帝即位召還以原官巡撫甘肅土魯多蠻犯塞軍乏見糧之煥鉤板邊吏邀勒淮商中鹽引悉以給商一日得銀三萬有竒戰士宿飽乃為三覆以待敵遣羸卒數百人領羸畜誘之遇敵反走敵畧取羸畜逐北深入總兵楊嘉謨部前鋒迎戰敵驚將從間道䦨入則二覆起邀其後之煥親率標兵夾擊遂大敗斬首七百餘級生得銀定王子綽木素降六百餘人悉分隸麾下甘兵以此益强明年春復大入塞病痢大黄山下枕藉相望諸將請掩捕之之煥曰鄙哉用是得侯何不武也遣譯人宣諭朝廷威德乞沙磧地活汝慎毋恐踰月病愈望邊城搏顙涕泣而去温體仁用閣訟攘相位之煥數飛書中朝別白是非體仁深銜之思中以危法二年我兵薄都城奉詔入援總領兵譁於途之煥駐蘭州再次邠州奉詔還鎮已又趨入援迴折數千里半年始至本兵希體仁指劾其逗遛欲用世宗殺楊守故事上不聽遂罷官歸久之體仁當國豪宗嗾邑子上書告之煥體仁從中主之之煥自是不復起流賊越秦隴躪豫楚蔓延光黄間之煥戒守令勿去有我在用軍法部勒鄉人子弟僮奴警巡迾逺偵探援兵登陴守者恃以無恐八年春賊乗夜遶城而南不敢逼自是賊游兵相及不敢犯麻城張獻忠每過城東戒勿近沈莊西陲兵所在焚掠過沈莊必斂兵免胄稽首而去鄉人入保者益衆名其堡曰保生之煥既以前事回籍聽勘久之敘甘鎮前後功加級􅄻子忌者阻之終不召用崇禎十四年秋病卒初之煥與同邑侍郎陳以聞好楊漣初殁語以聞曰昨曽見野貓頭來陳駭曰何謂也之煥曰日午時忽見竹亭篁籜間狀貌如生把余臂語曰血書中未盡之語汝為我證明之言訖而殁之煥罷鎮里居賊八年不敢窺殁後二年獻忠陷麻城猶戒勿犯梅氏持羊酒祭其墳羅拜而去外史氏曰天不欲太平宇内以梅君之賢足以仗三尺劍削平小寇奈何終沮于賊相豈非氣數歟侯震暘傳子峒曽岐曽侯震暘字得一嘉定人舉萬厯三十八年進士授行人天啟初擢吏科給事中是時保姆奉聖夫人客氏方擅寵與魏忠賢及閣臣沈㴶相表裏勢燄張甚既遣出宫而熹宗思念流涕至日旰不御食遂宣諭復入震暘疏争謂禮有慈母君命所使教子也魯昭公慈母死欲為之練冠有司執論乃止夫古之慈母職兼教養猶恩以義絶何況今之么麽里婦其可數昵至尊哉女德無極髙明不祥陛下即為客氏富貴計亦當早加裁抑曲示保全不宜格外隆恩以寵而益之毒且陛下始而徘徊眷注稍遲其出可也出而再入不可時出時入尤不可宫闈禁地姦璫羣小率睥睨其側内外鉤連則借叢煬竈有不忍言者昔王聖寵而煽江京李閏之奸趙嬈寵而搆曹節皇甫之變禍貽宗社良可寒心此陛下之殷鑑也疏上讓震暘沽名卒不省會遼事方􅁄經畧熊廷弼巡撫王化貞两人者不協數持論相牴牾兵部尚書張鶴鳴頗右化貞議者遂欲移迋弼與化貞畫地任事震𤾉逆知其必敗疏謂事勢至此陛下宜遣問經臣果能加意訓練則進止遲速不從中制雖撤撫臣一以付之無不可者有如不然則督其明白回奏以聽處分收拾殘局專任化貞此一說也不則移廷弼於宻雲而出本兵為經畧鶴鳴威望素著慷慨自命與其事敗同罪不若挺身報國此又一說也本兵如不可出則遂以經畧授化貞另擇沈深有謀者代為巡撫以資後勁此又一說也不則直移廷弼於登萊以終其三方布置之䇿與化貞水陸相犄角此又一說也若復遷延猶豫決僨國事於是方有㫖集議而廣寧陷矣化貞廷弼相率遁入關門猶數奉温㫖責以戴罪立功震暘大憤懣再疏謂臣言不幸驗矣為今日計論法不論情河西未壊以前舉朝所惜者什七在化貞今不能為化貞惜也河西既壊以後舉朝所寛者什九在廷弼今亦不能為廷弼寛也䇿撫臣者謂宜責令仍赴廣寧聫屬西部然而廥庫已竭其能赤手效包胥乎䇿經臣者謂宜仍責守關然而所謂守者將如廷弼前議三十萬兵數百萬餉以收全局乎抑止捃摭殘卒出之關外以姑示不殺乎凡此無一宜者廟堂之上欲行法則牽於情欲徇情則制於法及今不早定逃臣之律殘疆其奚賴焉其後治失事者罪蓋畧如震𤾉疏云已遂糾閣臣沈㴶結納奉聖夫人及諸中官為朋比具發其搆殺故監王安狀帝大怒命調外任繼又鐫二級以歸震𤾉任吏科才八閱月章奏數十上其大者率係國家安危治亂詞最切直為小人所深憚竟用是得罪去然訖莫能害也及震暘歸未幾而黨禍遂大作矣越五年卒於家其明年為崇禎元年子峒曽以主事奏曰先臣震𤾉用狂直得罪先朝幸遇陛下復官而先臣已不及待先臣觸忤權奸持忠入地儻得比死事諸臣共沐霈恩死且不朽特贈太常少卿震暘凡三子峒曽與岐曾最知名峒曾字豫瞻天啟五年進士授南京兵部主事外艱服闋改南吏部歴官郎中出為江西提舉㕘議會黜宗生兩人忤益王㫖及峒曽將謁見長史戒宜引咎拒不答既入見王問誤黜兩宗生亦譴責胥史乎峒曾毅然曰胥史何罪此曹奉㕘議所奉朝廷令甲也胥史何罪王愕且怒然以其言直不能有加而罷峒曾守正多類此累遷嘉湖道左㕘政以卓異被舉召為順天府丞是時所舉僅五人與峒曾同舉者穀城方岳貢江隂張有譽皆旋至大官而峒曽辭疾不至福王南渡召為左通政又以疾固辭我師下蘇州偕進士黄淳耀率吏民城守城既陷趨投池水中未死兵鉤出之遂遇害子演字幾道演弟潔字雲俱皆從死嘉定殉國最烈者吳人訖今推侯氏黄氏耆老述之至泣下岐曾字雍瞻國子監生少以文行與峒曽齊名峒曾既死越二年軍府召購故給事中陳子龍子龍雅善岐曾嘗過宿其家旬日去岐曽遂坐累備受􅃤刑者凡二十七次終以不屈死至今傳侯氏雙義云外史氏曰先生於國家安危治亂固已籌之熟矣其如執政茫然若有鬼物慿之者余讀先生傳不禁歎為咄咄怪事嘗謂前朝之亡雖曰天意實人謀之不臧也其子當灰飛煙滅之時猶能植綱常名教於大壊之日其亦得家教之深歟易應昌傳易應昌字瑞之號白樓江西臨川人舉萬厯丙午省試明年成進士授福建甌寧知縣嵗大水漂没田廬男女無算應昌拯恤備至民賴以甦臺使者按部偶以他事相拂掛冠而去使者亷其治狀為八閩最引咎謝過焉四十八年召擢河南道御史有㫖俾巡漕政諸所釐剔漕運不梗天啟元年巡按應天旋改督學陟大理寺丞進少卿時魏璫方熾諸正人纍纍削奪應昌亦坐斥家居崇禎二年以都察院左僉都御史起佐臺務疏請清吏治奠民生極言州縣蠧胥之弊人以為得弭亂之本明年正月擢左副都御史先是薊門失守烽火徹大内京師戒嚴刑部囚有逸者思陵震怒下尚書喬允升侍郎胡世賞獄以新尚書韓繼思議獄輕革職命應昌署都察院事更擬以聞應昌仍以杖上屢㫖駁問應昌曰法如是止矣臣不敢以己官易人命帝大怒并逮應昌令錦衣鞫訊而杖司官徐元嘏五十當應昌佐臺時御史史􅒇髙捷夤緣冢臣王永光不由司具稿遽題復􅒇等職都御史曹于汴惡之不為咨取􅒇等即入陛見于汴以亂臺綱乞致仕去􅒇等因汙詰之應昌疏糾兩御史奪其俸至是為蜚語言應昌黨庇邀結激帝怒坐以違㫖徇私置應昌大辟大學士成基命府尹劉宗周講官文震孟力救不報會京師大電雹鞫應昌之日雷震審官案帝稍警悟命緩其獄并停天下刑明年四月旱步禱不應司天言大臣獄有寃者始赦出論戍後數年放歸南渡時晉工部侍郎卒外史氏曰當愍皇帝時小人林立以陷忠良天亦怒矣時發雷雹以警之而奸佞不畏猶日圖君子之命以快其心者何耶嗟乎氣數不惟能束縛人并天而亦束縳之矣東林列傳卷二十
