body:
  text: 東林列傳卷十八江陰陳鼎撰明劉一燝傳劉一燝字季晦南昌人少白晳疎眉風姿朗秀對客凝坐與人語聲可貫耳侍郎鄧以讚見而異之曰劉季晦精神淵著能隠蔭數人舉萬厯二十三年進士選翰林院庶吉士未幾歸踰七年起授檢討是時沈一貫當國三十三年春京察所謂錢夢臯鍾兆斗者内閣私人也一貫庇之會其兄一焜為考功郎屬一燝為請免堅謝之已又請對曰黜陟大典非所敢私若以兄故而為人開倖惟有拂衣歸耳二人竟中察典未幾齎皇長孫御書使楚藩㝷陞贊善洗馬丁母憂起補諭徳歴官國子監祭酒詹事府詹事掌翰林院事四十五年春京察一燝當註詞林冊是時有十亂四閣臣之稱大東小東之謡伐異開隙如孫承宗繆昌期孫慎行等以物望為黨人所齮齕一燝毅然曰諸君皆國幹也其可去乎一二忌者時用蜚語撼執事持益力於是謡曰他司大熟詞林無收言不克逞志於一燝也故事掌院無一嵗不遷者一燝以前故四年不遷比考績司勲難於引例一燝笑曰固知二百年無院長奏績之例抑知二百年有四載不遷之院長乎其負公望在此其招衆忌亦以此矣先是一燝侍講東宮偉容止聲音𢎞亮光宗心識之一日請對引南山萬夀之詩以開廣上意時争梃擊者動揺國本故假呼嵩事用尊元良而規鬻獄者也光宗誤應以讀史惜三餘一燝拱手賀曰殿下今日開講即以勤學自勵此大禹惜隂心也大平令範可卜矣乆之轉禮部右侍郎教習庶吉士光宗即位念講幄功拜禮部尙書兼東閣大學士叅預機務數日上疾大漸召羣臣入宮受顧命李選侍從幄後趣熹宗出傳封后一燝訝曰皇上慿几延羣臣彼紅衣幄後者何人語聞中外皆知宮中將不利於嗣皇矣而環布盡李爪牙熹宗亦心動比上崩宮中洶洶虞變出一燝曰事急矣當力請見皇長子内官李進忠等攔乾清門不聽入給事中楊漣抗聲曰吾等奉大行皇帝㫖迎嗣皇繼大統爾何人敢格不令入衆乃却羣臣入哭臨畢問皇長子安在羣閹東西走不置對太監王安至曰為選侍所匿一燝正色厲聲曰誰敢匿新天子者安揺手曰徐之此難以口得當以計請公等慎無退遂趨入白選侍不出皇長子諸大臣不肯退第一出即返選侍頷之復中悔挽上裾不釋安抱上疾趨而出一燝顧冡宰周嘉謨等叩頭呼萬嵗蓋即定位號絶他倖也乃導輦行至丹陛上選侍頻使使挽上裾比抵門厲聲猶達外追輦還者使三至時陛㦸森列一燝外戒金吾謹宿衛語太監王安敇内蹕毋􅘆􅕟朝士吉服立殿前者日髙不聞宮中聲譁言曰事去矣二三大臣作何狀及望見鹵簿旌影且前又譁曰來矣復揚言嗣皇社稷神人主奈何不令吾儕共見乎駕詣文華門半駐閾下令曰止非環而扈者不得入駕馳而門閉衆少却一燝翼上左英國公張惟賢掖右扶上登寶座即東宮位然後擇吉告廟受朝事始大定是日羣臣上箋勸進上不允上既惕於還宮選侍亦冀還而得以挾重也一燝亟奏曰今乾清未浄殿下請暫居慈寜上然之復語安曰主上沖年無母無后外廷有事吾當受過若宮中起居公等不得辭其責上還宮謂安曰今日安得髯閣下伴我我乃無恐一燝修髯長髭上希見外臣故目一燝云然翼日尙書周嘉謨御史左光斗疏請移宮羣閹嗾選侍要上盟垂簾詰問左御史疏中武氏何語欲予杖一燝力持之乃止上登極之前一日選侍尙踞乾清首輔方從哲欲展移宮期持不可曰本朝故事仁聖嫡母也移慈慶慈聖生母也移慈寜今何日也可姑緩耶選侍即日移一號殿而天子復還乾清自是而移宮之業立矣上既御極方從哲以病在告一燝叅決大政國事倉皇大禮駢集如神廟升袝告成詣天夀山相大行陵寢地皆一燝與次輔韓爌任之故拮据獨勞旋以登極恩加太子太保文淵閣大學士改户部尙書仍予􅄻矢心當國謂朝廷以法祖為先臣下以奉公為要匡主徳重疆事扶衰幹蠱知無不為而大端則在以人事君神宗三十餘年舊徳遺直廢籍填委一以大行遺詔從事如鄒元標孫慎行馮從吾孫瑋趙南星鍾羽正髙攀龍等白首耆艾布滿九列而士氣伸又謂國家設官言與行相成今言者操任者之權票者又格言者之路上操下奪是交困也善御者調六轡善治天下者任六官六官任事而言路得以繩其愆言官陳事而政府得以裁其是則天下治於是一切條奏皆下六卿有不經者詔格之蓋懲萬厯末年言官沸囂政府倒權天下日多事也而衆始不恱於一燝矣初李選侍知宮在必移其下李進忠劉朝等盗内府秘藏過乾清門而仆金寶纍纍臥地下上遣大臣驗視按治甚急羣小為奄畫䇿曰上怒亟獄未易鬻也内庭喧傳選侍移宫日跣足投井語狼籍不可聞上沖人以違先帝為詞易撼也司禮太監王安數悻直忤㫖羣愬安藐上位把持法司上必怒而逐安如此則移宮之案翻顧命大臣可盡逐而大獄解矣於是造為蜚語揺惑中外上不得已乃以選侍夙忤聖母及近欲稱制事諭内閣示廷臣一燝具掲封還言事闗宮闈秘密無論外廷不宜抄傳即宮中左右亦不宜令窺瞷庶不致周章騰播致生事端會􅎪鸞宮災御史賈繼春首上安選侍掲尙書黄克纘給事中李春華御史王業浩更番詭辭為盗璫脫罪以嘗試上意上果怒復發出前諭令頒示羣臣又出御札重詰問繼春語所自來人慮賈禍不測賈亦股慄自掲為人所誤一燝謂言官風聞言事内廷影響豈宜輕及然天子新即位輙疑臣下朋黨此機一開異時奸人乘間中朝士君子先受其禍矣乃具掲上慰聖懷救御史而反覆朋比之無因己而賈囘奏削籍而御史張慎言髙𢎞圖救賈疏上上震怒留中欲重治一燝請發票曰救賈者乃自賈一人起見耳非為宮中也此事外之人乞寛貸己得罰俸而㫖誤書局外字御史反滋隙而謀搆者計益深及司禮安以强諫讒死魏忠賢客氏用事上意薨然盡解而羣小乃專心戢志一意攻一燝東事日亟朝議謂非舊撫熊廷弼不能辦上遂起用經畧遼東而言者交章擿一燝因面奏曰臣知君父為尊封疆為重恩讐禍福非所計也上亦念其舊勞委任如故而客魏積不相容言者摭拾不己自是去志決矣方一燝之在閣也持大體明國法抑浮夸遏僥倖引繩切墨不少假易盗庫之獄上傳田詔劉朝免死羣閹辯疏徑下法司一燝引例執奏封還原本則中外皆恨魏忠賢故名進忠攘陵工邀叙一燝援祖制内臣非司禮掌監及提督陵工不得䕃弟姪票止加恩三等又救攻客氏言官周宗建侯震暘王心一倪思輝等則客魏交恨閣臣沈㴶由客魏入以募兵要寵與劉朝比而興内操言官糾其弄兵一燝為之主則閣閹交恨謂遼事如鑿空捕風島帥毛文龍不足倚西援未可信而議棄廣寧者三尺不可貸也則島帥寧撫與逃臣交恨於是徐景濓郭鞏孫傑霍維華等詆讕萬端上亦無如羣喙何矣抗疏求去十二上乃得歸加少師􅄻璽丞一燝疏曰以擊楫枕戈之日侈東門祖帳之榮他日史冊書廣寧失陷有加官􅄻子以行者臣節掃地矣疏三上允辭􅄻即日戒行其陛辭疏畧曰鼎湖上賓事變倉卒爾時光景皇上知之在廷諸臣胥知之事定之後遂謂天佑社稷原無他慮而危身憂國抗聲内廷者遂以􅙅訿去計亦皇上所深惻也禁闈秘密非臣所知但思先帝龍潛之日皇上鶴禁之中翼戴何人調䕶誰力扶掖鑾輿抗遏要挾當日指以為功今日搆以為罪上下千古呂强張承業與李輔國魚朝恩法戒昭然臣願後人毋徒為五宗光寵計也外廷臣子自當以君父為急發東朝持梃之奸者目為生事消後宮牝晨之禍者坐以交闗雄唱雌和意欲何為尤臣所未解也又曰臣去國孤踪何必深言時事然係一身進退者小係宗社安危者大若以茹荼吞炭苦心付之長歎於歸𨼆得矣如國是何恨臣攻臣者借經臣舊案以為難端不知廣寧之失自有公評情罪何難立斷必使蜚語流聞為王化貞解嘲張修徳報怨恐莫須有之獄不宜再見今日也忠言苦語臨行彌切平生大節在移宮受禍亦在移宮歸三年楊左拷死詔獄要典既定詔削官追奪誥命勒令養馬當差至是而移宮之案始結初方從哲劾罷上宣諭稱首輔再三控辭以須葉向髙之至向髙初有間於一燝已知其避席延佇始為釋然一燝終不自明也兵部尙書張鶴鳴用一燝推轂起興奸細杜茂獄謀連欲殺一燝刑部尙書王紀閱實平反一夕内降斥紀去而一燝亦得白逆閹復用劉朝行邊劉廷元霍維華等持三案甚急一燝從容謂所親曰彼以三案殺我則與楊左同死彼以封疆殺我則與經畧駢首持忠入地亦復何憾越五年崇禎改元詔復原官光祿大夫柱國少傅兼太子太傅吏部尚書中極殿大學士致仕遣官存問八年卒贈少師諡文端周嘉謨傳周嘉謨字明卿湖廣景陵人登隆慶五年進士授户部主事出為韶州知府陞四川瀘州等處副使下車即擒治大憝楊騰霄豪猾股慄會建武兵變同官皆懼禍縮項不敢前嘉謨曰是何􅆛虎而遽鋒鏑迫人也輒單騎徑往曉諭禍福叛卒四千餘人皆俯首聽命及撫白草番夷視師卭州灌縣皆饒方畧萬厯五年陞按察使乞歸㝷丁内外艱起補故官時蜀人為稅監丘乘雲横斂逮繫相屬嘉謨移檄所司一切抗絶之又亷得奸猾附乘雲為虐者五人斃於法乘雲亦無敢誰何轉四川左布政使踰二年陞右僉都御史巡撫雲南時隴川宣撫多安民叛入緬據蠻灣嘉謨檄金騰副使黄文炳副總兵董獻策討之斬首二百餘級獲安民立其弟安靖諭散其黨而還亡何廷推總督兩廣疏減滇南額貢黄金五千兩不報立為官買法而西夷交趾越境侵掠兵餉不給酌鹽贖四千餘金給之又為南海番禺髙要髙明四會諸邑築隄捍災民賴以安四十六年陞南京户部尙書明年改北工部又明年改吏部尙書當是時神宗賓天光宗即位嘉謨請召還建言得罪諸臣王徳光等三十二人鄭貴妃邀封太后上再諭内閣趣禮部具儀注侍郎孫如游謂本朝無例不聽後廷臣會議松棚下嘉謨召鄭養性抗言責之曰先朝不早建國本皆由汝家今乆處乾清宮萌非常之念事發鄭氏無噍𩔖矣莫謂舉朝無人此自關汝家門禍福宜早決之養性懼入言於貴妃而封后之議乃寢光宗大漸嘉謨偕大學士劉一燝韓爌尙書李汝華給事中楊漣等入受顧命明日光宗崩而移宮之事起嘉謨首率九卿科道力争楊漣左光斗繼之選侍大怒然卒不得不移乃出居仁夀殿而側目嘉謨者衆矣自賈繼春安選侍掲出朝論大譁上怒下九卿會議嘉謨請示優容不聽再請上諭曰移宮始末卿等有公疏科道有單疏賈繼春皆置不問乃以違迕逼逐輕誣朕躬且皇考選侍王氏等四人同日移宮繼春不恤其他獨揑造李選侍雉經朕弟妹四人亦同日移宮繼春何不重念獨注意皇八妹入井向使繼春悔悟引疾逺避朕豈深求今激昻肆辯故朕必欲直窮根柢以質雉經入井真偽結此移宮公案卿等誼在體國當為朕分憂毋止曲䕶小臣以貽後日之慮再責繼春囘奏於是削籍為民當王安死魏忠賢漸用事沈㴶首通其私人劉榮以密結於忠賢忠賢以霍維華之疏王安也深徳之維華復引孫􅇐與忠賢通而嘉謨惡小人之亂政也以年例斥維華於陜西􅇐為維華修怨特疏糾之嘉謨引疾致仕陛辭上去國戀主疏上優詔答之三朝要典成以移宮事忠賢矯㫖削籍思陵立再起南京吏部尙書踰年卒外史氏曰余讀明卿先生傳則知熹宗即位之始李選侍作惡於内也甚矣九卿公疏科道單疏寧皆無影響之詞耶賈繼春之疏上而帝大怒矣豈亦偽者耶况上諭鑿鑿而奸相周延儒造此莫須有之言誣為出於思陵之口竟指三案皆非則亦深可痛恨矣夫熹宗登極才十六齡於時思陵未十齡耳又安能憶伊昔之是非而喋喋告之延儒耶此延儒謂人言不足信也抹殺滿朝忠義以自為解嘲耳若曰余前日以贓罷者人言之妄耳余何罪焉云爾劉鴻訓傳劉鴻訓字默承山東長山人生數嵗有疾已殆一道者見之色動以兩指探户樞塵丸之一投而愈人咸怪之長為文能抒寫胷臆揮筆數千百言萬厯己酉舉於鄉癸丑成進士選翰林院庶吉士下帷誦讀如諸生時葉向髙時目屬焉嘗笑撫其牀語之曰以此俟子丙辰授編修己未分授禮闈明年秋二帝相繼升遐宮庭多議執政大臣囁嚅不肯言鴻訓特詣直廬以擔當勉之朝論推許天啟元年賜一品服充朝鮮正使齎兩朝詔往諭鴻訓宣國威徳國王以下皆肅然時遼陽已陷朝鮮為造二舟從海道還遭風舟敗鴻訓跳水中適值淺沙扶載他小舟浮沈海波者三日夜又幾溺忽有小鳥金色集帆上得達登岸報命三年陞右春坊右中允四年陞左諭徳以艱歸六年即家晉少詹事兼侍讀學士忤逆閹削奪歸思陵即位既誅忠賢時輔相在位者多閹黨帝欲更置新叅以勷始政廷推十人鴻訓與焉帝倣古枚卜事特召吏部尙書房壯麗左都御史曹思誠吏科都給事中魏照乘掌河南道御史安伸等入内廷帝焚香告天置諸臣名金瓶中探之先得錢龍錫李標來宗道楊景辰再得周道登及鴻訓名凡六人有詔進禮部尙書兼東閣大學士遣行人至里門召之崇禎元年二月入直時國討雖伸而羣氛未靖在直者倡執中之說以相持鴻訓性伉爽遇事敢任特為帝分别黑白奏之而一二宵小先附璫璫敗復劾附璫諸人以冀解免者至是為臺省所糾鴻訓􅁬筆票擬言其陰陽閃鑠次第削奪御史袁𢎞勲僉人也以報復叅鴻訓且以要典之燬為鴻訓罪錦衣張道濬羣和之鴻訓從容具掲云諸臣叅論楊維垣賈繼春等疏同官偶屬臣票擬臣從田間來不知此中大有機阱但據疏票聞未敢瞻顧至要典一書海内忠臣義士吞聲飲血已乆臣實不敢謂此書為不刋之典掲入帝遣鴻臚至鴻訓邸宣諭而臺省鄧英劉斯琜等交章劾𢎞勲奪職異論始沮夏五月召對平臺鴻訓以民生之困由吏治茍且請以乆任為第一義因薦南户部尙書畢自嚴善治賦兵部尙書王在晉善練兵帝皆納用六月宗道景辰以人言去鴻訓與龍錫標道登同加太子太保晉文淵閣當是時羽書紛至帝責在廷諸臣言狀鴻訓為帝言為治當有次第毋蹈欲􅄩之弊帝意為解鴻訓儀觀秀發髯長尺有奇音吐琅琅中律呂毎言事帝必霽顔受之而旁觀者不能無側目會帝召詰給事韓一良疏惡一良語反覆欲停都憲之授鴻訓言王言當惜不宜惜一官又闗門以脫巾告帝意責計臣而鴻訓請發帑三十萬以示不測恩皆失帝指惠安伯張慶臻者奉􅃯總督京營故事知京營者不得問巡丁而慶臻􅃯書獨有兼􅃹捕營字提督鄭其心以侵職論之其增之者不知何人也人咸云中書田佳璧受慶臻賄閣臣標等糾之云從來􅃯稿皆相緣舊本中書繕寫送臣等閱過進呈前總督京營惠安伯張慶臻􅃯有増入巡軍字係中書田佳璧未經呈明䑃朧添入乞賜推問御史吳玉給事中張鼎延遂糾鴻訓及尙書在晉俱受賄有據帝赫怒下鴻訓獄諭吏部曰鴻訓身為大臣防維盡裂受賄擅增勅書事證的確猶屢疏誓辯欺罔支吾然事由兵部仍謂王在晉苖思順無贓其誰信之且大同失事重大𨼆不以聞及平臺召對甘心欺藐并張慶臻田佳璧俱著九卿科道依律會議於是大學士李標等掲云適見皇上發一臣同官鴻訓會議一本御史雖專指鴻訓而臣等撫心自問實四人同體之事鴻訓與臣等俱以皇上龍飛之初從淪落廢置中拔簡綸扉躬承眷顧置身霄漢此等榮遇豈區區千金萬金可以相易者臣等與鴻訓乆處疎略直率則有之其欲堯舜吾君與臣等實有同心今乃議論交謫剖陳無地願皇上采羣議以盡事中之公論沛特恩以全事外之國體則臣等幸甚而禮部尙書何如寵亦為帝言輔臣重任受賄大罪鴻訓受上知深且其人自有本末不宜有此反覆與諸臣争殿上帝怒終不解會議者再乃命謫戍代州而革在晉思順職慶臻奪俸三年佳璧論如律或云鴻訓在政府議事有所不可輙言曰皇上終是中主閹寺因而浸潤謂鴻訓以昏君目上從中讒搆百端至是必欲置之極典賴羣臣力救得謫戍去七年卒於戍所卒時有大聲發於空中人以為異福王稱制江南乃復原官外史氏曰嗟乎當思陵御極之初既誅巨憝盡屏諸閹委心大臣冀成中興之業故命相之始焚香告天舉行枚卜得錢機山及先生等六人何鄭重也迨乎先生以敇書得罪而機山亦以東江之故幾與袁崇焕駢首西市帝始有輕視諸臣之心以為是皆不足信而閹宦得以中之矣卒至交結壅蔽糜爛訌潰帝終不悟以至於亡究其初則諸臣不能精白一心矢公矢慎有以啟之疑也先生之獲罪實關興亡之大機故詳著於篇以為世鑒錢龍錫傳錢龍錫字稚文號機山南直華亭人萬厯丁未進士選翰林院庶吉士授編修歴陞春坊諭徳詹事府少詹掌南院事禮部侍郎天啟中魏忠賢亂政削奪去官思陵即位既誅忠賢以金瓶貯諸臣名字焚香告天得李標劉鴻訓及龍錫等六人皆以禮部尙書東閣大學士入閣辦事崇禎元年六月加太子太保晉文淵閣其秋召起舊輔韓爌入為首揆時方定附逆諸臣案帝以委之爌與龍錫爌為人端而厚龍錫則謙而和初僅列四五十人以請帝不然之再令窮治爌龍錫又以數十人呈帝怒其不稱㫖命分稱頌贊導速化三𩔖且云忠賢一人在内亦何能為茍非外庭逢迎豈遽至此翼日召閣臣入指黄袱所褁紅本示之曰此皆媚璫實跡也爌等知帝意甚堅乃網羅無遺而逆案遂定龍錫故江南物望所推一時主持議論又皆出其門下士姚希孟邪黨争為側目不能不睚眦於龍錫矣先是袁崇煥召起為遼東經略時龍錫叩以方略崇煥云當從東江做起東江者謂島帥毛文龍也龍錫曰公舍實地而問海道何居且毛帥亦未必可賴崇煥曰可則用之不可則有以處之耳龍錫未及置對而崇煥别去二年五月崇煥行邊至雙島誘文龍至以餉金十萬犒其師自與文龍登舟相視山海形勢即舟中斬之上疏數其十二罪當死而言臣出京時已商之於輔臣錢龍錫矣當是時文龍擁兵自擅有跋扈聲崇煥一旦除之頗以為當即當宁亦不以為罪也其冬大安口失事兵鋒直指闕下人有言崇煥之殺文龍陰為主􅅃地者帝為浮言所惑遂下崇煥於獄御史髙捷史􅒇袁𢎞勲者楊維垣私人也以疏叅劉鴻訓為公論所不容褫職時票㫖屬龍錫恨之會鴻訓以改敇得罪去冡臣王永光乃為三人請復官捷􅒇先得請相與合謀欲借崇煥以報文龍因即崇煥所云與輔臣相商一語捷疏糾龍錫指為同謀意欲羅織多人以快私憤龍錫上疏辯人有勸龍錫者言明主可與忠言當於辯疏中激切言捷等朋比之謀庶上悟而大獄可緩龍錫不能從遂致仕去明年八月既誅崇煥遂追逮龍錫言其背公徇私崇煥主􅅃疏語已露龍錫終不奏明若不重罪何以懲後下獄論辟而并謫戍科道官毛羽健毛九葉王應斗三人時思陵方任法以督責臣下在廷咸惴惴不自保即深知龍錫之寃無敢頌言者四年正月右中允黄道周起自田間乃上疏云臣竊觀比來逮繫舊輔錢龍錫拲梏鋃鐺樹簿法庭搶首獄吏羣臣相視默無一言此自書傳以來所未經見也尙古不具論秦漢而下宰相有犯坐請室不過數日自非大逆或裁或原人主未嘗不為引痛也今纍輔所坐昏庸疎率為罪督攀援耳督臣受劍制閫外忘親忘君僨事誤國雖磔裂莫贖閣臣坐綸扉遥度邊事不知能否成敗浪浪叩頭此於鬼薪城旦奚加乎先輔臣張居正當以邊功得􅄻錦衣堅辭不受曰吾身未嘗至疆塲而受上賞即一旦有敗何所逃誅臣疑其言以為不忠由今而觀未謬於先見也凡疆塲事最難言勝負何嘗一彼一此今閣臣以邊事坐誅後之閣臣必顧盼踟蹰不敢任邊事又令邊臣得以瑕隙卸閣臣後之邊臣有事必摭閣臣隻語單詞為質則是使綸扉之内割邊墻為殊域也自古宰相生值明時無大故而伏斧鑕者惟漢劉屈氂及先朝夏言耳漢武決意北伐心疑丞相阻廣利之師故一旦破法而戮屈氂世宗決意棄河套心疑開釁撓𤣥修之事故一旦破法而誅夏氏今東疆之圖未有定算恢復之計上下持疑而獨斷然快意於一纍輔纍輔既無斂碁引杯之致廷臣又無蹙芻齒馬之嫌遂使三台溺灰於貫城斗柄銷光於理勢毎見衣冠相語以目天下人心衰颯如此誰復為擔安攘之略者乎今巷議恣謬謂殺纍輔為毛文龍報讐朝廷自為人神攄憤何嘗計一故弁然物情既如此則邊將必驕邊將志驕則閣臣權絀故殺一閣臣為毛文龍報讎猶可為劉興治樹幟則不可借一閣臣為邊臣今日示前車則可為政府異日開後阱則不可且自陛下御極以來輔臣負重譴者九人矣一代之間寧有幾宰輔當堯舜盛時岳牧舉鯀貽禍滔天浮沈九載放殛之餘未聞岳牧係縲煩臯陶之聽也陛下即欲威柄獨運操縱海宇亦何必囹圄憤盈孤卿駢首令四方傳者咸謂天朝獄吏甚貴士紳甚賤乎書奏帝謂龍錫罪案原與文龍無涉何稱代為報讎本朝不設丞相疏内援引不倫至棄河套撓𤣥修豈臣子所宜言且稱夏氏是為何語著囘話道周再疏言恐邊臣藉口閣臣則帷幄之猷不壯故因邊計而引東江因東江而及毛帥因閣臣而引誤事之宰相思古宰相無遥制之實而收遥制之功今閣臣無宰相之名常受宰相之禍有此兩意滯於胷中故倉卒屬筆奉㫖責其支飾降級調用然帝意亦漸解矣至五月因天旱修省科臣劉斯琜又有疏請宥始釋龍錫於獄謫戍定海衛在戍十二年再經肆赦皆不得釋福王南渡稱號乃得復官存問卒於家外史氏曰吾聞故老云島帥毛文龍雖當一面足以制敵然往往縱兵淫殺焚掠以為富沿海一帶受害者數百萬家朝野人人痛恨謂其有跋扈意則惡之深而衆惡皆歸之辭也袁崇煥受敵國行間之言誘而斬之天下稱快然斬不以其罪也故有浮言之譖朝廷卒誅崇煥以正專擅可矣而株及機山先生則過焉嗟乎此猶逆璫之遺禍而東林之餘殃也夫姜逢元傳姜逢元字仲訒會稽人登萬厯進士官翰林進中允而其弟一洪亦成進士父鏡臨卒遺言曰吾家數世皆名臣汝輩當正身立朝以勉繼先烈固也特慎勿植黨二子唯唯故當崔魏時逢元一洪皆自言非黨人而其實東林羽翼也既而逢元進國子司業充講官科臣楊所修建言宜纂定要典倣世宗朝明倫大典故事而崔呈秀矯㫖開館敇大學士顧秉謙以下二十三人分總裁纂修謄錄收掌而以逢元非黨人可用列逢元副總裁官例總裁官入館據上座舉筆判諸館務逢元舉筆忽長歎衆愕然問故逢元視所舉筆示衆曰吾持此有年矣今欲用之而有違於心吾敢違吾心以用此物哉遂擲筆而出自是不復入館先是逢元為講官講虞書退有後言大聲曰後言非他謂既退而小人間之則有言言小人之得持其後也御史趙南星曾用其語入疏中忠賢銜之至是矯㫖謂呈身門户革職崇禎元年起詹事仍充經筵日講官㝷自禮部侍郎進禮部尙書時禮部所掌宗藩最多積弊凡請婚請封諸事自郡府至親王各有賂逢元除之會唐王讎殺其從父請面陳越關入都都人恐羣以宗藩事責逢元逢元私啟閣密處之遂懾伏去逢元枚卜舉第一再舉又第一凡九枚卜終不用而逢元亦乆厭曰吾得正身立朝以不墜先烈足矣他非所有也遂乞去請終養疏十六上後上親御門出諸章奏召廷臣給筆札各試票擬次日傳逢元及陳子壯文震孟張至發以下九人吏部錄年貎履歴上之上已用逢元而内侍沮之曰孰有講官如逢元倔强者復止至九年致仕逢元少時夢斗魁贈詩中有金殿簮花字自謂殿試必第一既而不驗至是將去會皇太子行冠禮逢元充三加官簮花殿中逢元乃歎曰然則吾之終此官豈人事哉外史氏曰聞之富貴在天則富貴者天實主之也於時之天亦竒矣所主之富貴俱畀蠧國害民之奸者何耶嗚呼醉耶憒耶熟睡耶錯畀之耶左右竊柄耶吾安得梯雲而問之練國事傳練國事字君豫永城人以進士授沛縣知縣調繁山陽天啟初舉江北卓異第一擢御史時山東妖㓂叛巡撫趙彦不能制國事上疏劾其遷延畏避失事機識者壯之會閣部孫承宗行邊國事上疏請定應舉事宜而廢庸撫閻鳴泰當是時邊務乆弛承宗以輔臣秉鉞將士不相習而事權中制毅然誓盡瘁援枹鼓出闗指麾部署義不反顧時中朝罕持之者人以是多國事之力也尋差巡漕明年事竣報命未幾被論削籍先是魏忠賢以取冬衣辱尙書鍾羽正國事疏論之坐是罷去崇禎元年詔起掌京畿道明年遷太僕寺少卿督山西餉又明年以僉都御史巡撫陜西時流㓂方熾帝銳意用兵山陜各斬賊獻俘國事在行間與有力七年晉㓂敗逸入陜西受降己而賊復叛帝怒逮國事謫戍廣西陜西人李遇知等疏救不報後遇知任吏部尙書為國事稱寃云督臣陳奇瑜主撫與國事相左得罪非其辜詔復冠帶家居逆總兵劉超者國事里人也詔援汝汴歸里讎殺鄉御史魏景琦等數十人怒馬趨國事庭欲脅為亂國事曰惡少以睚眦殺人罪及身耳將軍國之大帥而冒反跡朝廷一赫怒而族赤矣將軍宜守順上書陳寃狀聽生死於朝廷超懼稍稍禁屠掠謀依總督馬士英為解免會巡撫王漢奉密詔討之國事啟北門以應賊覺掩襲大潰殺漢國事履虎尾日夜鍵一室讀書或誚之國事曰此於生死際須定力勝之吾力恐不及正賴書卷助我耳士英受詔討賊總兵黄得功並抵城下國事密書與士英令許超降而擒之超故有復貴陽功士英貴陽人徳之單騎出見士英明日舉全軍出東門得功斬其黨張獻䇿合戰羣賊盡殪俘超士英於是重國事及士英擅權誅鋤東林黨人幾盡而國事得宴然司馬之堂者以此也外史氏曰當逆璫炎赫時而先生放膽捋其虎髭幾不免於虎口及劉超之叛又復履其虎尾矣至於士英虎咥清流先生宴然坐於虎頦之下而不遭其咀嚼豈非得讀書鎮静之功耶所謂以定力勝之者非耶東林列傳卷十八
