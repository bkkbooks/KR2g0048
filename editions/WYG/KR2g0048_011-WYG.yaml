body:
  text: 東林列傳卷十一江隂陳鼎撰明劉宗周傳劉宗周字起東紹興山隂人生而端嚴言動有倫雖年少時已巋然負儒宗望萬厯辛丑成進士丁内艱時許公孚遠學宗紫陽宗周叩為學之要告以存天理遏人欲遂謹識之勿敢忘甲辰授行人歸養丁外艱讀禮之暇惟以明理見性為事一日劉永澄至武林互正所學迺與決求仁之旨析主靜之説辯修悟之異同永澄爽然如有失而去壬子起官道謁髙攀龍相與講論復有問學三書皆儒宗要言時顧髙諸公興復東林大會四方同人講學不輟京中人目為鈎黨將搆大獄宗周上書言顧憲成之學歸於自反請各思自反何如時論韙之旋告病至天啟辛酉起禮部儀制司主事時魏璫初用外廷未有言者乃首發其奸未幾果竊柄亂政如所言遷光祿寺丞累遷太僕少卿以病歸甲子起右通政未赴而冡宰趙南星等斥逐朝局盡變乃疏辭陳人臣進退之義有旨削籍居家潛心理學嘗與攀龍質疑罔間而以半日靜坐半日讀書奉為準的崇禎初復官起順天府尹策蹇就道其子徒步隨之甫莅任即以直諫被斥歸閉門靜坐不見一客其門人羣請設教不得已過陶石簣祠集紳儒會講以伊洛主敬之學宣明於衆而於慎獨之要尤加謹焉丙子起工部侍郎屢進昌言疏論内閣温體仁狀且極言任用中官體統太重之弊上怒斥為民歸家啟蕺山書院從游累千人梓所述人譜以授學者有朱子致知與陽明致知之辯壬午起改吏部左侍郎陳聖學三篇晉左都御史上言建道揆貞法守崇治體清伏奸懲官邪飭吏治六事請復首善書院及社學罷厰衞上意頗嚮之甲申救諌官熊開元姜埰忤㫖罷歸甲申國變聞信卽赴杭省跣足衣麻被髪請卽舉哀或欲俟哀詔至宗周曰豈有子聞父喪不躃踊之理詔至再奉行未為不可也𢎞光立起原官至南都疏請誅誤國諸臣又表勸親征併劾四鎮淮撫戰守失宜之罪有違時宰意遂見逐乙酉六月山居聞變不食而卒學者稱念臺先生外史氏曰先生之理學文章沸天下宇内儒宗皆歸之觀其立朝正色有古大臣風國亡而身與之俱可謂無媿於所學矣祁彪佳傳祁彪佳字幼文浙江山隂人年十七舉於鄉天啟二年成進士授興化推官瀕行跪其父故參政承㸁請教承㸁不答或問之曰不見夫誨泅者乎壺而扶甕人藉其肘終其身不能泅一旦挾諸清泠之淵翻壺却甕􅑷其身入水而泅成矣今者入官則翻壺却甕之時也彪佳去果以賢能稱嘗出撫亂兵斬其渠徇於軍門崇禎四年考選擢御史時京營操兵遣七太監主兵政彪佳激切諫久之巡按蘇松預以十革十四申九詢檄下屬革者革其弊也申者申其所當行也詢者詢其何者可行何者在所革也乃據屬所答覈之定黜陟㑹蘇州無厲名打行廉其稔惡可殺者四人械於衢集鄉三老詢之曰是可殺否鄉三老曰可卽又詢諸觀者曰是可殺否觀者曰可於是掄大箠箠末量五寸積一寸半每箠十易操箠一箠至死驗之陳其屍而宜興鄉宦陳一教奴客播虐怨家刑牲焚其廬刼其財肆其屍墳彪佳先捕諸奴客正法平衆心且盡追還所佔掠男女田産而奏奪陳氏父子官然後治諸怨家之為亂者時彪佳囘道居上考而舊輔周延儒與陳氏僚壻怨彪佳執法隂嗾中官駁彪佳下其等降級上親索筆改罰俸當是時人憾彪佳寃而猶幸上之知也彪佳為人修長潔白風度翩然而遇事敏㫁時乞病家居猶立賑災法賑東南饑寧紹台三府十九縣皆倣行之乃以病假過八年自劾請照過五年閒住限例而詔起掌察召對賜茶餅會吏部吳昌時破計典任意出入彪佳遇於朝面折之叱昌時攬權骫法疏叅昌時昌時故叵測而彪佳是時又以疏留掌院劉宗周為上所忌至是疏入恐從此重得罪人人為彪佳危而上疑昌時謂彪佳言是旣而昌時敗彪佳循差例刷南京卷國變諸臣援宋髙故事擬以福王為兵馬元帥彪佳曰監國本朝故典也何遠引為議遂定未幾有傳正大位者彪佳抗言曰甫建國而遽登極何可且羣帥勸表未至即有忠如陶侃者尚以不預定策為恥况其他乎然是時邀功者駕言本兵史可法有二心可法懼雖是彪佳言不敢持遂以蘇民變謂彪佳素德蘇出彪佳安撫蘇州彪佳所至設先帝位率衆哭卽諭以大義且言中原已無賊國有長君使人心得安乃揭榜於路曰叛逆不可恕忠義不可矜毋借鋤逆報仇毋假勤王造亂捕蘓民之首亂者斬之凡借名抄從賊官如剽項煜家剖時敏室所殯棺次第捕治而嘉定華生家諸奴客同時起縛主戮辱索身劵所至數萬人彪佳盡捕之斬數人餘悉掩獄令曰有為原主所保者貫其死於是諸奴客家皆膝行搏顙匄原主赦免遂募士為蒼頭軍親教戰適興平兵攫丹陽市錢浙兵勤王者不平鬭而傷軍民大譟城閉彪佳率蒼頭馳治斬興平兵興平伯傑夙憚彪佳名至是忌之揚言且移兵丹陽以彪佳彪佳却以牒復約會傑於大觀樓時傑踞𤓰步大觀者𤓰步樓也傑謂彪佳必不至至期風作傑笑曰祁撫不至有辭矣頃之隔江帆起破浪頃刻達岸傳呼曰祁都堂至矣撾鼓入傑聞之大駭裹甲出迎及門見彪佳角巾單衣攜胥𨽻各一人又大喜手揮部士去勞且拜坐語久之起指江誓曰公鉅人也公在傑敢越尺寸以溷公者有如此江乃屠宰饗彪佳彪佳一舉箸而别旣而馬士英憾彪佳適劉宗周劾士英阮大鋮謂彪佳同為之嗾其黨張孫振劾彪佳二心阻監國正位為潞王地彪佳不與辯祇疏辭定策功所陞都察院右副都御史竟去我兵下江南貝勒以書幣聘宗周及彪佳彪佳沈水而死死時别家人駕言應聘將渡江宿所搆山園夜開牖望南山笑曰山川人物皆幻形也今山川如故而人生已一世矣詰旦家人失彪佳所在見栁陌淺水露角巾曰是耶蓋入水端坐云後唐王稱號贈少傅兵部尚書諡忠敏外史氏曰先生為言官曾痛言賦税徭役獄訟闗梁之弊上是之而未行也及按蘇時則有定解額清隠租平漕兑革行館置役田禁攤贓諸事皆實實禆民者與宗周同講學同死難而大鋮但疑其同鄉同住丹陽遂為同惡不去之不快者何耶嗟乎南國之亡亡於馬阮也當時京師諺曰都督多於狗職方滿街走相公止愛錢皇帝但喫酒又有署士英之門曰兩朝丞相此馬彼牛同為畜道二黨元魁出劉入阮豈是仙宗道路之言如此欲國之不亡其可得哉甚矣小人之害國也陸培王道焜合傳陸培字鯤庭浙江仁和人生而倜儻負氣發憤讀書日不盡數卷不止為文詞振筆風發光采爛然人皆歎其華贍崇禎十三年成進士例當授行人需次南還益縱覽古文竒書勤敏過諸生是時東南吳越間競尚文㑹培自少好客長益喜自負與其兄弟收召文士日夜為賢豪懽稱詩角藝一時號西陵體亦稍稍使酒任俠於人有不可則瞋目叱曰若亟去毋汙我座及文詞氣誼皦然深相結則折節身下之至急其困阨雖患難死生不易也由是客過武林者莫不爭先願從陸氏兄弟遊旣而與王道焜遊東林聴講學飜然大悟曰原來吾生平所為皆聖賢所不屑也遂一意誠敬而軌於道培為人有篤性事父兄孝謹父卒於官培自江寧歸號慟搏顙齧臂血淋漓見者皆為之泣十七年三月賊陷京師北望哭累日絶意仕進已而福王立南都就選得行人明年奉使淮上未還而南京不守遂歸誓以死殉五月我兵下杭州時家人避地桐瑦山培跪白母曰兒人臣也不能卒事大人死不塞罪母嗚咽不能語所親為之解曰行人無守土責如必不得已盍少待以觀變培仰天嘆曰主辱臣死陸生男子忍復須臾茍活耶初潞王尚在江東至六月聞潞王去海遽求死妻陳率家人晝夜伺守不得間乃徐徐改顔曰吾為老母泣留不得捐踵頂矣聞游兵且入山汝曹盍徙避之佯索酒滿引數巵言笑自若促陳徙去卽上大牀自經死先一夕留書訣兄圻作絶命詩杭人士聞之無少長皆流涕年二十九時同死者錢塘王道焜字昭平聞變謂子舉人均曰吾父子世受國恩不死北而死南晚矣亦自經死道焜故竒士父國柱同知兖州自免歸道焜舉天啟元年鄉試歴南雄同知崇禎末詔徴天下賢能吏將親試以不次用道焜名在選中吏部以郡丞無考選例題陞兵部職方主事道焜上書謂國家懸異格以待非常銓臣執故例而靳考選非陛下收羅賢豪至意得旨許候考而甲申之難作號哭曰臣惟一死報國矣至是卒如其言杭人嘗與陸培並稱之唐王稱號閩中各贈以官培諡忠節道焜諡節愍外史氏曰兩先生以豪傑之材藴聖賢之質使當日執政置之於有用之地其豈不能當一面乎惜乎竟以一死傳其名則亦可哀也已張國維傳張國維字玉笥東陽人少以理學自勵慕東林名走數千里來會講中天啟壬戍進士知廣東番禺縣屢擒巨盜以卓異擢刑科給事中遷禮部改太常少卿秦中流賊起渡河轉戰蹂躪黄鳳滁泗間朝廷憂之遂命國維以僉都御史巡撫南直至則察視沿江形勢而安慶孤懸江北據陪京上游楚豫之盜往來窺伺時調徽寧及吳淞兵戍之而海冦復竊發國維乃募壯士議增馬步二千於是皖為重鎮又以羣盜出没檄濱江諸邑修城郭建敵樓為永久計治吳七載威惠大行每值旱蝗則請蠲請折抗疏入告而其大者尤在講求水利蓋吳為澤國明初開修水利設有專官至宣德中周文襄忱為巡撫秤土均糧凡坵塍之灌注湖流者依重科畎澮之進退潮汐者減輕則其法尤為精密𢎞正以來屢命疏鑿自萬厯戊申後始漸廢弛農人竭蹶培壅收穫仍儉坐是民多艱食盜風日熾國維乗單舸遍探河渠悉為圖説凡三吳諸水之故道曾煩累朝睿畫者次第編訂他如臣僚章奏官司案牘莫不蒐採輯為三吳水利全書共計三十卷上於朝又疏請修治吳淞白茆於瀕江瀕湖瀕海之隘口築堤創閘以吐泄節宣之朝廷知國維才乃以兵工二部侍郎兼右僉都御史督河道時天旱水竭國維徒跣暴烈日中禱於東嶽大雨如注河遂通流會大盜李青山起山左騷動有旨會𠞰而青山佯請内附國維單騎造賊營青山出不意大驚羅拜請死國維隂察賊徒欲餌我旣還遂部署將吏疾馳之賊方置酒髙會謂其下曰侍郎已墮吾術中矣畧不設備國維至青山就縳餘賊悉降捷奏賜金幣廕一子錦衣而沂州王明及齊見龍張文宇等聚衆剽掠謀㫁餉道國維悉用計擒斬之東方遂寧十五年擢兵部尚書我兵已入闗七日前上書稱疾弗允也國維視事乃論劾督師范志完巡撫總兵以下數十人又檄薊督趙光抃率諸將捍禦急調天下援師國維見内外交訌勢甚危急請馳軍前自効上以機務重不許而是時永城叛將劉超擁兵觀望擅屠御史魏景琦家表請入援廷議授超以保定總兵官國維獨抗言曰此賞奸也若羽翼已成又一曹闖矣乃屬巡撫王漢圖超謀泄漢為超所殺國維密授巡按蘇京方略與督鎮共除之且赦丁啟光斬叛自贖超卒伏誅方國維急調援師也劉澤清入援臨清失守御史蔣拱宸疏論之國維言都城告急天下入援者恐後若一方有事歸罪中樞必海内不舉勤王之甲而後可未幾國維請告上許之而言者以周延儒用范志完為縱敵上大怒緹騎逮訊併及國維下獄刑科孫承澤疏救國維次日上御文華殿出疏示内閣及刑部諸臣范景文力言國維素著勞績罪有可原科臣言是上命以原官督浙直兵餉甫出而都城陷矣福王立南中以國維為京營尚書馬阮惡之以為東林黨人入蝗蝻錄中遂乞歸省母而南都失國維遂與方逢年熊汝霖孫嘉績鄭遵謙朱大典等迎魯藩於台州監國紹興國維為大學士督師江上適馬士英自南中奔至欲入朝國維知之首叅其誤國十大罪士英懼遂不敢入時兵馬雲集人冶一軍不相統攝國維請合諸將尅期會戰十月我兵至方國安嚴陣當之國維率王國斌趙天祥接應會天大風雨火砲弓矢不得發遂收兵而唐王已卽位閩中頒詔至魯藩不悦下令欲返台州國維星馳至紹上疏唐王言國當大變凡為髙皇帝子孫所當同心恊力成功之後入闗者王監國退守藩服禮制昭然若以倫序叔姪之分在今日原未假易且監國當衆心奔散之日鳩集為勞若南拜正朔鞭長不及猝然有變唇亡齒寒臣老臣也豈若朝秦暮楚之客哉疏出議始定然閩浙成水火矣浙東將士與我兵跨江相距會閩中使陸清源齎勅犒師而是時馬士英阮大鋮同依方國安因唆國安斬之且出檄數唐王罪國維聞之嘆曰禍在此矣國安旣斬閩使恐閩發兵又見杭州堅守不下遂議抽兵屬國維西征以余煌兼兵部尚書代督師時我兵方屯北岸用火砲擊南營國安懼拔營走江上諸軍皆潰惟王之仁一旅獨全因具舟楫邀國維入海國維不得已乃率衆迎扈魯王我兵渡江國安士英謀挾魯王投降遣人守王會守者病王得脱傳命國維遏防四邑遂遁入舟山而事不可為矣先是我兵破會稽有貽書招國維者國維答以身為大臣誼在必死惟乞全老母而已至破義烏衆勸入山國維曰誤天下者文山疊山也一死而已我兵至七里寺國維具衣冠南向拜曰臣力竭矣作絶命詩有精靈常傍孝陵墳之句從容赴園池死其子亦被戮外史氏曰嗟乎當魯監國扼守浙東與閩聯絡亦足以支吾也乃馬阮二賊唆斬閩使遂成水火卒不可支豈二賊與朱明有不共戴之讐耶不然胡為必欲盡喪其土也先生之死重於九鼎矣二賊能無愧乎詹兆恒傳詹兆恒字月如永豐人崇禎四年進士授福寧甌寧知縣有惠政十一年行取考選南京廣西道御史十二年巡按蘇松常鎮諸郡法紀嚴肅吏民畏戴之十七年五月福王立金陵兆恒上疏言目前大計兵餉為急今北漕已漸入南而停泊江淮者尚衆運弁旗甲折乾盜賣弊蠧不一而足宜急􅃯計臣將在淮者令督臣路振飛督之在京口者令漕臣白抱一督之星夜押發銜尾入南除補給京軍月糧外尤宜立運登庾無久露泊江干以資冦糧從之未幾陞大理寺左寺丞時馬士英當國兆恒與給事中章正宸皆亢直敢言故悉從陞擢當時謂超之正所以遠之而兆恒强項如故也六月士英薦阮大鋮詔冠帶召見兆恒言自崔魏煽禍毒危宗社幸先帝入繼大統芟除内難慮奸人凶黨窺伺生心於是欽定逆案頒行天下以首惡正兩觀之誅黨從列春秋之案凜如也然御極十有七年此輩日夜合謀思燃溺灰幸先帝神明内㫁確不可移今梓宫夜雨一坏未乾太子諸王六尺安在讐恥未復悲痛常在聖心而忽召見阮大鋮還以冠帶使屢年欽案遽同糞土豈不上傷在天之靈下短忠義之氣乎疏奏命錄逆案進覽於是兆恒繕寫成帙附疏入告而士英亦於是日進三朝要典矣七月奉命頒詔九月陞大理寺左少卿大鋮遂作蝗蝻錄盡羅天下賢良指為東林惡黨而兆恒預焉兆恒遂屢疏引疾明年二月囘籍我兵下福建兆恒起兵開化之嶺頭山兵敗戰死外史氏曰阮賊與朱明何讐必欲盡芟其股肱之賢良者何耶嗟乎忠烈往矣子孫式微矣彼蒼旣不佑矣而賊之子孫猶有垂紳食祿者天乎天乎是何心哉陳龍正傳陳龍正字惕龍浙江嘉善人少師事無錫髙攀龍而與同里魏大中同學天啟辛酉舉京闈第三人乙丑璫禍作大中首被逮送至錫山因謁攀龍證學累日初以文章經濟自負自中年後悔其無本一意反求身心遂悟關鍵在存誠而推行則在於愛人其所為皆有體有用之學年五十登崇禎甲戌進士授中書舍人戊寅五月熒惑守心龍正上養和好生二疏規切時失六月進特簡揆職二疏申責輔臣以人事君之義大忤執政己卯十月彗星見詔求直言龍正上格心疏其略曰語云事天以實不以文臣請曰事天以恒不以暫何謂實皇上今日求言卹刑之誠是也何謂恒願皇上勿忘此求言卹刑之心是也蓋星變有時弭而直言無時不當受人命無時不可哀是心也豈僅覩彗星而動哉願皇上嵗嵗存之日日存之疏入上甚嘉之未幾立冬日大雷電雨雹龍正上請正郊期疏謂先王以至日閉闗而後世以至日郊天於禮殊戾孔子對魯定公曰周之始郊其月以日至其日用上辛夫冬至不恒遇辛則用辛必冬至之月明矣云至日者則為冬至之日云日至者則是日至之月而非本月也上特命閣臣㑹部議奏久之駁上辛不便應仍用至日乃再進郊期考辨疏御批數十言從容清問閣部皆恚及三疏四疏上卒格不行龍正遂為郊期咨應一書冀此禮明於後世更著東天民傳以見志庚辰奉命冊封輝府因假歸壬午入都應詔陳言進生財平冦禦邊三疏俱䝉優旨又有墾荒議投閣未進而輔臣黄景昉先述以告上一日舉姓名問他輔至再無答者旣而戸垣楊枝起疏薦諸正人復及是議宜令繕本進呈旨下取覽龍正補疏上之而終沮於部又著掌上錄言兼足公私申明宫府内平外却四事而以格君心擇治人為本錄成晉江蔣德璟請觀而梓傳之癸未四月朝局稍轉進剖析偽學疏十月聞闖逆破潼闗為詞衣帶間云南箕靜聽常依主北闕閒居也致身甲申正月調南京國子監丞三月抵家求題致仕五月初聞國變驚慟屢絶遂得疾七月南渡遷禮部祠祭司員外龍正乞休再三始允乙酉六月南都潰得劉宗周殉節狀遂絶粒而死著有學言二十卷政書二十卷文錄二十卷因述二卷為幾亭全書行於世學者稱幾亭先生外史氏曰先生為人内嚴毅而外忠厚者也觀其輯儒統説以為本朝學術自白沙傳金針於甘泉雜禪於儒其後諸家繁興立説彌肆殊為斯道懼今盡芟其悖道之語存其正論俾學者以為宗雖謂諸家皆醇儒正學可也噫觀其絶粒而死與國偕亡則節烈又凛然千古矣黄淳耀傳黄淳耀字藴生嘉定人少力學為諸生卽以名行自勵同縣侯峒曾無錫馬世竒皆鄉先生名知人一見淳耀嘆異折行輩與交舉崇禎十六年進士未授官而歸福王南渡求仕者爭趨南京淳耀獨不往或問其故應曰諸公多善予者往則必為所牢籠矣君子始進其可不以正耶訖不往淳耀體貌魁秀讀書尤潛心先儒性命之説每置日厯有事必書其上以驗所養晚節尤多所自得嘗為書謝其鄉試房考官因自敘曰某蹇淺下材自十有七嵗而入膠庠今二十有一年矣蓋嘗求義理於六藝求事跡於諸史求萬物之情狀於騷賦詩歌求載道之器於漢唐宋數十家之文章編剗規模涵揉櫽括放而之於詩若文之間竊謂古之立言者非其有得於心則莫能為也夫旣有得於心矣雖有言可也如遷固荀揚韓歐之屬是也旣有得於心而有言之者矣雖無言可也如某家之叔度是也某比來刋華踐實玩思性命求東林程朱之道所以悟明其心而剛大其氣以庶幾古之因文見道者尋繹久之亦復超然有見於語言之外世儒舍性命而談事功舍事功而談文章是以事功日陋文章日卑詖淫邪遁之害及於政事而不可救也某粗有識知其敢貿貿焉以文人自居以富貴利達之習自溺也哉我師下蘇州淳耀偕諸大家率縣民城守師旣入城從容詣城西僧舍將死僧止之曰公未仕可勿死也淳耀曰城亡與亡此儒者分内事耳遂自經死其弟諸生淵耀亦從死焉外史氏曰文章功名不本於道德㫁非真者先生之文章動一時矣若城亡不與之俱亡則檜嵩之辭藻讀者不恥之矣其死也重於泰山乎徐石麒傳徐石麒字寶摩一字虞求嘉興人其先有居青浦者因為青浦諸生幼羸秀多能長而沈㝠於天文樂律兵陣之書貢於鄉上計偕罷歸而同年生殤於途石麒為製朋友之服經紀其喪以女妻其遺孤舉天啟二年進士授工部營繕司主事司節慎庫是時奄賢方用事勢張甚茍當其意卽得美遷所以羅致石麒者至再石麒方嚴自處不少顧奄始不悦奄興三殿之役督責峻急帑藏不支石麒累疏願省浮費蘇積困奄格不行每黷請石麒必以令甲折之大忤其意大獄起楊左諸君子相繼瘐死坐贓累千石麒之師黄尊素亦在繫時支蔓鉤連無不引避幸免而石麒獨首約同里為魏大中償所坐并為尊素上輸冀出之有盧偵事者以報奄奄益怒思所以中之會戚畹王昇矯領營葬金石麒疏發之下詔獄奄屬昇子造悖辭誣訐石麒詔并訊石麒條列昇父子罪狀甚著奄不能絀事得解然猶罷其官以歸崇禎誅大憝召用諸去國者石麒與焉補南祠部郎改吏部文選郎尋改考功主計典一二有大援負時望者屏黜不顧旣而被黜者知其至公亦不敢怨也計事竣例得敘勞擢京卿時相惡斥其私人持勿與久之遷尚寶卿轉應天府丞攝尹事時驛傳多凋敝而江東驛尤要衝馬戸之役最大馬戸者非富民即髙貲商官吏多以私嫌僉報産立破南都空虚多坐此石麒議以額役之錢官為募人牧馬悉罷僉報遂列十二條或移御史臺或上請著為令十一年春大司冦鄭三俊持法平以議侯恂獄不中失帝意下於理三俊海内耆德而帝方震怒不測百僚趦趄無敢言者石麒入賀元會因極言主上嚴刑峻法上下不交漸成釜􅑄故上天應之以災三時不雨大可省懼且清直大臣以執法頌繫上累聖德疏入人盡危之越三日帝御門畢忽召羣臣申飭大要以非不知司冦清而清固人臣分内事安可自恃析律骫法今念其老姑釋之故事未有於御門宣諭者帝所逮治大臣未有六日卽釋去者天下仰帝之明而嘆格君之深也尋召拜左通政轉光祿卿帝鋭意於治力崇節儉有終身蔬布之諭而食監供具積習多浮汰謂帝王家事大烏用書生屑屑較籌為石麒勿顧也釐奏冗食可罷省者以成君德寛國用帝悉嘉納之晉通政使先是帝尚綜覈兼採聴聞布衣上書者馳騁闕下叩銀臺門或獻策求用或有所攻訐往往得售其説倒置無等主者遏之則噂􅊱反唇至挾持不可忍石麒計此輩非可以勢格也日進其䜛説者就其封章句駁而字比之持之以理繩之以法使竆於辯而悔生焉於是告訐之風少息亡何遷少司冦攝御史臺署部事時貫索填滿視事三月而出滯獄萬餘陳新甲為樞部乖方誤國雖下吏多奧援猶揚揚自負石麒立傅爰書遂棄市海内快之晉大司冦時周延儒再當國頗能進一二舊德收物望然小人以非道進者不能拒也故君子亦不能安其位石麒為納言及少司冦時相君時致欵洽示接引石麒落落若勿知者及是時邊警方大嚴帝甚憤怒而外廷喜事者有江南北分黨及二十四氣之蜚語帝微知之因出中旨諭羣下毋結黨而給事中姜埰上言陛下何所見而有此諭恐啟奸人窺伺端帝震怒而行人司副熊開元新從謫所來極論時政微及元輔帝意已移而難大臣各予杖下獄都御史劉宗周以廷諍譴去石麒上言宗周立朝無偽忠偽信之習陛下用而舍舍而復用宗周今老矣陛下斥去之欲再見此岩岩冷冷之老臣豈可得哉書上不省而以議坐開元埰罪止配贖不足塞上意閒往歸里未幾聞冦逼畿甸痛哭竟夜為文檄同志起義兵悉吳越之甲北首赴難而鼎湖之信至矣遂定繼嗣嫁二幼女悉遣姬媵圖為國報仇而福王監國尋稱號起為右都御史旋晉冢宰是時中貴人勲戚外鎮互相附麗政柄不一石麒條上七事忤權貴意多格不行推登極恩進階光祿大夫太子太保然知事不可為遂謝病去旣而我師入嘉興石麒方在鄉募兵為城守計信迫乃還曰吾大臣不可以野死時城閉請縋之上老僕李成欲先登少僕徐錦年十五謂成曰君老矣幸速歸鄉成怒曰童子何知謂我老耶俱縋入城陷石麒自經繯寛不得斃顧老僕曰幸速成全我成痛哭不敢視錦慨然叩首於下者再起為主人𦂳繯遂絶因謂成曰主人今日死何為耶成泣告曰主人受朝廷大俸大祿今日國破君亡故以死報耳錦曰若是則我輩食主人食衣主人衣主人死我輩焉敢茍活耶遂解帶繫窓􅎉而絶成大慟亦自經在鄉二僕祖敏李升聞之俱自經死時順治二年六月二十六日也石麒為人忠誠正慤造次不二齊家以禮雖御僕亦知大義焉時城内外百里無人跡嗣子爾榖間闗百計凡二十餘日始得入城負其屍置槥櫝中以出方溽暑顔色如生握手没爪鬚髯怒張凛然有氣焉後一年爾榖以湖冦波及死於市妻孫氏聞爾榖死一女在抱棄之赴水死立而不仆一門之内臣死忠子死孝婦死節僕死義噫亦何可多得哉石麒博學强識條貫經史尤長於國家典制諸司掌故故贍於持論與人言移日不倦文章古雅淵茂章奏警徤愷直而性樂易愛人下吏寒士才行可錄而厄於無援者汲引不遺餘力然不以告人人有終身不知者故咸以為長者而其生平同德碩交惟都御史劉宗周大中丞祁彪佳左納言侯峒曾給事中吳麟徴考功郎夏允彞外此不多見皆與石麒相繼殉難即其取友可知己所著有可經堂集外史氏曰崇禎之末先生被放里居聞廷議以南遷聚訟人皆非之先生曰若膠柱死守亦非臣子愛君父之道茍翠華南幸各鎮撫之兵騰勇奮發大臣勲衞半留居守半充扈從以謀恢復亦不為無策也倘觀望狐疑至求遷不得尚忍言哉觀其説其亦濟變之一道歟宋李綱嘗議巡幸謂闗中為上襄陽次之建康為下當時亦未嘗膠柱於故常也特規度之地不同耳陳亮論與綱合而惜乎宋不能用也嗟乎崇禎時所謂闗中襄陽之險旣不可圖惟建康藉陪都之形勢以愍皇帝之憂勤創痛得人而用之天下事未必其不可為耳唐李翺云翺嘗怪神堯以一旅取天下後世子孫不能以天下取河北為憂夫興亡之判豈以其地哉向使擁福王之君若相雖得秦楚之地而據之其覆滅寧有異於建康者耶若先生者其濟變之圖無所庸而直以一死報國豈不痛哉東林列傳卷十一
