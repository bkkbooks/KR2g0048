body:
  text: 東林列傳卷十三江隂陳鼎撰明鄒元標趙南星列傳鄒元標字爾瞻江西吉水人萬厯五年進士觀政刑部首輔張居正父喪奪情抗疏指斥入朝門適翰林吳中行趙用賢以諍居正杖於廷血肉狼籍亟歎曰竒男子也出袖中疏上之略曰居正才雖有為學術則偏志雖不小忌刻過甚進賢不廣自用太濫言路未通民隠未達用深刻之吏阻豪傑之才以居正而在京守制綱常以斁人心以壞安望其弼成帝學輔翼聖志哉居正且大言曰不顧旁人之謗議不恤匹夫之小節將以三年之喪為小節乎臺省諸臣不言己為曠職又有御史曾士楚出疏保留省臣陳之謨效之朝廷為首善之地臺省為公論所出持論至此可勝歎哉疏入杖八十謫貴州都匀衞徒跣就道數濱死抵戍所進匀士講學從者日衆巡按御史至衞閲兵必軍裝持戟雜伍中御史亟遣人謝對曰此君命也何謝為十年居正死薦起為吏科給事中元標疏陳五事一寡慾以正君心而聖德培一召對以決壅蔽而泰交成一肅憲紀以糾羣吏而貪墨去一崇儒術以端士習而風聲樹一選撫臣以廣休養而百執事賢慷慨論列凡數千言帝嘉納之朝士多急利祿廉恥寖微元標疏糾南户部尚書張士佩驟進禮部尚書徐學謨難退尋並罷去而所推薦耿定向羅汝芳許孚遠等十餘人皆名儒夙望舉朝為之色動十二年春慈寧宫灾元標痛言修省有保聖躬開言路節財用拔幽滯寛罪宗放宫女六事忤旨朝士故揚言上怒欲杖殺鄒給事元標令妻檢曩所服布袍白蠟藥云予筋骨雖病然精神尚可杖五六十若緹騎來即徑去第毋令老母知之㑹大學士申時行數請曲貸謫南刑部照磨僉都御史石星告之曰公聞上語否上方御膳忽命撤減曰若不聞鄒某數朕耶其見憚若此明年五月調北吏部騐封主事請改南以便養母不許已而吏部尚書楊巍應詔陳言元標又為代草謂後宫多嬖寵近侍用事者十人號十俊即宣德朝之八黨也請割袵席之愛嚴便嬖之禁省内廷供億之煩減每歲贖鍰十七萬之數勅御史汰馬快船諸弊皆人所不敢言者十八年陞本司員外郎遽引疾歸逾年檄赴官途中所見聞吏治民瘼臚列幾萬言如家人父子相告語又言明主不以言瑣而忘采納藎臣不以身遠而忘諫規陛下初臨御時年才十齡朝講日親山谷傳中國聖人今聖齡方壯遽違前志臣竊痛之千金之子一日不出里閈臧獲有跳梁之患百里之吏一日不坐堂皇吏胥有舞文之憂今萬國萬姓係陛下為安危一日不朝則堂陛情隔忠良謀阻國事有不可知矣願陛下味孔氏一簣之訓鑒孟子九仞之譏取魏徴十漸之疏留神詳覽臣不勝大幸又聞太子天下之本重太子所以重宗社也今皇太子睿齡日増不知宫中保䕶有幾覃吉輩竊謂宜出而與諸儒臣相親也易稱主器莫若長子故受之以震願早冊立以慰天下望是時元標忠鯁藉甚在廷内外推轂者數十人帝終以切諫怏怏不樂用而元標念母將八十又請改南遂左遷南刑部主事亦忻然迎養及考滿赴部引疾復遷郎中值母憂歸遂堅卧不起居南臯之野談道著書學者稱南臯先生林居垂三十年由是學益進光宗即位召起刑部未幾熹宗立陞大理寺卿進刑部右侍郎在道聞遼東不守歎曰三十年來惟爭門户不問封疆禍見於今日矣請簡用岳元聲汪應蛟吳達可諸人而先定畿省勤王約寛山東畿輔遼餉以固根本旣至又陳拔茅闡幽振武保泰數事而歸本於簡儉和厚大約收拾人才調養元氣為國家計財用為小民陳疾苦帝皆可其奏元標旣以清直立朝與趙南星髙攀龍並稱類漢所稱三君子者天下咸屬目焉晚年風力遜始仕時科臣汪慶伯少之元標曰大臣老臣與言官自各有體安用呶呶作少年故態哉然於國家大利害則抗直如故李成梁子如楨驕恣楊鎬喪師得罪旣僉議如法忽降中㫖從寛元標讞如楨當死鎬罪不當赦并斥諸内臣干憲紀帝為改容卒仍初議是時天下賦重遼餉尤急元標曰不可以一遼失天下心請蠲遼餉而以鹽課鼓鑄税契義助諸策為之補救東事未寧而黔苗復亂議者爭言用兵元標曰患不專在苗興師動衆非良計也具陳其情狀惟在處置得人節制有法正當以不治治之因盛述前撫臣郭子章安苗功蓋元標在黔時嘗讀子章書觀其壁壘間當日與安酋㰱血盟處拊髀悲之故所論多切中又上書政府言其事天啓元年冬遷左都御史條議計典在核實毋縱毋苛廣寧之告潰也會議經撫罪多異辭元標曰王化貞棄廣寧宵遁宜服上刑熊廷弼比楊鎬多一逃比袁應泰欠一死均難逭罪時服其正論京察諸賢有以門户受錮者請追恤其旣死而亟錄其遺賢或以衰遲難之元標痛惜老成曰今几案置一古器坐客改容於用人何獨不然薦髙攀龍劉宗周等甚力光熹之間三案無信史禮部尚書孫慎行疏責首輔方從哲甚峻元標急韙其言疏曰乾坤所以不毁者賴有綱常綱常所以植立者恃有信史國史不書野史必載請亟定光宗實錄表明公論亂臣賊子之胆可破也又請矜容愚直言天變時危宜亟下求言之詔作敢言之氣今陛下卽位未二年數逐言官不急為賜環則士氣不振將來政柄不知落何手矣其持議不阿類如此當是時客魏已隂用事憚元標方嚴猶逡巡不敢肆而元標所引用正類皆非僉人意尚書孫慎行王紀皆坐忤旨罷斥元標力救不聴亡何遂以講學被謗矣元標之拜御史馮從吾為之副二人同志創首善書院講學於京師給事朱童䝉攻之以為招搖門户蓋奸黨嗾攻正人意不在講學也元標奏曰臣自少至老浮沈南北數十載獨有此學患難死生未嘗隕志昔隆慶間徐階當國集諸計臣千餘人討論識仁定性二書未嘗以此少階相業今乃為末俗所諱人生百年自帖括青紫外一無所聞雖位極人臣虚生浪死耳旣不許京師講會願罷臣歸田以究所志陛下經筵日講為諸臣先毋以臣等阻千百世共學之心馮從吾亦屢疏乞與元標同罷閣臣葉向髙為之疏辯議留給事郭允厚郭興治遂痛詆元標以二氏之學元標六疏乞罷乃加太子太保馳傳歸猶上書言邊徼事薦朱燮等可用匡攘後吏部尚書趙南星猶會推起用不果召未幾卒元標為人剛直無茍容通籍五十年晚登九列而前後在朝不滿數載中間晦養陶泳臨器含𢎞當居正之死羣喙交攻獨無一言訾及人以為難殁後以璫禍削籍崇禎元年李邦華請恤贈太子太保吏部尚書諡忠介廕一子平生與海瑞善殁而同諡有存真願學太平山房諸集初為吏部時迎母之官過彭澤舟夫不集厲聲讓縣尉既而悔之曰此亦吾父母國也奈何以尉忘敬心卒好言謝過不遑云趙南星字夢白直隸髙邑人九歲稱神童二十一舉於鄉二十五成進士蓋萬厯二年也授汝寧府推官擢戸部主事張居正當國病京師競為禱祀南星與顧憲成姜士昌獨不往改吏部考功尚書楊巍欲糾御史丁此吕南星洩之於編修趙用賢給事中王士性巍嗛之引疾歸再起文選上剖露良心疏所抨擊者如左都御史吳時來左副都御史詹仰庇少詹事黄洪憲給事中唐堯欽御史蔡系周孫愈賢等皆衆論不予者而給事中李春開媚衆糾南星上不聴又引疾歸尚書陸光祖將去特起南星田間調補考功郎中當是時繼光祖而為尚書者孫鑨有執持屬吏盡一時之選南星為考功主計靜坐篝燈苦心叅酌有蟲巢於耳繭成而不自覺援筆註考嚴於要津而寛於散秩遇一權勢姓名奮腕乙之要津無所闗白即臺省長預察事者亦不使知閣臣王錫爵趙志臯張位等盡喪其私人即志皋介弟亦中察典去説者以為數十年考功第一然執政銜之深矣臺省又恥不與聞也轉而拾遺吏部奪尚書俸鐫南星秩調外已而削籍凡救南星者皆放斥有差南星之為吏部也屢起屢蹶家居三十年位不過郎署與刑部鄒元標吏部顧憲成海内比為三君子如漢之竇武劉淑陳蕃焉光宗即位即家起太常少卿左通政尋轉太常卿明年陞工部右侍郎皆不拜奉詔切召乃就職甫一月即陞左都御史明年佐主京察其所鋤斥略與為考功時等亡何代張問達為吏部尚書謂京師交際殷煩士大夫朝氣皆疲於酬應序午入署惙惙不支請以全力盡職業又廉巡撫之賢者與郡邑循吏皆久任銓司如考功文選亦不得僕僕更代官評報部不得循故事以卑冗寡援者塞責又往時八品官有例移封父母請下逮九品幕僚以下皆鼓舞稱慶於是上再剖良心疏與三十年前奏自相喁答謂簠簋濫則彈壓輕戒上官毋得受守令貢獻又知從來典選者竿牘盈笥臺省至桀傲遇銓郎多磬折耳語嚴飭諸司毋循一切請托有挾而求者廷白其事有給事中代貲郎求鹽運司即注貲郎為王官出給事外藩左都御史孫瑋卒用髙攀龍代之不以門牆引嫌佐之者楊漣左光斗給事中則魏大中御史則袁化中等求而弗得者皆恨又故事銓曹重行輩序若魚貫若以副郎入躐郎中上即不服南星以清望調兵部鄒維璉於考功時江右銓司吳羽文猶在事一省兩銓尤為創見又不與江右臺省謀於是陳良訓章允儒等以非例責維璉而傅櫆已潛通魏忠賢首攻維璉以撼南星而難端作矣會楊漣二十四大罪疏亦以是時上先是忠賢亦知南星為人望當其為總憲時於上前亟稱美之一日囑其甥傅應星來執贄南星麾去又嘗同坐𢎞政門選通叅南星正色語曰主上沖年内外臣子各努力為善忠賢黙然怒形於色又魏廣微者其父允貞南星同好也素以通家子畜之不少假借乃廣微以同姓嚴事忠賢倖致揆地而南星待之益峻每歎曰見泉無子見泉者允貞號也他日廣微三至求見門者曰休矣將脱幘而寢廣微怒曰擯我耶人可擯官不可擯也恨刺骨與忠賢比而嚙南星及都御史髙攀龍𤼵崔呈秀貪穢狀南星議戍之呈秀倉皇走忠賢叩頭請命言不去南星我兩人未知死所及推晉撫謝應祥廣微抵掌曰得之矣以攀龍為南星門生大中為應祥門生也嗾御史陳九疇劾之而廣微呈秀合計獻忠賢逐選郎夏嘉遇都給事中魏大中而南星亦乞骸行矣旣而攀龍以南星門生去首輔韓爌以救南星去一時名賢削奪者踵趾相望日必數人逾年而國遂空諸小人乃取南星素所顯斥及諸正人抨擊去者分布要地作逆閹爪牙首用傅櫆等之言起大獄羅織海内殺楊左諸人惟南星行撫按鞫訊當事者藉是効首功辱南星於庭子清衡外甥王鍾龎受箠罷荷校兩月觀者雨泣坐􅂍一萬五千兩罄産不完十之一士大夫隂助之經訊之日投牒者數千人寃聲沸内外特與遠戌時南星年已七十六法當贖忠賢矯旨不許而逆黨趙興邦盧承欽梁夢環張訥輩劾奏無虚日指為元兇南星戍代州清衡戍莊浪鍾龎戍永昌相去萬里將行妻馮氏一慟而死清衡母李氏憂死清衡子方七歲以家難怖死南星慨然不以介懷坐短轅攜殘書一篋自隨執鍾龎手仰天祝曰汝兩人往戍所宜閉户讀書彼蒼不終憒憒也至代僦小樓以居顔曰吉祥又掃土室顔曰味蘗作漢髙曹操等七論又為韵語以約漢以下事聞人足音墐戸不敢應晉藩遣使存問亦不答崇禎初肆赦撫臣牟志䕫逆黨也故留滯不聽歸終殞戍所明年詔復原官贈太子太保諡忠毅外史氏曰當明之際君子濟濟在朝使無奸相之内搆逆璫之中孽俾諸正人各展其學亦足以為治也豈至覆亡哉奈何旣壞之奸囘復亂之逆惡誅戮賢良戕賊方正不至夷滅淪喪而不止此豈天道使然歟余讀南皋夢白兩先生傳不禁涕泗滂沱而傷心也馮從吾傳馮從吾字仲好號少墟長安人好濂洛之學嘗受業於許孚遠居父母憂哀毁盡禮中萬厯十七年進士改庶吉士授山西道御史巡視中城不通奄人謁見上怠於政事抗章言皇上郊廟不親朝講不御章奏多留中不發諸臣言之諄諄皇上聴之藐藐屢請饗祀而遣官如故屢請朝講而靜攝如故屢請批發而留中如故豈在廷諸臣無一言當上心耶皇上試觀戊子以前四裔效順海不揚波天下何等景象也是勵精之效既如彼庚寅以後南倭報警北冦渝盟天變人妖疊出迭至天下又何等景象也是靜攝之患又如此失今不圖長此安竆况今當朝覲之期萬方畢集咸欲一覩清光而竟不可得則必相疑而議不曰皇上困於麯蘖之鄉而懽飲長夜必曰倦於窈窕之娛而晏眠終日雖近頒勅諭謂聖體違和或可借此自掩不知鼓鐘於宫聲聞於外天下人心豈可得而欺哉况皇上每晚必飲每飲必醉每醉必怒左右一言稍違即斃杖下如此則既非靜攝又廢朝政縱諭旨森嚴恐不足服天下而信後世也願皇上勿以天變為不足畏勿以人言為不足恤勿以目前之晏安為可恃勿以將來之危亂為可忽天下幸甚疏入上大怒欲廷杖之會皇后長秋節閣臣救解得免大計外吏命從吾司偵邏苞苴絶跡都給事胡汝寧者執政私人也特疏論之汝寧遂斥外請告歸起故官巡長蘆鹽政潔己惠商鹽政大飭二十四年春上怒南北言官凡科道掌印者盡斥為民從吾預焉自是杜門不出日取先正格言體騐身心造詣益䆳光宗踐祚起尚寶司卿進太僕少卿改大理同定熊廷弼王化貞之獄歴僉都副都御史恊理院事廷議三案罪謂李可灼以至尊嘗試而許其引疾當國何心至梃擊之獄與發奸諸臣為難者即奸人也羣小惡之時臺長為鄒元標相與建首善書院集同志講學其中益為小人所惡給事朱童䝉郭允厚郭興治遂相繼疏詆從吾上言宋之不競以禁講之故非以講之故也我二祖表章六經天子經筵講學皇太子出閣講學講學為令甲臣子望君以講學而已則不講是欺君也倘皇上問講官諸臣望朕講學不知諸臣亦講學否將何以置對先臣王守仁當干戈倥偬之際不廢講學卒能成功此臣等所以不惜毁譽而為此也遂屢疏乞歸又二年起為南京右都御史未赴改工部尚書力辭予致仕旣而魏忠賢益熾乃削其籍同邑王紹徽為冡宰素與從吾不協使巡撫喬應甲窘辱之不勝憤鬱而卒崇禎改元復其官賜諡恭定從吾為學全在本原處透澈未發處得力而於日用常行必事事檢勘以求合其本體故所造光明純粹卓然為一代大儒所著有辯學錄疑思錄闗中書院語錄及少墟集行於世首善書院者建於天啓初年葉向髙為記董其昌書之後為魏忠賢搥碎其碑向髙記略曰吾聞鄒先生之學深叅黙証以透性為宗以生生不息為用觀其意趣所指似欲并禪機𤣥旨而包括之為一家馮先生之學反躬實踐以性善為主以居敬窮理為程其識力所至又若欲舉二氏之學而盡驅之教外者向髙微意蓋不滿於元標云外史氏曰余遊長安與其孫交好得拜先生遺像魁梧竒偉燕頷虎頭儼然望而畏之也及讀其所著書則委曲宛轉以發明先賢之藴又恂恂然如孱弱書生焉嗟乎天欲亡明乃生逆璫以戕賊之使不得一展其所學傷哉王紀傳王紀字惟理山西芮城人丰采凝峻萬厯十七年進士推官池州以廉辦聞入為禮部主事歴遷儀制郎中與顧憲成為石交十九年冊立東宫有日矣以金冊未就欲另改期廷臣疊請冊立帝皆不悦紀又特疏請之不報然守正據典禮凡宫府儀制皆慎别長幼有羽翼東宫之力朝士倚重是歲十月皇太子立明年紀陞光祿少卿尋引疾去久之起補原官主試河南覩宦途溷濁以由君子觀之一節命題為求富貴利達者作痛砭時貴醜之甚恨然紀不恤也轉太常少卿提督四譯館陞僉都御史巡撫保定四十三年加副都歴户部左侍郎陞尚書入督倉場歴官中外皆著清望天啓二年改刑部尚書會議三案紀憤懷忠鯁嫉諸用事者甚嚴謂麗人之蠱惑崔文昇之涼劑李可灼之紅丸同一機軸舊輔方從哲獨秉國鈞慣結奧援止知有貴妃不知有君父罪更在沈一貫上當先帝哀勞過甚已成篤疾可灼紅丸再進從哲實主使之故有囘籍之溫綸有銀幣之厚賚由前而觀從哲過信可灼有妄用藥之罪由後而觀從哲曲庇可灼有不討賊之罪為法受惡百喙奚辭故不逮可灼無以服天下不逮文昇無以服可灼不削奪從哲官階禄廕無以洩天地神人之憤議出人為竦然會客魏擅權内外通呼吸刑部郎徐大化黨邪害正攻給事中周朝瑞紀劾罷之謂朝瑞持徑尺批逆鱗天下所稱朝陽鳳也大化誠抱孤憤為朝廷擊賊今有人於此巧能移奪人主之視聴力能顛倒天下之是非交結權黨誅鋤正士誠今日之蔡京也何不明目張胆出袖中彈文相擊乃與嚴氣正性之朝瑞相尋干戈耶紀意所彈射蓋大學士沈㴶也御史楊維垣疏令指名紀遂上疏直斥沈㴶引宋蔡京為比以為京㴶生不同時而事實相類其結附魏進忠與京之契合童貫同乞哀董羽宸與京之懇欵陳瓘同要盟死友邵輔忠孫􅇐與京之固結吳居厚王漢之何異罷逐顧命元臣劉一燝周嘉謨與安置吕大防蘇軾何異降斥持正言官江秉謙熊德陽侯震暘與貶謫常安民任伯雨何異尤可異者賄交婦寺竊弄威權中旨頻傳而上不悟朝柄隂握而下不疑此又京迷國罔上曠百世若合符節者也宋史昌言擊蔡京者大中丞石公弱大司徒陳顯臣叨為司冦耿耿孤忠義難緘嘿乞斥姦輔以謝公論并罷臣以謝言官臣雖伏草莽死無恨客魏聞之忿甚哭愬帝前㑹佟卜年劉一瓛等下獄指為邊疆奸細帝怒欲立訊誅之紀不肯附和坐違慢忤旨㴶遂劾紀二大罪内批削籍紀旣負清直聲大學士葉向髙等合疏力救言法者天下之平也天子不自㫁而與執法之臣共之期平允而服人心也王紀身為大臣讞決遲囘無所逃罪誠以此事重大而佐証未有淑問未備殆求其情罪允協衆論僉同彰朝廷雷電之明若敢曲庇叛人臣等百口可保也不聽向髙再疏獨救又不聽紀與夫人騎二驢襆被以歸朝論大譁修撰文震孟上疏白紀言紀策蹇出都人謂快於馳驛破帽蒙頭人謂榮於蟒玉遂并斥震孟去嗣後閹黨煽禍羅織無虚日㑹紀卒人皆吐舌曰使王尚書在必不免矣崇禎元年復官贈少保廕一子諡莊毅外史氏曰嗟乎明欲亡矣以惟理先生驚天地泣鬼神之言即刻木為君者亦當㸃首也柰何竟不能動其忍心耶哀哉人犯必死之疾雖使岐伯復生終難療矣沈思孝吳𢎞濟列傳沈思孝字純父嘉興人也七歲授尚書端介如老成人隆慶元年年二十六舉於鄉明年成進士又三年謁選吏部故事進士踰三年者得謝有司為京朝官時髙拱署部事見思孝器重之使所知諭之曰暫淹曹郎為臺省地思孝辭乃授番禺知縣時殷正茂總制兩廣檄富人與外國市而權其子母又欲開海口諸山以供税思孝皆持不可正茂不能難仍薦之思孝方以卓異召將授給事中而同官間之於制府隂中之僅授刑部雲南司主事萬厯五年冬張居正以父喪奪情思孝與同部員外郎艾穆共疏爭之詔杖思孝八十謫戍廣東神電衞濱死者數矣十一年居正死思孝等皆復官先時同上疏杖謫者艾穆而外翰林吳中行趙用賢進士鄒元標也五人以同患難故相與友善思孝尋晉尚寶司丞十二年至京師陞光祿寺少卿時御史李植江東之羊可立以追劾張居正及攻馮保徐爵為居正黨所側目又以帝卜壽宫植東之等爭大峪山非吉地語侵執政而用賢中行蹇諤自喜執政亦弗善也思孝甫入都即有以執政意説其委蛇者思孝謝之曰某非以一死博富貴者也㑹御史丁此吕以謫發科場事為吏部尚書楊巍所劾諸人數爭之閣部大臣積不能平遂明攻植與東之而指摘中行用賢等思孝忿曰江陵雖殁餘氛猶熾耶時王錫爵新入朝植東之等頗推戴焉錫爵拒不納更上八不平之疏以攻之錫爵亦致書思孝且語其人曰若主與我同仇何如吳趙二子耶思孝復書曰寧負相公不敢賣友負國以故凡保江陵子弟及保大峪山者皆不署名於是當路皆惡之思孝初以光祿晉太常寺少卿提督四譯館陞順天府府尹嚮用矣坐是改南京太僕寺卿以提調保勘冒籍為科臣唐堯欽所劾寔借事以傾之也吏部議調思孝應天府尹執政以改南不改官奪選司俸會御史房寰妄劾南京都御史海瑞再疏爭勝進士顧允成彭遵古諸壽賢上疏直瑞而劾寰言為寰甚易為瑞甚難詔以出位言事罪允成等褫其冠帶思孝疏推瑞之賢且救允成遵古等而極詆房寰之貪穢請復遵古等冠帶依資序用以除壅蔽之習反依違之風疏上以怨望切責之謝病歸十九年陸光祖為吏部尚書乃起南京光祿寺卿尋陞都察院右僉都御史巡撫陜西時寧夏哱拜父子與劉東明許朝等叛詔思孝移駐下馬闗為總督魏學曾聲援思孝言逆賊勾虜諸部響應陜兵調遣無餘欲募浙兵五千宣大騎兵五千以資防禦乞發内帑以供餉并請宥故都御史李材罪赴行間詔發太僕寺馬價銀十萬兩及庫貯濟邊銀五萬兩令思孝就近募兵而罷李材勿遣思孝勇於任事顧與魏學曾不相下給事中侯慶遠劾其舍門户而守堂奧議以南人未習邊事調撫河南思孝辭不往曰臣不能三秦豈能中州帝雅知思孝尋陞大理寺卿時内官郝金以詐傳懿旨下獄金内官張誠私人刑部薄其罪思孝駁正誅之帝喜尋晉工部左侍郎陜西織造羊羢思孝疏請減十之四陜人賴焉未幾陞右都御史兼兵部右侍郎協理京營戎政時吏部推舉以思孝貳李楨而帝用思孝有疑其藉内援者給事楊東明劾之思孝再抗疏辭温旨弗許時孫丕揚為吏部尚書方大計羣吏叅政丁此吕在黜中思孝以此吕為御史有抗直聲力爭之不得給事中鄒廷彦復繼楊東明劾之帝怒謫東明奪廷彦俸㑹御史趙文炳劾文選郎中蔣時馨納賄時馨疑思孝嗾之遂訐思孝求少宰不得乃結江東之劉應秋等命李三才以欵授御史帝怒時馨削其籍孫丕揚亦以思孝之爭此吕也乞歸帝慰留丕揚命逮此吕亦不罪思孝也尋閣臣趙志臯等亦稱此吕才名自負廓落不羈貪汙未必肯為伸思孝議帝復命思孝侍經筵南給事中祝世祿請去思孝以安丕揚時論嗤之御史俞价等復劾思孝為盧杞工部員外岳元聲疏爭之帝皆不報時丕揚思孝皆杜門不出志臯等言二臣皆賢者所爭亦皆公心請上宣諭令卽出視事并諭言官郎署勿互相排擊從之二十四年乾清宫災思孝請行皇太子冠禮為囘天第一事復奏日本封貢事謂亟宜修戰守之備并論志臯石星主封誤國皆與時議不合蓋剛腸自任負氣骯髒其天性也丕揚尋以乞休允放思孝亦得請歸詔馳驛去病痊起用居家七年卒思孝晚結主知及去國復得温旨由是忌者益甚一去不復出矣然思孝品望素定一時正人皆推之陸光祖謂鄒元標曰吾郡清撡潔行沈純父朱汝虞兩人獨純父嫉惡過嚴汝虞名廷益嘉善人官通政陳有年亦曰純父雖剛然玉也世柰何以石攻玉顧憲成允成髙攀龍鄒元標皆善思孝憲成屢致書當事訟其賢且為辯誣思孝卒元標為誌其墓重惜其不大用也惟以爭丁此吕忤丕揚秦人重怒之遂成洛蜀之勢其後辛亥京察之前御史史記事大亂將作疏猶以思孝為戎首謂其與顧天埈合謀翻局以錦衣衞劉承禧偽書為口實憲臣攀龍力辯之而思孝亦以是歲卒矣萬歴四十一年賜祭二壇天啓中贈太子少保子士龍士臯士龍舉鄉試思孝同里同時以建言削籍有聲者為御史吳𢎞濟吳𢎞濟字春陽秀水人萬厯十四年進士授蒲圻知縣二十年行取選湖廣道御史二十一年吏部侍郎趙用賢為吳鎮所訐去位都御史李世達户部侍郎李禎等皆罷户部郎中楊應宿鄭材復論用賢等以􅆺執政行人髙攀龍斥材應宿為䜛説且以喜同惡異斥輔臣詔切責攀龍𢎞濟乃上疏言應宿疏訐吏部攀龍責望輔臣陛下皆令部院叅看臣一喜一懼喜者喜應宿之有所懲而小人有去國之日懼者懼攀龍之䝉詰責而忠臣被進言之辜夫攀龍責備閣臣亦無他意誠以進賢退不肖之權握於皇上而斡旋其間者惟在閣臣今大小臣工之賢者比比而去其所奉以去者皇上之明旨而票擬實出閣臣此閣臣所以不白於天下而攀龍所以有言也若應宿之言上無朝廷下無公論臣竊意其妄有所挾而出此疏入帝怒𢎞濟黨救攀龍命降二級調外閣臣疏救不聴給事中吳文梓等交章救之帝愈怒斥𢎞濟為民文梓等俱奪俸𢎞濟歸不及俟起用而卒後逆璫亦以黨人禁錮崇禎立復官贈光祿寺少卿孫統持字巨手有文名以志節顯外史氏曰當東林初起時政府鑒江陵之轍輒以為黨每言於帝而帝誤聽之凡有申救東林者亦即以為黨嗟乎東林黨禍始於神宗末一二宰輔先種其毒根至崔魏而毒大發也若純父海舟兩先生已稍露其萌蘖矣至崇禎朝既不能用參苓芪术以調劑而益攻以巴黃砒石毒愈甚而命隨之悲哉東林列傳卷十三
