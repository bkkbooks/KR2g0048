body:
  text: 東林列傳卷一江隂陳鼎撰宋楊時傳本宋史楊時字中立南劍將樂人幼穎異能屬文稍長潛心經史熙寧九年中進士第時河南程顥與弟頤講孔孟絶學於熙豐之際河洛之士翕然師之時調官不赴以師禮見顥於潁昌相得甚歡其歸也顥目送之曰吾道南矣四年而顥死時聞之設位哭寢門而以書赴告同學者至是又見程頤於洛時蓋年四十矣一日見頤頤偶瞑坐時與游酢侍立不去頤旣覺則門外雪深一尺矣闗西張載嘗著西銘二程深推服之時疑其近於兼愛與其師頤辯論往復聞理一分殊之説始豁然無疑杜門不仕者十年久之歴知瀏陽餘杭蕭山三縣皆有惠政民思之不忘張舜民在諫垣薦之得荆州教授時安於州縣未嘗求聞達而德望日重四方之士不遠千里從之遊號曰龜山先生時天下多故有言於蔡京者以為事至此必敗宜引舊德老成置諸左右庶幾猶可及時宰是之㑹有使髙麗者國主問龜山安在使囘以聞召為祕書郎遷著作郎及面對奏曰堯舜曰允執厥中孟子曰湯執中洪範曰皇建其有極歴世聖人由斯道也熙寧之初大臣文六藝之言以行其私祖宗之法紛更殆盡元祐繼之盡復祖宗之舊熙寧之法一切廢革至紹聖崇寧抑又甚焉凡元祐之政事著在令甲皆焚之以滅其跡由是分為二黨縉紳之禍至今未殄臣願明詔有司條具祖宗之法著為綱目有宜於今者舉而行之當損益者損益之元祐熙豐姑置勿問一趨於中而已朝廷方圖燕雲虚内事外時遂陳時政之弊且謂燕雲之師宜退守内地以省轉輸之勞募邊民為弓弩手以殺常勝軍之勢又言都城居四達之衢無高山巨浸以為阻衞士人懷異心緩急不可倚仗執政不能用登對立陳君臣警戒正在無虞之時乞為宣和㑹計錄以周知天下財物出入之數徽宗首肯之除邇英殿説書聞金人入攻謂執政曰今日事勢如積薪已然當自奮勵以竦動觀聽若示以怯懦之形委靡不振則事去矣昔汲黯在朝淮南寖謀論黯之才未必能過公孫𢎞輩也特其直氣可以鎮壓姦雄之心爾朝廷威望弗振使姦雄一以𢎞輩視之則無復可為也要害之地當嚴為守備比至都城尚何及哉近邊州軍宜堅壁清野勿與之戰使之自困若攻戰略地當遣援兵追襲使之腹背受敵則可以制勝矣且謂今日之事當以收人心為先人心不附雖有髙城深池堅甲利兵不足恃也免夫之役毒被海内京城聚斂東南花石其害尤甚前此蓋嘗罷之詔墨未乾而花石供奉之舟已銜尾矣今雖復申前令而禍根不除人誰信之欲致人和去此三者正今日之先務也金人圍京城勤王之兵四集而莫相統一時言唐九節度之師不立統帥雖李郭之善用兵猶不免敗衂今諸路烏合之衆臣謂當立統帥一號令示紀律而後士卒始用命又言童貫為三路大帥敵人侵疆棄軍而歸孥戮之有餘罪朝廷置之不問故梁方平何灌皆相繼而遁當正典刑以為臣子不忠之戒童貫握兵二十餘年覆軍殺將馴至今日比聞防城仍用閹人覆車之轍不可復蹈疏上除右諫議大夫兼侍講敵兵初退議者欲割三鎮以講和時極言其不可曰河朔為朝廷重地而三鎮又河朔之要藩也自周世宗迄太祖太宗百戰而後得之一旦棄之北庭使敵騎疾驅貫吾腹心不數日可至京城今聞三鎮之民以死拒之三鎮拒其前吾以重兵躡其後尚可為也若种師道劉光世皆一時名將始至而未用乞召問方略疏上欽宗詔出師而議者多持兩端時抗疏曰聞金人駐磁相破大名刼擄驅掠無有紀極誓墨未乾而背不旋踵吾雖欲專守和議不可得也夫越數千里之遠犯人國都危道也彼見勤王之師四面而集亦懼而歸非愛我而不攻朝廷割三鎮三十州之地與之是欲助冦而自攻也聞肅王初與之約及河而返今挾之以往此敗盟之大者臣竊謂朝廷宜以肅王為問責其敗盟必得肅王而後已時太原圍閉數月而姚古擁兵逗留不進時上疏乞誅古以肅軍政拔偏裨之可將者代之不報李綱之罷太學生伏闕上書乞留綱與种師道軍民集者數十萬朝廷欲防禁之吳敏乞用時以靖太學時得召對言諸生伏闕紛紛忠於朝廷非有他意但擇老成有行誼者為之長貳則將自定欽宗曰無逾於卿遂以時兼國子祭酒首言三省政事所出六曹分治各有攸司今乃别辟官屬新進少年未必賢於六曹長貳又言蔡京用事二十餘年蠧國害民幾危宗社人所切齒而論其罪者莫知其所本也蓋京以繼述神宗為名實挾王安石以圖身利故推尊安石加以王爵配享孔子廟庭今日之禍實安石有以啓之謹按安石挾管商之術飾六藝以文姦言變亂祖宗法度當時司馬光已言其為害當見於數十年之後今日之事若合符契其著為邪説以塗學者耳目而故壞其心術者不可縷數姑即一二事明之昔神宗嘗稱美漢文惜百金以罷露臺安石乃言陛下若能以堯舜之道治天下雖竭天下以自奉不為過守財之言非正理曾不知堯舜茅茨土階禹曰克儉於家則竭天下以自奉者必非堯舜之道其後王黼以應奉花石之事竭天下之力號為享上實安石有以倡之也其釋鳬鷖守成之詩於末章則謂以道守成者役使羣衆泰而不為驕宰制萬物費而不為侈孰弊弊然以愛為事詩之所言正謂能持盈則神祇祖考安樂之而無後艱爾自古釋之者未有泰而不為驕費而不為侈之説也安石獨倡為此説以啓人主之侈心後蔡京輩輕費妄用以侈靡為事安石邪説之害如此伏望追奪王爵明詔中外毁去配享之像使邪説淫辭不為學者之惑疏上安石遂降從祀之列士之習王氏學取科第者已數十年不復知其非忽聞以為邪説議論紛然諫官馮澥力主王氏上疏詆時㑹學官中有紛爭者有旨學官並罷時亦罷祭酒時又言元祐黨籍中惟司馬光一人獨褒顯而未及吕公著韓維范純仁吕大防安燾輩建中初言官陳瓘已褒贈而未及鄒浩於是元祐諸臣皆次第牽復尋四上章乞罷諌省除給事中辭乞致仕除徽猷閣直學士提舉嵩山崇福宫時力辭直學士之命改除徽猷閣待制提舉崇福宫陛辭猶上書乞選將練兵為戰守之備髙宗即位除工部侍郎陛對言自古聖賢之君未有不以典學為務除兼侍讀乞修建炎㑹計錄乞恤勤王之兵乞寛假言者連章丐外以龍圖閣直學士提舉杭州洞霄宫已而告老以本官致仕優游林泉以著書講學為事卒年八十三諡文靖時在東郡所交皆天下士先達陳瓘鄒浩皆以師禮事之暨渡江東南學者推時為程氏正宗與胡安國往來講論尤多時浮沈州縣四十有七年晚居諫省僅九十日凡所論列皆切於世道而其大者則闢王氏經學排靖康和議使邪説不作凡紹興初崇尚元祐學術而朱熹張栻之學得程氏之正其源委脈絡皆出於時子迪力學通經亦嘗師程頤云外史氏曰龜山先生學本二程昔明道諫神宗以正心窒欲為先伊川上書仁宗即以王道為心後事哲宗復言習與知長化與心成無非欲正君也先生劾王氏一疏引君於正道者其得之程氏之學深矣夫安石千古以來叛道壞俗之罪人也先生起而闢之出其正學以正君心而君正矣罷其配享燬其新經而士於斯正民亦於斯正矣所謂正朝廷正百官正萬民者其先生之正學乎此宋之所以不即亡而尚有偏安之茍延也非先生之遺歟羅從彦傳本宋史羅從彦字仲素南劒人以累舉恩為惠州博羅縣主簿聞同郡楊時得河南程氏學慨然慕之及時為蕭山令遂徒步往學焉時察之乃喜曰惟從彦可與言道於是日益以親時弟子千餘人無及從彦者從彦初見時三日即驚汗浹背曰不至是幾虚過一生矣嘗與時講易至乾九四爻云伊川説甚善從彦即鬻田走洛見頤問之頤反覆以告從彦謝曰聞之龜山具是矣乃歸卒業沙縣陳淵楊時之壻也嘗詣從彦必竟日乃返謂人曰自吾交仲素日聞所不聞奧學清節真南州之冠冕也旣而築室山中絶意仕進終日端坐間謁時將溪上吟咏而歸恒充然自得焉嘗采祖宗故事為遵堯錄靖康中擬獻闕下㑹國難不果嘗與學者論治曰祖宗法度不可廢德澤不可恃廢法度則變亂之事起恃德澤則驕佚之心生自古德澤最厚莫若堯舜向使子孫可恃則堯舜必傳其子法度之明莫如周向使子孫世守文武成康之遺緒雖至今存可也又曰君子在朝則天下必治蓋君子進則常有亂世之言使人主多憂而善心生故治小人在朝則天下亂蓋小人進則常有治世之言使人主多樂而怠心生故亂又曰天下之變不起于四方而起於朝廷譬如人之傷氣則寒暑易侵木之傷心則風雨易折故内有林甫之姦則外必有祿山之亂内有盧杞之姦則外必有朱泚之叛其論士行曰周孔之心使人明道學者果能明道則周孔之心深自得之三代人才得周孔之心而明道者多故視死生去就如寒暑晝夜之移而忠義行之者易至漢唐以經術古文相尚而失周孔之心故經術自董生公孫𢎞倡之古文自韓愈栁宗元啓之於是明道者寡故視死生去就如萬鈞九鼎之重而忠義行之者難嗚呼學者所見自漢唐喪矣又曰士之立朝要以正直忠厚為本正直則朝廷無過失忠厚則天下無嗟怨一於正直而不忠厚則漸入於刻一於忠厚而不正直則流入於懦其議論醇正𩔖此朱熹謂龜山倡道東南士之游其門者甚衆然潛思力行任重詣極如仲素一人而已紹興中卒學者稱之為豫章先生淳祐間諡文質外史氏曰先生不求聞達於世其經綸不少概見獨所謂道德問學之淵源上承伊洛之正下開中興以後諸儒之緒昭然於兩間也喻樗傳本宋史喻樗字子才其先南昌人初愈藥仕梁位至安州刺史武帝賜姓喻後徙嚴樗其十六世孫也少慕伊洛之學中建炎三年進士第為人質直好議論趙鼎去樞筦居常山樗往謁因諷之曰公之事上當使啓沃多而施行少啓沃之際當使誠意多而語言少鼎竒之引為上客鼎都督川陜荆襄辟樗為屬紹興初髙宗親征樗見鼎曰六龍臨江兵氣百倍然公自度此舉果出萬全乎或姑試一擲也鼎曰中國累年退避不振敵情益驕義不可更屈故贊上行耳若事之濟否則非鼎所知也樗曰然則當思歸路毋以賊遺君父憂鼎曰策安出樗曰張德遠有重望居閩今莫若使其為江淮荆浙福建等路宣撫使俾以諸道兵赴闕命下之日府庫軍旅錢榖皆得專之宣撫來路即朝廷歸路也鼎曰諾於是入奏曰今沿江經畫大計略定非得大臣相應援不可如張浚人材陛下終棄之乎帝曰朕用之遂起浚知樞密院事浚至執鼎手曰此行舉措皆合人心鼎笑曰子才之功也樗於是往來鼎浚間多所裨益頃之以鼎薦授祕書省正字兼史館校勘初金旣退師鼎浚相得懽甚人知其將並相樗獨言二人宜且同在樞府他日趙退則張繼之立事任人未甚相遠則氣脈長若同處相位萬有一不合或當去位則必更張是賢者自相背戾矣後稍如其言又嘗曰推車者遇艱險則相詬病及車之止也則欣然如初士之於國家亦若是而已先是樗與張九成皆言和議非便秦檜旣主和言者希旨劾樗與九成謗訕樗出知舒州懷寧縣遷通判衡州已而致仕檜死復起為大宗正丞轉工部員外郎出知蘄州孝宗即位用為提舉浙東常平以治績聞淳熙七年卒初樗善鑒識宣和間謂其友人沈晦試進士當第一建炎初又謂今歲進士張九成當第一凌景夏次之㑹風折大槐樗以作二簡遺之後果然趙鼎嘗以樊光遠免舉事訪樗樗曰今年省試不可無此人於是光遠亦第一初樗二女方擇配富人交請婚不許及見汪洋張孝祥乃曰佳婿也遂以妻之外史氏曰二程之學一誠而已先生學本龜山而傳於程氏者也其言曰啓沃之際當使誠意多而語言少是言也有所由來矣然則先生之學其致君者在是其教人以事君者亦即在是乎尤袤傳本宋史尤袤字延之常州無錫人少穎異蔣偕施垌呼為竒童入太學以詞賦冠多士尋冠南宫紹興十八年擢進士第嘗為泰興令問民疾苦皆曰邵伯鎮置頓為金使經行也使率不受而空厲民漕司輸藁秸致一束數十金二弊久莫之去乃力請臺閫奏免之縣舊有外城屢殘於冦頽毁甚袤卽修築已而金渝盟陷揚州獨泰興以有城得全後因事至舊治吏民羅拜曰此吾父母也為立生祠注江隂學官需次七年為讀書計以薦召除將作監簿大宗正闕丞人爭求之陳俊卿曰當予不求者遂除袤虞允文以史事過三館問誰可為祕書丞者僉以袤對亟授之張栻曰真祕書也兼國史院編修官實錄院檢討官遷著作郎兼太子侍讀先是張説自閤門入西府士論鼎沸從臣因執奏而去者數十人袤率三館上書諫且不往見後説留身密奏於是梁克家罷相袤與秘書少監陳騤各與郡袤得台州州五縣有丁無産者輸二年丁税蠲凡萬有三十家前守趙汝愚修郡城工纔什三屬袤成之袤按行前築殊鹵莽亟命更築加高厚數月而畢明年大水更築之墉正值水衝城賴以不没㑹有毁袤者上疑之使人密察民誦其善政不絶口乃錄其東湖四詩歸奏上讀而嘆賞遂以文字受知除淮東提舉常平改江東江東旱單車行部覈一路常平米通融有無以之賑貸朱熹知南康講荒政下五等户租五斗以下悉蠲之袤推行於諸郡民無流殍進直祕閣遷江西漕兼知隆興府屢請祠進直敷文閣改江東提刑梁克家薦袤及鄭僑以言事去國久於外當召上可之召對言水旱之備惟常平義倉願豫飭有司隨市價禁科抑則人自樂輸必易集事除吏部郎官太子侍講累遷樞密院正兼左諭徳輪對又申言民貧兵怨者甚切夏旱詔求闕失袤上封事大略言天地之氣宣通則和壅遏則乖人心舒暢則悦抑鬱則憤催科峻急而農民怨闗征苛察而商旅怨差注留滯而士大夫有失職之怨廪給朘削而士卒有不足之怨奏讞不時報而久繫囚者怨幽枉不獲伸而負累者怨强暴殺人多特貸命使已死者怨有司買納不卽酬價負販者怨人心抑鬱所以感傷天和者豈特一事而已方今救荒之策莫急於勸分輸納旣多朝廷吝於推賞乞詔有司檢舉行之髙宗崩前一日除太常少卿自南渡來恤禮散失事出倉卒上下罔措每有討論悉付之袤斟酌損益便於今而不戾於古當定廟號袤與禮官定號髙宗洪邁獨請號世祖袤率禮官顔師魯鄭僑奏曰宗廟之制祖有功宗有德藝祖規創大業為宋太祖太宗混一區夏為宋太宗自真宗至欽宗聖聖相傳廟制一定萬世不易在禮子為父屈示有尊也太上親為徽宗子子為祖父為宗失昭穆之序議者不過以漢光武為比光武以長沙王後布衣崛起不與哀平相繼其稱無嫌太上中興雖同光武然實繼徽宗正統以子繼父非光武比將來祔廟在徽宗下而稱祖恐在天之靈有所不安詔羣臣集議袤上議如初邁論遂屈詔從禮官議衆論紛然會禮部太常寺亦同主髙宗謂本朝創業中興皆在商丘取商髙宗實為有證始詔從初議建議事堂令皇太子參決庶務袤時兼侍讀乃獻書以為儲副之位止於侍膳問安不交外事撫軍監國自漢至今多出權宜乞便懇辭以彰殿下之令德臺臣乞定喪制袤奏釋老之教矯誣褻瀆非所以嚴宫禁崇几筵宜一切禁止靈駕將發引忽定配享之議洪邁請用吕頤浩韓世忠趙鼎張浚袤言祖宗典故既祔然後議配享今忽定於靈駕發引一日前不集衆論懼無以厭服勲臣子孫之心宜反覆熟議以俟論定奏入詔未預議官詳議以聞繼寢之卒用四人者時楊萬里亦謂張浚當配食爭之不從補外進袤權禮部侍郎兼同修國史侍講又兼直學士院力辭上聽免直學士淳熙十四年將有事於明堂詔議升配袤主紹興孫近陳公輔之説謂方在几筵不可配帝且歴舉郊歲在喪服中者凡四維元祐明堂用吕大防請升配神考時去大祥止百餘日且祖宗悉用以日易月之制故升侑無嫌今陛下行三年之喪高宗雖已祔廟百官猶未吉服詎可近違紹興而遠法元祐升侑之禮請俟喪畢議之詔可孝宗嘗論人才袤奏曰近召趙汝愚中外皆喜如王藺亦望收召上曰然一日論事久上曰如卿才識近世罕有次日語宰執曰尤袤甚好前此無一人言之何也兼權中書舍人復詔兼直學士院力辭且薦陸游自代上不許時内禪議已定猶未諭大臣也是日諭袤曰旦夕制冊甚多非卿孰能為者故處卿以文字之職袤乃拜命内禪一時制冊人服其雅正光宗即位甫兩旬開講筵袤奏願謹初戒始孜孜興念越數日講筵又奏天下萬事失之於初則後不可救書曰慎厥終惟其始又歴舉唐太宗不私秦府舊人為戒又五日講筵復論官制謂武臣諸司使八階為常調横行十三階為要官遙郡五階為美職正任六階為貴品祖宗待邊境立功者近年舊法頓壞使被堅執鋭者積功累勞僅得一階權要貴近之臣優游而歴華要舉行舊法姜特立以為議已言者因以為周必大黨遂與祠紹熙元年起知婺州改太平州除煥章閣待制召除給事中旣就職卽昌言曰老矣無所補報凡貴近營求内除小礙法制者雖特旨令書請有去而已必不奉詔甫數日中貴四人希賞欲自正使轉横行袤繳奏者三竟格不下兼侍講入對言願上謹天戒下畏物情内正一心外正五事澄神寡欲保毓太和虚已任賢酬酢庶務不在於勞精神耗思慮屑屑事為之末也陳源除在京宫觀耶律郭莽除承宣使陸安轉遙郡王成特補官謝淵李孝友賞轉官吳元允夏永壽遷秩皆論駁之上並聴納韓􅇑胄以武功大夫和州防禦使用應辦賞直轉横行袤繳奏謂正使有正法可囘授不可直轉侂胄勲賢之後不宜首壞國法開攀援之門奏入手詔令書行袤復奏􅇑胄四年間已轉二十七年合轉之官今又欲超授四階復轉二十年之官是朝廷官爵專徇侂胄之求非所以為摩勵之具也命遂格上以疾一再不省重華宫袤上封事曰壽皇事髙宗歴二十八年如一日陛下所親見今不待倦勤以宗社付陛下當思所以不負其託望勿憚一日之勤以解都人之惑後數日駕即過重華宫侍御史林大中以論事左遷袤率左史樓鑰論奏疏入不報皆封駁不書黄耶律郭哈復以手詔除承宣使一再繳奏輒奉内批特與書行袤言天下者祖宗之天下爵祿者祖宗之爵祿壽皇以祖宗之天下傳陛下安可私用祖宗爵祿而加於公議不允之人哉疏入上震怒裂去後奏付前二奏出袤以後奏不報使吏收閤命遂不行中宫謁家廟官吏推賞者百七十有二人袤力言其濫乞痛裁節上從之嘗因登對專論廢法用例之弊至是復申言之除禮部尚書駕當詣重華宫復以疾不出率同列奏言壽皇有免到宫之命願力請而往庶幾可以慰釋羣疑增光孝治後三日駕隨出中外歡呼兼侍讀上封事曰近年以來給舍臺諫論事往往不行如黄裳鄭汝楷事遷延一月如陳源者奉祠人情固已驚愕至姜特立召尤為駭聞向特立得志之時昌言臺諫皆其門人竊弄威福一旦斥去莫不誦陛下英㫁今遽召之自古去小人甚難譬除蔓草猶且復生况加封植乎若以源特立有勞優以外任或加錫賚無所不可彼其閑廢已久含蓄憤怨待此而發倘復呼之必將潛引黨𩔖力排異已朝廷無由安靜時上已屬疾國事多舛袤積憂成疾請告不報疾篤乞致仕又不報遂卒年七十遺奏大略勸上以孝事兩宫以勤康庶政察邪佞䕶善𩔖又口占遺書别政府明年轉正奉大夫致仕贈金紫光禄大夫袤少從喻樗汪應辰遊樗學於楊時時程頤髙弟也方乾道淳熙間程氏學稍振忌之者目為道學將攻之袤在掖垣首言夫道學者堯舜所以帝禹湯武所以王周公孔孟所以設教近立此名詆訾士君子故臨財不茍得所謂廉介安貧守分所謂恬退擇言顧行所謂踐履行已有恥所謂名節皆目之為道學此名一立賢人君子欲自見於世一舉足且入其中俱無得免此豈盛世所宜有願徇名必責其實聴言必觀其行人才庶不壞於疑似孝宗曰道學豈不美之名正恐假托為姦使真偽相亂耳待付出戒敕之袤死數年侂胄擅國於是禁錮道學賢士大夫皆受其禍識者以袤為知言嘗取孫綽遂初賦以自號光宗書扁賜之有遂初小稿六十卷内外制三十卷嘉定五年諡文簡子棐槪孫焴禮部尚書外史氏曰先生每公退輒閉門謝客以抄書為事其子弟及諸女婢亦計日分抄故其家藏書積至萬卷嘗語李太史燾曰吾所抄書共若干卷將彚而目之饑以當食寒以當衣孤寂以當友朋幽憂以當金石琴瑟嗚呼先生之讀書若此宜乎其學之正也李祥傳本宋史李祥字元德常州無錫人隆興元年進士為錢塘縣主簿時姚憲尹臨安俾攝錄叅邏者以巧發為能每事下有司必監視鍜鍊囚服乃已嘗誣告一武臣子謗朝政鞫於獄祥不使邏者入門旣而所告無實具以白尹尹驚曰上命無實乎祥曰卽坐譴自甘憲具論如祥意上駭曰朕幾誤矣卿吾爭臣也遂賜憲出身為諫大夫祥調濠州錄事叅軍安豐守臣冒占民田訟屢攻而不決監司委祥卒歸之民主管户部架閣文字太學博士國子博士司農寺丞樞密院編修官兼刑部郎官大宗正丞軍器少監言忝朝蹟八年在外賢才不勝衆願更出迭入由臣始出提舉淮東常平茶鹽淮西運判兩淮鐵錢比不定祥疏乞官賜錢未銷濫惡者更鑄紹熙新錢從之淮人以安遷國子司業宗正少卿國子祭酒丞相趙汝愚以言去國祥上疏爭之曰頃壽皇崩兩宫隔絶中外洶洶留正棄印亡去國命如髪汝愚不畏滅族決策立陛下風塵不搖天下復安社稷之臣也奈何無念功臣至意忽禮貌常典使精忠巨節怫鬱黯闇何以示後世除直龍圖閣湖南運副請開道學之禁後為言者劾罷之於是太學諸生楊宏中周端朝等六人上書留之俱得罪主沖佑觀再請老以直龍圖閣致仕嘉泰元年八月卒諡肅簡外史氏曰先生所學大公至正故能以公心發公論而動一時也汝愚之誣賴以明道學之禁賴以解而衰宋為之一振所係豈小哉蔣重珍傳本宋史蔣重珍字良貴無錫人嘉定十六年進士第一簽判建康軍丁母憂改昭慶軍尋以公事與部使者異議請祠易簽判奉國軍紹定二年召入對首以自天子至於庶人所當先知者本心外物二者之界限為言界限明則知有天下治亂而已何樂其尊知有生民休戚而已何樂其奉且論苞苴有昔所未有之物故吾民罹昔所未有之害苞苴有不可勝竆之費故吾民有不可勝竆之憂遷祕書省正字屢乞祠不可明年待命霅川移文閤門請對當路憚之添差通判鎮江府辭㑹行都火應詔曰臣頃進本心外物界限之説蓋欲陛下親攬大柄不退託於人盡破恩私求無愧於已倘以富貴之私視之一言一動不忘其私則是以天下生靈社稷宗廟之事為輕而以一身富貴之所從來為重不惟上負天命與先帝聖母至於公卿百執事之所以望陛下者亦不如此也昔周勃今日握璽授文帝是夜即以宋昌領南北軍霍光今年定䇿立宣帝而明年稽首歸政今臨御八年未聞有所作為進退人才興廢政事天下皆曰此丞相意一時恩怨雖歸廟堂異日治亂實在陛下焉有為天之子為人之主而自朝廷達於天下皆言相而不言君哉天之所以火宗廟火都城者殆以此臣所以痛心者九廟至重事如生存而徹小塗大不防於火之未至宰相之居華屋廣袤而焦頭爛額獨全於火之未然亦足以見人心陷溺知有權勢不知有君父矣他有變故何所倚仗陛下自視不亦孤乎昔史浩兩入相才五月或九月即罷孝宗之報功寧有竆已顧如此其亟何哉保全功臣之道可厚以富貴不可久以權也上讀之感動授寶章閣主管雲臺觀則告吏部不受貼職祿不願貼職恩他日星變求言復申前説又慮柄臣或果去位君心易縱大權旁落則進為君難六箴召為祕書郎兼莊文府教授端平初入對上五事且曰隠蔽君德昔咎故相故臣得以專詆權臣昭明君德今在陛下故臣得以責難君父乞召真德秀魏了翁用之帝謂之曰人主之識無他惟辨君子小人重珍對曰小人亦指君子為小人此為難辨人主當精擇人望處之要津正論日聞則必知君子姓名小人情狀矣兼崇政殿説書戒家事勿以白務積精神以寤上意每草奏齋心盛服有密啓則手書削稿帝稱其平實遷著作佐郎邊帥以八陵圖來上詔百官集議重珍言史嵩之旣失相位危於幕巢猶欲邀功自固其位請擇賢帥如漢用充國使之親至邊境審度事勢條上便宜丞相主出師闗洛重珍力爭㑹邊帥議和戰不一復召集議重珍奏曩乞專意備守不得已則用應兵今不敢變前説不聽遂自劾以密勿清光乃不能遏兵端乞免説書職遷著作郎兼權司封郎官起居舍人言近者當侍講席旋命止之夫輟講偶以他故則當知聖躬舉措之難或所傳果得其實則當知聖心持守之難帝曰非卿不聞此言闗洛師大衂復進兵重珍言若恥敗而欲勝之則心不平而成忿氣不平而成怒生靈之命豈可以忿怒用哉又言邇來用臺諫頗主不必矯激之説似畏剛方太過之士竊窺選用之意正謂其平易而省事耳然數月之間一失於某再失於某借曰慎重臺綱而憂其激亦當以平正者居之又論禁旅貧弱教習頻嚴輒不能堪不稍變通非消變之道兼國史院編修官實錄院檢討官言更化以來舊弊未去者五狥私調停覆䕶姑息依違是也今又益之以輕易遷起居郎以疾求去以集英殿修撰知安吉州權刑部侍郎三辭不許自劾其不能取信朝廷之罪乞鐫斥置閑散促覲愈力而疾不可起詔守刑部侍郎致仕贈朝請大夫諡忠文外史氏曰本心外物之辨是以正己者正君也抑邪人進正人其導君於正者不已至歟先生可謂不負所學者矣胡珵傳胡珵字德輝晉陵人建炎間以避地始居無錫甘露鄉宣和三年成進士調開德府儀曹掾歴遷祕書正字太學生陳東上書攻六賊言者謂珵嘗為潤色又與李綱同舟東下貶梧州人號蒼梧太守紹興初召試館職復除正字遷著作郎兼史館校勘時趙鼎當國以熙豐元祐舊史蕪穢屬珵與張嵲修正鼎去位出守嚴州及鼎復相又舉珵與嵲筆削成書已而秦檜立主和議珵與同館朱松凌景夏常明范如圭等合辭抗疏忤檜去性嗜學既第後嘗受學於楊時問辯語孟諸書究極精微又嘗謁劉元城於南都暨歸元城曰子聰明能䕶以至道當成令器遂以所聞退而筆之名䕶道錄尤善詩文安貧樂道至老好學不倦為一時表正云外史氏曰天下邪詖淫偽之害大都聰明人致之飜不如侗焉椎魯者抱其本來足以入道善乎元城聰明䕶道之言真篤論也凡為豪傑為聖賢與流而為小人為二氏止為聰明不能䕶以至道之故耳先生可謂能以至道䕶聰明者矣東林列傳卷一
