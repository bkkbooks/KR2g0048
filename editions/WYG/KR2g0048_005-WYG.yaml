body:
  text: 東林列傳卷五江陰陳鼎撰明石有恒傳石有恒字伯常湖廣黄梅人性高潔以文章名萬厯三十四年舉於鄉四十七年始成進士與鄒元標最善嘗持其書來東林納交於諸君子初授浙江遂安知縣下車以避勞邀利畏禍三事自誓以程朱正學課士訓民輸運不任里甲羡緡公貯之充運費督僮僕種園蔬躬自灌漑不用民一物士紳餽遺悉辭不受歲災親履荒瘠地問民疾苦監司檄郡縣遏糴抗議力爭出帑金市粟民賴以濟調繁長興縣再調常熟長興民籲請得留時巨豪葉朗山吳野樵等結島㓂為亂剽掠無虚日撫按檄有恒討之有恒以隔屬辭不允乃設方略擒其魁賊稍稍戢而餘衆散處湖蕩伺間為出入有恒請馳檄各屬分兵搜捕當事韙之未果行天啟三年正月朔城門夜啟賊突入有恒方正衣冠待漏聞變出立㕔事賊露刃脇之不為動且叱曰草賊敢叛天子殺王臣耶索印不可強之行不可以刀傷其長子確亦不顧賊擁之出儀門有恒曰頭可斷此限不可踰也遂被害血上噴移時不仆主簿徐可行奔赴亦死之賊入署搜其篋粗葛二端俸金二兩而已賊亦相顧驚歎事聞贈太僕寺少卿諡忠烈外史氏曰先生為東林樹赤幟以先聲者乎如不死於賊入則必與楊左諸君子先後同聲相應者也余嘗讀南臯先生與先生書曰余少以王陸之學卽為正道及晚與東林顧涇陽交得程朱誠敬之理乃悟前學之稍偏也足下窮理盡性一本程朱其得道之正乎則先生之所以課士訓民者皆得聖賢之正者矣故臨難不少挫有以也夫張振德王燾列傳張振德字季修崑山人幼性孝善事父母弱冠卽從東林顧憲成高攀龍遊以萬厯丙辰選貢授四川興文知縣縣故九溪蠻地土墉三尺戸不滿千振德日與士民講學明忠孝大節人皆化之時永寧酋奢崇明有異志潛結奸人掠賣漢丁振德至請於兩臺復弓手舊額免抽協防堡兵嚴酋人出入之禁又捕得興文人為掠賣主者論配之招還被掠者三百餘人崇明遺之書不報繼以二千金為壽復裂其書却之天啟元年振德被檄入闈而崇明所遣援遼將樊龍等殺廵撫藩臬據重慶叛時振德署長寧縣去賊稍逺從者欲走長寧振德以守興文為正遂疾趨入縣賊猝至振德督鄉兵與戰力盡援絶退集居民城守㑹大風雨賊毁土城入振德度不支入署命妻錢氏二女淑昭淑慶等人持一刀坐後堂曰若輩死此吾死前堂乃取二印繋肘後持匕首危坐賊至慰曰無恐振德叱曰大丈夫從容就義何恐之有俄而賊焚民舍振德曰此吾授命時矣遂率家人北向拜曰臣奉職無狀不能殺賊惟以一死明志妻女先伏劍死薪上僕婦皆從乃命家人舉火火熾自刎一門死者九人賊目胡宗禄至火所見振德尸面色如生左手繫印右手握刀忿如赴敵狀皆驚愕口稱忠臣羅拜而去事聞贈光禄卿諡烈愍勅建專祠而長寧簿徐大禮者聞振德死嘆曰張君教我矣城破之日亦飲藥而絶王燾字濬仲崑山人少孤貧賦至性九歲出嗣有從叔圗嗣産謀擠之河燾忽心動奔歸後嗣祖析産且鉅萬燾悉以讓叔獨迎養嗣祖母及母惟謹萬厯戊午舉於鄉授海門教諭丁母艱補儀眞却諸生䞇邑令墨絶弗與通陞解州知州未任丁祖母艱在東林講學者三載崇禎九年補隨州故流㓂出没地或憂之燾曰臣子敢擇地而蹈乎星馳赴任練鄉勇審偵探釐馬政設攩木有土㓂李良喬等潛伺為亂先計殱之不數月獻賊猝至攻圍甚急燾身冐矢石且戰且守殺賊三百餘人賊有隨州紙城之號相持二十餘日力援俱盡㑹日暮大風雪西城火裂燾知事敗馳入署冠帶北面自經死時州治焚所縊室獨存燾屍危立賊望見駭去所司察狀尋州印印出燾足尺土下事聞贈太常卿諡烈愍外史氏曰兩先生雖死有先後然皆出於忠也忠者孝之表也兩君惟有眞孝之德故不畏強禦不怯冦盜而報國以忠耳然當倉卒之時而從容就義非養之有素烏能至此哉鹿善繼傳鹿善繼字伯順定興人先世自小興州徙定興之江村世有名於畿輔祖久徵萬厯八年進士知河南息縣有聲擢陜西道御史以敢言稱巡按蘓松諸郡皆以直聲著父正字成宇久徵長子也少為諸生以孝聞性不解飲顧好客客常滿座為人倜儻好奇能急人難至激於大義力為排解雖自棄其身家不恤年八十餘卒人至今稱鹿太公云善繼端方謹慤少以祖父為師萬厯三十四年舉於鄉四十一年成進士投牒歸里桐城左光斗嘉善魏大中長洲周順昌聞而訪之定交蕭寺中數歲始授戸部山東司主事精心鹽筴為閩粤鹽法議内艱歸服除補河南司署廣東司事㑹廣東解金花銀至銀故𨽻司農供文武吏俸萬歴後始入内庫遼左方用兵餉中絶大臣請出之不允請帑又不允善繼言於户部尚書李汝華曰與其請不發之帑何如留未進之金如干上怒願以身任汝華如其言疏請帝怒奪善繼俸一年汝華欲補進善繼奮曰司官以死生爭公以去就爭上意卽堅未必不可囘也廷謝日閹人閤扉勒索太倉銀善繼飛書主太倉者劉榮嗣劉報曰發三日矣實未發也詔責補還善繼復持不可曰有可還安用借請以善繼言囘奏死生惟命閹愕眙而去當是時上怒不測人皆為善繼危太公聞之掀髯曰臣子不當如是耶緘口保身非吾兒也尋奉旨奪汝華俸一月善繼降一級調外得山東鹽運司判官而金花銀竟補還矣泰昌改元復原官典新餉盡斥諸耗羡陋規外解久不至善繼歎曰芻糗不前安得成功然餉加於民民窮又安得應抗疏請發帑百萬不報亡何遼陽陷以才望改兵部職方司主事與同舍郎葉震生耿如把為尚書崔景榮草疏請罪行間將吏以伸國法廷議多不便善繼上疏力爭復請録故將戚繼光後恤死事高邦佐等是時王象乾以大司馬行邊起用廢弁張思忠等與職方耿如把議不合如把持之力有旨責其違阻善繼上書首輔葉向高曰邊疆之壞由於債帥請托今如把不狥情乃以違阻罪之於國事何勿謂能違阻之司官易得勿謂去能違阻之司官為小失也向高是之議得寢高攀龍為都御史薦善繼剛毅清約實心任事請以職方兼御史督輦下保甲教民忠義有旨允行竟不果天啟二年大學士孫承宗以閣臣理兵部事素重善繼善繼曰今日之事惟更易逃官逃將使畏法不畏敵事乃有濟承宗然其言請置熊廷弼王化貞於法并劾治逃臣高出等承宗閲視關門善繼從及出督師復表為贊畫勾稽將卒審察營壘識馬世龍偏裨中薦之為大將承宗在關拓地四百里善繼籌畫居多承宗嘗曰伯順在坐儼若嚴師助我不止謀議也其相引重如此十二車營成承宗巡昌薊將入賀聖壽因面奏機宜魏忠賢方用事有言樞輔將清君側者魏廣微以告忠賢矯旨促返鎭其黨李蕃等復議減兵省餉以掣之善繼移書極論皆不省時銓司缺廷議屬善繼善繼辭曰樞相一日在師中善繼卽一日在幕中主憂臣辱願同生死且已出門告天復囘頭戀吏部諸君亦安所用之承宗語善繼曰太宰以銓郎待君予雖不奪賢獨不憂太公匕箸乎善繼曰辭塞上就銓司此常人所不為家君范陽男子書來囑善繼從公於邊老人為汝加一飯公以常人畜善繼顧忍以常人畜家君乎承宗改容謝之方是時忠賢大興黨禍光斗大中順昌先後逮詔獄拷死皆坐賍追比三氏子弟踉蹌至無敢留者卒主善繼家太公為之周旋槖饘醵金應比善繼聞又力助之人皆咋舌而鹿氏父子不顧一時義聲動天下以久次轉貟外郎遷武選司郎中承宗為璫黨楊維垣等論劾屢疏請告善繼亦引疾歸崇禎元年起尚寶司卿陞太常寺少卿管光禄寺丞事未三載復請告歸里九年七月我兵攻定興善繼時居江村邑令請入城守親族勸勿行善繼曰吾雖無城守責每見士大夫非降卽遯吾所深恥遣子化麟奉太公避亂亟入城為令部署守禦凡六日城陷大罵不屈死之家人奔告太公太公慨然曰吾兒誓以身殉城今果然矣事聞贈大理寺卿諡忠節承宗為詩六十四章哭之已而高陽破承宗亦死善繼少嗜學得王守仁傳習錄慨然有必為聖賢之志旣而與攀龍光斗等交遂得程朱之傳嘗與諸生論經義人服其正又與容城孫奇逄以學行相砥礪從遊者日益衆至不能容僦隣比僧舍居之每拈程朱大旨教諸生大要以認理為根主敬為本故節義經濟皆卓然有以自見子化麟有文行舉天啟元年順天鄉試第一人孫盡心亦舉崇禎中鄉試有名於時外史氏曰先生父子周旋東林被難諸賢可謂竭盡其心中流砥柱矣况乎節義經綸見之實事迥然不同於敗腐書生也乃天不厭亂遂使攖城而死不能大其功業悲夫盧象昇傳盧象昇字建斗直𨽻宜興人漢尚書植之後也先世自涿郡徙義興桃溪祖立志知儀封縣事去桃溪遷居宜邑象昇生而白晳臞似不勝衣而膊獨骨負殊力少讀史至睢陽武穆輙起舞太息曰吾生得為斯人足矣喜立名節弱冠卽與東林諸君子徃來舉天啟二年進士授戸部主事督餉清源倉甫下車見倉米盈鉅萬計歲耗亦糜萬石而河南大旱無現糧積逋五載民間至揭瓦負楹棄兒鬻婦猶不得飽正供未遑計也象昇拜疏請折一時赴折者恐後而逋糧悉清時三藩就國藩艘噪呼等於盜賊象昇豫置布囊運米峙涯舟及水次卽令滿載藩艘亦服其能戒勿停擾而猾吏不得為奸以卓異陞大名知府時巨盜馬翩翩以大家子為羣盜淵藪稱九省通家部衆攫人道上人莫敢仰視象昇徃擒之巾服坐馬上獨行無從有少年露刃衝騎而前問翩翩作何狀象昇應之曰已擒就戮矣少年卽䟦馬去俄頃復還而象昇彈指取之立棄市崇禎二年京師戒嚴募鄉勇勤王以知兵擢大名兵備副使六年正月流賊冦邢臺象昇登摩天嶺覘賊賊蝎子塊者善射發三矢一矢落象昇貂領一矢殪中軍一矢從象昇睂間過鏃睂有血痕賊駭曰盧公似有三眼眞神人也不敢逼象昇射殺二人而還四月追賊於小西天山中五月再破賊於青龍崗八月復禦賊於沙河縣之丹井前後斬首數千級象昇臨陣以身為先親與賊格闘刃及於鞍弗顧失馬卽以步戰以是為賊所畏不敢窺大名而七年報功之疏不及人皆憤之初象昇追賊至廣平廣民聞賊來奔趨郡城廣守懼賊與民混閉關不納民數萬悲號動野象昇急呼啟鑰盡縱之入與守語曰民為國本何得閉戸棄之㓂來我為爾扞徹夜巡行城外不下馬解帶明晨賊遁廣民以安已而賊潰渡河殘燬河南明年破鄖六縣蔣允儀罷上遂命象昇以都察院右僉都御史廵撫鄖陽時蜀㓂返楚者駐鄖之黄龍灘象昇與總督陳奇瑜分道夾擊自烏林關乜家溝石泉壩康家坪獅子山及太平河蚋溪諸㨗前後斬首五千六百有奇請益鄖陽主兵并減稅賦繕城郭及貸鄰郡倉穀三事上皆允行又於其間募商採銅鼓鑄稅羡餘以積糧又零賊之蜂屯山谷者望烟追捕賊墮谿塡塹積骸如山鄖以是復成巨鎭初象昇至鄖殘兵缺餉勢岌岌且從賊象昇草奏請發先解銀盔鞓帶銷金百兩椎牛作餅為衆飽飡因諭之曰朝廷餉且暫缺特後至耳爾敢背義作賊耶與爾衆約有懷二心者殺無赦衆屏息俛首誓死不二後川帥鄧玘尅餉軍譁從關門鼓噪而下象昇單騎赴之衆相率蒲伏泣訴象昇隱其情呼玘赴漢夀亭侯祠宰牲賽祀隨草祝版云有營私剝軍者神殛之玘面如土色卒為其下所殺他帥至皆神明事象昇而鄖治已而奇瑜所受降秦㓂復叛象昇遣將李玉華解商州之圍追擊於胡梯岔不利副將楊正芳等戰賊雒南斬五百餘級殺賊首飛天虎卒以力竭敗没象昇乃上疏曰今日事勢未易使賊化為民先使民不為賊未易使賊盡殱於兵先使兵不走為賊若果兵自兵民自民賊自賊則賊可盡矣如今秦中之冦大率逃卒饑民歴來斬馘累萬盈千究之所殺者皆百姓賊固在也臣請設為立寨之法因高設險丁壯聚居統以團保練長可使民得為民復設為併村之法小村之不克寨者附於大寨可使無一民棄為賊乃又設為清野之法民資勿散貯以資賊復不併貯以艷賊彼旣無所掠勢不久留可使賊不見民而自去為賊又設為潛㐲火噐之法以竹木代銃竅地伺隘可使賊衆中疑不敢輕蹈害民未幾改湖廣巡撫明年加右副都御史總理南直河南山東四川湖廣五省軍務仍管湖廣巡撫事與總督洪承疇南北合勦未幾上命釋巡撫加兵部右侍郎總理七省軍務賜尚方劒便宜行事象昇旣受命是時豫賊自麻城趨羅田犯蘄水象昇乃以全楚主客兵一萬八千人分之以三千䕶陵寢一千六百人守鄖四千四百人備襄陽命馮時早援隨應孝感周元儒援麻黄蘄州秦翼明駐隨棗而身率楊世恩等迎戰於羅山旣至而賊帥整齊王從信陽走應山象昇復率李重鎭陳永福等夾攻之賊遁去已而聞汝雒急復倍道而前歴鄖襄宛葉馳千四百里入汝督李重鎭雷時聲連戰二日飛矢殪賊千人斬首一百七十餘級當是時諸將偃蹇不奉命尾賊而病民殺良為功自曹文詔艾萬年陣亡尤世威敗衂言戰者聞虎色變事事觀望不前象昇慷慨洒泣勉以大義故祖寛左良玉楊世恩等所至有功九年正月先是上以流冦未平齋居武英殿素服減膳撤樂象昇率諸臣於元旦表稱臣等暴師經年不能摧殄兇醜貽君父宵旰憂罪萬死請大駕還宮御常服嘗法膳上優詔答焉已又自為奏曰賊横而後調兵賊多而後增兵無人不落後局兵至而後議餉兵集而後請餉時時寓有危形况請未必敷致兵從賊而將為冦是八年來絡繹而請之兵反樹賊黨積累而用之餉適齎盜糧也又言督理宜有專兵專餉請調咸寧甘固之兵屬督薊遼關寧之兵屬理每月需餉銀各一十三萬而聽承疇辭三邊臣辭全楚又言各直省撫臣俱有封疆重任一處有賊一處求援一處需兵一處求調不應便成吳越分應何以支持夫粉餙太平尚可調停遷就用兵勦賊豈容委曲那移又言臺諌諸臣不問事之難易不顧人之生死一味求全責備在識力不堅者必致因人以自餒不肯向前卽清白自矢者亦且避忌而灰心從何展布又云中外勿惜浩費有司勿憚苦難各省直無吝餉金諸紳士勿事横議大家齊心合力效順除兇待賊悔禍乞降再議散遣安揷然後輕徭薄賦䘏死弔生保固元氣此則勦蕩之大局也臣與督臣有勦法無堵法有戰法無守法其言切中事宜上嘉納之是月李自成圍廬州破和州含山進圍滁州連營百餘里城且夕下象昇在西沙河聞變乘夜疾馳平明扺滁命祖寛羅岱等分兩翼殺賊追敗之於朱龍橋横尸枕藉水為塡咽不流象昇復躬援枹鼓大呼直前搏賊賊披靡再斬首六百七十餘級奪獲騾馬無算時城中猶未知賊敗象昇遣一裨將請粮卽竿其頭繼遣又欲殺之象昇自臨城又以砲矢相向行太僕李覺斯識象昇急令開城犒軍知州劉大鞏腹戰股栗無有人色象昇笑曰䜿儒姑慰遣之明日築壇祭陣亡將士親為墮淚屬州人殯殮軍士皆感恩而泣當是時自成精銳大半盡於滁陽使乘勝驅勦可收全局而淮撫朱大典不為堵截復逸去招集散亡連營還㨿楚豫象昇又追敗之於七頂山又命祖大樂趨唐縣備汝寧祖寛趨光化備鄧而親建大將旗鼓追賊於鄧州使人告襄陽曰賊疲矣東西攔截前阻漢江可一戰擒也楚撫王夢尹郢撫宋祖舜慢弗應三月賊從光化之羊皮灘復走襄郢自象昇受命討賊閲三載未嘗寧居嘗夜逐賊偶露地倦卧曲左肱作枕右臂牽挽馬勒夢中聽馬蹄蹴踏聲遂大呼躍馳軍中並喊聲上馬始皆弗喩其故已而知賊大隊夜行聞軍中呼躍反疑中伏死奔達曙已行百里連晝夜追三百里斬獲無算設露卧酣寢一軍盡醢矣又賊遁承襄象昇獨以數百騎入其陣中為賊所圍困二日與諸將約曰食盡道窮留此死擊不勝亦死吾當力衝之乃率騎徃擊賊衆披靡因斷其糧道越三日賊䧏九年夏溽暑休兵象昇疾走秦關與總督洪承疇議事凡臨潼邠州渭南韓城華州諸處承疇隨地嚴兵阻賊象昇又屢獲奇勝期旦暮可平值京師戒嚴上命總督各鎭援兵并京營出征再賜尚方劍加兵部左侍卽右僉都御史星馳入衞自象昇歸朝關兵囘鎭賊亦大舉入秦中原不以殄賊為事矣已而京師解嚴廷議簡象昇任中樞當事者忌之改總督宣大山西軍務請陛見不許象昇知宣雲餉缺斗米千錢且内外解多逋額難以軍法行力請屯牧占晴課雨問土宜卜美種如老農之治稼行之二年積榖二十萬石上賞賚有差傳諭九邊以宣大為式象昇復具疏曰屯有十利有十梗有五易有五難何謂十利廣種薄收愈於不種利一邊無棄土卽非窮邊利二伍鮮游軍漸免逃伍利三粟日以増則價日以減利四屯中草束可資戰馬耕牛利五官民各有所入可佐召買之所不備利六邊吏時行阡陌習知農疇智慧日生筋骸日壯利七軍與民相習得寸則寸得尺則尺衆志可以成城利八因屯而牧廣事栽植多畜牛羊犬彘鷄鳴狗吠之聲達於四境使士忘塞上之苦利九路堡窮軍經年缺餉非逃卽斃無計生全若屯務興舉與之行糧以活其命教之力作以堅其心利十也何謂十梗人情畏難有得不償失之說一梗也庸吏自便未肯以乘軒策肥親田畯之業二梗也貪弁役軍彼方有事科𣲖安有餘力助耕公田三梗也猾軍胼胝非其所習必出怨言四梗也豪右侵種納糧則指為抛荒官墾又認為已業五梗也劣生把持將備等官多不能與之為難六梗也衞所工於影射指東認西四至難明未免匿肥而報瘠七梗也各路各堡文武多官有一人不願做一處不能行者未免生出浮言轉滋築舍八梗也塞土砂磧百里之内難得一線河流惟水地三倍於旱田卽不與民爭田勢必至與民爭水九梗也屯軍專事耕鋤難以分身他顧而功令所在差操聽㸃之際宜加體恤未必人有同心十梗也臣更言其易軍有戰守操練之責成而十抽其二則易於使屯有牛驢種具之多費而官為措辦則易於行地有逺近高下之不同而酌以時宜則易於力將吏有明昧貪亷之别久暫勞逸之殊而嚴董率勤課成則易於集事人情有淳頑勤惰之分虛實誠偽之異而愼稽查明賞罰則易於勸懲乃若所難亦有之邊方十年九旱一經災祲籽種全抛此天時之難塞上五穀非宜多係雜粮佈種茍違其性終鮮刈穫此地利之難農歴三時總以收成為主秋高風勁若邊事有警宜防收保不及此人事之難大凡任事者必有利害是非得失毁譽隱伏於其内交伺於其旁此任勞任怨之難任事而期於有成當局猶堪展布乃從前疑畏易起日後風波易生此事前事後之難惟力破其難且梗者而身任其易且利者天下事不止屯務宜爾也奏上上命確議行焉屯政旣修遂弛出塞樵牧之禁又時出不意躬閲諸堡斬離伍把總費自強以肅軍政十一年三月象昇以誕日方舉觴侑客忽啟鑰云西邊乞炭台吉以數百騎壓張家口求市象昇聞警卽夜馳六十里至天城令箭羽翎交道上狎至夜分發符𫝊諭雲晉軍無動次左衞遣諜探知三十六營離邊牆八十里密檄雲帥從西至宣帥從東至而自督標兵出羊房堡搏戰先二日出榜示之衆竟解去當是時敵十萬臨邊象昇以正言相折一矢不加而去乃當事者謂無血戰功竟不敘未幾丁父憂七疏乞奔喪許之候代而新督陳新甲以逺未至㑹我兵分四道薄京師詔奪情以兵部尚書三賜尚方劍督諸路軍入援上召見平臺力言當戰上壯之與樞臣楊嗣昌議不合時嗣昌方以墨縗視事為諸正人所攻益與象昇郄事無不中制象昇出都號呼嗣昌曰文弱吾與爾皆以奪情身不孝莫解只辦忠耳嗣昌恚行至昌平請兵僅撥宣雲三鎭二萬人與之又令就總監高起潛兵於通州象昇歎曰彼不過欲總監撓我師期耳恚不赴適嗣昌至軍象昇厲聲詰問嗣昌色戰奮言曰公直以尚方劍加我頸耶象昇曰尚方劍須從自頸下過如不殱敵未易加人也嗣昌益恨之已而眞定河間皆失守遂落象昇尚書銜以侍郎督師翰林院編修楊廷麟抗疏曰南仲在内李綱無功潛善秉成宗澤隕恨請以軍事專委象昇毋中制嗣昌奏改廷麟兵部主事象昇軍前贊畫旣至委督粮眞定象昇自誓必死晨出帳四面拜曰吾與將士同受國恩患不得死不患不得生衆皆泣莫能仰視十二月十二日進至鉅鹿南十里賈庄奮擊頗有斬獲明日我軍大至總兵虎大威戰不利象昇大呼率後騎繼之手擊殺十餘人身中四矢二刀馬蹶死從死者僕顧顯掌牧人楊陸凱嗣昌疑象昇不死有詔視驗廷麟遣將得其屍於戰塲麻衣猶被體撫按佯若不識一卒遥見卽號泣曰此我盧公也遂肅拜衆皆拜畿南百姓聞之皆奔走雨泣曰盧公死誰䘏我者競除地立祠每有疾病輒此禱祀求福甚有痛其亡發狂疾死者而嗣昌故靳之使踰兩月方得就殮象昇三賜尚方劍未曽戮一裨將前高平知縣侯𢎞文者奇士也僑寓襄陽見象昇勞苦鄖疆願散家財募滇軍隨象昇討賊題授監紀已而象昇移任宣雲𢎞文率所募兵重繭至楚為後事者所陷以擾驛上聞有旨卽訊象昇不勝憤懣上疏曰𢎞文破家為主捐軀殺賊身罹法網臣甚痛焉臣初聞𢎞文譴問卽遺書責之其報臣書初不及已事惟以滇兵莫為綏輯兼乏餉為虞身雖對簿義切封疆懷忠報國之氣可槪從而抑沒之乎今羣臣欲以誤用𢎞文罪臣推其意且有故激滇兵之變以甚𢎞文罪者總之臣不請𢎞文為監紀必不至此臣誤𢎞文𢎞文不誤臣也未幾𢎞文於十四年譴戍天下咸痛讒夫高張異才不用而又嘆象昇之能得士於閫外也象昇多力善射喜畜駿馬皆有名字曾逐賊入南漳猝遇大賊戰敗追至沙河水濶數丈奮矟一躍而過卽所畜五明驥也嘗言功成築􅎠隠園於桃溪以老竟不遂其志死時年三十九弟象觀字㓜哲崇禎十五年鄉試第一人明年成進士象昇死四年上書訟兄寃得贈戸部尚書太子少師予祭葬又三年改贈兵部尚書諡忠烈特祠蔭一子錦衣衞世襲千戸象觀英畧稍下其兄而文采過之後殉難赴水死方象昇之盡節於賈庄也楊嗣昌遣邏卒三人偵之其中有俞貂鼠者歸而言象昇死事甚悉嗣昌怒箠楚三日夜逼令吐實終不易將斃仍翹首曰天道神明無枉忠臣天下賢士大夫聞而哀之俞名振龍素以販貂為業故人稱俞貂鼠云外史氏曰先生經濟武畧不在武穆下武穆見殺於賊檜而先生見殺於嗣昌俱不使成其功此千古所同慨也嗟乎假令楊機部之言得行以軍事耑委之國家事尚可為也奈何賊相必欲殺先生而卒使明社淪亡也耶東林列傳卷五
