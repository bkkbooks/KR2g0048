body:
  text: 東林列傳卷二十二江隂陳鼎撰明丁元薦傳丁元薦字長孺號慎所浙江長興人萬厯丙戍進士質剛骨徑見大識超厯挫抑甘厄窮百折而終不餒其浩然之氣初官中翰矢口而陳當世之弊時以為賈誼之疏與世遂不相臭味一斥而歸沉寂田間者數年再起儀部復矢口而陳當世之弊時以為汲黯之戇與世益枘鑿而不相投於是鎩其翅絶其轡至欲剚以大盜之刃一決目中之刺竟中他事削籍歸甲子元晨賢令被弒一邑震惴若將隕墜元薦奮不自計流言矢集屹無所避擒盜寧民一邑得安平時究心理學其加功也深其用心也密凡東林諸君子無不就正而於顧憲成則師事之憲成嘗答書云承示新功甚善周子揭主靜是得手事程子見人靜坐便歎其善學是入手事李延平教人靜坐看喜怒哀樂未發時氣象又就中點出一活機此大儒留下海上單方也他日又云得手書不勝欣慰足下用心如此何患不日進也寡欲二字極妙周元公首闡聖學亦只此二字是一了百了工夫更不須此疑願與足下共勉之亦只密切做去不須悔前慮後反成憧憧令心體上多一事也嘗過無錫赴東林會講他日憲成致書曰東林之會風色蒸蒸座上發貧賤富貴一則尤令聽者竦起足下之功於是乎大矣年七十卒天啓中以其為憲成門人也禁錮之崇禎朝乃復外史氏曰當明末時習俗仳􅍣茍有良心者卒不能合况先生乎故一出再出而終見惡於時流此其入山惟恐不深而甘老於田間也汪康謠傳汪康謡字淡衷號鶴嶼休寧人精研理學以紫陽朱子為宗弱冠舉於鄉萬厯癸丑成進士授諸暨令摘姦翦暴不避權貴擢户部司庾臨清以練兵備白蓮賊有功升郎中出守漳州蒞任日瞿然起曰是紫陽舊治也吾産於其鄉仕同其地豈別問治譜哉一考故憲申之為自約者八約屬者三又有八禁五不擬著為令皆以實心行實政州大治尋舉卓異第一推漳南參藩適魏崔肆熖崔為同門友嘗授意招致乃峻詞拒絶守漳三載迄不通一字崔銜之巡撫周起元坐贓數萬下漳州籍沒士民洶洶泣訴康謡亦泣曰吾不惜此一官以護孤忠寢其事不纍漳一人益忤崔意推升疏上逆璫矯旨削奪去後漳民思其德奉祀朱文公右額曰新安兩夫子祠崇禎改元起福寧兵憲時紅夷不靖賊氛羣起乃廣什伍集亭障嚴接濟嘗以元旦馳師寇不及備斬馘無算寇平以疾告歸日講學於天泉還古書院精治尚書體朱子大意為之注有尚書刪補一編行於世學者稱鶴嶼先生外史氏曰先生守漳及備兵福寧政事功績厯厯在人耳目惜乎終於泉石而不復再出噫先生亦知時事之不可為矣林宰傳林宰字德衡福建漳浦人萬厯辛丑進士授無錫縣令蒞任後適東林方興講學遂捐復講堂其後重建道南祠成又為之記其略曰宰維吳地自讓王篳路而來李子歌風言遊禮樂斌斌號文學之國矣中更六朝五季剝蝕於談麈榛蕪於戎馬非先生正學南來五百年墜緒何以昭兹來許顧或謂南宋道學空談無用宰按先生䇿燕雲之師則云宜退守汴京不可虛內示外金人內寇則云宜堅壁清野潛遣援兵追襲至於三鎮不可棄和議不可從責金人敗盟問肅王使必復而後己種種碩畫皆熟諳情形事變深於兵家者之言此真有用道學豈與爭機鋒而渺功實者埒也或又以其辟應蔡京為疑不知先生鴻才巨識行權濟時正善學二程而融之使其志得行於靖康建炎間則金人可無南窺二帝可無北狩一祖六宗之業可無偏安江左奈之何厄於權姦不究其用以殉此諸君子所謂扼腕太息而欲宰之論其世也歟自東林復振後每月主會遇當道憲長四方賢哲一軌於禮其有心衛道如此至先後試士拔馬世竒華允誠為第一人稱冰鑑云其加意人文又如此凡民間有事剖斷如流按律得情吏胥不得上下手去任後民思之曰安所得林青天哉其得民心又如此官歷部曹至南京兵部侍郎卒學者稱平華先生後逆璫毁書院見宰碑記遂入東林榜中削奪崇禎改元乃復外史氏曰先生作令梁溪政治和平青天之謡婦人女子至今猶能道之其所取士皆一時節義文章之流嗟乎今安得所謂林青天者出而為宰一振東林耶賀時泰傳賀時泰字叔交湖廣江夏人平時寡交遊惟與同里郭文毅大冶尹蕭槐胡對薇砥礪文行既諸公次第貴顯時泰淹蹇貧益甚諸公或相向為慰藉時泰夷然嘗遇嵗除不能具一杯羮以一母雞豆二升易米七升五合支度嵗三日糧賦詩自勵曰清苦丈夫志風霜善自持陽和非不愛義命貴安之是時長子逢聖尚幼風度端凝屹如莊士時泰目顧而心許之自是益樂飢課子迄逢聖貴即大書於堂云當年雞豆未忘念此日兒孫勿妄思以故逢聖自釋褐金華揚歷揆府及於受命成仁三十餘年如一日一惟奉其家教鄉黨比於郭有道邵安樂一日見高攀龍依庸堂扁柎取道不逺人之義乃作人模樣一書自人之大體小體以及同體異體約數十條允堪效法又著思聰録一卷其人模樣書云士人所守若未能定先從鄉黨中尋一個真節婦人做樣子便不難了嘗與山右河汾人辛全字復元者為學問友手書商學交最善別著三世事小録及女針二十四則皆有禆名教有關世道之言學者稱陽亨先生又稱人模樣先生云外史氏曰先生一雞一豆猶顔子之一簞一瓢也樂飢課子不以貧纍及子貴而志不少易非得道之深者烏能至此哉史孟麟傳史孟麟字際明宜興人九嵗能屬文長益砥志於理學萬厯癸未成進士由庶常授工科給事知無不言丙戍皇三子生有詔封母鄭皇貴妃草疏論其不可草具偶示同鄉薑士昌乃袖而歸署其名以上一時羣臣連起諍之章凡數十上俱被譴謫而鄭亦止稱貴妃論者稱士昌翼儲首功而不知疏實出孟麟也癸巳有旨三王並封內閣王錫爵擬諭以進乃同水部郎嶽元聲率省部諸僚大聲疾呼沸於邸沸於朝疏既數十上孟麟更綜集羣篇櫽括體要為條議答問奏之大指謂中宫無待嫡之條元子無封王之例又曰有嫡立嫡不聞無嫡而待嫡無嫡立長不聞有長而虛長其詞委折詳核俾難者無復置辨由是並封議寢震位旋定而錫爵銜之會孟麟有疏劾中貴遂擬旨豫杖孟麟乃易囚服趨朝待命上知其忠有密諭閣臣終不譴言官以快近習旨竟留中既而疏救選郎趙南星與朝議忤遂相繼稱疾歸時孟麟與南星尚未識面後並出山始交善尋掌吏垣並佐察典所排擊多強貴南星因奉旨褫削孟麟復疏救亦免歸外艱闋晉太常少卿再丁內艱服闋不補久之特起太常少卿提督四譯館初御史劉光復嘗指斥東林又抨所交淮撫李三才及乙卯梃擊變作光復廷諍下獄上怒叵測孟麟方奉差在途見邸報奮然抗疏請立皇太孫赦光復疏入被旨切責謫降運判光復得減死惟伸公是不計昔嫌人尤以為難前後林居三十年偕同志研求濂雒宗旨既捐其世業就邑中創明道書院復遊錫山師事顧憲成友事高攀龍質疑問難要諸至當為學本不雜禪至篝燈丙夜危坐澄懷人有疑為禪者尤喜奬誘後進出其門者多為聞人病中矻矻著書聞國是紛紜深切牛李朔蜀之憂後竟如其言天啓初補大理丞晉太僕卿未赴卒贈禮部右侍郎賜祭葬後以東林追奪崇禎立乃復學者稱玉池先生著有明道附言亦為堂集併奏疏行於世外史氏曰豫讀先生文慨然想見其為人及考其懿行乃知為一代賢者不徒文字而已也先生殁後姦黨喬應甲誣為東林護法而削其籍應甲攻東林疏凡三十上極言諸賢之惡以是清流盡削奪然千百世下是非昭然究何益哉葉茂才傳葉茂才字參之無錫人性至孝痛母先逝事父逾謹萬厯己丑成進士授刑部主事三月旋告改南迎養遂得南工部𣙜稅蕪關念商重困以寬恤為主去關五十里有雙港往譏防漏稅風濤不測易為商厲立命弛其禁差竣改吏部郎中請告歸起禮部郎中歷遷太僕少卿時御史湯世濟疏斥諸建言者為邪黨乃上疏爭之略曰當日發姦摘伏論列沈一貫湯賔尹諸人者謂之邪黨則曲庇私人壞祖宗二百餘年計典明通關節壞二百年大典者反為正人君子乎變亂是非將貽國家無窮之禍不報諸黨世濟者羣起攻之又嘗激於年例考選不公上書鄭太宰云年例兩衙門之劣處也考選尤言路一大關鍵也去取間風聲所係令處一真品則真者畢懼選一偽品則偽者畢進尚何以年例考選為又嘗致書高攀龍辨當年四案正論危言扶植千秋名義最大尋告歸後改太常少卿不赴擢工部右侍郎以祖父母未邀封贈一出甫三月見權璫當道國事日非遂請致仕逆璫惡之屢欲加害未能也通籍四十年什九在告家貧布衣蔬食出則徒步所居老屋數椽薄田兩頃不殊寒畯仰承父志去官而家去城而鄉青鞋布襪以奉杖履撫胞弟茂德極其鞠養居恆論學以洛閩為正宗以守身為切務所交惟東林諸君子皆白首不渝終嵗扄戶不出嘗有詩云涉世幸逃三見黜歸田喜遂一間身其自寫至矣方魏忠賢亂政熹宗未有嗣長洲姚希孟赴京師茂才告之曰君行矣好語諸公宜思其大者請信邸出閣講學此今日本計也其愛君憂國之心如此崇禎初方起召用己卒矣年七十二著有見聞録旁囂録八貞女傳興至吟等編行世學者稱間適先生外史氏曰先生介然特立衣冠不正望望而去如伯夷然平易近人勸掖流俗下至乞兒皆可相親如栁下惠半世曹郎在在盡職揚歷風波不罹黨禍如申屠蟠柝理論事一字必嚴不好為渾語以居寬大之名如程伊川云許世卿傳許世卿字伯勳無錫人家貧有志操天性孝謹父早亡事大父有禮步趨無尺寸軼事母至孝為諸生有聲受知郡邑絶不干以私萬厯乙酉舉於鄉淡然自若服食居室不稍變其初丙戍從公車還為幽居十戒出入恆指而自問曰若得無食言否或以私嘗之輒指其壁謂曰此吾之息壤也可奈何所居敝巷閉門不啓守令下車一謁後不得再覩其面郡守歐陽東鳳延請修郡志以東鳳端人也一出應之平生交遊絶少見小人如目中刺嘗曰和風未學由由惠清節寧希望望夷每自東林講學歸敕其子曰人何可不學但口不説欺心話身不做欺心事出無慚朋友入無慚妻子睡無慚夢寐乃為學矣五上公車不第庚子冬行至桃源河冰堅遂返謝去傳金自號早白老人矢終焉之志嘗於隙地手藝菜甲曰不如是何能無求於人清苦自甘晚而益窘客有持槖金謂曰此物易公片楮耳乃直視曰當謁客竟出門去不顧有親黨坐法者來告急世卿適鬻一婢代為輸罰鍰終不為緩頰其刻勵如此疾革囑其子曰吾有某逋未償某施未報某家人賚未給某故人子典田所入已當其直亟取券還之翛然而瞑時年五十未仕而卒著有中解編太玄玄言露頴編諸集而特好為詩一切欣惋悲愈之感悉發乎詩詩成抱膝長哦輒復歡然自得學者稱為靜參先生外史氏曰今之所謂孝廉者文詞而已何嘗知所謂孝所謂廉也先生之舉孝廉可謂不負其名矣至於易簀時語非真道學不能也嗚呼吳桂森傳吳桂森字叔美無錫人幼有至性父喪哀毁如成人長從顧憲成高攀龍講學萬厯四十四年以序貢應廷試後遂絶意仕進急歸過毗陵學易於錢一本每玩一卦輒進而請正盡發其扄歸時一本目送曰吾易在梁溪矣爰就管見象抄廣其意作像象述天啓初高攀龍出山延主東林慨然任之己而攀龍豫告見東林四座弦歌心竊自喜尋璫難作攀龍死止水桂森哭之慟竭資以佐費官旗時書院已毁乃約同志鄒期楨期相兩兄弟就業道南祠已而相朂曰平陂往復天地之常吾輩但當為所能為以待天之自定乃集真儒一脈敘道學淵源而以關中馮從吾為道脈之合焉璫敗有表章書院之旨亟謀興復建麗澤堂又搆小齋名來復講易其中羣儒翕集其説易也謂乾坤成列而易行乎其中坎乾來主坤也人心之誠也震誠之動艮誠得主也離坤順從乾也人心之明也巽以入之兑以説之自誠明自明誠非誠與明乾坤或幾乎息矣又嘗正王守仁無善無惡四語曰有善無惡性之體有善有惡意之動知善知惡是格物知善無惡是致知聞者以為名言晚年倣義門鄭氏家會及五經會聯屬宗人子弟以為常其自署曰東林素衣所著像象述外有金針易説談易隨問真儒一脈尚書説春秋大全纂禮記訓釋等書行於世外史氏曰余讀先生像象述一書知易之有理有數有象焉今訓詁家但知講理融通而已而不知象數之寓於理中微先生易其蓁蕪乎張大受傳張大受一名夢時字伯可別字弦所無錫人少頴異隨父大參澄齋公讀書貴州署為文超軼不羣萬厯癸卯舉於鄉屢上公車不第謁選授安吉州知州為治大得民心甲子元旦劇盜葉朗生餘黨殺長興令石有恆將犯安吉夢時率士一戰而寇大敗四境敉寧民苦解絹請上臺易為官輸民甚便之尋轉常德同知署府再署司李賢聲茂著以監偏沅軍有功薦升山東鹽運司同知寬商恤竈國課無虧及沿海告警竭守禦之䇿民賴以安一時有循良之目將有殊擢竟告歸家居講道東林刻有會講商語蒲榻笑拈二編晚年嗜學益甚日讀書寸許雅好書法日揮數幅為樂案頭惟存彭澤香山明道康節數卷以當尚友卒年七十八外史氏曰先生七嵗工對偶九嵗能詩侍孰師坐一書樓手題云上此樓來一動一言務遵聖訓下此樓去一事一念務慊親心其幼時志已不同矣年十五以縣試第一補諸生久困場屋入太學四十後始登賢書其後奮志東林得諸賢切磋之益卓然稱有道者焉陳仁錫傳陳仁錫字明卿號芝臺長洲人年十九舉萬厯丁酉孝廉時文習衰靡慨然以倡明理學為己任究切經術所為文不屑西京以下屢上春官不第天啓壬戌始成進士廷試一甲第三人授翰林院編修丙寅充日講官在經筵多所規正每以進忠直逺姦佞為言時魏忠賢用事方芟夷善類聞仁錫言惡之會忠賢冒軍功纍爵上公給鐵劵仁錫當視草辭不可忠賢密使人謂曰屬草則台座不則刀鋸奚擇乎仁錫曰吾腕可斷草不可屬數日即有孫文豸以誦步天歌妖言亂政見捕詞連仁錫及文震孟坐以東林謀主震孟先已降調里居以池陽救得免逮而仁錫遂削籍歸當是時朝士奏對稱上公而不名伏謁呼九千嵗宗社大命懸於絲髮仁錫以一書生抗拒直揭一代綱常還之君父其關於世道人心者不小也崇禎初起原官稍遷中允再補日講出宣詔三韓齎油素記厄塞甚悉為小册可當聚米也鞕裘之贈一峻謝之又明年庚午署國子監司業所教士以誠敬為本是秋充經筵講官所敷陳皆切時務不事訓詁辛未分典禮闈得士為最秋册封周藩歸時相惡其不附遂訟於朝曰是門户後徑也是東林嫡派也科道何為不逐之遂乞身甲戌三月起南祭酒南雍士子欣然復有南陳之稱南陳謂文定當永樂時統南雍者也亡何疾遂不起卒年五十六贈詹事府詹事諡文莊所著有經濟八編大學衍義續補及賦役漕政水利等輯最大者世法録一書凡本朝之大經大法祖訓之敬天勤民以迄禮樂兵刑象緯厯律邊鎮方輿濬河利漕莫不畢具疾作遺命上世法録於天子曰臣之報主盡在是已其所學大略如此學者稱芝臺先生外史氏曰先生在朝與文姚諸公名節相期道義相砥乃其時欲陷之者一曰東林嫡派再曰東林邪黨不去之不止者何哉君子曰是天也東林列傳卷二十二
