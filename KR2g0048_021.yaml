body:
  text: 東林列傳卷二十一江隂陳鼎撰明孫慎行傳孫慎行字聞斯號淇澳武進人萬厯乙未進士授編修妖書事起時宰有所逞憾欲窮其獄慎行抗疏言宜存國體時論韙之前後以艱歸冊封歸請告歸歸輒鍵戶著書不通一客纍遷禮部侍郎署部事時光宗儲位雖定而福藩猶未之邸慎行敷陳調劑趨令就國𨼆然有羽翼功他若慈聖太后廟號王貴妃藏主諸王選婚諸禮皆守正力爭楚獄久寃議為平反釋其幽滯者數十人代藩廢長立少念其事與東朝相類急正之以杜小人窺伺者而庚戌科場之弊卒按法持之又請祀羅豫章李延平於文廟在部逾年請告去竟被京察罷職昌啓間再召為禮部尚書先是光宗大漸李可灼進紅丸服之晏駕民間訛言被弒慎行不勝痛憤上綱常大義一疏得㫖下九卿科道議議上詔奪從哲官而戍可灼二三逢內者意不懌尋以爭秦藩封爵非例忤告歸會副都御史楊漣劾魏忠賢二十四大罪楊既拷死而慎行以論紅丸坐戍得寧古極邊慎行坦然就道而上晏駕璫伏誅得解戍未幾以原官協理詹事府事召髙卧不起崇禎八年有㫖廷推閣員特召慎行時已病疏辭不允扶曳應命甫至都而卒天下惜之年七十一贈太子太保諡文介外史氏曰天欲亡明也先芟夷正人盡矣所存者一二老成又流竄遐荒當其起用之日天下莫不延頸望之乃竟不少假以年者何哉君子曰是天欲亡明也于孔兼傳于孔兼字元時金壇人自少事大父父母及其昆季孝友備至登萬厯庚辰進士授九江府推官擢禮部主事纍遷儀制司郎中磨勘戊子試録疏發其可疑者數人皆當路子弟駁都御史吳時來不當諡忠恪得㫖奪諡朝貴咸目懾之既而纍疏爭三王並封議竟寢及疏救考功郎趙南星語侵閣臣遂落職調安吉州判赴任即投牒歸就邑西郊建志矩堂築八卦亭偕士友講肄其中而時過錫山與東林講席其論學一本於程朱諸新說與舊相盩者塞耳不欲聞嘗曰學在不事空言無求頓悟惟下學上達躬行君子是儒門真儒其訓子曰士君子能於羣譏衆詆時立得腳定才見堅貞能於尊官厚祿時回得頭早才見知幾能於主少國疑時看得命輕才見節槩能於從容談笑時解得急難才見才識能於淡泊冷寂時無歆想心才見志趣能於風波震撼時無驚恐念才見器度汝曹識之當沈一貫以妖書加害沈鯉極力周旋得脫於禍人髙其誼自解官歸講學之暇巾車櫂舟追逐雲月若未嘗有牽連左官之纍優游二十年以夀終後逆璫以其曾救南星也指為東林矯㫖削籍崇禎初乃復外史氏曰儒者之學天德王道而已先生以志矩名堂志乎天則也志乎天則而天德全矣天德全則成真儒而非徒從事語言文字之儒也讀先生願學齊述觀先生立朝直道自是儒之真者矣薛敷教傳薛敷教字以身武進人幼侍祖方山與聞濓洛關閩之學長而與顧憲成髙攀龍締交互相參討學問益深萬厯己丑成進士觀政時會御史王藩臣上疏不白憲長都御史吳時來耿定向交參之敷教憤然起曰是欲為執政箝天下口也抗疏爭之甚力有平津曲學金陵險陂之語忤執政勒令回籍三年起鳯翔府教授尋遷國子助教時有詔並封三王具疏力諌復貽書王錫爵有東門黃犬追悔已遲之語錫爵恚甚然事因之以寢未幾京察趙南星因斥當路私人被逐敷教抗疏申救謫光州學正與士子砥礪德業一以道義相成州人熏其德者如在春風中尋丁母憂歸遂不復出日從東林講學苦自刻勵垢衣糲食出入不假肩輿止一蒼頭以隨中年婚嫁相續負郭殆盡知交中有諷其少通融於交際者婉謝之曰少秉一節老而渝之辱殆甚焉即同志所遺亦不受其有問病餽藥餌者稍嘗而謝曰行就木矣不敢忘當年矢志性至慈蠕動不忍加害其於人則油油與偕雖至俗客不作分別見獨耳目所及之凶人必翦之而後已至於解人厄揚人善終日孜孜常若不及平居每曰學茍不窺性靈任是皎皎不汙終歸一節又曰今人所以不甚講學者謂講學為欺己欺人耳不知不講學者都真心不自欺否機械變詐畢竟聞誠意之說而減靡麗紛華畢竟聞恥惡衣惡食之說而減自私自利之人聞天下一家之說畢竟不至十分損人害物講學何負於天下哉人以為至言年五十九卒學者稱𤣥臺先生私諡清端著有浮弋集泉上雜語續憲章録藏于家殁後天啓中逆璫引繩批根謂其曾救南星列之東林榜中頒示天下云外史氏曰先生嘗作真正銘云學尚乎真真則可久學尚乎正正則可守君親忠孝兄弟恭友禔身以亷處物以厚良朋切劘要於白首鄉里謗怨莫之出口毋謂冥冥內省滋疚毋謂瑣瑣細行非偶讀書學道係所禀受精神有餘窮𤣥極趣智識寡昧秉拙省咎殊途同歸勞逸難狃世用我兮不薄五斗世不我用徜徉五栁無貴無賤無榮無朽殞節逢時今生諒否必真必正夙所自剖嗚呼誦斯銘也可以想見其人矣安希范傳安希范字小范無錫人幼有夙慧弱冠登萬厯丙戌進士官行人當入臺省而格於年有諷以增年者希范曰安生不以臺省重也遷儀部念母老請南言者曰盍少俟共以銓部擬之矣希范曰安生不以銓郎重也竟得南司封會王錫爵當國多斥異已者希范上言近年以來正直老成之臣敢言之士俱不安於位如趙南星趙用賢孟化鯉人皆知其剛正而次第屏黜孫鑨李世達李楨雖才品不同而先後去國行人髙攀龍一疏竊以為皇上之忠臣亦輔臣之諍友而反䝉重斥於是人心公論不能無責備於閣臣願皇上嚴諭閣臣無植私黨疏入嚴㫖逮問上怒解削籍歸居膠山之西林適顧憲成集逺近同志講學東林欣然從之別掃一室讀書其中泰昌改元起廢詔下直臣遺老半入啓事希范恬然不之問猝聞鼎湖再賔驚迷痛泣者終日即命駕之吳興菁山營菟裘矢終焉之志嘗作詩寄憤有曰執簡定應書趙盾舉朝誰請討陳恆又曰受遺元老仍增秩進藥鴻臚也賜金一腔熱血見乎辭矣尋病卒年五十八天啓初贈光祿寺少卿學者稱我素先生平時與髙攀龍講性命之學攀龍曰性命微言與他人言多不解與小范言輒解每好讀書論事謂六經文章之祖經世之謨外此則溫公記事本末誠古今得失之林也後逆璫指為攀龍同黨入東林黨人榜中昭告海內削其贈官崇禎立乃復著有養心日劄讀書日箋荒政撮要武備私考文獻通考刪諸書藏於家外史氏曰先生天資近道類於陳仲弓郭林宗其人幸薦剡將及而先瞑耳倘不即死而從諸賢以起則正色危言其有不從楊左周魏諸君子之後者乎劉元珍傳劉元珍字伯先號本孺無錫人萬厯乙未進士初授南京禮部主事升郎中以親老引疾歸養者數年再補南京職方司郎中核假冒黜羸弱裁冗濫嵗省金錢二萬有竒時大學士沈一貫當國以楚假王事忮禮部右侍郎郭正域又以次輔沈鯉右正域并忮之刑科給事中錢夢皋一貫私人也遂疏參正域并及鯉於是楚王遂以為真而正域卒罷去妖書事起一貫思嫁禍於正域夢皋又直指正域與鯉所為引繩批根將一網異己者乙巳京察吏部左侍郎楊時喬左都御史溫純力持公道夢皋與其黨多麗考功法一貫蠱惑神宗謂京察不公盡復言官之黜者且留察典不下人心憤甚莫敢先發元珍乃抗疏曰朝廷磨礪一世伸正絀邪以端揆大臣無樹私交無作好惡無或朦上而箝下彰善疸惡一切聽之公評而佐天子持衡焉使人務節義而重亷恥於是君子道長而泰道隆不意今日乃有罔上行私如首輔沈一貫其人者又不意有頑鈍無恥如刑科給事中錢夢皋其人者夢皋推年例而妄奏求容掛察典而乘機建議壟斷如市士林不齒逮兩䝉録用濫被殊恩因此蠱惑聖聰猜疑部院并考察全疏亦中格矣臺省被察諸臣槩留中矣國家代守之典章屑越於今日朝野駭然僉謂夢皋之黨隂謀叵測將異日種種僥幸之門從此以開大可慮也夫使夢皋羞惡未泯亦宜驚彈射而斂跡胡乃猖狂自恣轉作風波駕言楚事含沙反射蔓衍何極僉謂夢皋之黨機鋒叵測將異日種種傾危之隙從此以開甚可畏也夫使政本之地不私一人則奸慝無壅於上聞邪謀亦安能下逞乃沈一貫實為戎首自秉政以來曾不聞佐輔皇上救生靈於塗炭者何事起忠良於擯扼者何人年來比昵僉人乖謬尤甚即如京察一事皇上豈有愛於夢皋而故昵之又豈有私於臺省諸臣而獨寬之蓋由一貫曲庇私人為術甚巧內則假公以朦上外則挾威以箝下既借皇上之權以伸其意復竊皇上之德以固其交頓令百年巨典忽焉決裂而皇上顧獨任其咎一貫生平機械畢露於此夫以輔弼之臣不能導皇上驅逐羣邪廓清仕路而反以身為叢奸聚慝之圖使守法者抑勒無聊席奧者髙張無忌將來誰肯為皇上觸權要持國是乎一貫之敢於欺罔如此敢犯清議而不顧如此有為之鷹犬如夢皋其人者將何所施而不可近見夢皋諸疏無不橫恣胸臆以黨名人從古小人未有不以朋黨之說先空善類而得羣恣邪謀者所關治亂安危之􅑆會良非細故幸皇上自為社稷計少留意焉疏奏神宗玩之不己意不忤也一貫及其黨經營百端謂不廷杖元珍議不可息適雷震郊壇竿木上懼反杖㫖繼而兵部主事龎時雍直攻一貫欺罔誤國有㫖元珍與時雍皆削籍而一時被察得留者亦免官其明年南京吏科給事中陳良訓御史孫居相極論一貫奸貪遂罷相而元珍摘奸之功為首歸十六年值光宗即位徵言事廢棄者起為光祿寺少卿是時遼瀋既沒舊贊畫劉國縉以招撫南四衛官民為名擁衆數萬入內投謁督餉侍郎令發天津登萊船南濟元珍上疏曰國縉為李成梁義兒狼狽相依種害遼左成梁棄朝廷疆土國縉代為營賄幸免誅戮無窮禍本實基於此李維翰紅旗催戰玩寇喪師撫順失守楊鎬繼之密與李如柏主議和之䇿獨忌劉綎為當戶之蘭故令杜松出撫順布私人誘入伏中松與綎血戰以死一則寸骨不留一則合門碎首如柏為諸將領袖冷眼旁觀令箭之招適與凑合是兩名將與數萬官兵實鎬與如柏殺之國縉一當贊畫之任首疏力保鎬與如柏而反欲坐杜松以違制此何心哉國縉主用遼人冒帑金二十餘萬究竟所稱土兵三萬曾得其一臂之用否其贊畫行徑大率如此已而被參解任蹤跡詭祕不知東還以後作何勾當一任蹂躪屠戮之慘獨脫然於千鋒萬鏑之中直待河東盡沒河西危同纍卵國縉不後不先突如擁衆以入衆至數萬不為單弱況山東礦徒素號驍徑矢不外附國縉既能招撫四衛官民亦可收礦徒之用曷不就彼中糾合牽制以自贖從前之積孽而乃遽欲問道登萊天津竄處內地意欲何為況遼瀋之亡皆以降人為內應今數萬之衆保無奸細攙入其中果為國縉招撫者或別有指授亦不可知夫一國縉耳今日若能招撫逃亡昔日必不扶同賣國昔既惡其賣國而黜之今忽信其招撫而收之呼吸安危豈容嘗試自遼事發難以來猛士捐軀叛帥反噬今日震竦人心之機全在刑賞操縱刑賞之權全在果斷有如功罪已分彰疸莫決坐令戎行勝氣漸廢於廷議迂緩之中甚可惜也疏奏下部議覆部畏國縉之黨不覆也而兵垣請擢國縉為東路巡撫者則格不行矣未幾卒於京邸年五十一初元珍以建言歸也與顧憲成講學東林自喜得歸宿地又與錢一本為同善會表章節義優恤鰥寡有言非林下人所宜者元珍曰痌瘝一體如救頭目惡問其宜不宜也嘗有知交當路蘇之富民被誣陷大辟者投暮夜金元珍怒叱去之徐亷其寃密為雪理不令之知其不愧獨知如此平居以子路自負不使惡言入於東林講論稍涉附會輒正色曰毋亂我宗㫖聞謗講學者曰彼訾吾黨好名以為口舌其實彼之不好名乃專為決裂名教地也當東林為天下彈射元珍謂髙攀龍曰此吾輩入火時也無令其成色有減可矣後亦以東林追奪愍皇帝即位詔復其官著有文訣文衡依庸絮語三畏堂素業湖畔逸農遺稿外史氏曰吾聞先生之為人嫉惡甚嚴一佞人在其側輒如物梗喉間必吐之而後已蓋其所稟者剛德居多剛者天德之首聖人所謂無欲之剛也先生其無欲者哉錢一本傳錢一本字國瑞武進人萬厯癸未進士令廬陵以興起斯文為己任建王文成祠并祀鄒文莊諸公延禮名儒倡明絶學擢御史首疏糾前按臣祝大舟貪黷不法得㫖逮戍舉朝肅然又請祀羅倫羅洪先陳真晟曹端於學宫已巡按廣西方行部聞冊立皇太子改期乃上言曰父子至親長幼有序陛下之明㫖也今皇元子年已十齡不出閣講學愛而不勞非親也元子母與諸妃伍而弟母皇貴妃反出其上母以子貴弟可加兄非序也且陛下欲法肅皇帝乎肅皇帝建儲在嘉靖十八年今已逾二年矣皇貴妃恩禮過於中宫日萌奪嫡之心皇元子與皇諸子章服不別名分不正傳聞陛下曾失言於皇貴妃因執為信以要陛下此皆肅皇帝所未有也陛下惡諸臣激擾一人言之則故遲之一年既而又一人言則又遲之二三年必使天下無一人敢言者庶得曲就昵愛之私不思國本動搖周幽晉獻之禍可以立睹疏入留中踰三月給事中孟養浩亦以國本為言得㫖杖養浩并革一本職歸里杜門絶跡公府郡守歐陽東鳯建先賢祠傍構經正堂共推講學時宜興有明道書院史孟麟主之無錫有東林書院顧憲成主之三人往來講習四方士大夫興起者衆於是小人害正指為朋黨一本講習如故若不聞者嘗曰不見是而無悶不見知而不悔正吾輩得力處也居恆自省有曰既戴天履地而為人當參天兩地以有事又曰心術中有許多淫樂慝禮聰明中有許多亂色奸聲身體中有許多惰慢邪僻之氣且去細細查考生平無他玩好獨心於六經濓洛諸書下至天文地理無不披究而於易學尤深曰易者象也象也者像也作像鈔又歷叙儒學正傳為源編滙編自出心得勉人學問為黽記每過東林會講學者翕然從之羣稱啓新先生年七十二卒天啓初贈太僕少卿外史氏曰先生之易學最深蓋人但得之於辭先生則得之於象朱子有曰於言上會得者淺於象上會得者深先生之於象得之深矣自像象管見及像鈔出而學易者有所歸止功亦巨矣哉李復陽傳李復陽字宗誠江西豐城人萬厯癸未進士授無錫縣令蒞任編役最均催科有法戊子己丑嵗凶加以疫癘捐俸出鍰以蘇民困循行阡陌訪問疾苦鄉老莫不樂親焉向為江右李見羅門人傳止修之說至是與顧憲成講學黌宫時髙攀龍年方二十五往聽之躍然喜曰吾學其有興耶後乃相與開講席立文會朔望紳士畢赴三年四境大治升吏部與憲成同佐計事以考功郎趙南星降調同憲成上疏略曰頃者皇上切責吏部專權結黨趙南星降調外任臣等與南星生平以道義相期許及在同部又以職業相切劘惟兹內計之典始而咨詢繼而商確臣等皆與焉今南星被罪臣等獨何辭以免伏惟皇上擴天地之量垂日月之明念南星自謀則拙謀國則忠還其原職以示任事者之勸無徒快被察諸人之心倘始終以為專權結黨乞將臣等一併罷斥無令南星獨蒙其責不報其切直如此歷遷通政司左參議卒學者稱元沖先生後崔魏以其疏救南星斥為黨人削奪崇禎立乃復外史氏曰先生令無錫而四境大治其功業至今猶能追道之也至於立朝以讜言進不捷邪徑節介著於一時非得學問之正曷至此周孔教傳周孔教字懷魯江西南昌人萬厯朝進士初令臨海以循卓徵入為御史適趙南星論時事忤當路其客諷孔教糾之不應吳比部徹如特疏彈之時臺省官閧然起曰言官論人者也非論於人者也奈何壞我體面將合疏排焉孔教又與萬二愚諍止之曰若如是攻擊則禍在國家矣史奉常玉池應召而北時孔教為督學約玉池偕許京兆少薇啓諸執政請行東宫三禮久之執政議欲先大婚而後冊立乃與王銓部淡生力言其不可而止及巡撫江南政暇過東林率諸士大夫講正心修身之學明程朱之正他如舉劾各屬賢否請停織造浮派諸疏言言痛切至於戊申救荒一事尤為披瀝肝膽哀痛迫切一字一淚有令人見之而不忍讀讀而不忍竟者其為政惟虛衷下物孜孜求善常若不及朝有告焉朝而行之不俟晝矣晝有告焉晝而行之不俟夕矣凡此皆其一片精神所注非僅僅指陳是非條畫利害間己也與顧憲成髙攀龍為石交每事咨詢以是善政滿江左後晉秩總河三吳諸父老日夜竭蹶北走相與呌閶闔乞直指為特疏以請上不允特加慰勉一則曰大得民心一則曰久著勞績命下促赴河任遂行後逆璫斥為黨人削奪崇禎初乃復外史氏曰吾於先生之為政而知其所學之正矣周官有云學古入官議事以制政乃不迷先生之政至今百姓猶追述其德不休至於講學東林後之人亦有追蹈其跡而邀譽于一時者不足為先生重也歐陽東鳯傳歐陽東鳯字千仭湖廣江人萬厯己丑進士官戶部出為常州太守政績懋著為有明三百年來循良第一下車即倡學甲辰書院成為文以記之其略曰楊龜山先生者固程夫子所目為道南者也晉陵之有宋儒學也自龜山始也其言云人性上不可添一物堯舜亦率性而已嗟乎世皆以新會之自然姚江之良知為第一義而究其所以實非于人性上另添一物也主敬主此窮理窮此亦非於率性外另為一事也何必曰千古祕密至今日始泄幾欲閏宋儒之統哉余為此懼私心時時念之幸而有人焉超然反其所自始相與聨集同好恢𢎞遺緒此其尊德樂道又非第泛涉其涯而已倘宋儒之學因是以張於晉陵而大明於天下滔滔世道亦且因是以有綱維而不至於端引防潰之患其所補寧小小也故特著其說以俟後又建傳是堂於毗陵以講學建取斯堂於先賢祠之東與多士論學取魯多君子之義任滿擢潁上備兵勤勞稱職數載致政歸朝命再辟堅卧不起乃得佳壤於豹湖之濵而穴之曰此豫之所歸也築室焉顔曰夕可杜門體道於中使友人問夕可之說於髙攀龍攀龍乃作夕可說應之又數年卒學者稱宜諸先生後逆璫毁書院見其碑記斥為黨人削奪崇禎改元乃復外史氏曰先生守常州以學為教化而合郡漸之迄今猶有流風遺韻焉及見時之將晦遂歸林下再召不起可謂知幾之君子矣潘永圖傳潘永圖字君懷金壇人幼嗜學切求程朱正脈聞白沙新建之謬因走梁溪求正于髙攀龍攀龍與之講論纍日遂有得而歸崇禎元年成進士授戶部主事轉員外郎中與黃道周劉宗周相友善時小人目為東林餘孽及溫體仁為相欲逐清流作蠅蚋録而以永圖馬成名為前鋒使者每言于上曰門戶之害將亡宗社若不除之恐禍蔓矣幸思陵不聽故難不作永圖在戶部管太倉銀庫能釐剔奸弊屏除扣減陋規尚書輩交口而稱其能初思陵誅逆璫魏忠賢委任士大夫而士大夫率皆推諉避事思陵傍徨四顧無可當意者於是復稍用中官為耳目戶工二部至設總理太監張彛憲攬權驕倨凌侮士大夫部臣皆為之下永圖獨不屈出為歸德知府流寇犯商丘守備喬宇定約為內應引寇焚掠近郊圍城甚急永圖積薪署門與家人約曰設有不測舉火自焚日夜乘陴固守賊悉衆攻城益急文武吏相顧失色永圖舉止自如懸金購死士縋城下砍賊斬首數百殺其愛將一人賊驚顧遁去兵部上其功而中官張彛憲修前卻功不敘轉山東副使治餉通州當是時邊事告警巡撫總鎮提兵入援備兵使者以遷去人咸為永圖危之獨能拮据搘拄軍需無乏會巨璫盧維寧奉命總督永圖再持正與忤功又不敘以他事降調歸未幾起為遵化監軍道副使遵化轄喜峯大安兩路最為要衝至是三失守矣永圖親歷險要增置墩堡又創為據險設伏之議上之一嵗之中聮絡聲援拊循什伍綏輯潰兵聲名日振思陵積其前後功由監司超拜僉都御史巡撫順天八月受事十一月薊州陷明年二月以封疆重典論死當永圖受誅時人咸謂其受事日淺餉匱兵單事多掣肘非盡永圖之罪其回話一疏言馬蘭松棚兩路分隸薊州道界嶺報警臣率師東禦道臣鞠思讓私調尖夜聽㸃擅令戍兵分班尖夜撤則哨探誤而烽火失傳戍兵撤則臺牆虛而關堡失守臣雖欲堵之口外亦不能及又思讓誤用教官髙登庸攝薊州匿奸內應以致辰攻酉尅而臣所領將吏兵餉種種可以痛哭雖韓范在軍亦無如何僨事有人代為受過臣亦何辭焉死時年五十當是時有僉都御史馬成名溧陽人與永圖生同庚居同里同舉進士同擢都御史且同制至是得罪同事臨刑同日識者以為前定云外史氏曰嗚呼邊事之不可為久矣萬厯初年張江陵當國慎擇本兵妙選戶部當時戶兵二部皆老成久任而九邊文武大帥居正莫不嘗試嚌啜其材知之審矣則調和其間使內外一體故呼應無有不捷而推諉有所不可邊陲隂受其福自居正死而閣臣之局屢變户兵二部因之邊帥又因之始之閣臣一變而為謹願蓋避前人攬權之名而席其强盛之實雖拱手無為天下未至驟裂其時户兵二部多閣臣之所厚號膴仕顯官以體統軋邊帥而邊帥亦尊富自將置武備不甚講是壞之基也繼之閣臣再變而為險僞快意恩讎主張朋黨戶兵二部多其私人以喜怒御邊帥而邊帥救過不暇嗜進無己闒茸可以為賢覆敗可以為功是壞之成也繼之閣臣三變而為貪墨金幣惟恐不多恩䕃惟恐不廣交結惟恐不固欺蔽惟恐不深亂盈天下而取快目前以向背為朋黨以利害為恩怨其時戶兵二部特閣臣之外府耳以緩急難邊帥無事則以為溪壑有事則以為犧牲甚至歸騎飽揚邊臣麋爛而內閣方以廟算論功晉官受賞以至封疆危殆言路喧呶大農中樞視履官如傳舍誰秉國鈞不自為正大壞至此一時所為督撫者直往而承罪耳豈不痛哉自萬厯癸未以後崇禎甲申以前其履霜堅冰淪胥及溺之狀真萬世龜鑑也總之朝廷一用閹宦天下未有不亡者三代則無論已亡秦者閹寺也亡漢者閹寺也於晉於五代於隋大半伏閹寺之禍也唐之亡非閹寺乎宋之亡非閹寺乎元之亡雖由獨用䝉古以專利要未嘗不由於閹寺也而明又繼之君天下者何為不悟哉嗟乎明之閣臣得以竊柄者無不由於閹寺也況內外皆用之哉其亡也宜矣東林列傳卷二十一
