body:
  text: 東林列傳卷七江陰陳鼎撰明賀逢聖傳賀逢聖字對陽江夏人少與同邑熊廷弼齊名督學熊尚文竒之曰賀夏瑚商璉也熊干將莫邪也後皆如其言廷弼領解額逢聖下第尚文召慰之許為膏火資逢聖毅然起立曰某即幸雋不敢負生平竿牘戒况不第乎尚文益歎服萬厯三十一年舉於鄉屢上春官不利循例署應城縣學教諭刻苦亷儉以作人為己任日率諸生講程朱之學及義利公私之辨嘗語人曰生平無一事足報朝廷惟寒氊七載實心實事庶免素餐耳四十四年登進士第二人授翰林院編修歷中允國子監司業與鄒元標趙南星等為首善之㑹逢聖故與廷弼不合王化貞失遼陽廷弼同逃入關並下法司楚人梅之煥滿朝薦等白廷弼寃疑逢聖不與逢聖曰詎可以私嫌廢公議援筆屬草淋漓慷慨人皆稱其公然廷弼卒論死先是楊漣劾魏忠賢二十四大罪既下獄死忠賢憾楚人甚已并殺廷弼楚士斥逐無虛日獨以逢聖清望好語之曰各省直建立生祠惟貴鄉湖廣實無功德逢聖對此地方官事非某所敢知忠賢又言聞上梁文出公手何謂不知逢聖正色曰此借銜耳忠賢默然遂借南京主試推未當矯旨削奪歸崇禎改元起原官升南京國子監祭酒尋進少詹事協理詹事府事丁父憂服闋歷升禮部尚書八年拜東閣大學士進文淵閣申救詹事黃道周與首輔張至發議多忤遂請告歸十四年與周延儒同再召用延儒盛輜重具供帳所過餽餞迎謁逢聖扁舟遄發關吏物色之不知誰為江夏相公也比至又與同官蔡國用不合復引疾求去六月帝御中左門召見諸輔臣逢聖時已得請復被召同入觀德殿賜坐逢聖伏殿大哭久之駕移中極殿輔臣亦隨侍復大哭命之出乃叩首辭大哭不絶聲見者怪之莫喻其意陳演言逢聖慘動天顔無人臣禮然帝不問亦不罪也十六年李自成陷襄陽總兵左良玉退保安慶而張獻忠乘間破廬州及蘄黃諸郡遂犯武昌巡撫戴良暄惶懼無人色逢聖方家居或請易他服逸逢聖曰見危授命識之久矣急進箋楚王請出帑金募戰士不允㑹監軍道王揚基擢撫鄖陽遽移營渡江兵益薄賊破漢陽門執楚王投之江逢聖與參將崔文榮守武勝門文榮被槊死賊傳令必完賀相公否者斬逢聖歸家將自裁卒至傳賊將意逢聖叱曰我豈為賊苟活耶冠服北向叩頭赴滋陽橋水死時盛暑尸數日不變後贈太保諡文忠外史氏曰先生痛哭殿前豈有他哉於時有不能措一辭置一語者矣惜乎帝不悟也而在廷諸臣無一悟之者是盡鬼乎盡蜮乎盡木偶乎盡犬豕乎彼陳演之豺狼猶曰無人臣禮何其憒憒如是耶嗟乎嗟乎至於殺身成仁在先生分也余何能贅一辭焦源溥傳從兄源清焦源溥字逢源一字涵一陜西三原人少喜學問談名臣節義事輒慷慨色動登萬厯四十一年進士歷知沙河濬二縣考最召為四川道御史服食儉甚左右苦之笑曰不聞長齊御史乎纍上封事嘗論戒逸欲曰陛下觀於御馬可以求御民之方監於使舟可以得使民之道㑹家艱歸天啓四年起補江西道御史羣臣聚訟三案忠奸混淆源溥抗疏請明綱常其略曰人情意見或有異同綱常必無二理請平心以質之光宗為神宗之元子為元子者忠則為福藩者非忠孝端孝靖為神宗之后為二后者忠則為鄭貴妃者非忠孝元孝和為光宗之后為二后者忠則為李選侍者非忠此不待辨而明也鄭貴妃逆謀從前未著至張差梃擊事發禁門蹀血之禍迫在呼吸尚忍言哉况當先帝御極之初突傳神祖封后之命請封未遂而冶容並進遂致升遐今即勉寬貴妃始終恩禮以慰神祖之靈以述先帝之孝而鄭養性之都督不可不奪也至李選侍不過一宫人耳非貴妃比使無失德於聖母陛下原無夙嫌則推先帝之愛自當特加優厚臣恭誦陛下近諭所云凌虐聖母推阻陛下又有臣子所不忍言者今即欲為選侍乞憐曲宥前辜量加恩禮而移宮始末公卿大臣同與此事必不可得而抹殺也且崔文升李可灼不處極刑借廷尉持平之說開凶豎漏網之門刑部尚書黃克纘不得而逃其罪也又有疏救東林曰東林講學明綱常名教也今以為邪黨而逮之是欲毁綱常敗名教陛下執何道而治天下乎危言正論天下爭傳四年巡按真保例遷潁州道副使而以崔文升監視潁州欲甘心於源溥遂移疾歸崇禎二年閹黨既誅起改山西分守河東道遷武寧參政升本省按察使七年擢右僉都御史巡撫大同簡練將士治兵械城堡誓圗滅賊是時邊事日棘兵既缺伍又逾年無芻餉歲且洊飢民無糠籺至淘馬糞以食源溥亟請蠲賑增兵調餉上六事屢疏不能應乃自劾求去而監視內官魏國徴猶托論其不職坐罷歸裒所撰奏議詩文為逆旅集曰吾旅人也得休田間幸矣十六年冬十二月賊陷西安源溥被獲啖以總督脅降不屈則勒輸金源溥瞋目大罵曰瞎賊吾恨不能生啖爾肉安從得金速殺我毋多言面故黑多髯時人目之為黑焦至是鬚髯皆上指罵不絶聲拔其舌支解死年六十三從兄源清字湛一萬厯三十五年進士除戶部主事出知廣平府舉卓異天啓間歷副使參政崇禎五年纍遷右僉都御史巡撫順天宣府七年九月以萬全左衛失守奪官謫戍久之家居城陷抗節不食七日死至今秦中稱大小二焦中丞而小焦源溥為尤烈一時同城死職者巡撫馮師孔按察使黃絅西安知府簡仁瑞長安知縣吳從義指揮使崔爾達秦府長史章尚絅同府死職者商雒道副使黃世清知縣則渭南楊暄山陽董三謨白水王無逸蒲城朱一統中部朱新鍱在籍殉難者吏部尚書渭南南企仲其子禮部主事居業從子工部尚書居益太常寺卿耀州宋師襄山東巡按御史王道純參政田時震副使祝萬齡僉事王徴封副都御史朱常德舉人朱誼泉席增光都司舍人丘從周凡二十四人其他府先後殉難及禦賊戰死闔門抗節死者尚數百人嗟乎皆不可得而考矣外史氏曰焦氏兄弟固秦人也然與東林諸君子同鼻息觀其立朝侃侃視死如歸雖死有先後而與楊左諸公並烈矣胡守恆許文岐列傳胡守恆字見可舒城人七嵗能賦詩舉崇禎元年進士授湖州府推官德清令某以賄聞巡按御史屬守恆密察之守恆舟楫往來未嘗私也令聞伺守恆出視事貯黃金菜甕中投入署守恆怒召令至曰吾不賣直彰人過亟持去令慚謝七年舉亷吏第一改翰林院編修明年充東宫講讀官與黃道周汪偉諸君子善以父老請告歸廬州連歲大飢人相食守恆倡議捐賑募漕督以下得米粟千餘石全活數千人時流冦四起張獻忠革裏眼等五營屯聚英霍山中旁掠楚豫淮南諸州郡十五年六月冦舒城守恆方家居率衆守禦凡七閲月賊晝夜圍攻射書城中購長鬚翰林千金或勸之曰公為賊耳目久矣割鬚易服疾入都當可免守恆曰我去顧令舒子弟獨死耶義不忍且遍地皆賊去將安之毁形以偷生吾不為也守益力舒將孔廷訓叛降賊賊入執守恆好語之曰汝守土官耶毋自苦守恆罵不屈乃以刃剸兩膝攢刺之洞胸而死漕運總督史可法上其事贈詹事府少詹事諡文節湖州民祀之安定祠復建樓祠旁曰忠孝樓許文岐字我西仁和人幼聰頴敏文章弱冠偕其伯父赴東林㑹講即有省曰讀書以利祿為者非夫也當向聖賢路上行乃可登崇禎七年進士例授北部以父官南畿便省覲改南京兵部主事督武學九年升員外郎歷職方司郎中方是時天下已亂冦盜充斥江北賊革裏眼等冦瀕江諸郡文岐從兵部尚書范景文調兵食疏薦總兵杜𢎞域十年出為黃州知府黃當冦亂後户口凋殘人多逃匿景文以南都根本地擬留之文岐不可曰事不避險臣職也慷慨登舟比至捐俸製火器嚴斥堠募丁壯集父老諭之衆皆感泣未閲月賊至遣騎徐鳯常勝偵之伏兵以待賊方食炮發倉皇奔潰射其前鋒一隻虎殪之奪大纛而還與郡人梅之煥耿應衡聨絡各鄉堡賊聞不敢近獄有重囚七人久繫文岐命歸省尅期就獄皆如約至乃詳請釋其罪為七義傳記之十三年大學士楊嗣昌視師薦升下江防道副使駐蘄州蘄臨三塹乏守具監軍推官楊卓然撫張獻忠於城下見者寒心文岐練卒伍峙糗糧賊遣其黨張雄飛潛渡將南下文岐偵得實獲雄飛立遣遊擊楊富馳田家鎮焚其舟殆盡賊不能渡楚撫宋一鶴上其功蘄副將張一龍馭兵嚴文岐重之當共宿帳中中夜呼噪聲四起文岐曰此必奸人乘夜思遁耳堅壁不出質明叛兵百餘果奪門遁一龍率兵追獲立斬之一軍肅然楊富既久鎮蘄宋一鶴復遣參將毛顯文至不相能兵民洶洶文岐㑹二將以杯酒釋之各戢兵民始無患愍皇帝數召對大稱文岐才推鄖陽巡撫未拜命荆襄失守左良玉潰兵南下長江數千里民居商艘焚掠略盡文岐立馬江口迎之兵莫敢犯時諜報日急人無固志㑹升督糧道客曰公今可行矣文岐歎曰吾為天子守孤城三載矣分當死封疆雖危急奈何棄之命其妻吳率幼子奉母歸長跪泣别乃檄楊富毛顯文屯關廂為固守計㑹藩宗逐守兵不給餉兩軍漸解散而藩下都司郝承忠復潜通張獻忠十六年正月遂大隊圍蘄州文岐率甲士往來堵禦發神銃斃賊甚衆時夜將半天寒雪盈尺賊破西門文岐督軍巷戰雪愈甚銃火皆沾濕至關忠義祠諸將請渡江文岐曰封疆已陷吾何敢獨生自經樹下家丁楊第救之佩刀出復殺數賊力盡遂被執賊見之曰好許參政不愛錢愛百姓環擁見獻忠獻忠亦聞其名頗禮之文岐厲聲曰既被執惟速死耳獻忠怒命繫於後營時舉人奚鼎鉉等數十人同繫文岐密謂曰觀賊老營多烏合凡此數萬皆被掠良民若告以大義同心協力賊可殱也於是隂相結期四月中以栁圈為信生員王國統者嘗姦宦家婦為文岐所褫責心憾之至是亦與約遂以其謀告獻忠獻忠索之得栁圈召文岐曰吾破武昌當發榜安民君為我署之文岐知事露瞪目視賊取案上大硯擲獻忠曰吾頭可斷榜决不可押獻忠愈怒命引出至麻城縣三里坂文岐北向拜辭朝廷又南向拜父母甫再拜賊前連磔之遂死賊去士民收殮之面如生時文岐父聨樞從粵西解組歸道南昌知府龎某曰長公歿王事雖死猶生足賀不足弔也喪歸過蘄黃士民哭送者以萬計督帥史可法巡撫何騰蛟先後疏聞贈太僕寺卿給祭葬豫諡蔭一子入監讀書祀名宦鄉賢外史氏曰賊臣楊維垣凡十七疏斥東林為小人若見可我西兩先生皆東林人也一則不肯毁形以偷生至洞胸而不畏一則被執而猶思圗正至磔骨而不辭視維垣詐稱殉難置三棺於中庭挾二妾而宵遁半道遭讐家擊死者為何如耶信哉玉汝先生曰東林天下之材藪也豈可以等閒目之乎衛景瑗傳族子楨固𦙍文衛景瑗字仲玉陜西韓城人舉天啓五年會試閲三年補殿試與高攀龍楊漣左光斗交最善既授河南推官以亷明為巡撫都御史范景文所器重用卓異徴遂擢山西道監察御史首劾輔臣周延儒奸貪及銓臣曽楚卿救工科曹靖元等直聲大振出按畿南威惠並著以外艱不候代奔歸詔鐫俸一級服闋補原官轉河南道御史巡太倉巨璫曹化淳有所請託叱不顧兵部尚書楊嗣昌議加勦賊兵餉景瑗抗疏力爭謂天下安危視百姓利病邇者兵燹旁午旱蝗洊臻百姓病已棘矣奈何復加征以促之訖不能用御史王績燦吳執御吳彥芳俱建言被謫瑗疏請召還復不省㑹給事中傅朝佑李如璨劾閣臣溫體仁得罪下詔獄上召對平臺景瑗在帝前力請釋兩臣以作敢言之氣帝方寵信體仁聞景瑗對大怒禍且叵測而景瑗侃侃勿顧也降行人司正屢遷至大理少卿時周延儒復當國修前郤遂以右僉都御史巡撫大同崇禎十七年賊李自成東犯太原督臣王繼謨望風遁景瑗議調兵趨據雁門關總兵姜瓖觀望不肯行及賊攻寧武關守關總兵周遇吉數遣使告急又促瓖出兵瓖執不應且曰非我信地景瑗憤曰國勢至此何論信地同舟共濟正在此時傾槖不及千金出為犒軍費親率麾下赴援未行而寧武陷周遇吉力戰死賊遂長驅抵大同景瑗方督兵出城力戰而瓖內變開城門降賊衆大至景瑗兵潰衆擁景瑗入自成營或叱之跪景瑗不為動踞坐於地大呼皇帝而哭自成好謂曰吾清澗一民耳非有天命不至此君能輔佐我當益加君官景瑗瞋目叱曰吾仗節一方期滅汝而朝食肯從汝作叛逆事耶賊引之出顧見瓖㦸手罵曰賊奴萬段汝與我朝盟而夕叛我死决不汝宥越三日再擁見自成自成又好謂曰真忠臣吾將驛送汝歸景瑗曰國破何家可歸盍速殺我因出不意以頭搶階石血淋漓被面絶而復蘇自成竦然又命掖之出見賊黨無不大聲痛罵羣賊慍甚後三日驅至海㑹寺景瑗北向再拜曰臣失封疆死不足贖哭與繼母董訣遂自經死母與兩子皆從行賊聞亦不殺也甲申五月南中立國追贈兵部尚書諡忠毅廕一子錦衣衛百戶初景瑗在大同獨與分巡道朱家仕善至是同死於難楨固字屏君景瑗族子也少負氣喜談兵留心民事舉崇禎七年進士授開封府推官楨固與族父景瑗皆以是官起家又皆在河南其聲名亦相埒人尤異之時流賊剽掠往來無常村民扶擕奔走數十里不得至城邑多及於難因議築西關城處之間以事經南陽汝寧河南諸府皆量其地宜城者勸民加築且出俸金助之既成民呼為衛公城又舉城守事宜十三則奏記上官上官竒其材有警檄楨固與謀即戎服據鞍一日夜行數百里按視城壘修備禦所過扼塞險易悉識之以故賊不能犯崇禎十四年用卓異徴召對中左門力言今天下民窮半以兵半以歲諸臣惟戮力勦冦冦平則無殺掠之慘則時和時和則年豐年豐則用足是故平冦為足國第一要務擢雲南道監察御史首劾中樞玩冦謂中州為腹心重地河以南四藩封鼎建焉天下之物力萃於此天下之安危係於此若腹心不守將四方震動自河洛告陷已壞西方半臂所恃者宛洛扼西南之險為大梁作障而南陽又報陷矣闖曹踞陳項幾三月圍襄破葉勢必及宛此時撫臣居何地保督居何地禁旅居何地鎮臣居何地獨不能一為唐藩地乎此時督中州者丁啓睿也援中州者楊文嶽也鎮中州者陳永福也此輩終能了勦冦之局否若猶未也則亟議更啓睿受事未久朝氣堪䇿若永福者萬不能千里長驅臣恐以守汴者誤汴并誤全省也文嶽於冦陷南陽高臥杞邑察中州形勢賊自商雒入必犯嵩閿則汝州為要地自鄖襄入必犯南陽則襄城為要地自潁和入必犯沈丘自英霍入必犯固始襄城則陳州為要地若分額兵萬人為兩營一駐襄城以應南陽一駐陳州以應汝寧冦至夾城而陳靜可示犄角動可圗牽制是即所以為守汴計也不然顧汴則失洛陽顧汝則失南陽臣實憂之其明年出巡按畿南真定等郡數請蠲逋賦恤飢饉又請正驕兵悍帥之罪請革津遼米豆及俵馬之害又數檄沿河諸州縣安輯河南民避冦至者凡全活數十萬人事聞再留巡按一年十七年春李自成陷河東諸郡漸逼京師李建泰督師禦之上命凌駉與楨固監其軍割京營兵三百人𨽻之楨固行至真定聞昌平失守焚十二陵享殿欲還軍救援有旨命固守良鄉涿州既而京師陷疾趨保定挾一參將行至大石橋遇賊數萬騎與戰射傷賊帥賊少却已復益兵圍之楨固突圍出躍入井水淺不得死為賊所執初賊僞相牛金星故中州舉人嗛楨固理汴時發其惡幽楨固於獄欲殺之會自成兵敗西奔脫走入五臺山作絶命詞而死𦙍文字祥趾亦景瑗族子也崇禎四年進士授翰林院庶吉士歷編修司業中允左諭德侍講經筵時流冦四起海內騷動𦙍文方在里居十六年冬自成破西安全省瓦解𦙍文星夜赴京師慟哭言西土之危將延社稷次第上五疏備陳禦冦方略且請捐家所有以助軍需上召見𦙍文哭陳勦冦之謀請召諸將翼衛王室有詔褒之既而京師陷微服匿民間自成鈎索得之備加慘刑不屈已又乘間南奔督師大學士史可法開府揚州疏薦以左春坊左諭德兼兵科給事中監興平伯高傑軍西討傑疏薦吳甡鄭三俊金光辰姜埰熊開元金聲沈正宗等𦙍文繼奏曰臣嘗歎國家敗壞皆由在廷臣子全不務實昔年東林逆黨勝負相爭高者以有用之精神供無益之口卑者以立黨排陷之威為納賄招權之藉而其實東林多君子逆黨盡小人既相攻擊君子多敗小人多勝此中著眼底裏便知天啓朝足以鑒之矣惟朝廷明斷於上大臣虛懷於下略其所短取其所長則裨益時艱非淺也既而許定國襲殺傑於雎州又命以兵部右侍郎總督傑所部兵經略開歸軍務再兼徐揚巡撫我兵下揚州大學士史可法知府任民育總兵劉肇基原任兵部侍郎張伯鯨死之𦙍文與監紀主事何剛同赴水死外史氏曰天下事至崇禎末即周孔亦難於措手矣先生一門忠烈義不苟全得東林氣節多矣於此可以見講學之功也徐標傳徐標字鶴洲山東濟寧人天啓五年進士以忤璫故出知信陽州歷官鳯陽兵備崇禎十五年冬邊警告急保定巡撫革任擢標右僉都御史代焉明年陛見賜銀幣歸任愍皇帝念畿民罹兵燹之苦欲得其詳十二月復召見標詢之標曰臣自江淮來數千里見城陷者固蕩然一空即完城亦僅餘四壁物力已盡蹂躪無餘蓬蒿塞途雞犬音絶道途間曽未見一耕者成何世界陛下有幾土地幾人民何以致治帝欷歔泣下曰諸臣不實心任事以至於此皆朕之罪也標因陳車戰墾田事帝善之十七年正月賊已陷秦晉漸及畿輔加標兵部右侍郎總督畿南山東河北軍務仍巡撫保定賊窺真定標統兵力守先是真定知府丘茂華聞警送其家出城潜與賊通標執茂華下獄茂華夜與叛辨謝嘉福合謀遂殺標牒所屬州縣待賊數日後賊始以數騎來據真定隨直搗宣府入居庸矣福王南渡贈標尚書外史氏曰先生當人心渙盡之時而欲思赤手以回天意蓋亦難矣乃猶有奸人陰為助虐宜乎事不成而身先死也悲夫蔡懋德傳蔡懋德字維立號雲怡蘇州崑山人七歲讀大學便立志學為聖賢長能文雅不欲以文名日讀先儒語録得王文成書歎曰聖學淵源在是吾今知所宗矣萬厯已未成進士授杭州府推官有治行升禮部主事時魏忠賢用事建祠京師禮部尚書率諸曹謁賀懋德與同官翁鴻業中道托疾歸及三殿告成忠賢受上賞廷臣皆進級有差輒具揭吏部辭之言不敢無功受賞隨乞封光澤王差禮畢歸里築室奉母題所居曰不隨室以見志崇禎改元誅忠賢起官江西按察司副使視學政先是在禮曹於文成之學有所得至是頒拔本塞源論於學宫而一本於程朱立書院禮請鄒瀘水萬恆麓輩主之已則時蒞講席與諸生往復辨難著管見臆測數千言嘗登白鹿洞講孝經大義聽者感動咸謂鵝湖一㑹以後再見今日尋備兵嘉湖擒大盜有功盜平廷臣交章薦之以為知兵丁艱服闋補井陘道甫三月改調寧前時關外勢甚危即日夕訓勵將士識應時盛於偏裨中又與將軍祖大夀相勸勉時時稱說忠孝大義以感動之邊人大安而山東河南北直忽陷名城數十遂轉濟南道進山東按察司河南右布政使所在以亷能著尋齎表入京師遵諭陳言極言天下變亂日深戡定亟需經濟而經濟不本聖賢大道則見小欲速終不足以撥亂反治惟皇上精研大學一書以明德建皇極則揆文奮武何難焉又言自儒者正學不明執一自是多偏黨而不歸於大中至正天下禍亂實原於此上甚嘉之乃命巡撫山西特賜召對上謂孝經小學務遵㫖頒行以勵風俗對曰學無大小皆有裨治化然今日反亂為治當從大學提綱挈領最為易簡上是其言賜饌及銀幣恩寵有加至山西榜於門曰願聞已過求達民情於三立祠為講㑹聘名儒傅山等主之又立干城社以招竒謀異勇之士於是定譁兵討叛冦三晉安堵如故壬午九月京師以邊警戒嚴徴天下兵入援懋德即日誓衆屇行而奉㫖命防龍固乃於千五百里地扼關隘設烽臺布置嚴整匹馬不入境未幾賊陷河南尋入關三秦皆陷遂至西安掠榆林晉中所屬平陽汾州皆大震乃屬巡按御史汪宗友守太原獨提羸師三千日夜往來拒賊河上一敗賊於大慶渡再敗之於風陵渡又敗之於吉鄉渡相拒者四閲月太原告急宗友以書促之歸衛晉王乃親引千人馳入太原甫歸宗友出走而賊遂從平陽渡河而北矣賊遣僞使誘降輒梟賊使首竿之以令衆而以死封疆自責賊怒悉其衆五十萬抵城下㑹城下瘞炮以待賊至適營其上乃夜募壯士發炮殱賊衆無算賊益怒揮衆攻城越二日城遂陷懋德先草遺疏懷之至是授贊畫知縣賈士璋而身督麾下巷戰久之知勢不能支麾下士欲劫之以走不可徑下騎徒行入三立祠登堂北向叩首呼曰臣力竭矣敢一死以報皇上復再拜祠中諸大儒木主訖解腰帶自縊於祠之東梁從死者自中軍副總兵應時盛以下凡若干人南渡後詔豫祭葬建祠諡忠襄凡所官處皆祀名宦外史氏曰先生為學以致知格物為根要以至誠為歸宿以知及仁守莊蒞禮動為階級以發憤疑問深造自得為工夫故其臨大節而從容閒暇也嗚呼俾先生而不克成其事業者殆有天焉朱之馮傳朱之馮字德止號勉齊順天大興人為諸生時即見知於楊漣左光斗中天啓乙丑進士授戶部主事𣙜河西務却羡金辭魏璫殿工不悅斥為東林黨欲殺之不果乃謫理問遷行人司副刑部主事員外郎郎中升浙江僉事清軍山東參議齎表入京頓家屬於濟南俄城陷母妻自殺母死以正月二日自是每元旦後守母位啜粥飲水過十五日蓋痛母露骸半月方葬也廬墓三年服闋補山西參政壬午應詔陳利弊十二月升右僉都御史巡撫宣府嚴核將士劾庸懦補虛伍時坐明倫堂召諸生講學以激發忠義鎮兵譁辱餉司之馮出即撫定誅首惡七人尋推晉督秦督不果甲申春賊氛漸逼所至皆迎降兵部主事金鉉上疏謂宣府京師屏蔽請亟撤內監掣肘專任之馮忠勇必足辦也不報二月太原寧武大同相繼陷巡撫蔡懋德衛景瑗總兵周遇吉兵備朱家仕皆死之人心大震之馮率文武紳士設太祖位於城樓慟哭誓以死守諭軍民毋聽賊誘終淫掠汝前降者可鑒也督標兵禦賊炮矢相加兩書夜內監杜勳王承𦙍開南門迎賊入之馮轉炮向內擊賊已大至左右擁之行叱曰離此一步非死所遂易公服登北城樓縊死諸生姚時中者篤知大節儀範修整知監鎮有二心歎曰以死勤事者獨朱中丞耳吾當從其後亦死之之馮豫具遺疏勸收人心培節義收人心在愛民力愛民力在拔亷官又作書與金鉉别且戒子弟當讀經世書呂新吾呻吟語不可不讀疏上二日而都城陷之馮死時甲申三月十一日也福王時諡忠壯外史氏曰冦犯山西破城郭下郡邑朝廷親信內臣輒八騶迎降而先生獨慨然與城俱殉以報國家數百年養士之隆可謂不愧理學科名矣東林列傳卷七
