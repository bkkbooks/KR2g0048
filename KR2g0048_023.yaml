body:
  text: 東林列傳卷二十三江隂陳鼎撰明文震孟姚希孟列傳文震孟字文起長洲人弱冠舉萬厯甲午賢書居父喪哀毁廬墓竹塢三年未嘗見齒有真孝亷之目十上春官至天啓二年始成進士廷對第一授翰林院修撰時魏忠賢漸用事因禁講學興黨議正人以次竄逐震孟上疏言勤政講學之實謂君臣相對如家人父子則左右近習無緣可以蒙蔽且曰空人國以營私窟幾似濁流之投詈道學以逐名賢有甚偽學之禁疏上忤忠賢意乘上觀劇摘疏中傀儡登場語謂比上偶人激怒上傳杖八十輔臣救免降調未幾逆璫矯旨削籍崇禎改元復原官充日講纂修熹宗實録校對光宗實録副本請改定三案之誤其在講筵嘗講君使臣以禮力勸帝培養士氣推心感人勿徒峻刑法以啓猜疑講罷即傳旨釋刑部尚書喬允升副都御史易應昌於獄又講春秋宰咺歸賵言咺位六官之長而壞法亂紀自王朝始焉用彼相蓋有所諷也在春坊時疏劾呂純如羅織諸賢今藉奧援思借邉才起用吏部尚書王永光假竊威柄變亂祖制考選擯斥清才上命指實具奏永光旋罷厯升詹事府少詹事上知可大用八年七月進禮部左侍郎兼東閣大學士既與首輔溫體仁忤十一月遂罷初震孟講春秋稱旨已而引疾不允體仁語之曰行相君矣何避也其相也值體仁在告出不意驟命之震孟自恃特簡於體仁無所依附始入體仁有票擬必請正有改必從震孟語人曰溫公虛懷乃爾何云姦同官何吾騶曰是人機械甚深何可信也越數日體仁知其踈凡震孟票擬徑抹去不用震孟拍案大呼以諸疏擲體仁體仁亦不顧至是震孟吾騶欲以工科給事許譽卿補南京太常卿體仁與吏部尚書謝升難之升遂疏糾譽卿震孟票擬奪俸體仁不可震孟作色擲筆曰言官以去為榮即革職無害體仁遂揭此語入告與吾騶俱罷譽卿擊璫有直聲十年不調削籍以去而震孟清徑負時望入相僅三月體仁擠之不竟其用天下惜之十年卒於家福王南立諡文肅姚希孟字孟長吳縣人生數月而孤其母文氏徴明之曽孫女也希孟父歿文僅二十餘家故貧困於役希孟晬之日縣吏卒將之庭踞堂而嬉人皆憐之或以慰其母曰此兒吉徴也數歲頴悟異常幼即能屬文外祖父元發異之謂其子震孟及希孟此兩孺子皆不凡以故震孟與希孟舅甥如兄弟也希孟性至孝母課督之甚嚴甫成童而業大就與震孟俱為春秋大師老生宿儒皆自謂勿及希孟師事張世偉而友周順昌朱陛宣震孟弱冠舉鄉試屢上禮部不第希孟久為諸生年三十四始與世偉順昌陛宣同舉鄉試踰六年遂先震孟成進士執政將選為庶吉士希孟初以親老辭請於母而後應時學士劉一燝韓爌為教習師皆深器重之神光之際再值大喪一燝與爌同時執政希孟左右其間一時名賢布滿朝列給事中楊漣論劾崔文升侍疾無狀及力主移宫事皆希孟贊決之尋授翰林院檢討時漣以移宫事放歸與希孟慷慨言别矢禍福共之熊廷弼素與東林異而希孟深重其才於其被逮也出郊唁之慰勞良苦且為白之公卿間其後閹黨借廷弼以誣諸人蓋自此始也天啓二年魏忠賢與客氏漸得志殺王安文震孟始登第即以言事落職希孟所與遊及共講學者如鄒元標馮從吾王紀等先後去國廷臣以學為諱於是希孟亦奉母歸與震孟俱南居往來東林講學二年忠賢焰益熾巡撫周起元謂希孟曰賈彪云我不西行大禍不解公亦有意乎不得已仍奉母入都至則趙南星髙攀龍楊漣左光斗魏大中等相繼屏黜希孟入朝倀倀且惴惴也居無何甫同考會試而母文氏以病卒於京邸希孟奉喪歸至中途逆璫矯旨削籍抵家屏居墓廬絶葷血者三年朝夕哭聲震林木過者聞而悲之七年熹宗崩莊烈即位誅忠賢逆黨稍斥而柄國者猶持同異希孟與震孟等未即登啓事髙陽孫承宗貽書同邑閣臣李國􅕠乃召為左春坊左贊善尋進右庶子與震孟俱為日講官時韓爌復出為首輔奉詔定逆案希孟助之為多而楊漣左光斗周順昌魏大中等贈諡恩恤彛典備至凡政出自爌者皆希孟力也希孟在講筵四載厯升詹事府正詹事兼侍讀學士帝亦重之時咨訪政治得失是時周延儒溫體仁方迭用事延儒頗善希孟欲引之而體仁深險忌希孟英果時思以事中焉會庚午順天府鄉試希孟與姚明恭為考官誤取武生三人武生例不當入闈然責在提調於考官無與也體仁欲歸咎希孟乃票旨命覆試武生而以文字苛繩之遂謫希孟以少詹事掌南翰林院希孟既去猶時謫其講語於帝前懼帝復用之也蓋體仁之忮刻如此希孟至南京得疾請假歸歸二年而卒震孟入閣僅三月體仁亦以事逐之震孟歸而希孟病矣舅甥執手榻前依依靡間希孟卒甫十餘日而震孟亦卒外史氏曰文起在朝席不及暖而即被逐孟長入朝未久亦即被謫夫天未欲存明也故使其舅甥歷坎坷焉天欲存明豈肯使之遽亡哉許士柔傳許士柔字仲嘉常熟人幼聰慧父伯彥課授十三經孫吳握竒經諸書諷誦皆上口踰年卒業鄉黨父老皆驚異之萬厯末舉應天府鄉試天啓二年成進士選翰林院庶吉士四年授檢討持節册封楚王以父喪去崇禎初服除升侍講纂修神熹二朝實録管理誥敕歷升中允諭德後為左庶子掌左春坊事先是熹宗時魏忠賢擅政羣小持門户異同嗾忠賢命諸史臣輯三朝要典辨梃擊紅丸移宫三案伸邪説毁正論復改修光宗實録削其與要典抵牾者莊烈初元用中允倪元璐言燬要典而所改光宗實録如故少詹事文震孟疏抉摘之是時溫體仁當國與王應熊皆附會邪議者意難之震孟疏入錢士升為次輔擬諭禮部詳核同異帝御平臺手出震孟疏辨明三案是非帝力闢要典邪説體仁懼其改實録也隂沮之曰事久經聖諭申飭便可垂示萬古於是奉是非己明不必議改之旨應熊所擬也士柔憤然曰若是則要典猶弗焚矣乃上疏曰臣備員纂修恭閲皇考實録總記於世系獨略皇上娠教之年聖誕之日不書也命名之典濳邸之號不書也聖母出何氏族受何封號不書也此皆原録備載而改録故削之者也原録之成在皇上潛邸之日猶詳慎如彼新録之進在皇上御極之初何以率略如此夫臣同官震孟所言是改録所筆者也筆焉而不信天下萬世猶得按其説而正之若臣所言是改録所削者也削焉而不書是使聖朝父子母后兄弟之大倫皆暗而不明缺而莫考其於信史謂何疏上得旨謂纍朝舊例不必滋煩體仁復令中書官捧穆宗總記以斥士柔士柔抗章爭曰皇考實録與列聖條例不同列聖在位久登極後事編年排纂則總記可以不書皇考在位僅一月登選三后誕育聖躬皆在未登極之前不書之總記將於何書也穆廟大婚之禮皇子之生在嘉靖中故總記不載至於册立大典編年未嘗不具載也皇考一月易世熹廟之册立當書皇上之册封獨不當書乎體仁怒將劾之同列沮之而止士柔復上疏曰纍朝實録無以不書世系為成例者臣所以抉摘改録正謂與纍朝成例不合也孝端皇后皇考之嫡母也原録具書保護之功而改録削之何也分莫尊於正嫡功莫大於保聖當日國本幾危幸天心有所付託坤寧調護真孝慈之極則顧復之深恩史官不難以寸管抹殺之此尤不可解也疏上報聞如故體仁滋不悅會體仁忌倪元璐嗾誠意伯劉孔昭劾之并及士柔族子重熙私撰五朝注略事將連士柔士柔懼亟以注略進御帝覽而善之事得解尋出士柔為南國子監祭酒體仁去張至發當國承體仁指謀逐士柔高攀龍之贈官也士柔為行誥詞故事制誥皆屬詞臣惟贈官誥文屬誥敕中書職掌崇禎初褒恤諸忠誥詞皆出詞臣手蓋諸家子弟請之中書以為侵官故深恚時攀龍誥軸未給至是其家請補給仍以士柔所撰詞進帝方申飭言不得用駢儷語中書黃應恩摘制詞語告至發至發喜即以撰文違制劾之遂命鐫二階調用司業周鳳翔為抗疏辨曰詞林故事閣臣分屬撰文或手加詳定或發回竄改未有徑自糾參者也誥敕用寶嵗有常期未有十年之後用寶進呈吹求當制者也贈誥専屬中書崇禎三年所申飭未有追咎元年之史官詆為越爼者也高攀龍純修正學皇上翦逆褒忠一旦毛舉細故舞文反使忠良色沮姦逆軒渠非所以勵當今示後世也疏雖寢不報公論韙之士柔尋補尚寶司丞遷少卿以卒子琪詣闕辨誣狀請復本官帝許之仍贈詹事府詹事兼翰林院侍讀學士士柔倜儻善應卒頒詔至南京中官運皇木梗道從人勢張甚士柔奉詔書鷁首已朝服侍其旁中官色沮叩頭去外史氏曰余讀仲嘉先生傳知體仁至發果魏璫之義兒也不然玉汝文起兩先生欲改正實録而體仁輩隂沮之者何耶嗟乎體仁輩直犬豕之不若矣按吳興席帽山人筆話載體仁與至發未顯時曾貸黃金各製飲器晉魏忠賢下鐫其名以父事之余猶以為惡之之辭耳及讀筆紀諸書乃知席帽山人之不謬焉成勇傳成勇字寶慈樂安人七嵗記萬言性端介喜聞針規惡嬉戲人號為成子路讀太極易通有會謂理學在實踐不在空言天啓元年鄉試第十明年會試䇿引宦官仇士良為戒主司歎曰戅哉又三年成進士方是時逆璫魏忠賢橫甚諸新進諷勇同往謁勇愕然曰吾儕進身始未能折檻陳言除凶監顧乃媚閹人要榮恥矣堅不往授饒州府推官媚璫者屬勇謂鄒元標東林黨魁也往當困挫之勇不應至則造元標廬請業焉會中使承璫差馳浮梁冶場治器過饒知府率僚佐郊迎勇不可中使怒索供具誶知府羣吏走匿郡騷動勇坐廰署遣吏捕中使諸從役笞之中使走署恚曰有旨有旨勇曰旨採冶􅯐耳詬辱二千石鞕長吏豈亦旨耶中使踉蹌去誓曰不訴上公撲殺此吏有如日勇聞之恬然亡何崇禎改元璫誅獲免凡三為理官所至出孝經小學及先儒語録進屬吏郡之士大夫發明其義曰吏治以講學為先任歸德冬月衣單夾有以貂裘進者峻却之流寇數十萬圍城下衆奔噪勇乘城誓衆曰宋州古睢陽張許風猶在乎今日勝則生不勝則死死生皆臣職耳率衆擊賊賊大敗遁去舉卓異第一考選翰林五日給事中陳啓新沮之啓新者故以武舉躋言路者也時帝御平臺咨羣臣時務楊廷麟等稱勇才品帝動容改南京監察御史會黃道周疏參楊嗣昌奪情攖怒不測勇上疏申論辭甚峻同官止之曰覆車不可鑒乎勇曰講學先明倫明倫先事父為人子而不知父又寧知有君耶此不言孰可言者得旨逮繫勇就道太學六堂生率數千人集江干哭送之下獄嚴鞫主使初訊曰天地鬼神主之再訊曰二祖列宗主之三訊曰周公孔子主之坐繫者三年日與道周以孝經易傳相辨析作詩遞唱和會大震電肆赦遣戍浙江寧波衛劉宗周張瑋汪偉等先後薦牘數十上起福建道御史不就隱居十五年獨處一小樓署一聫曰萬里風光樓上眼千秋事業榻前心著有程易發西銘解崑崙洞語録諸書而卒偕勇隱者鄉人張貴吾慷慨言事多竒中從勇遊患難不忍去共棲雲龕中好言仙一日寒風冽冽雪滿山谷勇與貴吾踏雪行望叢棘中一物徐視之則人也乃開目顧兩人曰公等來何遲耶相與坐樹下移時勇叩其名曰吾肅宗朝小吏耳見一顯者臨刑心痛楚不自得遂逃入此山中辟世因欲授勇導引法勇辭之曰子入山逃死吾入山待死耳士各有志不相謀也其人笑曰又三年清明之前一日其從楊左諸君歸來乎勇作雪中人記之至是果卒外史氏曰理學者洵在躬行實踐不在空言也先生歷仕宦履艱危一皆身體力行至死未嘗少懈可謂得理學之實者矣吕大器傳吕大器字先自四川遂寧人崇禎元年進士授行人六年擢吏部稽勳主事歷考功文選郎以終養乞歸張獻忠自楚流入蜀大器以邑城庳倡士民修築賊過天星等經遂寧見城堅不可攻引去大器慮賊復至募土著習弓弩火炮撫按上其事詔加一級十一年例轉陜西關南道參議明年升固原副使西安有劇盜穴長武山中巡撫丁啓睿檄大器馳剿大器用穴地火攻法盡殱其衆十四年調湖廣驛傳道參政旋擢右僉都御史巡撫甘肅甘州總兵柴時華者與前撫劉鎬郤賄鎬已復威脅之縱兵大譁至焚其臺門鎬返所豫賂加倍乃止鎬坐是罷去以憾死大器入境密陳時華諸不法狀請移之涼州己得旨奪時華秩以副將王世寵代之時華既解印忿之欲為變會其部將坐法當逮紿時華曰朝廷且逮君新撫軍陳兵涼境矣時華惑之帥親軍千餘出甘州保所築私莊遣使齎金幣結土魯番為邏者所獲鎮道馳報大器亟遣兵捕之以其事聞時華拒戰十餘日大兵日集土魯番不至親丁多降者時華知事敗大呼曰我誤聽人言至此欲逃死安所乎命舉火閣室自焚死時華西寧人世為將其下多死士叛聞之日舉朝震駭不十日捷至帝大悅十五年召為兵部左侍郎明年總督保定軍務周延儒以首輔督師軍潰諸將多陷沒惟保定軍獨全詔分别行間功罪晉秩一級是年夏張獻忠破武昌調大器應皖江楚總督命總兵李輔明馬科各以四千人聽節制時南昌告警遣部將謝騰雲李士元及左良玉兵遏賊於樟樹鎮大破之十一月復吉安及廬陵吉水十二月復茶陵醴陵奉詔與良玉平賊十七年正月調南兵部副尚書史可法治軍留都李自成犯京師可法帥師入衛大器署部事莊烈皇帝凶問至南中洶洶議立君未有所屬福王潞王皆避賊至淮上大臣意多在潞王鳳陽總督馬士英貽書言福王神宗之孫序當立魏國公徐𢎞業等集議朝內大器時兼署禮部主潞議不肯署右都御史張慎言詹事薑曰廣皆然之方列福王不孝不弟等六事貽可法及士英而士英已與南竄總兵高傑劉良佐劉澤清等歃血立福王矣連兵江北大臣畏之不敢違乃以福王告廟五月王監國南京尋即位士英入輔政出可法督師淮揚大器改吏部左侍郎給事中李沾以擁立功升太常寺少卿疏劾大器定䇿懷二心大器乞罷不許六月士英薦阮大鋮可任樞二豫冠帶召見給事中羅萬象御史陳良弼大理寺丞詹兆恆等交章言大鋮以欽案擬戍不宜召大學士高𢎞圖請下九卿議與士英不合求去大器抗疏劾士英挾重兵入朝靦留政地其子乳臭而都督妹壻手不寸鐵而總兵瓜葛之越其杰以軍犯而監軍附逆之田仰以久廢而侍郎逮問之楊文驄以抗提而職方膽大心雄目無法紀又云吳甡鄭三俊等臣不敢謂其無一事之失而清直剛介均係海內士民之歸馬士英阮大鋮輩臣不敢謂其無一技之長而貪鄙憸邪終為宗社無窮之禍語極切直不數日劉澤清入朝極詆東林遂劾大器為東林衣鉢真傳前撫甘肅以私忿殺總兵柴時華及受賂諸事大器連章引疾遂以原官致仕初大器佐南樞堅主立潞議與時忤至是慮後禍以親書告廟祝文送內閣其謝表有云赤眉銅馬合湊而糜爛神州檜賈溫敦接踵而橫居津要蓋指士英大鋮也末又言臣自此雲遊逺涉恐當事者誤以姓名逺瀆天聽致形蹤無獲臣不敢不預為請明人頗疑其橫九月李沾復疏參大器懷挾異心阻撓定䇿遂奪職命法司逮問大器己間道走栁州明年我師下福建執唐王廣西總督丁魁楚巡撫瞿式耜與大器等定議立永明王由根監國肇慶晉大器大學士兼兵部尚書與魁楚同典樞務內監王坤自閩至以司禮竊國柄魁楚深相結遂入相大器心惡之又與魁楚爭戎政不協屢引疾會永明王西出自請留守遂辭去由梧趨韶再至梧復返栁州入蜀召之不出先是偽將劉蔭率兵三千人歸永明王至是相傳王已死楚宗人朱容藩據夔州自稱監國諸將皆賀大器扺遵義守將王祥郊迎容藩亦使人以千金來迓大器北行過李占春營具言永明無恙容藩僭竊不宜受其爵號占春然之不復事容藩後敗走忠州為追兵所殺王祥綦江人素勇悍為九圍子隘官張獻忠之亂據有遵義諸縣自稱平寇伯晉忠國公後為孫可望所敗自刎死嘉定人楊展起家武進士亦據嘉定犍為遺民潰賊皆歸之衆至數萬人時蜀大飢父子相食展遣使告糴黔楚自縉紳以下至弟子員皆資給農民與牛種口食使擇地而耕願從戎者補伍百工雜流各以藝就食孤貧無告者廩之於是蜀賴以全活雄視一方自稱華陽伯顧性矜尚文墨不務攻戰至引賊自助卒為袁韜武大定誘殺併其軍袁武張獻忠故部曲也大器思用蜀人既歷諸鎮深為太息謂總督李乾德曰楊展志大而疏袁韜武大定忍而好殺王祥庸懦不足仗蜀事其可為乎遂之黔至獨山州疽發背卒葬遵義之九龍壩外史氏曰先生以皎日直矢之軀而與羣姦同事無異麻生蓬蒿中也安能一日容其直哉卒至安不終日而又皇皇奔走於苗蠻㸑僰之中希一申大義於天下至於死而後己亦可哀矣嗟乎此皆東林人物也誰謂東林邪黨耶金光辰金九陛列傳金光辰字居垣滁州全椒人崇禎元年進士授行人督餉寧關諭止譁兵之亂擢監察御史巡視西城獲營兵為盜者七人立誅之輦下肅清內使周二以姦殺人即移司禮監往捕周方值御前被收乞哀帝曰御史所執者祖宗之法朕何敢私卒抵罪由是益有聲六年命視太倉庫尋兼理新餉及節慎庫時流冦大亂中原用兵新舊餉增九百餘萬吏叢為姦帝用軍興法誅後期者不能應光辰請定條例鈎考事得就理五月京師大風電上言崇治體課實行明功罪預國儲端化原廣言路六事會給事中章正宸以紏新輔王應熊下獄具疏救之引陽城沮裴延齡吕誨論王安石為比不聽明年八月帝御平臺賜諸大臣筆札令舉堪任吏部尚書者吏部左侍郎張捷舉原任尚書吕純如帝曰此逆案中人也科道官云何光辰與御史韓一元等面斥其妄退復疏論純如之姦及捷乘機起用借題翻案之巧事遂寢十一月奉命巡按河南值嵗飢全秦流寇盡趨而東商雒伊汝淅鄧之間賊騎充斥光辰間道兼程以進謂豫鎮陳永福兵寡不足恃請以左良玉鎮河南而調曹文詔張全昌等分馳夾擊以壯聲援會良玉擁兵不進即疏劾之諸將皆奮已而全昌破賊於許文詔追賊於隨州祕陽皆大有斬獲賊兩逼歸德使祖寬陳永福祖大樂等先後擊走之乃請蠲賑被災州縣數十處民賴以蘇河南府推官湯開逺者竒士數有功光辰會薦於朝使監良玉軍嗣以建言被逮立奏釋之使辦賊光辰雖不典兵而善鼓勵將士凡地形險易兵力分合及剿撫機宜皆先期入告受事十五月疏凡至百餘上事竣還朝以疾乞休不允值邊警命分守東直門見時事日非陵京震動憤然上疏劾首輔溫體仁誤國又論督師楊嗣昌不職當逮問適兵部侍郎仇維禎奉命出鎮通州請留內臣杜勛為監鎮光辰復劾維禎身膺重任一籌莫展而先擁戴中官又摘其疏中如失怙恃等語以為羞士類而誤封疆頗極醜詆而帝方倚任中官越四日命九卿科道錦衣衛官俱至召光辰入出疏詰責甚厲光辰直趨榻前辨對不稍屈帝恚甚將行廷杖會是日風雷大作雨如注殿廷晝晦懼而止命刑部議罪先是光辰同新寧侯談𢎞業駙馬都尉鞏永固給事中張元始等守門忽聞召光辰衆疑將就獄皆錯愕失色元始對之出涕光辰顧笑且去禮科給事中馮元飈荆祚永密繕救疏伺不測則立進之良久見光辰出左掖門皆大喜爭往迎問光辰徑詣門上無所語張給事見而歎曰雷霆不懼寵辱不驚君其兼之矣然終以忤體仁部議降級有大璫使人招光辰曰皇上每言金御史才可大用但性急耳願一詣我可免也光辰使人隔垣謝之卒得降以去工部侍郎劉宗周方假歸在道具疏力爭亦奪職光辰在謫籍三年復召為大理寺丞纍遷至通政司左參議會有旨起廢即薦陳必謙許譽卿周鑣金鉉楊廷麟張采王相説詹爾選范景文方震孺金聲等十一人時崇禎十五年也五月帝以鳳陵重地恐重被寇掠欲以總漕都御史史可法改督鳳陽令諸臣各陳得失光辰進曰鳳督誠宜易若使易以漕臣是欲急而反緩也今闖賊已破歸德歷數程則逼淮革左獻忠盤踞英六歷數程抵揚萬一二賊相合漕臣乃欲從淮上以救二陵則已隔在外矣帝曰何謂在外曰潁亳接壤河南過壽州則為鳳陽泗州揚州此河南賊來之路也廬州既過則為全椒六合儀真揚州此舒廬賊來之路也今賊在河南及舒皖間若以數股由徐至淮以數股由廬至揚兩道交堵聲援斷絶漕臣豈不隔在外乎帝曰光辰言是也朕按地圖亦如此未幾遂升都察院左僉都御史時帝方以劉宗周為左都御史張瑋為副都二人同時被召臺中謂之三正閏十一月復召諸大臣對中左門令速議督撫去留語次諸臣遽請釋薑埰熊開元不聽劉宗周復申救之抗辨良久帝怒命候旨處分光辰進曰宗周之救二臣非為二臣起見也無非欲皇上為堯舜之主廣納言之美耳主聖則臣直一時不識忌諱語言過戅乞賜優容帝曰開元此疏定有主使必宗周也光辰曰宗周賦性硜直賔客不通二臣之事即宗周亦謂其不能無罪但在御前不覺以忠愛之心披納牖之益實從君德起見且宗周在事百務整理即近日皇上所頒憲綱日與諸御史申飭奉行前者同臣察理城守不避風寒其實老成可念帝曰金光辰亦著議處光辰復奏臣忝司風紀竊見宗周為人其在臺中即不動聲色人心亦肅若皇上留此老臣不但舉朝有所觀感即薄海內外臣民無不悅服如有一字之欺臣願甘斧鑕帝命光辰同宗周先出候旨宗周奪職光辰降三級調外自是臺中遂無人光辰亦再疏終養以父憂歸廬墓山中十七年三月闖賊逼京師光辰墨縗與禮部郎周鑣武德兵備使雷縯祚糾義旅勤王既聞城陷帝崩走南都哭臨三日即歸墓所五月福王立江南馬士英阮大鋮等當國以東林羅織諸正人興大獄鑣及縯祚皆遇害日遣厰衛卒伺光辰遂攜家避居丹陽湖不仕而卒光辰清操直節不下宗周生平對君告人無稍委曲朝士目為金赤子其論溫體仁楊嗣昌與內侍杜勛皆與帝意忤蹶而再起復以救宗周去及體仁以主使斥回嗣昌敗宣雲之失杜勛八騶迎賊而京城隨陷權姦閹寺之禍竟悉如光辰言金九陛字允納光辰叔父也光辰嘗受業焉為人博學慷慨好持大節領萬厯四十三年鄉薦久不第授經山中滁人皆嚴事之因過逆璫祠不下車巡按劾之罷去崇禎初起知棗陽縣始至即辨疑獄禱雨滅蝗民驚以為神時流寇方肆虐楚中戕州縣以數十計棗故介襄承之交西渡豐樂河東踰隨州溫峽口皆距承天顯陵二百里為極衝九陛增陴濬湟挑其邑中壯士得四百餘人授以兵仗造徑弩毒矢為戰守計邑有罏杯堰厄塞也率衆馳往築土城鑿濠引水環之伏壯士其中為縣城聲援而自以民兵擊賊於鹿頭店射傷其渠帥順天王遂破之賊凡十餘至終不能踰棗而南鄖陽巡撫盧象升疏其有護陵功擢南光祿寺大官署正轉户部主事已而寇大隊掠廬鳳間烽火連數百里遊騎逼江上南兵部尚書范景文急使九陛監浦子口倉護軍餉浦口城小而樓櫓不備乃多築墩臺積􅏳口炮具人持毒弩畫堞而守之賊知有備引去以功轉本部郎中𣙜稅杭州升廣西蒼梧兵備副使大破猺賊於鳳凰山威望益著時崇禎十四年也明年奉表入朝帝召見慰問賜銀幣復還湖廣上荆南道而鄖襄已陷楚中盜賊蜂起九陛間關赴任稍收復諸城邑撫定劉荒保燕子窩諸賊悉有功會三省合勦八排猺洞復以監軍治餉務事平總督沈猶龍薦九陛才將會推贛南巡撫而九陛年已七十矣病不能赴歸一年而有甲申之變以憂卒論者悲之外史氏曰思陵朝有材而不能用用而不能任任而不能久蓋由羣小叢集而不使正人一吐氣也兼之愍皇帝多疑致之豈盡由於氣數哉東林列傳卷二十三
