body:
  text: 東林列傳卷十六江隂陳鼎撰明王圖傳王圖字則之其先太原陽曲人徙耀州舉萬厯十四年進士選翰林院庶吉士授檢討在史館頎然以公輔自待時秦人布滿九列而圖兄弟尤矯厲特起與東林相倡和南北黨部之萌從此起矣圖守檢討十五年沈一貫當國有妖書之獄圖少嘗及其門援引古誼極言規諌一貫弗善也久之陞右春坊右中允掌南院還坊充東宫講官以右庶子掌坊事又四年陞詹事府少詹事久之以吏部右侍郎掌翰林院前後服官自宫坊歴亞卿皆不出詹翰資望最深萬厯中年黨論滋起王家屏沈鯉之後資地相偪謂可紹二人而大拜者咸屈指郭正域劉曰寜並圖而三正域逐曰寜逝物望漸屬於圖而小人之側目滋甚當是時孫丕揚為冡宰秦人也圖又秦人羣小忌而謀間之三十九年京察羣小造為假書以撼丕揚謂福清當逐富平耀州繼之秦􅎃漸盛於是紛爭遂起又顧憲成馳書救淮撫李三才或嗾丕揚發單諮訪廷辯淮撫是非以為鉤黨之計圖詫曰秦人與東林一網盡矣亟言於丕揚止之羣小知其所由解皆恚恨移而攻圖圖又與祭酒湯賔尹隙御史金明時素不職欲逃察典飛章首攻圖圖抗疏辯而劉國縉繼之鄭維芳又繼之秦聚奎且言今天下大勢惟有秦人而已更無皇上也論今天下人情惟有趨附秦人而已不知有皇上也祖宗二百年來考察大典本憑以黜幽也而秦人借以發抒私忿皇上五十餘年培植之太宰本託以程材也而秦黨借以壓伏人言又云王圖因明時鋤破其入相之路銜之刺骨至今而明目張膽扶同排陷夫沈一貫雖陽施隂設猶有憚天下公議之意圖則并此心而無之矣圖杜門求去上不許仍令主計事賔尹竟以不謹罷劉國縉徐大化張嘉言亦罷喬應甲王紹徽樂和聲外調明時聚奎落職諸附湯見黜者聚族而求逞於圖圖求退益堅言者持之益急乃抗疏别白極論賔尹所以被察與紹徽等所以媒孽之故移疾出國門求去疏前後二十上姑令給假又三年始以病子告丁巳内計羣小用事以拾遺中圖當時主察諸人並罷而前局盡翻矣泰昌元年光宗以講讀舊勞廕一子天啟二年起原官四年陞禮部尚書兼翰林院學士協理詹事府事逆閹難作削籍家居七年卒兄國萬厯五年進士官至兵部右侍郎巡撫保定子淑汴萬厯三十五年進士初授寳坻知縣即金明時所糾縱子納賄養交者也官至户部山西清吏司郎中再坐圖罷官削籍崇禎初詣闕訟父寃復原官贈太子太保諡文肅外史氏曰萬厯朝之小人何其多也不知祖宗何罪於天而天生此林林總總之奸邪以敗其國耶彼小人者䘮其廉恥腐其肺肝惟知有富貴利禄而不顧朝廷宗廟社稷罔惜忠良身家性命毒於虎狼矣則之先生方以公忠盡國而虎狼輩必欲除之而後快嗟乎先生至今墓草猶香白骨尚生而攻先生者天下後世無不唾之罵之徒遺臭於千古已耳李三才傳李三才字道甫陜西臨潼人後移家畿南之張家灣舉萬厯二年進士少負志節與南樂魏允貞長垣李化龍以名世相期許允貞為御史抗論閣臣張四維申時行不當以甲第私其子蹈故相張居正覆轍嚴㫖謫官三才以户部郎論救亦降東昌府推官自此聲名籍甚其在山東治尚威嚴擒捕大猾根株必盡二十年後民猶思之累遷督學卿貳二十七年秋以僉都御史總督漕運巡撫淮揚再加户部尚書是時朝政日弛朋黨角立播州朝鮮次第用兵礦税四出黄河決蕭家口三才獨厲風裁以聲名自髙因上疏曰明主不好利而忘國忠臣不先身而後君蓋利有大小義有緩急辨之早也臣自束髪登朝正陛下臨御之始郊廟必親朝講不輟用人未必賢而必才行政未必平而必勤庶官思奮百度具修國有餘粟民有餘食亦一時之盛也自火酉内訌而國費侈矣哱拜外叛而國用匱矣然此猶内事也不得不應之兵也未幾而日本之役興矣謂朝鮮貢獻邑也蜃齒勢也為屯兵鴨緑以為聲援可也為收復王京因而奏㨗可也為危亡不保即郡縣之亦可也計不出此驅袵席之赤子勤瘴海之外夷奪有限之儲胥填無用之絶壑勞師百萬費財百萬士民愁苦海内繹騷於中國何益哉如曰彼我衞也不救非以為仁乃實不足為衞矣如曰彼亡我隣倭也不救非以自保今九邉盡鄰敵矣如曰彼夙志忠順也取之非以為義然不能禁敵之不取也此失計之一矣未幾而播酋難作矣楊應龍之殺妻也此土酋之常耳土酋之事中國不治也計不出此欲繩以法始而議勦繼而議撫無何又勦無何又撫朝更夕改二三其政彼習見我如斯也睨然有輕中國之心而狡焉肆跳梁之志陷我城池戮我軍民刦我職官奪我疆界於是六郡之師以臨之雖天贊其決旋即殄滅而殺傷糜費亦略相當其終之勦是也其初之撫則非也勞師百萬費財亦百萬何故哉此失計之二矣乃天不厭禍兹者黄河又決非細故也非逺憂也國家安危天下治亂從此始也蓋治之而不必復其故也則泇河恐終不足恃漕運終不可濟京師萬衆仰屋待哺即使化沙磔為南金變瓦石為和玉民不能食也治之而必復其故也則百萬之費數十萬之夫將焉取之取於民而民不堪也取於官而官無應也興大役動大衆自古奸人資也所謂挑動黄河天下反也此一役國家之安危治亂也夫前之失計如彼今之大患如此即今太倉無二年之蓄九邊有終歲之饑小民皮骨飽於豺狼四海脂膏填於帑藏拯溺救焚出民水火轉危為安易亂為治無如前日奉傳聖諭矣故礦税旋復臣不必言弊政當罷建言終斥臣不必言忠良當收無辜復繋刑法當改臣不必言蓋聖心原無不照聖㫖原無不周故不避忌諱不顧利害歴陳國家所以受病之勢與所以致亂之機如此陛下試思之無聊之民尚可當此礦税否用人之日尚可棄此忠賢否積怨之衆尚可終此濫及否穆然深思毅然猛斷前所傳諭務在必行嗇在一念利在天下屈在一時伸在萬世旰食宵衣側身修行郊廟必親朝講必復盡祛近日之弊一還當年之美此猶救時良策尚得其半者也不報先是中人出筦礦税横行恣睢陳増在淮尤無狀三才直以氣凌之見則汗必沾背凡各税官無狀者令死囚攀為同盜捕而捶殺之移牒於増増莫敢誰何已又盡發其奸入告且曰陛下愛珠玉民亦愛温飽陛下憂萬世人亦戀妻孥陛下欲黄金髙北斗之積而不使百姓糠粃充升斗之儲陛下欲為子孫千萬年之計而不使百姓有一朝夕之謀試觀徃籍如此政令而不亂者未之有也及至於亂珠玉不啻糞土積累散於一朝悖入悖出失衆失國每誦斯言心寒魄散可畏也疏入又不報復上萬民塗炭已極疏亦留中乃自劾求去上竟允之時三十九年二月也一時南北臺諫交章保留御史史學遷疏尤切至比其才於管仲皆不報三才有姿貌威容敢言負氣淮揚為南北衝賓客所過傾心結納莫不爭赴其庭牢籠駕馭中朝舉動朝發夕聞上終用其言罷去陳增東南胥得安枕功髙名重頗見汰色時論欲以外僚直内閣如祖宗朝故事忌者疑為推戴三才於是工部主事邵輔忠給事中劉時俊御史徐兆魁喬應甲等劾其贓私數百萬出死力相攻擊三才盛氣陳辯不自引去而顧憲成自林居遺書閣部力為洗雪於是言者又乗間弁攻東林物論糾纒飛章鉤黨傾動朝野從此南北黨論不可復解而門户之禍移於國家矣方王錫爵之再召也密疏言上於章奏一槩留中不過鄙夷之如禽鳥之音不以入耳然臣下以此愈囂疑鬼疑神甚非國體其疏甚祕而三才鉤得之謂錫爵以臺省為禽鳥故言者攻錫爵不遺餘力又性豪華疑不為清流所喜而結客滿天下憲成之前譽言日至信其才真足辦國家矣或言憲成過淮上三才讌之常蔬而已厥明盛陳百味憲成駭問對曰皆偶然耳昨偶乏故寥寥今偶有卽羅列以此不疑其奢其操縱類如此三才旣留又以人言求去疏凡十五上不報請移徐州候代又不報遂登舟俟命始許之歸而置雙鶴書院講學其中家近畿南不乏奧援聲譽翕集輪蹄過從填溢街陌御史孫居相復薦之黨人虞其復用嗾劉光復李徴儀聶心湯等糾其用皇木侵官地削籍待勘於是三才遺書政府曰某與相公同里同學從無怨言不知何故必欲置僕於死地僕平生傲骨不喜媚人使今日可附相公何如始進之初附江陵以取通顯也當江陵秉政權傾人主威福不下分宜某以一新進士位不過一主事又非有言責也忠憤所激彈劾奸佞如視腐鼠全不知有權相全不知有功名亦全不知有刀鋸鼎鑊識見所至自行吾是而已豈有四十餘年砥礪一旦盡失之歟某自分必死何望有今日惟是膽大欺君之票擬試問相公清夜捫心安耶否耶嘗慨盧把李林甫之徒非不赫赫一時未幾而灰飛烟滅身死名辱徒貽萬世唾罵耳竟何益哉一時富貴可慕也千萬人指視亦可畏也一人私憤可洩也士大夫清議又可懼也一日行事可忽也史官直書天下後世公論更可虞也敢以書告天啓元年廷臣多薦三才下廷臣博議侍郎王德完力阻之而止二年遼事起樞輔孫承宗薦為經略詔起南京戸部尚書未任而卒三才所同志者憲成為東林人望稱為名臣允貞撫晉有聲以子廣微附奄隤其家聲化龍用治河平播功晉宫保以功名終三才獨遭彈射不得枋用亦以黨人之故云外史氏曰道甫先生豪傑而有聖賢之資者也當其在位時所行之事雷轟電掣雨注風飇令人有不可測者至於律身以廉居心以正不染簠簋不蹈邪徑所用吏皆才能之士其屬員於常俸外多資以金使之不貪結納贈遺以千百計蓋其善貨殖能運算獲息甚阜而人多歸之惜乎為宵小所忌假令予以大位勘亂治平未必非管樂之流焉余故曰豪傑而有聖賢之資者也陳于廷傳子貞達貞慧陳于廷字孟諤宜興人父一經有孝行鄉里私諡為孝潔先生母雷氏方姙于廷夢虎飛天門之祥及生而手足結毛成麟文襁褓中數起躍地不驚舉萬厯二十三年進士授光山知縣吏無敢以餽遺進厯任唐山秀水皆以治最稱擢授監察御史直言敢諫萬厯中年邊實漸墮士大夫舌戰内靡邊情驁不可制廷議未之覺也己酉四月正陽門災于廷抗疏論大政七八事因言邊事詆欺敵人繕精利假卑遜以緩我俄貢俄停俄衆俄寡出没如鬼神我邊計諸臣庚癸共呼奄冉歳月猝然有變何以禦之毋乃以宗社民生為僥倖後卒如其言嘗言給事中汪若霖鯁直不當黜又言輔臣朱賡挾私意逐諌官又言王錫爵黨賡又言職方郎趙拱極吳有孚輩皆兩相私人不宜處要地又言詞臣陶望齡顧天埈犯清議奉命巡鹽河東首言閹人張忠不法亂鹺政當罷又言鄒元標趙南星王德完皆直臣當召用巡按江西嘗言淮藩庶長子常洪謀不軌又言宗藩多庶代嫡死冒生幼讕長及詭養異姓糜祿食為宗蠧又言贑税宜節九江税璫潘相酷痡商舶商大譟于廷力言璫當撤又言并税亦當罷熹宗即位陞太僕寺少卿遷太常卿禮部尚書孫慎行請究紅丸集九卿臺省議闕下于廷獨力爭謂李可灼固有所主矣灼御醫乎非也疇藥而疇誤耶必謂誤則張差以癲脱并脱隂翼張差者成何世道前事已誤今又議減紅丸獄尤誤刑部尚書王紀以持詔獄不上削籍于廷倡言紀無罪不宜罷今以直言放紀紀得矣其如他日史臣執筆書曰天啓某年某月日罷刑部尚書直言王紀何後世必謂朝廷借讞佟卜年一事斥賢臣以恐喝臣下將陛下為何如主哉不聴久之自通政歴大理卿晉戸部侍郎又言鑄錢十議力劾司官乾鑄本者歲得數十萬緡再晉吏部侍郎冡宰趙南星相賀曰冡宰不足喜與公同官可喜也當是時齊魯之間攻道學者驟起借書院為端諸正人皆引避去而髙攀龍又劾崔呈秀魏大中劾傅應星羣黨遂合謀魏忠賢以難天下魏璫羽翼既成天下無敢難魏璫者楊漣左光斗至以身殉之而一時正人驅除盡矣初南星譴去于廷代視事魏廣微欲以私人代南星于廷面拒之而會推喬允升馮從吾汪應蛟忠賢大怒叱曰是三人者庸愈於南星乎于廷乃渠黨不可不急逐之于廷既罷與楊左同日出國門忠賢命騎四偵之于廷行李蕭然而止後又遣緹校逮之㑹熹宗崩乃免愍皇帝立更政舉遺老起南京右都御史掌南察時逆璫雖誅而奸黨猶在位乃與署察事戸部尚書鄭三俊等合疏言曰臣子致身惟奉一君以為大朝廷行法凡懷二心者必誅自逆璫竊弄威福輦下諸奸首先倡媚南中尤而效之於是遙奉魏忠賢為盟主近借太監胡良輔等為轉闗有建祠者有拜祠者有頌功德者有代驅除者有受璫薦引者因而有借璫速化者或雖無顯然獻媚之詞而身與祝頌之列或未奉摘叅褫革之旨而猶侈晝錦之榮在今日類夜行晝伏之蹤在異日恣覆雨翻雲之計若僅與溺職者同一處分非所以杜奸萌而肅計典也遂露劾謝啓光郭如闇何早李時馨夏敬承劉漢徐復陽魏豸胡桂芳張聚垣虞大復頡鵬葉天陛周宇李際明邵存性魏𢎞政葛大同歐陽充材夏之鼎等二十人而科道又交劾房壯麗張鶴鳴田仰張文熙孫國楨楊紹震彭惟城王之臣邵輔忠徐大化曹思誠徐紹吉郭増光劉廷元霍維華郭永厚吕純如馬之騏潘士良王應豸岳如聲丘兆麟等二十二人一時邪黨俱盡輿論快焉又三年陞北京都察院左都御史具疏辭不許拜闕謝恩畢退而告人曰于廷平生好言天下事官御史時則其職也熹宗拱黙中人有竊政者于廷即去言路亦當言今天子英明嘗疑臣下好名沽直更多言徒滋疑天子惟有勉修職業仰報萬一耳明年八月御史祝徽畢佐周以笞衞弁失上旨下都察院議于廷乃抗言曰陛下赫然留意武功欲激勵諸甲胄臣即薄譴兩御史未為過然天下將驕卒悍紀綱不立尾大之勢已見萌芽又摧挫法吏以長其焰恐益潰廢不可收拾將貽聖明之憂方大今日倘避激聒不一湥言為失職失職且負國老臣不敢是時天子意有所向于廷持之益堅凡五宣諭五不奉詔上怒又先是以草場災下御史潘倬獄以武闈下余文馬如蛟獄于廷各疏救之於是上責于廷庇臺員而輔臣周延儒素不悦于廷又從中擠之遂再削籍歸御史祁彪佳禮部郎周鑣推官湯開遠俱疏爭不報于廷事四主立朝四十年不為鍥急而見義必為有直無曲以敢言再削籍故海内翕然仰之與趙南星鄒元標髙攀龍等歸二年而卒福王立國追贈少保子貞達字則廉由任子官戸部主事愍皇帝遣中官分理部事卿以下無不順其意旨貞達獨强項不屈以誣搆下刑部獄謫順天府知事甲申徇國難死而季子貞慧最知名貞慧字定生天啓間逆閹竊國而逆黨作百官圖及邪黨天鑒同志㸃將諸錄依之以盡殺朝廷之士其間侍從之臣楊漣左光斗外于廷為之魁崇禎末阮大鋮作蝗蝻錄謂是東林後勁依之以盡殺天下之清流其間貞慧為之魁然貞慧雖為布衣而持尚名節與金沙周鑣貴池吳應箕無錫顧杲等善激揚名聲互相題拂衡量公卿譏刺執政幾如後漢黨人會崇禎十一年阮大鋮謀起用貞慧與諸人具掲發其事初魏忠賢伏誅阮大鋮以逆黨禁錮日夜謀於故相周延儒思起用延儒已許之矣而周鑣不從會宣城人沈壽民保舉入京首劾楊嗣昌並及大鋮大鋮始沮喪而貞慧等之掲又繼之於是大鋮恨次骨會延儒再相大鋮遣私人迓於虎丘貽以金爵延儒返爵曰息壤猶在然南都清議亦可畏大鋮曰廢籍馬士英某之化身也其可乎延儒諾之而去貞慧應試南都每酒後與諸人沸詬大鋮以為笑樂大鋮聞之益恨十七年三月京師陷南都立國馬士英執政阮大鋮驟起為兵部侍郎於是作蝗蝻錄大捕諸人周鑣雷縯祚下獄死沈壽民吳應箕等亡命顧杲與貞慧等俱下鎮撫司大鋮之意實欲借此盡殺東林諸君子㑹國亡乃止貞慧出而隠居陽羨山中後十餘年而卒外史氏曰嘗讀明太祖實錄見其用法酷烈多殺戮勲舊成祖旣攘建文之業又重戮天下義士忠臣且使其妻孥多入教坊則亦慘毒之至矣彼蒼豈不怒乎及其亡也多生小人以亂其國孟諤先生以王佐之才懷濟安之志而不能展其一籌卒為權奸所抑老死林下夫豈非天意乎汪應蛟傳汪應蛟字潛夫南直婺源人萬厯二年進士觀政部曹日從耿定向講學於世味泊如也授南兵部主事轉郎中引疾歸補南禮部郎中再移疾去居家究心性命之學與理學諸君子往還無間久之補福建按察使副使改四川提學副使山東叅政備兵易州按察使礦税擾民應蛟上言陛下所利在帑藏之私蓄而臣慮在閭巷之傷殘陛下所安在目前之無恙而臣慮在將來之不測及今不悟馴至天變人離雖復盡大地為黄金變河沙為珠玉而瓦解勢成天下事可勝道哉疏入不報倭犯朝鮮移備天津旋擢巡撫倭患弭改撫保定先是天津葛沽白塘一帶舊屬汙萊土人咸謂斥鹵不可耕間有濱河者稍藝菽豆畝獲一二斗應蛟獨以為無水則鹻得水斯潤若以浙閩濱海治地之法行之穿渠灌水可為稻田於是用其法於二處墾田五千畝畝收三四鍾凡得粟及菽豆萬餘石乃上疏曰天津當河海咽喉為神京牖戸見在水陸官兵凡四千人費餉六萬餘兩俱加派民間原無請給内庫欲留兵不免於病民欲恤民則無以給軍臣早夜熟思惟屯田可以足食今荒地連封接軫奚啻六七千頃若為之開渠以通蓄洩築隄以防水潦每千頃可致榖三十萬石以七千頃計之可得榖二百餘萬石此非獨天津六萬之餉可以取給即以充近鎮之年例省大農之轉輸無不可者因條畫墾田之丁夫與額税之多寡以聞得旨允行焉衞弁栁勝秋劉斯忠者誑奏畿輔可括税十三萬已得請應蛟言真保順廣等府非舟車輻輳地僅小民分地而集約期而市日中交易而退其貨不過米粟花布其人不過土著村氓陛下憫念元元豈忍以斗尺之嬴餘横加征斂原奏官虚張為利借公營私伏乞陛下念畿輔根本之地敕賜停止不報應蛟三疏力爭乃得減半時所屬旱暵應蛟發倉粟為賑䇿騎周行村野按户以給民賴之濟萬厯三十年陞工部侍郎予告歸天啓元年擢南戸部尚書尋改北遼蜀黔方用兵餽餉旁午應蛟言臣嘗讀史見漢髙帝與項羽相距滎陽數歲用師嘗數十萬而蕭何從闗中餽餉調發未嘗乏絶豈有神輸鬼運之術哉考其生平籌畫惟是養民一語髙帝稱其勞績曰鎮國家撫百姓給餽餉不絶吾不如蕭何夫給餽餉而先以撫百姓當時闗中施為可槩想見故能興漢滅項如運諸掌然此非漢髙蕭何之創言也大禹陳謨於舜曰德惟善政政在養民此堯舜所以致盛治漢髙君臣特暗合耳今國家值多難之時當匱乏之極勢不得不嚴催科然必以愛養民力為本因條奏愛養十八欵以舒民力三方布置議起需餉千二百萬應蛟力阻之廷議紅丸移宫二案應蛟責備元輔多與時議左廷臣有以為老不任事者天啓二年見逆璫漸用事乞骸歸加太子少保臨發疏謝陳堯舜敬修心學曰臣生平所得在是不敢不入告内引宋儒語以宦官宫妾為戒四年廷推吏部尚書璫矯旨以署部事左侍郎陳于廷為黨比革于廷職而應蛟等皆削籍又三年卒所著有中銓寤言彞語及海防撫畿計部奏疏俱行於世外史氏曰先生學宗誠敬不希頓悟士之遊其門者有莊敬日嚴之感里居謝絶一切常衣緼枲不異寒素當毁書院禁講學作黙識解示門人勉以力行嘗語人曰聖賢為道德豪傑為節義士夫為功名商賈為財利夫不能為道德節義而為功名已失却地步乃下為商賈所為可恥孰甚焉又曰在我者當如是其成與否有不可知吾知盡吾誠敬焉耳嗚呼非學之粹然曷至此倪元珙傳倪元珙字賦汝元璐從兄也偉儀幹修軀廓目廣顙旋頷口可容拳耳不及肩者寸與元璐同舉天啓二年進士初授祁門知縣以最調歙縣時告密蠭起奸人吳榮者人奴也告其主吳養春以布衣擅黄山利數十年坐贓九十餘萬株連徧郡元珙曰吾在必不使黄山為阱凡所以慰居民調緹騎者聲淚俱下歙藉是不亂明年工部主事吕下問至搜索遍竆谷勒富家子逼及嫠婦羣百姓不勝憤一夕聚萬人鼓噪燬院門必殺下問乃止下問踰垣去二百里至績溪元珙單騎往勞下問持刀哮曰今日必與公偕死元珙笑曰百姓已散身自就公死耳但願公歸告朝廷黄山瘠不能産金也下問怏怏去遂劾元珙挑禍慢詔書魏忠賢命逮元珙會姑蘇殺緹尉信聞乃中輟已而忠賢又使其私人大理寺正許志吉來督贓志吉故歙人而尤無賴自􅏳其鄉甚於下問元珙持益堅時逆黨許顯純已殺諸名賢志吉拜為假父蹈厲上下時時諷元珙為魏璫建祠元珙笑曰畚鍤之事須與百姓謀之今洶洶如此敢復犯乎志吉恚又將劾之會熹宗崩而止愍皇帝即位忠賢等伏誅而元珙以治行髙等入為監察御史首訟黄山之獄因發兩人奸狀奏上下問為民志吉論死元珙知天子方向用言官故言事日益鋭旣請召還忤璫劉宗周方震孺范景文耿如杞等百餘人又請逮治逆黨顧秉謙魏廣微霍維華李魯生門克新等三百餘人又發吏部奸弊劾文選諸郎吏又請慎名器無聴雜流以貲得官凡數十奏上皆是之未幾巡按江西先禮前哲而後視事時粤賊鍾凌秀等由閩武平突入贑州旋由贑犯吉安圍永豐撫臣移疾去代者未即至元珙以按臣攝兵事於是募丁健飭將吏繕城壕以五千人扼賊之背又結鄉兵分防鄱陽九江之間賊進不敢攻退無所掠於是大困又以兵少請召粵䖍閩三省㑹兵合𠞰先是標兵已破賊於黄牛岡復敗之於木湖及三省兵合遂大破之斬獲無算凡五閲月而賊平㑹有嫉之者竟不敘僅以修城功賚白金三十兩已而以御史督學南京而復社之事起初太倉張溥張采以文章聲氣結納於東南間為東林之繼有依附得名者輿論不無異同温體仁當國因惡諸正人欲借端刪除異已奸人陸文聲希政府意作蠅蚋錄約二千餘人皆海内君子也上言復社不治將為不軌上已疑之㑹蘇州推官周之䕫以漕事罷官湥忌溥等亦疏訐復社生徒妄立四配十哲名目皆溥與采為之宗而劉宗周黄道周附之上因下其事於元珙元珙故遲久乃奏曰諸士修立名節即矜激無所害上意稍寛而體仁以為黨䕶擬旨鐫職二級降光祿寺錄事元珙雖貶官心傷時事規切執政語甚激又云今閣臣分曹擬旨無主名有所逃責請令各疏名使明主得因事考其能否奏上執政大恚擬旨切責然上心是元珙言更令易擬凡三上不允上竟自降詔從之著其言為令閣擬疏名自此始而元珙亦以是病久之陞行人司副治益邸喪復以病歸歸又七月而卒卒之前十日陞光祿寺丞外史氏曰先生蔚為人望奈生遭末世當國如體仁者又盜賊為心刻刻以正學為攻時時以正人是戮烏能使先生得行其志哉嗚呼東林諱而復社興復社逐而朱明絶奈何若温若沈若周若陳諸相國讀孔孟書而稱科第中人竟同於食灰壤者耶陳幼學傳陳幼學字志行無錫人萬厯十七年進士授確山知縣確山少水利多荒蕪幼學教民墾田八百頃通河一百九十丈有竒省雜支銀六百抵正額三年民以殷富撫按上其績調繁中牟至任活饑民無算牟人德之縣南地多茂草不可耕幼學令投牒者必入草十斤數月草盡闢膏腴二十里又築堤十三道障河民無棄田其貧不自給者男一牛婦車一輛分木棉數十斤佐紡絍㑹年饑中牟獨無流殍幼學家故貧成進士又遲暮故其為人樸誠視吏事如家事經營纖悉初若煩碎久之皆切民身家出於至誠民亦欣然戴之七年進刑部主事歴員外郎奉旨録囚畿輔以矜疑釋者三百餘人遷郎中俸滿出知湖州府所司以織染羨金進立叱去之撲殺豪奴凌采郡人稱快大猾施敏楊陞横於鄉捕得杖殺之中書潘廷圭庇施楊為奸上其狀巡按御史竆治如律民為之謠曰公來如砲施敏埋窖公去如雷楊陞飛灰三十六年大水幼學召父老議賑勸糴立粥場與節推閻世科分董其事又置義田三百畝移饑民修塘就食為從來救荒第一在湖州六載遷九江副使以母老告歸家居十五年為東林長後起太常少卿不赴年八十四卒學者稱筠堂先生外史氏曰先生守吳興時政暇即與士大夫講性命之學執經問道者以千計至於政治之良至今郡人猶能道之不衰非徒恃區區語言文字之流也東林列傳卷十六
