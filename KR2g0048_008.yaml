body:
  text: 東林列傳卷八江陰陳鼎撰明范景文傳范景文字夢章號質公北直吳橋人萬厯癸丑進士當逆璫煽焰時景文請告林下凡東林諸君子遭逆陷害景文家去京師甚近無不使人隂為周全或走書當事力為排解如周順昌懸賕追比景文變産資之不足則遍告同志以為助及為執政莊烈皇帝惡臣下各持門戸言官多廷杖竄逐景文從容救解以此諸賢得不死者甚多所薦皆東林賢士奈同政者俱小人多掣肘居私室必浩歎長吁憂簇於眉無日開也甲申二月入閣冦逼召對平臺景文對曰聨絡人心堅守待援此臣所知他非敢議上曰君死社稷朕志已定卿言是也三月十八日賊攻彰義門太監已謀内應迎賊矣景文值宿内閣十九日早方詣中左門請見而宫人倉皇出走問之曰王太監隨駕南行矣遂趨朝房賊騎充斥家人勸易服歸寓瞷駕為去就景文曰駕出不與聞今將安歸紿之出朝房遂自經家人復入而釋之景文曰此非為我也因至五顯廟草遺疏畢旋賦詩有翠華迷草路淮水漲烟澌之句蓋誤宫人之言以駕出必幸金陵呼一家人隨至馴象所望闕再拜遥拜先隴顧家人曰翌晨收我遂投雙塔寺旁龍象庵古井中死年五十九妻某氏先縊死福王立南都贈太傅諡文貞我朝賜諡文忠外史氏曰先生當國命垂絶之時而拜相縦有經天緯地之才亦無如之何矣然而見危授命殺身成仁可謂能擔荷萬古綱常千秋名教者矣倪元璐傳倪元璐字玉汝浙江上虞人生而頴異弱冠舉於鄉天啓二年成進士選翰林院庶吉士尋授編修與少詹事黄道周同名時逆璫魏忠賢用事獻媚者至以忠賢享瞽宗配食孔子七年元璐典試江西獨以皜皜乎不可尚已命題逆璫恚甚會愍皇帝御極而璫敗故免海内益以此重之璫既磔死餘黨猶踞要津欲禁錮林下諸賢乃力攻東林又創為孫黨趙黨熊黨鄒黨之目以一網清流元璐憤甚抗章極論首為上别白言之其疏曰臣聞持世不平則隂陽之戰起論人失實則舉錯之道乖臣見在廷章奏凡攻崔魏者必與東林並稱邪黨夫以東林為邪黨將復以何名加諸崔魏崔魏而既邪黨矣向之首劾忠賢直彈呈秀者又邪黨乎哉夫東林天下之才藪也其所宗者大都樹高明之幟而或繩人過刻持論太深謂非中行則可謂非狂獧則不可其所援引者即不無非類要可指數而盡耳中實有謝華膴其若脱置黜陟於不聞泊然無營君子者也今曰邪黨則無不邪黨矣且天下之議論寧涉假借而必不可不歸於名義士之行已寧存矯激而必不可不凖諸亷隅自後之君子以假借矯激深咎前人於是五虎五彪之徒起而背叛名義毁裂亷隅夫頌徳不已必將勸進生祠不已必且呼嵩而人猶且寛之曰無可奈何不得不然耳充此不得不然之心將何所不至哉議者能以忠厚之心曲原此輩而獨持已甚之論苛責吾徒亦已悖矣末復言韓爌文震孟當用書院當復疏奏上未納而逆黨御史楊維垣力詆之元璐復疏曰臣前疏所陳正為臺臣楊維垣而發也陛下明旨一則曰天下為公再則曰化異為同三則曰分别門戸已非治徴而維垣必曰孫黨趙黨熊黨鄒黨陛下於韓爌則曰清忠有執於文震孟則曰起用而維垣必曰爌非賢震孟不良陛下事事公虛而維垣言言我見臣為維垣效忠告者大不圖維垣以臣為謬也維垣謂臣盛稱東林蓋以東林之推李三才而緩熊廷弼也亦知東林中有首叅二十四罪之楊漣及戍擬崔呈秀之高攀龍乎且魏忠賢之窮凶極惡而維垣猶稱之曰厰臣公厰臣不愛錢厰臣為國為民况五虎五彪律當處斬而法司初擬止於削奪不㡬驕兒䕶之維垣身係言官不聞駁正又何尤於推三才寛廷弼者乎而以臣為謬臣不受也維垣又謂臣盛稱韓爌夫爌昭然抵觸逆璫抗疏嬰禍之跡而加以關説罔利莫須有之言已非篤論矣即廷弼一事爌條旨僅免一梟未嘗赦之也廷弼行賄之説逆璫造此以殺楊左諸人耳謂移宫一案無從衊以受賕於是改為封疆四出追比此天下所共知維垣奈何尚守是説乎至於不附紅丸及孫慎行君子之論臣言原非矛盾蓋慎行清望較之王之寀不侔議雖深刻不失春秋書趙盾之法夫董狐不為沽直趙盾亦未嘗貶賢而以臣為謬臣不受也維垣又謂臣盛稱文震孟夫震孟臣不更論即如王紀清正著聞以叅沈㴶忤璫而譴斥震孟以薦紀削奪均之得罪於逆璫者也至於破帽䇿蹇傲蟒玉馳驛之人此何可譏夫刑賞出於朝廷而榮辱因之當時則忠賢之刑賞已耳維垣亦思數年來破帽䇿蹇之輩較之超階躐級者誰為榮辱抑宫保横玉之劉詔何如桎梏抵罪之耿如把自此意不明於是乎相率為頌徳生祠呼公呼父而不顧可勝歎哉而維垣以臣為謬臣不受也維垣又謂臣盛稱鄒元標夫元標之為人前則峭直後則寛和若詆之為婪取多藏則猶之稱厰臣不要錢云耳臣雖斬首穴胸不敢聞命也故謂都門非聚講之所則可謂元標講學有他意必不可謂聚講之徒不盡端人也可謂聚講或有邪謀必不可且逆黨當日所以驅逐講學諸人而拆毁書院者其意正以箝學士大夫之口而恣其無所不為自元標以偽學見逐而逆璫以眞儒自命學宫之席儼然揖讓宣尼使講學諸人而在豈至此哉而以臣為謬臣不受也維垣又力詆臣矯激假借兩言夫臣正為今之詆眞狂獧為假名義者言之也當崔魏之世人皆任真率性為頌徳生祠呼公呼父使有一人矯激假借而不頌不祠不公不父豈不賴此人哉維垣以至抑揚之詞為一成之論而謂臣大謬臣益不受也維垣又謂必小人待其惡稔乃攻而去之臣以為非計也必待小人惡稔其壞天下事不知凡㡬殺天下正人不知凡幾雖攻而去之不已晚乎即如崔魏之惡稔久矣使不遇聖明誰攻而去之哉維垣始終以為無可奈何為附璫者解嘲設或崔呈秀一人舞蹈稱臣於璫諸臣亦無可奈何而舞蹈稱臣焉又令逆璫以兵刼諸臣使為叛逆諸臣亦無可奈何而即從叛逆可乎維垣又言今日之忠直不當以崔魏為對案夫品節貞邪試之於崔魏而定矣有東林之人為崔魏所恨必欲殺之逐之者正人也有攻東林之人雖為崔魏所惜而勁節不阿或逐或奪者亦正人也以崔魏定邪正譬之以鏡别妍媸維垣奈何不取法於此乎總之東林之取憎於逆璫獨深受禍獨酷在今日當曲原其被抑之苦不當毛舉其纎悉之瑕而徒欲與逆黨以首功代逆璫而分謗斯亦不善立論者矣人才不可不惜我見不可不除衆鬱不可不宣衆議不可不集魏忠賢之餘論崔呈秀之故智不可奉以為經守之不失願維垣之熟計之也疏入報可海内傳頌以為名言已又上毁三朝要典疏其略曰臣觀梃擊紅丸移宫三案起於清流而要典一書成於逆豎其議固可兼行而其書則當速毁蓋當事起議與盈庭互訟主梃擊者力䕶東宫爭梃擊者計安神祖主紅丸者仗義之言爭紅丸者原情之論主移宮者弭變於㡬先爭移宫者持平於事後六者各有其是不可偏非總在逆璫未用之先羣小未升之日雖甚水火不害塤篪此一局也既而楊漣二十四罪之疏發魏廣㣲此輩門戸之説興於是逆璫殺人則借三案羣小求富貴則又借三案經此二借而三案之面目全非矣故凡推慈歸孝於先皇正其頌徳稱功於義父又一局也網已宻而猶疑有遺鱗勢極重而或憂其翻局於是崔魏諸奸乃始創立私編標名要典以之批根今日則衆正之黨碑以之免死他年即上公之鐡劵又一局也由此而觀三案者天下之公議要典者魏氏之私書三案自三案要典自要典今為金石不刋之論者誠未深思若夫翻即紛囂改亦多事如臣所見惟有毁之而已書奏從之時已遷侍講再轉左春坊右中允七年上初重武闈始廷對行傳臚禮榜已放上疑考官不公逮繫在事諸臣盡斥其中式者命元璐副左庶子方逢年為主考再試畢元璐獨疏救被繫諸臣上亦不罪明年補日講官時上已罷韓爌劉鴻訓而相周延儒温體仁體仁數以朋黨擠羣臣㑹黄道周救罪相錢龍錫斥外元璐疏請以己官代道周又請召還府尹劉宗周以此益為當事所枘鑿又上制虛制實疏以譏切時政其論端政本有曰勿以大猷付之悠忽勿以瑣務示其周詳恩怨不横其胸好惡必循人性毋徒傷元氣而情面仍存毋浮慕精明而叢脞實甚凡侃言必有深意毋一筆抹殺以遏羣謀凡至理必有定歸毋雙票游移以嘗上意毋以意見讐獨立之士毋以聲顔拒來告之人其論伸公議又曰吏部左侍郎張捷舞智保奸致激羣論凡彼死灰竭計惟幸家國多凶所以向者盛傳勾敵之謀已而即有邊才之薦不觀袁𢎞勛以訟楊賈裭勘潘國楨以薦劉詔承刑何獨於今衆惡必察且昔年逆案之定聖意本以弭爭故如鄧英持正尚云違旨鐫官豈以張捷背公終聽靦顔就列體仁輩深銜之而上獨重其言懸之御榻以備省覽八年流賊犯祖陵上下詔罪已元璐復上蠲七年以前逋賦及改折東南雜解疏上皆允行陞國子祭酒復祖制貢士積分之法體仁知上意向元璐力謀所以去之乃授意勲臣劉孔昭借冒封典劾元璐禮部尚書姜逢元工部侍郎劉宗周等疏爭之體仁竟擬㫖削元璐籍上改冠帶閒住家居七年特起兵部右侍郎兼翰林院侍讀學士以母老辭有旨敦促時京師戒嚴元璐長跪告母曰自瓊州公以來再世禄食今天子有急奈何其母裂所衣襦示之曰為爾氊也豈曰無衣元璐乃毁家召募得數十人及其弟瓚率家徒佐之可數百人趨淮上問淮使者覔鹽徒為助無有應者乃身率十騎持滿夾趨衝險出濟北十餘日達京師上聞之甚喜曰固知是吾倪講官也即日召見條奏守禦之䇿悉備隨以劉超就擒叙功廕一子錦衣衛指揮僉事當是時上注意元璐甚切行且旦夕入閣而陳演欲攘首揆乘延儒視師搆成其罪又慮元璐大用乃入告曰天下不治由兵農不合今廷臣可任者惟倪元璐馮元飈耳使元璐為大司農元飈為大司馬彼此叅合不日可治上心然之即日以元璐為戸部尚書兼翰林院學士與元飈分部治事五日之間三承召對元璐以浙人例不為戸部辭不許召對中左門諭曰朕知卿久矣勉為朕任勞又曰古帝王致治不過數人周四友漢三傑高皇帝用劉基宋濓亦一二人耳朕專倚卿可坐致太平元璐念太平非司農可致固辭又不允因進曰皇上必欲用臣敢陳三言一期與兵部通盤合筭先准餉以權兵因准兵以權餉被兵之區餉不可問敗軍之壘兵亦銷亡彼此相權則數清而用足此實做也一小生小節無益於數須求一舉而可得數十百萬又必有利於國無戕於民者銳意講求以圗有濟此大做也一謂陛下以堯舜之心孔孟之術而責治於司農特命儒臣講官為之豈宜或出於掊克權宜之䇿臣願以仁義為根本禮樂為權衡茍政有厲民者臣必為民請命蠲所必蠲賑所必賑總奉陛下安民一言以彰聖學於天下此實做也語未畢上歎曰卿眞學問之言根本之計元璐既退首定差規抑奔竸薦保舉諸生蔣臣為本部司務以任綜核先是軍興正賦之外有邊餉有新餉有練餉條目繁而胥吏易以為奸元璐請併三為一官民便之又請盡罷催餉科部差員及侍郎專以歳計責成撫按又倣宋朱熹義倉舊法而反其五累以備凶荒時當極弊之後盡力補苴而度支終絀乃請以軍籍餘丁輸粟改民籍免其勾捕可得千萬民亦樂從上不聽保定巡撫徐標請復開中之法元璐奏先於都城開引十萬亦未及行㑹西人湯若望以開礦造鈔迎上意而陳演與中官力主之又周延儒吳昌時贓銀各鉅萬朱大典贖鍰四十萬上命中官王坤與給事中韓如愈馬嘉植滿朝薦銜勅催解元璐皆危言激論請收成命上為罷遣坤餘如故造鈔之役復遣中官採桑穰於三吳元璐又與閣臣蔣徳璟交章爭之乃止在部凡十閱月事關利害無不力持皆此類也而噂㳫者日甚陳演授意閣臣魏藻徳宻䜛於上曰元璐素工文詞錢穀非其所知宜撤還講幄十七年二月詔解部務以原官專直日講元璐笑曰此吾志也一日進講生財有大道上疑其諷刺輒詰曰今國用匱絀至矣生之者衆為之者疾何所措手對曰陛下聖明不妨經權互用臣儒生止知因民之情藏富於國耳上不懌而罷元璐不懾亦不引謝明日上諭閣臣曰故事講筵有問難而無詰責疇昔之言是吾過也方元璐初直講時敷陳詳雅上無不前席傾聽嘗講尚書説命值體仁侍側語譏其徇私背公上拂然抵書盡幾端卬首上視元璐抒辭益朗頃之上卒頫就案霽容聽受焉其忠憤為上所容納又如此當流賊之起也惟事剽掠攻陷城邑輒棄之而去議者憂其飄忽難制元璐獨曰此猶流水其害不蓄倘令雄踞大都按兵四出本計一定不可復禦矣已而李自成㨿襄陽進取唐鄧規略大河以南將北渡張獻忠自安廬西入蘄黄窺武昌以為聲援元璐謂二賊當離之使不相及乃可專力以圗自成自成授首取獻忠直易事耳又大帥左良玉以縦掠荆楚心懐兩端宜薄誅往咎厚責成功於是與樞臣元飈合謀白上命鳯督及淮皖鄭豫諸撫臣畫疆自守以遏賊為功進秦督孫𫝊庭尚書督師率諸將分道南下勦自成命左良玉沿江左右伺便進擊以是𫝊庭抜寶豐唐郟進逼襄城而良玉亦收復承天及荆襄諸屬縣㑹𫝊庭乘雨出闗為賊所乘諸軍盡潰𫝊庭死自成乘勝長驅遂陷潼關事聞元璐撫膺大慟曰嗟乎垂成之績隳於一旦天下事安忍復言猶請手詔秦晉二王如能任殺賊即假以大將權如遜不知兵使悉輸所有給戰士毋齎盗云詔未逹而西安已陷自成遂有全秦舉兵向闕及上命李建㤗出師復申河防三議又陳救時三策惜乎其無及也賊至宣府繞出真定急請太子撫軍而南如宋康王故事不聴請以六十金募一士得五百敢死可以潰圍召勤王師章上未發而城陷元璐聞賊入束帶稽首北謝天子南向别母畢命酒酹所懸關忠義像前酌盡數巵出就㕔事援筆題案上曰南都尚可為死吾分也勿以衣衾歛暴吾尸以志吾痛遂縊死南都立國贈太保吏部尚書諡文正我朝詔䘏明季殉難忠臣二十人元璐為首諭祭易諡文貞賜地七十畝命有司春秋致祀元璐才髙而常若不足士有尺寸之長極意推揚必使上達尤精於易與黄道周角立成家而通權達變過之所著有倪易應本代言奏牘講編樞計奏疏若干卷外史氏曰先生當啓禎之朝昌言嶽嶽能使羣奸破膽宵人屈服毎一疏出如撞晨鐘崇禎元年三疏其最著者矣愍皇帝每得其疏置之屏間出入瞻誦以為偉人不可謂不遇矣諸臣陰譛之而陽奉之引孝宗用劉大夏戴珊故事為比夫以愍皇帝十七載之知不能使一詞臣進於咫尺以五日三召之勤不能從講幄致其戡亂之功卒至君臣同殉社稷嗚呼豈非天哉夫天之生小人也奸謀詐智令人叵測如楊維垣者小人中之鬼蜮也當甲申愍帝殉社稷彼即聲言死難置酒高㑹隣右謝别令生辦三棺於庭謂與二妾同死黒夜挾妾以遁明日其子麻衣冠哭告左右居人詐稱父已殉國矣詎維垣至半道為讐家擊殺挾其二妾去然天下皆信其為殉難者矣嗟乎小人之欺天欺地欺神欺鬼欺己欺人直如牛鬼蛇神而不可測安得不破人家國哉金鉉傳金鉉字伯玉武進人以北京留守衛籍舉天啓丁夘鄉試第一人崇禎戊辰成進士時年十九自以為不習吏事請改教授日集諸生講濓雒之學燕居言行俱有規格被服造次居然老成人比之胡安定擢國子監博士遷工部主事時上已誅魏忠賢而太監張彛憲等旋用事奉勅總理戸工兩部錢糧建别署鉉曰此天下存亡之機也奈何誅忠賢復任一忠賢乃抗疏言彛憲既有獨踞之庭必强二部郎官匍匐進謁挫士節辱朝廷疏上不報而總理已建署果檄郎官以謁尚書儀註見復上疏固爭之㫖諭金鉉不得過激時彛憲意甚得與其黨議接待郎官禮或曰視尚書當稍倨彛憲曰吾當稍恭而待金鉉倨耳鉉遂集諸郎官倡議曰職事可令掾吏移之吾曹有一人登彛憲堂即屬彛憲假子毋許入孔子廟於是諸郎官詣尚書各請以公事出至期彛憲升堂黄衫緹衣倡贊畢但見吏不見郎官待至午不至彛憲恚甚曰避金鉉不即來耶命小䜿竊伺門外望扇導來即報已而馬蹄前後過之無一人入者乃大慚憤借驗放十六門火器誣指十八位無火門劾以故悮軍機曰必殺鉉㑹尚書力爭僅削籍歸家居與其弟錝以讀書為事尤善易學初號在六至是自題所居曰狷菴耑讀程朱書謂古今學􅎃之正無出乎此壬午冬上御文華殿命科臣舉清官以孫承澤薦起金鉉補兵部車駕司主事分守皇城益修城守火器甲申二月冦從蒲州渡河晉省全陷宣府告急上使太監杜勲監視鉉上疏曰宣府京城之蔽宣府不救慮在京城撫臣朱之馮忠勇足恃恐受内臣之掣請亟撤之不聽至三月冦至杜勲同總兵王承𦙍迎降之馮果死因哭語其弟錝曰今我哭朱公數日後汝曹旋哭我也未㡬冦犯京師薄彰義門城下鉉急㸃禁兵歸謀匿母母章氏年八十矣哭告母曰鉉守皇城城亡當與俱亡今日從母乞此身母曰噫久謂汝讀書知大義乃今始向我乞身哉且我命婦與汝偕勉之汝魂歸當㑹我井中趣之出又命僕追往以朝衣隨之鉉行至御河橋衣朝衣望闕拜又望寓拜母即投御河死僕奔告其母母曰孝哉鉉㑹我井中矣急正冠帔投井妾王氏隨之俱死錝歸收葬畢哀號數日亦死井中是年南都䘏贈太僕寺少卿諡忠節本朝賜諡忠潔外史氏曰氣運至崇禎甲申窮矣先生挺然以節義自持甚而母子兄弟及妾咸歸於仁為綱常名教光讀其太夫人相别之言凛然千古猶生也嗚呼馬世竒傳馬世竒字君常無錫人崇禎辛未進士以庶吉士改授編修丁丑㑹試同考己夘典江西試取抜多知名士已而奉勅諭山東江西湖廣諸藩悉却餽遺甲申遷左春坊左諭徳時冦警孔亟上數召廷臣問計世竒奏目前要着在收拾人心而收拾之方須從督撫鎮將約束部伍令兵不虐民民不苦兵始上以其言諭兵部勅行之三月十九日京城破世竒心計上必死社稷沐浴更衣捧勅印北向叩頭謝恩南向遥拜毛太淑人同妾朱氏李氏闔小室自經賊騎闌入四顧蕭然太息而去諸僕伺間排闥窺之世竒與李復甦而朱已絶矣僕許達等環泣曰奈太夫人何世竒叱曰正恐辱太夫人耳達又曰聞天子亦南幸曷少從容乎世竒曰皇上必不南何紿我為手書約同年成徳同死夜檢書籍所存詩文等二十餘冊俾僕携歸寄一圅於弟世名一函於子壬玉次日有同朝數人來寓勸勿死世竒曰吾意已定公等休矣妾李哭而前曰妾死主前乞主歛妾妾不後死乃乞紗帨先經死世竒命市三木以二殯朱李指其一曰以此殯我因謂諸僕曰吾受國恩十三年矣自祖及孫者四世今國破君亡分固應死益以二妾天之與我厚矣歸語吾兒謹事太夫人揮僕出題壁曰馬世竒同二妾殉此遂左手握椅右手撫几正襟端坐縊死世竒豐頥玉色皎皎如祥鸞彩鳯自少篤志嗜學好推奬後進嘗曰處世宜存生機勿萌殺機居官宜尋退步勿爭進步方差諭諸藩宴楚府湖廣提學王永祚乘間言曰尚有兩郡新案未發世竒若弗解者答曰此主司盡心之日也使客曷聞焉永祚慚而退及過江西提學侯峒曽自負衡鑒揚言嵗試黜劣卷四千人世竒大駭曰一試黜士四千得毋過當乎彼孤寒不幸遭此無論絶進路且永失館穀矣峒曽跼蹐曰案已發奈何世竒因教以覆試拔等之法於是收復者過半丁父艱日蘇州推官倪長玗其門人也欲以罪贖三千金助喪世竒辭之曰蘇方大飢留此賑民可也長玗又請以羨金三百犒從者金至立命以原封送錫庠供修學費其他取拔知名士如龔廷祥堵𦙍錫蔡鳯戚勲蕭琦王漢萬發祥劉渤劉日杲等皆先後死節不愧師門云福王稱號南都贈禮部右侍郎諡文忠我朝賜諡文肅祭一壇祠田七十畆外史氏曰先生當國家淪喪之時従容赴死不肯有所瞻顧其諸門人先後死節者不一其人皆先生一人倡之也俾三百年之綱常名教不墜於社稷淪亡之後所係豈淺鮮哉東林列傳卷八
