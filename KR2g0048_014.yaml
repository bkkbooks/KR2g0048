body:
  text: 東林列傳卷十四江隂陳鼎撰明孫鑨傳孫鑨字文中餘姚人忠烈燧孫也父升為禮部尚書鑨兄弟以進士髙第先後列大僚而鑨獨恂恂若寒素初授武庫司主事提督京師武學學中貴戚子弟都城遊俠射獵者皆繫籍於中鑨宿知其弊當六年會舉之日一以文義為去留比奏將上尚書欲易一私人鑨力持不可既退同官宋嶽呼鑨曰立峰吾今畏汝矣寧有上官煦煦言而面赤強爭者乎立峰鑨别字也疏上留中同事者皆危懼鑨不為動踰日竟下由此名大起遷職方員外郎丁外艱服闋補武選即中是時世宗深居齋宫錮言事諸臣屢興大獄舉朝惴恐鑨具疏極諌以秦二世宋徽欽為喻盡發諸姦與中璫不法事大學士徐階見之大詫曰癡也郎奈何輕批逆鱗哉會上病諸璫壅之不得達引疾歸隆慶元年起南京文選司郎中升南尚寶卿考滿入京時髙拱以內閣攝吏部尚書見鑨欲北之鑨若不聞而去遷南鴻臚少卿萬厯初入為太常少卿提督四譯館遷右通政再升光祿卿張居正奪情議起疏劾不報復引疾歸居正殁以原官升大理卿歷刑吏兩部侍即拜南京吏部尚書又改兵部陸光祖罷入為吏部尚書當是時事權初歸銓部人情杌􅑾中旨譙讓諸曹郎鐫俸削籍者趾相屬鑨不為動遷除大政不謁內閣路遇閣臣亦不避道循光祖之意加徑直焉大學士張位積不能平疏言會推大臣與議者各舉所知彚奏取上裁以此欲撓吏部權鑨覆寢之而給事中史孟麟力申鑨議疏繼上位益忮而閣部水火矣鑨在吏部集思廣益欣然舍己意廓如也時徴聘久廢鑨獨亷一二篤行士於科名外以維世風如鄧元錫劉元卿王敬臣王升馮行可等士論韙焉萬厯二十一年大計京官故事皆在正月二三宵小輩為閣臣出力者皆借條陳侵吏部權欲以決隙致潰鑨與考功即趙南星慷慨自矢曰法之不行自親昵始於是南星首摘其姻婭都給事中王三餘鑨亦亷其甥呂胤昌胤昌者文選副即也自是部院臺省莫敢以意干其私人而城社之黨絀當是時大學士王錫爵假歸兼程赴闕意欲有所庇鑨知之計疏先一日上錫爵憤甚合謀張位而臺省以不得與聞察事也二恨交作使臺省合謀曰拾遺吾職也仍拾吏部耳遂合糾稽勳員外即虞淳熙職方即中楊于庭兵部主事袁黃鑨疏爭之政府故擬留用而給事中劉道隆劾疏至嚴旨詰吏部專權結黨已又責其回奏不認罪奪俸三月南星降秩外用淳熙等間住鑨求去不允鑨又念身去無須多言顧權黨之説不可使遺患將來乃具疏申明職掌並乞骸骨又不聽又凡東林賢者盡疏薦之大拂錫爵位意焉既而都察院公疏救南星上大怒責其市恩於是左僉都御史王汝訓右通政魏允貞大理寺左少卿曽乾亨吏部主事顧憲成李復陽禮部郎中于孔兼員外郎陳泰來主事顧允成張納陛户部主事賈巖國子監助教薛敷教等二十餘人具疏力爭咸歸咎內閣而刺錫爵與位尤甚已而史孟麟升吏科都給事中引疾不拜極論前事禮部即中何喬逺主事洪啓睿連爭之皆不省當是時聚訟盈廷清流盡逐東林黨錮之禍基於此矣初陸光祖之在吏部也選即王教以量移萬國欽事一司皆削籍政府欲假以立威懲後而衆益不服後遂屢行之鑨罷而繼鑨者不久即去自是吏部用人之疏一槩留中而閣部之權並輕惟二三臺諌以口舌為權衡驅斥異已而已觀於丙辰丁巳之察可為浩歎者也鑨請去益堅上遣中官賜養羊上尊終不出疏十上賜乘傳歸踰年卒久之贈太子太保諡清簡鑨淳誠質行自奉寒薄與人循循如長者意所不可賁育莫能奪三王並封議起諸臣嶽元聲等引祖訓各上封事久不決鑨率九列廷爭之錫爵氣奪儲位始定風波震撼中繼光祖而為名吏部者惟鑨為然子二長如法癸未進士刑部主事以爭國本謫潮陽縣典史卒贈光祿少卿次如洵癸丑進士山東參政天啓間逆魏擅權矯詔入東林黨中父子皆削奪崇禎立乃復外史氏曰先生為東林肇基者也當其在吏部時引賢若渴東林正人濟濟咸登矣及其去位而清流之禍胚焉俾無張王之嫉忌則先生不罷而陸與純王忠伯輩再起與東林諸賢共佐朝廷太平之業未必不逺追文景也余故曰肇東林之基者先生焉江東之傳江東之字長信歙縣人少為諸生性剛有大志萬厯五年賜進士授官行人擢山東道監察御史叱駙馬侯拱辰於途貴戚斂手避之是時張居正初卒而馮保猶用事徐爵者保假子也居正素藉之以通於保居正死爵熖益張時乘驢出入東安門莫敢訶止東之行遇爵執其驢付所司即上疏陳爵罪歷言爵借馮保以作威福狀雖未明指保罪而實以撼保帝覽奏怒命錦衣衛逮爵論死尋以御史李植疏竄保於南京先是江西巡撫僉都御史王宗載與遼東巡按御史于應昌合謀竄殺御史劉臺以快居正之忿至是宗載協理都察院事東之露章劾之曰故大學士張居正輔理十年不為無功但攬權太專設心太險媚已者立躋要地異已者墜之重淵以致邪佞之徒趨媚太甚以成居正之惡如御史劉臺論劾居正義正辭嚴其忠義之心不出趙用賢鄒元標等下也臺不死當與諸臣并用矣王宗載前撫江西必欲殺臺以快居正之心購其仇家代創誣本遣人伴送來京妄奏于應昌奉旨察審同心狐媚逼脅司屬揑報虛贓宗載復啖故江西巡按御史陳世寶以美官擬臺逺戍臺死潯州棺衾不備行道之人莫不流涕曰是劉御史也何罪而至此極耶是殺臺之慘主之者宗載行之者應昌世寶也世寶嘔血暴卒天實誅之宗載謀害忠良當以首論應昌誣贓枉法當以從論疏入帝命戍宗載應昌於邉故事御史上封事必以副封白堂上官東之捧疏而升宗載迎謂之曰江御史何言東之曰言公殺人媚人耳宗載失氣反走聞者咸側目焉小阿卜户率百餘騎襲破黑峪關殺數十百人去邊臣掩其敗瘞藏諸尸詐以功聞為巡按御史李植所劾朝議遣科臣勘之帝素知東之時方督屯畿輔帝曰此行非御史東之不可命撤屯務往將行執政有為邊臣請間者東之指心謝之至則盡得其掩敗詐功情事顧未有左驗乃間行關外見新蒔蔬圃疑之命吏士發土得九尸尸皆中創於是諸將叩頭服東之報命分别降罰坐死有差御史丁此呂論劾居正時科場事失執政意吏部尚書楊巍奏劾此呂調外東之言巍晚節不終巧塞言路且言輔臣申時行二子皆中科名不樂此呂有是疏巍之劾雖曰巧庇故相實則逢迎新輔疏入不報時民間多私自宫者東之請嚴禁之帝稱善南豐知縣車大任以丈出餘田要首薦東之曰是謂竭澤而漁百姓將由之困乃請改正新增虛糧田地劾大任奪其官又請蠲恤屯收近地免守陵户銀力二差及禁皇親占産害民諸事帝皆嘉納之時帝方追憾居正及保東之與同官李植羊可立皆以論劾當上意乃詔曰江東之盡忠言事摘發大姦有功擢光祿寺少卿尋晉太僕寺正卿時居正保餘黨時復引繩批根中傷善類有劾李植者東之發憤上疏曰張嶽沈思孝吳中行趙用賢鄒元標數臣忠義天植九死不移臣安為之黨而樂與之遊今若以李植與思孝中行等交往為罪則植猶未若臣之密臣之罪重於植願先罷臣於是給事中齊世臣御史吳定交章劾東之東之屢乞罷帝命中使至皇極門慰留之蓋異數也居亡何禮部尚書徐學謨為帝相壽宫於大峪山大學士申時行主之東之與植可立相繼論大峪山多石非吉壤忤執政意於是次輔許國訟言攻東之植可立等王錫爵入朝懼東之等交攻之也上八不平疏攻東之等於是帝意漸移遂左遷東之植可立三人東之為兵部職方司員外即復劾欽天監正張邦垣相壽宮欺罔不報尋出知霍州以病免歸萬厯二十一年吏部即中趙南星推用東之起知鄧州尋升湖廣按察司僉事備兵辰沅甫三月帝親書旨付吏部晉南京光祿寺少卿尋召入為大理寺丞進左少卿署大理寺卿事南星與鄒元標創首善書院於京師姦人欲攻之東之力排攻者乃止閹人格殺親弟而以其妻當刑部即議輕其罪東之嚴駁置重典獄上詔如東之議而譴刑部司屬太醫屬范洋為人通賄於選即蔣時馨事覺繫獄時馨欲殺洋以滅口東之以洋當過錢律不應死會御史趙文炳劾時馨鬻官削籍時方外計銓司欲出丁此吕東之與思孝以此吕素伉直力爭之於是言者羣劾東之且嗾趙文炳自反其詞謂劾時馨疏為受東之指帝知其姦不問也東之屢乞罷帝仍慰留焉執政慮帝終右東之乃乘間出為右僉都御史巡撫貴州實放之也貴州素荒徼土司安疆臣謀以新貴縣復為貴竹司東之毅然折之且得其納賄中朝諸狀疆臣懼而止又請設天柱銅仁二縣改土為流薦用能士朱梓等皆下所司行之烏撒頭目阿備稱兵擁安效良求繼東之檄兵縳阿備而許效良繼焉髙寨苗剽劫新添衛東之檄兵擊之斬首百餘級事聞賜白金播州楊應龍仇殺五司五司轄黔郡東之募兵擊賊賊夜薄我軍殺傷相當議者遂以輕發失事坐之東之撫黔三年為科道京察拾遺詔令致仕去復以播兵事落職東之行至安慶患風痺抵家而卒東之為行人時刑部即中舒邦儒其同年也闔門疫死遺孤一歲人以疫故不敢過其門東之為經紀其喪事自著官服往抱其孤歸乳之舒氏卒有後少納妾於杭得寠人婦還之不責其直人皆稱長者云東之殁後亦入東林黨中崇禎立乃復其原官外史氏曰先生與李植羊可立輩負其才氣志欲不憚強禦以立功名彈劾侃侃論事風生要皆出於為國家非有私也且其是非亦未有乖於正論者乃當時賊相必欲驅天下氣節強幹之士扇為雷風水火薄射之形者何耶嗟乎社稷欲丘墟遂使此數賢終不得竟其志也宋燾傳宋燾泰安人萬厯二十八年進士選庶吉士改御史巡按應天兼理學政時應天有劉天緒之亂天緒河南人以白蓮教扇聚千餘人自相部署號龍華帝主圖掠倉庫犯陵寢事覺捕治燾因上言自採榷役興民不堪命一夫振呼而從者響應况今北方告急邊餉不支外有庚癸之呼內無度支之蓄萬一潢池弄兵揭竿繼起誠所為瓦解之勢也宜及時發內帑之金停無藝之稅克詰戎兵簡練將帥則內治順而外防固矣時相朱賡不協清論而莫有言者燾上言大僚多缺百職不熙閹豎鴟張於內邊竟憑陵於外四方盜賊水旱道殣相望而九閽轉隔天聽益髙賢才鱗集者不用斥逐者不起使其壯者老老者死摧抑消磨之法士氣奄奄殆盡矣又言憸邪之輩習於結納以軟熟繞指為伴食鎮靜其言侵擊輔臣於是賡上疏求斥罷帝優詔慰留然攻賡者繼起如陳于庭汪若霖輩交章纍牘鄭振先劾賡十二大罪且言賡與沈一貫王錫爵為過去見在未來三身皆自燾發之自此與宰相齟齬矣遂移疾乞歸築室飬志與東林諸君子相往復尋卒天啓間以鄒元標疏贈光祿少卿後以東林黨削奪崇禎改元乃復其官外史氏曰吾聞父老云朱賡紹興人也為相時大小九卿科道衙門皆以賄納其鄉人為胥𨽻刺其巨細事以聞賡因之而要貨故富至八百萬久之根深蒂固胥吏皆得執持國政於是天子之權下移於賤𨽻而天下事壞矣前朝敗亡之毒實賡種之也當賡執政時勢如猛獸負嵎先生毅然攘臂而攖之可謂雄矣湯兆京傳湯兆京字伯閎號質齋宜興人萬厯十九年進士授豐城令亷惠甚著豐有三不在之謡曰銀不在庫吏不在廨囚不在獄七年徴拜御史時稅璫四出橫索至窘職官於死且折辱宗室莫敢言兆京輒入告痛言之一時吐氣而姦人希旨言興利者百出京衛百户王遇桂閻應隆請科直𨽻田房稅變賣髙淳等縣馬場可得數十萬又請海外貿易獻四十萬輒得旨查勘兆京上言以為東南凋敝至極通番禍變可虞年來水旱頻仍閭里蕭條大非昔比富者貧而貧者流移何從取盈而得數十萬以駕虛鑿空之説為焚林竭澤之謀人窮則亂獸窮則攫吳閶之間屢見告矣臣謂東南凋敝者至極以此昔年閩粵浙直之中倭皆緣土人通番起釁竭東南半壁之財力僅乃驅之朝鮮之役亦費國家數百萬倘邊圉稍有不戒臣不識太倉太僕尚能辦數百萬之費否耶教猱升木聞者寒心臣謂通番禍變可虞者以此乞下吏誅姦辨以為言利者戒書上其議寢已巡視西城有中使三人塗辱侍即敖文禎詰之則鄭宫使也兆京露章劾處發配金陵貂璫肅然自是兆京直聲震朝寧巡按宣雲復上言宣府大同名為兩鎮地實彈丸今既設稅監復有礦監已激成廣昌之變宜一切罷免不報而守備皇陵內豎李浚指盜陵木啖居民無虛日兆京密陳之浚偵之亦誣訐永寧軍人盜木冀軋兆京朝廷遣科道臣往勘乃得白尋按福建還掌河南道管內計復按順天兆京所至有膽決不避權貴風力錚錚而先是宣雲之役兆京誣既白而軍民被逮者數十人浚必欲殺之以杜口炮烋愈甚兆京疏其惡貫已盈中外怨恨狀帝震怒責浚長跪三日其下鷹犬皆杖配被逮者悉放還會厰監盧愛其黨豪橫蔑法都人知兆京能持法訴其狀愛惶懼無措令其客來謁因説曰君少節意寺卿在我耳兆京笑曰三公不易介者何人而敢以嘗我卒堅執不少貰又嘗參稅監馬堂是時諸奄無不噤齘恨湯御史然憚其公正莫可抵隙以是得伸其志福王之未之國也羣臣屢疏不得上通兆京倡率科道官伏闕叩請疏乃得至御前大抵言祖宗之制莫重分封未有親王既壯而久居京邸者臣等伏讀髙皇帝祖訓有曰自古親王居國其樂甚於天子今福藩已鼎建天中而陛下不俾之啓行何陛下之愛福王異於髙皇帝之愛其子孫也夫食洛食瀍卜年卜世此福王之家也千里邦畿萬國朝宗此非福王之家也期在明春之詔臣等信陛下之有成言乞敕下早諏吉日以襄巨典未幾福王遂之國寢奪嫡謀叩閽之力居多焉初兆京掌河南道日與孫丕揚曹于汴同理京察為萬厯之辛亥時黨事起附東林者曰淮秦李三才方為淮撫而王圖秦人也與東林相難者曰崑宣崑山則顧天埈宣城則湯賔尹曰四人者皆希望枚卜而其徒爭擁戴之是年主察者皆東林而湯賔尹金明時等皆被察於是明時秦聚魁等上書詆斥兆京諸人喧呶不休二百四十年以來察典之撓亂所未之有帝亦平處而已丕揚圖于汴相繼去兆京尋奏論吏部尚書趙煥擅權因挂冠歸未幾卒年五十二贈太僕少卿天啓間兆京死垂十年魏忠賢之黨追恨之列其姓名於東林黨人與宋燾曹于汴江東之史記事劉憲寵魏大中章嘉楨袁化中等謂之前鋒榜示天下云外史氏曰先生果東林之前鋒也當神宗之末閹璫其熾矣非其伐之於先則忠賢九千歲之稱不其易而為萬乎楊左諸君子繼其鋒以身家性命摧之而逆黨始不敢遽為莽之篡奪否則熹宗之鼎早屬趙髙矣章嘉禎傳章嘉楨字元禮德清人萬厯八年進士授蒲圻知縣丁憂歸起補當塗會歲大旱鄰境蝗飛蔽天將及當塗嘉禎禱之一夕蝗盡赴水死邑獨有秋民有治地得金穴者金皆鐫嘉禎字因持以獻且曰天賜公也嘉禎取金熟視之謬曰此文乃嘉祐固宋物也令籍入庫悉作正供以蘇民力御史喬璧星按部至索行幄嘉禎以歲飢民貧不為具璧星怒夜宿太平驛見驛中設位祀嘉禎召丞欲撻之丞言令有德於民民皆設位奉祀何撻丞為璧星趣取驗丞出食頃擔囊負捆而至皆民所奉嘉禎祠版也璧星大感動乃特疏薦之都御史海瑞亦以治行第一薦擢兵部主事調禮部復調吏部歷文選司坐會推閣臣事削郎中顧憲成籍嘉禎降羅定州同知解職歸居十八年起南京刑部主事遷尚寶司丞奏言微臣幸荷賜環同僚尚在遺佚乞將遷謫諸臣鄒元標等九十八人廢棄諸臣范俊等一百十人悉賜録用而諡孟化鯉顧憲成等以慰幽魂不報再進右通政四十五年京察以忤御史劉廷元借拾遺被劾遂降級調用天啓元年補兩淮運判三遷至大理左寺丞卒既亦以黨人削奪云平生負經濟大志所學亦純粹為權姦所厄未竟其用士論惜之外史氏曰先生東林之赤幟也雖所上之疏不報而諸賢為權姦厄抑者皆有起色矣自後正人得立於朝不可謂非先生一疏之力也崔景榮傳崔景榮字自強長垣人萬厯十一年進士授平陽府推官擢監察御史疏劾東厰太監張鯨罪巡按甘肅再按湖廣河南最後按四川積臺資十八載晉太僕寺少卿甘肅地當河隴三面距邊時邊欵久戰具粗備諸將多媚敵自固景榮悉劾罷之請令土兵統以土官練鄉勇番部統以宿將捍外患敵入番拒於外我應其內不以小小順逆定功罪著為令火落赤入臨洮越渭源去鞏昌四十里景榮張燈乘城賊知有備引去播州之亂起李化龍總督入路景榮以巡按監軍大帥劉綎吳廣輩故健鬭然素驕蹇綎使人馳金幣至景榮家為太公壽景榮上疏論劾闔軍股栗進兵逼龍囤賊偽降冀小緩景榮劾治吳廣責戰益急卒平播州或言播平賴安氏力居多宜以播地畀安景榮不可會化龍憂去景榮為善後計請蠲蜀一歲租并恤上東五路罷礦使化龍疏敘監軍功景榮悉去之以太僕三年滿擢僉都御史巡撫寧夏諸將吏夙聞景榮按河隴狀咸震懾銀定素驕歲入掠諸部屬隂為之導適犯六羊河口景榮親督戰破之因議革導賊諸部賞諸部懼請與銀定絶銀定既失導剽掠無所得亦叩關求市景榮故難之令倍送丁口自贖嘗念寧夏歲市費不資議省之在任三年僅一市其後佐兵部延鎮吉能等挾欵求補市巡撫以一年兩市請力駁寢之卒亦無他變歲省金錢十餘萬四十五年入為兵部左侍郎署部事皇親鄭養性襲父左都督駙馬都尉侯拱辰子昌國乞恩授都指揮使已得請矣景榮以恩施太濫引祖制再疏諌止又言邊事不宜專用債帥頃九邊大將非賄不得蕭大亨為兵部武選職方明以賄為次第凡都司守備各官負債皆數千計請行禁絶從之總京營戎政改吏部以疾辭六上疏不得請於大明門叩辭去踰年起宣雲總督召還晉兵部尚書時邊事寢劇羽檄紛馳封事日數十上力疾題覆會遼瀋陷熊廷弼王化貞議不協命廷臣議經撫去留景榮數為言官所論御史方震孺請罷景榮以孫承宗代之遂引疾歸天啓四年十一月特起為吏部尚書當是時逆璫魏忠賢盜國柄羣小更相倚附逐尚書趙南星即家起景榮欲倚為助比至璫飾巨宅以待景榮不赴移宿火房錦衣帥田爾耕來謁辭不見帝幸太學璫請先一日聽祭酒講議裁諸聽講大臣賜坐賜茶禮又議減考選員額汰京堂添注官景榮皆力持不行俄傳政府及六曹集議事景榮曰吏部事與司禮無涉非户工各曹比璫恚曰彼謂吏部無弊耶孫承宗督師關門請入賀聖壽面奏機宜璫黨謂承宗將清君側矯旨促返鎮崔呈秀徐大化等連章論劾下九卿集議景榮訟言曰關門非承宗不可於是嚴旨趣視事楊漣左光斗之被逮也景榮移書魏廣微勸其申救坐邸中三日力促之廣微不得已具揭有旨切責廣微懼以景榮書為徴曰景榮教我也於是御史倪文煥特疏參景榮有云景榮身為冡宰同一君子也首攻淮撫之邵輔忠力詆東林之劉廷元疏糾張鳳翔之盧謙何以久不登啓事也同一小人也黨護淮撫之孫居相賣身東林之史記事計陷毛文龍之夏之令何以久不聞削奪也且東林之人輦金數十萬托李孔度為姦細隂謀翻局何可不問御史門克新復參景榮主調停之説媚姦邪而邀後福景榮遂削籍為民崇禎改元用廷議復原職遣官存問四年卒贈少保景榮去官時慮璫禍未已妻王為製服藏鴆已亦密置毒奩中幸得免天啓中稱清正冡臣惟景榮與趙南星云外史氏曰當逆璫煽虐之時所畏者正人在朝耳故去髙邑而進長垣以長垣可以杯圈而為吾徒也孰知長垣又一髙邑耶此倪文煥之誣參刻不容緩焉嗟乎長垣一去天心可知矣劉憲寵傳劉憲寵字抑之慈溪人中萬厯十四年會試奔父喪回已復丁母憂不御酒肉不處內者六年始就廷試授吉安推官郡多賢大夫憲寵悉與之交相砥礪以名節御史巡方者知其賢每携以自助所部太和萬安二縣多兼并郡守汪可受欲行丈量法憲寵已取為鄉試考官矣力辭之任丈田事田乃得均決獄意主平反然法之所在屹然不移行取授虞衡主事改禮部儀制司遷員外郎專管册庫凡藩府之請名請封必致餽始得憲寵悉却之疏朝至夕覆事無留難胥吏聽令而已代王欲廢長立幼力持之遷本司郎中皇長孫生條上諸禮儀一依皇長子例所以隂衛儲宫者其慮甚逺以聖母徽號禮成超擢光祿少卿不樂仕乞册封之差以歸家居十餘年熹宗踐祚起原職遷太僕少卿右通政念加𣲖之害疏乞蘇民困以弭盜源語極愷切溫旨令設法具奏乃上言鹽法屯田鼓鑄三事其言鼓鑄欲大小錢兼行大為母小為子錢多則用母而以餘數用子錢少則用子而以整數用母其説甚具時不能行遷南京太僕卿乞假歸未幾羣姦用事御史袁鯨劾之革職憲寵天性和粹而操行亷介服食無異寒士鄉邦重之時小人撰同志諸録以害東林清流憲寵預有名故被劾也卒年八十四外史氏曰小人之害君子也恐君子得志而不容耳若先生者謹慎自持所謂狷者是也奈何亦見忌於小人也耶江秉謙傳江秉謙字兆豫歙縣人萬厯三十八年進士授鄞縣知縣地濵海閩民漁於海者遇風舟壞邏者誣為通洋繫縲數百人當事者將白於朝秉謙執不可三駁三覆卒平反焉入拜山西道御史巡視光祿嵗省費無算天啓初魏忠賢設內操大學士沈㴶助之募兵都下中外危駭秉謙首率諸御史劾之廣寧陷言兵部尚書張鶴鳴經撫失職樞臣何得蟒玉行邊坐忤謫外尋落職為民皇子生詔建言者皆復職忠賢銜秉謙不得與後楊漣劾忠賢亦以錮秉謙為罪云未幾以疾卒與友人訣而歎曰吾願生平不負所學為令不負地方為御史不負朝廷所願不遂命矣夫崇禎初詔復其官外史氏曰兆豫先生以強項忤璫遂禁錮終身齎志以殁海內惜之然不至如楊左諸君子慘死詔獄余猶以為之幸也嗟乎明之氣運適逢陽九百六之厄正人君子不遭荼毒以死卒不享其天年者何耶嗚呼三代以上義理之天耶故人得以義理主之耶三代而下氣數之天耶即天亦囿於氣數之中不能自為之主耶雖然忠孝節烈禮義亷恥此八者挽回氣數之資也吾人寧具此以與氣數之天爭不可舍此而隨氣數之天瀾倒也夫東林列傳卷十四
