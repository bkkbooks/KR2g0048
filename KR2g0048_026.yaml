body:
  text: 東林列傳卷末下江隂陳鼎撰明附熹宗原本本紀下四年春正月丙辰朔長興民吳野樵作亂殺知縣石有恆主簿徐可行戊午巡撫貴州都御史王三善自大方還貴陽半道為苖賊所遮師潰三善死之監軍嶽具仰同知方明棟梁明泰副將秦民屏皆歿賊勢復張庚申天津三衛地震有聲川師入龍場獲奢崇明及其妻子僞官蔡金貴等丁卯以馮從吾為南京右都御史葉向髙請勿停添注以廣起用從之己巳何宗彥卒癸酉土笆籬番人貢馬及方物乙亥左副都御史喬應甲奏東林黨魁李三才借黃正賓汪文言交通趙南星髙攀龍等力為援引上是之丁丑獲妖人聞香教主王好賢誅之蘇州府同知楊姜忤織造太監李實蘇松巡撫周起元發實侵漁違禁諸罪不報葉向髙請召還文震孟等不聽裁施歸兵備僉事癸未日旁有黑子相蕩凡四日二月辛卯張輔之致仕壬辰張經世致仕癸巳葬冲懷太子丙申御經筵月犯軒轅右星丁酉以左僉都御史沈警炌為南京工部尚書薊州永平山海地震壞城郭廬舍無算免川廣閩浙香貢命朱燮元處置藺酋故地丁未以風霾諭邉臣戒備己酉以緝捕功進錦衣衛田爾耕少保兼太子太保壬子日黃無光甲寅京師地震宫殿動搖有聲樂亭地裂湧水尺餘三月乙卯朔王象乾丁母憂以吳用先為薊遼總督丙辰京師地震戊午京師地再震庚申夜復震者三癸酉視朝丙子進田爾耕少傅兼太子太傅御史劉廷宣請祀宋儒張載父迪於啓聖祠己卯諭京城緝盜癸未東江都司張盤遇敵于南關嶺死之是月杭州兵變廕內寺魏忠賢弟為錦衣百户夏四月甲申朔親享太廟丙戌榆林衛民家生豕一首二身二尾八足石砫宣撫司女將秦良玉其弟秦民屏死於王三善之難有㫖勞之命蔡復一總督雲南湖廣軍務賜尚方劍乙丑禮部侍郎董其昌奏輯萬厯留中諸疏並薦李維楨宿學史才從之獲妖民金科馬永等於江淮間誅之乙巳陽曲榆次地震給事中傅櫆誣奏魏大中左光斗與內閣中書汪文言交通罪狀詔下文言鎮撫司獄戊申諭行當十大錢嚴私鑄工部尚書王舜鼎卒太監魏忠賢緝私鑄廕賞命嚴訊汪文言大學士葉向髙乞歸不許叙淮徐禦妖功李養正進太子少保豫廕五月甲寅朔福寧州軍變命許顯純掌北鎮撫司乙卯賜毛文龍蟒衣仍給敕百道以待有功壬戌禱雨增鹽課癸亥乾清宫東墀旋風驟起吹內官監大鐵片盤旋若紙墜於西墀聲若轟雷甲子沈㴶死叙黔中解圍復城功丁卯孫承宗求去舉趙彥自代不許毛文龍請餉以四十萬給之己卯夜有流星如盞大青白色自壁入于天倉二小星隨之固原華亭大雨雹塞上大旱六月癸未朔存問周府應城王在銓並旌其子肅菬孝行左副都御史楊漣劾魏忠賢二十四大罪不問初魏廣微未相先事魏忠賢為父密導以邪徑及漣疏入忠賢懼謀于廣微令先逐葉向髙甲申忠賢辭東厰溫㫖不允丁酉給事中傅櫆陳良訓御史張訥各疏攻趙南星左光斗魏大中鄒維漣等丙申通州新兵譁保定地震己丑魏大中等劾魏忠賢客氏傅繼教傅應星之罪忤㫖下詔獄向髙救之得免癸巳午刻南方五色雲見太僕少卿朱欽相給事中許譽卿劉𢡟御史李應升特疏糾魏忠賢掌詹事禮部尚書翁正春給事中熊奮渭朱大典陳竒瑜吳𢎞業霍守典孫紹統楊維新等御史劉璞劉芳房可壯洪如鐘李喬崙郎中鄒維璉等各疏糾魏忠賢皆不聽丙申大雨雹皇子慈焴薨諡悼懷太子有中官騎馬入禁門毆傷衛士巡視科臣杜三䇿劾奏不問大學士葉向髙揭請退忠賢并罷內撡不聽魏忠賢矯詔杖殺工部屯田司郎中萬燝戊戌撫寧侯朱國弼劾魏忠賢奪俸閒住命錦衣衛逮其書奏舍人於獄壬辰逮巡城御史林汝翥汝翥畏杖亡去投遵化獄巡撫鄧渼以聞仍逮杖之霍州髙時正家生豕二身二眼象鼻四耳四乳尚書趙彥等合疏請退忠賢詔勿過計甲辰命王守謙往關門諭留孫承宗丁未朱燮元俘僞都督李逺達等二十五人至京恤録大方陳亡將士江南大水辛亥封光宗選侍傅氏為懿妃李氏為康妃秋七月癸丑朔藺酋奢史都等伏誅紅夷通倭逼福建禦之辛丑大學士葉向髙致仕以朱光祚為工部尚書總理河道南師仲為南京禮部尚書癸亥六科廊火南給事中楊棟朝劾魏忠賢搜括南都之害御史李應升為慘死萬燝訟寃黃尊素王振竒杜三䇿周洪謨萬言揚疏繼上俱報聞御史劉廷佐請誅忠賢不報詔進大學衍義補給事中劉𢡟請罷內操不報河決徐州山東饑賑之島師三捷八月甲午左都御史孫瑋卒貴州兵克岩頭寨以捷聞詔肅朝儀褒封五經博士孟所譽母張氏曰貞懿上耕籍田廣順天解額申明會典輿服之禁南兵部尚書陳道亨侍郎嶽元聲等合疏請去魏忠賢祭酒蔡毅中率合監師生千餘人請究忠賢二十四大罪以遵祖訓皆不聽癸卯以髙攀龍為左都御史辛亥以李維楨為南京禮部尚書九月壬子朔命直省搜求志傳奏疏文集等書送史館以備纂輯從御史劉芳請也發內運庫新造軍器於關門毛文龍屢奏捷音御史袁化中駁之曰外之捷在我未嘗斬將奪城在彼弗聞喪師失地小小捕獲何足獻俘俟文龍俘叛人至然後宣捷告廟未晚也不聽庚申髙攀龍劾兩淮巡鹽崔呈秀貪汚奪秩聽勘庚辰以馮從吾為工部尚書冬十月壬午朔親享太廟大學士魏廣微後至魏大中劾以不敬廣微求去溫㫖慰留廣微遂於魏忠賢所日媒孽之卒成乙丑丙寅之獄乙酉以曹于汴為南京右都御史己丑敇諭羣臣辛卯玉璽見漳氷濱巡撫河南程紹以獻文曰受命於天既夀永昌丁酉吏部尚書趙南星致仕己亥左都御史髙攀龍致仕福建官兵破走紅夷搗其巢獻俘封皇親王天瑞郭振明皆為伯十一月辛亥朔斥署吏部事左侍郎陳于廷左副都御史楊漣左僉都御史左光斗並為民起崔景榮為吏部尚書李宗延以吏部尚書掌都察院事前大學士朱國祚卒督師大學士孫承宗請入賀萬夀面陳方略不許命速回鎮己巳大學士韓爌致仕十二月辛巳朔復逮汪文言下詔獄召還賈繼春徐景濓王志道從御史梁夢環請也兩當民變殺知縣牛得用加朱燮元為兵部尚書以周希聖為南京户部尚書丙申削吏部尚書趙南星籍大學士朱國楨罷李維楨引􅔂致仕喬允升罷以黃克纘為刑部尚書癸卯南京地震如雷五年春正月庚戌朔五更木星逆行犯太微垣左執法辛亥召崔呈秀復其官戊午雲南巡撫閔洪學奏普安二新之捷辛酉諭江南重災地方漕糧改折三分之一浙江帶運糧米暫折一年甲子考察天下方面有司巡按貴州御史傅宗龍請暫停武舉専勵戰勇拔真才以收實用從之戊辰舉卓異閔夢得等二十四人命李蕃管理章奏癸酉恤貴州死難諸臣徐朝炯孫克恕王昌𦙍楊以成鄭鼎等贈官豫廕有差吏部請燒燬追到楊漣左光斗等誥命一十七軸乙亥大班糾核朝覲官員起李飬春為刑部尚書以董其昌為南京禮部尚書禮部左侍郎協理詹事府事何如寵冠帶閒住太僕寺卿劉宗周革職追奪誥命丁丑賜敇奬毛文龍戊寅以慶陵成加孫承宗少師兼太子太師兵部尚書俱進建極殿大學士林堯俞太子太保皆豫廕舊輔葉向髙加上柱國廕尚寶司丞朱國楨加少師兼太子太師吏部尚書建極殿大學士廕中書舍人太監魏忠賢廕錦衣都督同知王體乾等亦升廕有差曹于汴辭免南京右都御史新命許之南京兵部尚書陳道亨罷左副都御史喬應甲劾李三才為東林黨魁并及張問逹趙南星髙攀龍曹于汴假然諸臣章凡二十上俱下所司察議蔡復一奏織金之捷發帑銀十萬兩充黔餉是月白菱湖奸民楊桓等聚衆倡亂僞稱懿德元年擒之二月庚辰朔以陵工加林堯俞太子太保豫廕朝鮮來賀壬午以湖廣山東江西福建鄉試策問多譏刺語鐫主考方逢年章允儒熊奮渭李繼貞丁乾學郝土膏顧錫疇黃承業等各三級調外用御史劉廷佐論救亦鐫級調外乙酉命顧秉謙魏廣微為會試主考大理寺丞徐大化疏攻趙南星孫慎行并追論移宫及汪文言罪案遂命録用何熊祥王永光申用懋朱一桂陸卿榮王伉秦聚奎汪慶百徐揚先郭鞏劉廷宣邵輔忠姚宗文范得志諸人更換朝鼓己丑余懋衡疏辭南京吏部尚書新命許之戊戌月掩氐宿東北星壬寅豫孫如游諡文端甲辰朱光祚罷乙巳逮戚臣李承恩下鎮撫司獄魏忠賢誣其擅用御物也追理刑部右侍郎王之寀請嚴挺擊主使之罪斥為民丁未楊柄疏劾巡撫順天鄧渼賄結汪文言并糾何棟如詔鐫渼三級調用逮棟如勘問命太監王敏政胡良輔册封朝鮮李倧嗣為國王戊申我兵破旅順逰擊張盤都司僉書朱國昌死之三月辛亥工部主事曹欽程劾東林黨魁周宗建張慎言李應升黃尊素薦忠憤之臣傅櫆陳九疇李魯生張訥李蕃周昌晉李恆茂梁夢環張惟一顧其仁宗建等坐削籍逮問慎言命撫按追贓壬子栁佐卒癸丑李若星奏鎮蕃之捷起王在晉為南京吏部尚書王永光為南京兵部尚書改畢自嚴為南京右都御史甲寅幸太學釋奠先師臨彝倫堂魏忠賢以不便于已廢祭酒坐講三品上大臣坐聽之禮乙卯加魏忠賢弟姪官一級以緝獲李承恩功也丁巳詔革冗官下游士任于鎮撫司孟淑孔並行勘問己未趙彥搜括班軍折價銀十一萬兩九千八百有竒助工李仙品回籍聽勘庚寅命議經撫去留辛酉户部侍郎陳所學罷壬戍總兵官魯欽劉超深入水西兵潰總督蔡復一上章自劾詔欽超帶罪立功甲子起文球為兵部侍郎兼右僉都御史協理京營戎政甘肅巡撫李若星削職為民追奪誥命黔國公沐昌祚卒嘉魏忠賢修肅寧城功廕錦衣都督僉事於本邑建坊旌表從逆黨崔呈秀請也丙寅策試天下貢士睗余煌等三百人進士及第出身有差命沐啓元襲祖爵掛印充總兵官鎮守雲南毛文龍請借京營龍尾機炮以應軍中急用許之戊辰上諭許念敬送鎮撫司與汪文言一並勘問薊遼總督吳用先冠帶閒住庚午𢎞政宣治二門興工甲戌蔡復一致仕命朱燮元兼督貴州以李長庚為户部尚書兼右副都御史督理糧餉巡撫天津丁丑掌北鎮撫司許顯純讞汪文言之獄請逮楊漣左光斗袁化中魏大中周朝瑞顧大章同訊又誣奏趙南星王之寀熊明遇惠世揚毛士龍繆昌期鄒維璉黃龍光黃正賓鄧渼李若星盧化鰲徐良彥錢士晉施天德等並行撫按勘問追贓銀六萬兩法司會勘李承恩夏四月辛巳汪文言死于北鎮撫司癸未太白晝見丙戌開鼓鑄於荆州丁亥發衝車百輛於關門給事中霍維華借紅丸移宫之案誣奏王安劉一燝韓爌周嘉謨張問達孫慎行罪詔毁監生楊惟休私刻泰昌日録宥李可灼回籍一燝等俱斥為民加舊輔沈一貫少師癸巳起王之臣兵部侍郎總督薊遼何士晉削籍戊戍賜川湖雲貴總督朱燮元尚方劍便宜行事借太僕銀十萬兩給邉己亥削劉一燝籍養馬當差髙攀龍奪職為民起范濟世為南京都察院右僉都御史提督操江熱審慮囚以緝獲武元吉功廕魏忠賢弟姪一人都督僉事丙午發中宫及諸王公主助餉銀四十萬于各邉五月戊申朔逮原任御史方震孺下刑部獄沈正宗削籍蔡毅中宋槃致仕霍守典罷王洽閒住劉憲寵褫職己酉兵部尚書趙彥致仕庚戌韓光祐罷贈朱國祚太傅沈㴶太保並豫諡嶽駿聲追訟張差確係風癲命鄭養性回京居住下御史袁化中北鎮撫司究問丁巳翁正春罷行宗室限祿法己未以施鳳來錢龍錫丁紹軾李康先李標吳宗達充實録副總裁癸亥楊所修言挺擊紅丸移宫三案宜倣明倫大典勒成一書以示天下從之甲子趙彥張問逹周嘉謨削籍乙丑躬祀皇地祗於方澤回宫即泛舟西苑溺水賴救得免同載幼璫二人溺死丙寅前禮部尚書王圖閒住陳序糾之謂為門户渠魁庚午白所知罷命魏忠賢姪良卿僉書南鎮撫司徐光啓罷壬申以髙第為兵部尚書下顧大章於北鎮撫司六月丁丑朔命衡世子由闕慶世子倬㴶瀋世子效鏞周世子恭枵蜀世子至澍並嗣為王延安大風雪三日是嵗大饑人相食戊寅蕭雲舉罷翟鳳翀削籍聽勘庚辰濟南飛蝗蔽天秋禾傷盡辛巳余文疏參葉向髙陳一元陳長祚一元削籍田景新糾次輔朱延禧壬午張鳳翔罷丙戌朱延禧致仕樂元聲回籍聽勘姚希孟削籍起黃汝良為禮部尚書兼翰林院學士掌詹事府事周如磐為禮部尚書兼翰林院學士協理府事以王紹徽為左副都御史丁亥命毛孟龍襲封南寧伯己丑下左光斗于北鎮撫司庚寅鄖陽巡撫畢懋康前吏部左侍郎李騰芳削籍辛卯下魏大中于北鎮撫司甲午中官韓世祿劾髙陽知縣唐紹堯遣緹騎逮之丁酉王圖程正已趙昌運彭遵古李日宣程國祥削籍當差擢魏忠賢甥楊六竒為錦衣同知朱光祚削職為民癸卯下楊漣于北鎮撫司秋七月丁未朔躬享太廟滇南始開鼓鑄戊申胡應台罷庚戌下原任御史方震孺于刑部獄楊漣左光斗袁化中魏大中周朝瑞顧大章等諸奸以僅坐移宫不足蔽辜乃誣漣等並受熊廷弼賄囑許顯純等逐日比贓以肆其毒遣鴻臚官宣諭魏廣微入閣辦事戊午太白晝見辛酉御史倪文煥誣劾李邦華李日宣周順昌林喬枝等以講學譏訕朝政請碎其碑庚午韓䇿汪先岸追奪誥命選劉有福尚六公主齊贊元尚七公主何棟如謫戍崔景榮致仕以李宗延為吏部尚書壬申削原任大學士韓爌籍左副都御史楊漣左僉都御史左光斗並死於北鎮撫司被察御史康丕揚追論楚宗妖書事請定郭正域罪趙世卿議事不阿乞與議諡章下九卿科道詳議甲戌吏科都給事中魏大中死于北鎮撫司命嚴追袁化中等贓八月丁丑朔御史石三畏追論萬厯三十九年四十五年天啓三年三次京察顛倒是非主其柄者為邪臣李三才顧憲成王圖孫丕揚曹于汴胡欣王元翰王淑汴湯兆京王宗賢趙南星張問達王允成凃一榛王象春等十五人皆當治罪詔生者削籍當差死者追奪誥命已經削奪者禁錮并其子孫毛文龍疏頌册封朝鮮中官王敏政胡良輔使不辱命溫㫖報聞御史張訥奏毁天下書院削奪鄒元標孫慎行馮從吾余懋衡等六十人官甲申以鎮撫司緝獲蔣應陽功加魏忠賢弟姪爵二級戊子諭內閣曰朕自去嵗屏逐凶邪廓清朝寧勵精圗治雅意中興秉軸大臣莫有為朕分憂共念者即如楊漣左光斗移宫一事背先帝之深恩陷朕躬于不孝又熊廷弼等喪師辱國寸斬尚有餘辜楊漣等乃受其重賄巧為出脫天地不容神人共憤而在朝文武持祿養交徇私避禍但顧子孫之計不圗社稷之安朕方率循舊章而曰朝政日亂朕方祖述堯舜而曰大不相侔以致言官承望風㫖緘口結舌無敢直言其非自今宜改悔圖新共維國是如仍有隂懷觀望借題報讐或揑寫蜚書希圖翻案者朕按祖宗所立紅牌律治以說謊欺君之罪必不食言中朝政日亂大不相侔二言魏廣微揭中語也廣微大懼求救于顧秉謙又卸過於崔景榮故忠賢惡景榮而疏廣微命周如磐丁紹軾黃立極為禮部尚書馮銓為禮部右侍郎並兼東閣大學士入閣辦事九月丁未掌河南道御史袁化中死于北鎮撫司丁酉蔣應陽棄市以王紹徽為左都御史徐大化為副都御史吳宗禮為南京刑部尚書己亥魏廣微林堯俞並回籍壬寅册封任氏為容妃殺遼東經略兵部尚書熊廷弼傳首九邉丁未太僕少卿周朝瑞死于北鎮撫司以吕兆熊為户部尚書總督倉場甲寅前登萊監軍僉事佟卜年死于獄壬子遼師敗於錦州副總兵魯之甲死之甲寅皇極𢎞政宣治諸門工成加恩中官王體乾魏忠賢李永貞等並廕弟姪一人錦衣僉事忠賢加賞銀五十兩紵絲三表裏别廕一人都督同知給豫應得誥命陜西提學副使顧大章死于刑部獄中詔以楊漣等六人獄詞頒示中外又前鋒㮄湯兆京等明告天下崔景榮李孔度削籍夏之令逮問戊午周道登削籍辛酉給事中霍維華請採雲霧山木以佐殿工戊辰以李從心為工部尚書冬十月丙子朔皇第三子生容妃任氏出原任大學士葉向髙辭免殿工加恩不允癸未川湖總督朱燮元陳會剿機宜優㫖從之甲申准民間俊秀納銀入學召兵部尚書髙第經略遼東賜尚方劍及蟒玉銀幣諸物經略遼東乙酉康丕揚遣戍丙戌以皇子生停今嵗決囚土星犯太微垣上將丁亥傅宗龍上屯守方略戊子命禮部造鎮守薊鎮中酉八路關防月犯畢宿火星庚寅大學士孫承宗致仕豫馳驛歸辛卯改王在晉為兵部尚書命禮部造經略遼東薊鎮天津登萊等處軍務關防壬辰御史潘汝楨參朱世守楊一鵬劉䇿陸完學俱命削籍甲午誥敇中書吳懷賢以稱道楊漣疏為忠賢所惡下鎮撫司獄掠死戊戌擢許𢎞綱為南京兵部尚書十一月丙午朔追封容妃任氏為皇貴妃己酉揚州知府劉鐸以書箑有刺時語為緝事者所告逮下鎮撫司辛亥詔停止南都解茶壬子周如磐致仕陳熙昌陳子壯俱削籍熊明遇提問追贓乙卯刑部獄房火廕魏忠賢族叔志德為都督僉事己未萬夀節御門受賀甲子以冬至大祀奉皇祖配遣駙馬都尉侯拱辰告于太廟丙寅加原任工部尚書丁賓太子太保丁卯躬祀上帝於南郊上御殿受賀以臨雍特恩賜孔氏宗人孔聞範等入監讀書喬允升冠帶閒住甲戌嘉奬田爾耕總督川湖雲貴兵部侍郎蔡復一卒于軍詔贈兵部尚書諡忠惠革錦衣衛南鎮撫司指揮同知張道濬回籍十二月乙亥朔刋示東林黨人姓名於天下丙子毛文龍僞為俘獲百三十人以獻廣鹿石城二島溺死五人至登州私逃二十人登撫發兵緝捕皆拒敵死至京僅存十一人餘皆托之逃溺給事中楊文嶽劾之章下所司癸未李宗延罷李養正乞休許之以王紹徽為吏部尚書周應秋為刑部尚書乙酉薛三省致仕丙戌以緝獲功廕魏忠賢甥傅應星為左都督戊子原任吏部尚書趙南星以忤魏廣微併其子清衡俱戍邉太常少卿阮大鋮疏薦謝升傅櫆命吏部酌議以聞御史王珙頌魏忠賢籌國緝奸功優詔答之錦衣指揮僉事髙守謙毆殺原任檢討丁乾學於其第削奪金世俊米萬鍾王繼謨馬孟楨韓竒象方有度歐陽調律翟學程公鼐等三十六人官方大任提問追贓練國事李𤣥王祚昌霍鍈楊新期談自省等削籍復以緝獲功擢魏忠賢族弟宗孔都督同知豫魏忠賢甥傅應星父尚才母魏氏祭一壇仍建坊以旌母節辛丑御史吳裕中糾丁紹軾詔杖于闕下杖畢遂卒改周應秋為左都御史壬寅黃克纘罷董其昌致仕甲辰祫享太廟賑河間旱饑旌表節孝貞烈六年春正月乙巳朔上御皇極門受賀庚戌髙第奏我兵入右屯甲寅詔追王之寀周宗建張慎言熊明遇方大任及已故陶朗先楊漣左光斗顧大章贓銀以助大工給事中潘士聞疏劾曹欽程欽程削籍以逆黨攻逆黨也丙辰名皇子曰慈炅擢徐兆魁為刑部尚書戊午敕纂三朝要典以顧秉謙丁紹軾黃立極馮銓領之甲子擢李思誠為禮部尚書戊辰大風揚塵四塞庚午我兵圍寧逺辛未寧逺圍解御史夏之令死于北鎮撫司以喬應甲為南京右都御史二月甲戌朔嚴逃兵之禁乙亥加寧前參政袁崇煥為僉都御史專理軍務仍駐寧逺毛文龍請釋王化貞切責之丁丑西部入犯平川三山禦却之己卯周應秋請嚴追楊漣左光斗等贓庚辰月掩畢宿火星以來宗道為南京禮部尚書削石三畏籍逆黨自相攻也甲申賜駙馬都尉劉有福册誥冠服周如磐卒贈少保諡文懿己丑刑部擬惠世揚大辟候決大風揚塵四塞庚寅周應賔卒贈少保諡文穆壬辰崔呈秀頌魏忠賢觸事懷忠請宣付史館從之起張鶴鳴為南京兵部尚書癸巳大風揚塵四塞乙未大駕鹵簿成廕魏忠賢弟姪一人都督僉事丙申録四川殉難諸臣李忠臣等之後戊戌蘇杭織監李實疏參原任應天巡撫周起元并周順昌髙攀龍李應升周宗建繆昌期黃尊素等皆遣緹騎逮之詔袁崇煥奪情視事己亥上親朝日壇庚子大風揚塵四塞二月甲辰朔命南和伯方一元掌南京後軍都督府事丙午髙第乞病歸命總兵官滿桂以原官守寧逺丁未以中官為各鎮監軍叙緝獲功封魏忠賢姪魏良卿為肅寧伯豫誥劵世襲吏部尚書王紹徽請給以四代誥命併及忠賢祖父從之命袁崇煥巡撫遼東方震孺擬絞庚申區大倫削籍隂霾如雨成基命冠帶閒住以劉廷元為都察院左副都御史蘇州民變擊死逮周順昌旗校甲子命王之臣為兵部尚書兼都察院右副都御史經略遼東閻鳴泰總督薊遼封西洋大炮為安國全軍大將軍丙寅姜逢元冠帶閒住己巳三朝要典成夏四月癸酉朔親享太廟叙緝獲功廕魏忠賢弟姪一人為都督同知仍賜敕奬諭熊明遇遣戍賜魏良卿第宅朝房黃龍光鄧渼鄒維璉徐良彥遣戍乙亥遣官分取花石丁丑諭括各路銀助工己卯原任兵部尚書黃嘉善卒贈太保海寇林七老等合紅夷作亂官軍討平之己卯川貴總督朱燮元擒奢寅以捷聞癸未下繆昌期于北鎮撫司丙戌原任左都御史髙攀龍赴水死崔呈秀直陳要典之原優詔答之叙寧逺功廕魏忠賢弟姪一人錦衣都指揮世襲加袁崇煥兵部侍郎巡撫如故餘升賞有差癸巳上以敘功本未列崔呈秀名命以工部侍郎兼都察院左副都御史列名劉廷元之後禁夷人收買鐵器是日白露著樹如垂綿日中不散丁酉工部興工修信王邸第戊戌丁紹軾暴死贈太保諡文恪是日東北方有白雲名天裂頒肅寧伯鐵劵庚子下周順昌于北鎮撫司南御史張繼孟削職提問追贓助工再叙寧逺功李起元等各升賞有差五月癸卯朔董可威罷丙午以盛暑輟講陜西巡撫追參孫瑋乞革去恩廕追奪誥命從之原任左諭德繆昌期死于北鎮撫司戊申王恭厰災㷊死軍民無算是日薊州地震密雲俱地震有聲如雷三日乃止毛士龍黃正賓遣戍夏嘉遇擬徒姜志禮削籍己酉以王恭厰災下詔修省癸亥朝天宫災甲子以薛鳳翔為工部尚書巡撫登萊武之望劾毛文龍跋扈報聞丁卯以黃汝良充經筵講官戊辰賜肅寧伯魏良卿莊田七百頃於獻縣庚午神宗實録成六月丙子京師地大震天津三衛宣大連震山東濟南二府河南一州六縣皆震傷軍民無算丁丑皇子薨給魏忠賢三代祭葬誥命棄陳一敬市武長春所妄扳也丙戌霧重如雨戊子吏部員外郎周順昌御史周宗建並死于北鎮撫司河南盧氏奸民李宗善等聚衆為亂官兵擊擒之庚辰大學士顧秉謙等進三朝要典閏六月御史陳朝輔糾馮銓媚佞請斥之不聽巡撫浙江潘汝楨首疏為魏忠賢建生祠御史黃尊素死于北鎮撫司壬寅陳朝輔再糾馮銓命銓回籍聽勘册諡懷獻太子以倡議蠲免鋪墊賜敇奬諭魏忠賢遣錦衣衛千戶王涖民往徽州逮吳養春以擅黃山利也改原任總兵滿桂為中府僉事御史李應升死于北鎮撫司以朱一桂為南京右都御史壬子月犯天江第二星升閔夢得為兵部右侍郎兼右僉都御史總理五省兵馬錢糧乙卯月食隂雲不見毛文龍僞捷報功辛酉鑄巡歷諸路核軍餉太監官防以給紀用陶文等下周起元於北鎮撫司升馮三元為都察院右僉都御史協理院事壬戌中府草場火殺擊旗校蘇州義士顔佩韋馬傑沈揚楊念如周文元等五人王紹徽罷李若星遣戌秋七月辛未朔日有食之親享太廟日食隂雲不見河南地震黜刑部沈演為民癸酉停採雲霧山木命滿桂鎮守山海關掛印駐關門兼轄四路以周應秋為吏部尚書王永光罷乙亥畿輔地震辛巳寧夏地震命戎政尚書馮嘉會回兵部管事以薛貞為刑部尚書房壯麗為左都御史殺揚州知府劉鐸丙戌擢施鳳來張瑞圗李國􅕠並為禮部尚書兼東閣大學士入閣同首輔顧秉謙辦事李啓元致仕己丑月犯畢宿山西靈丘地震庚寅登州城樓火辛卯以郭允厚為户部尚書蘇茂相為户部尚書總督倉場安南入貢乙未崔呈秀為工部尚書兼左副都御史督察大工八月黃汝良致仕庚戌新城伯王升子錦衣衛指揮王國興以魏忠賢誣奏論斬癸丑以駱從宇為禮部尚書兼翰林院學士掌詹事府事吳從禮罷辛酉賜閔夢得尚方劍琉球入貢丁卯劉廷元請改正光宗實録九月甲戌福建地震編修姜曰廣給事中王夢尹頒詔朝鮮毛文龍稱病乞罷不允戊寅另設關外餉司己卯徐如珂朱欽相削籍辛巳以靳于中為南京刑部尚書巡撫應天兼僉都御史錢龍錫倪思輝削籍周起元死于北鎮撫司癸未太白晝見庚寅顧秉謙致仕甲午皇極殿成帝御殿受賀有聲如怒濤自殿中出朝班閧然魏良卿以殿工功進肅寧侯原任左都御史李鋕卒順天府丞劉志選承魏忠賢指誣奏皇親張國紀以危中宫御史梁夢環繼之詔捕其家人下詔獄冬十月庚子朔上御皇極殿頒厯親享太廟加賜魏良卿田三百頃孝陵指揮李三才為魏忠賢建祠賜額曰溥仁戊申進魏忠賢為上公加恩三等進魏良卿為寧國公世襲賜之誥劵祿米視魏國公例嵗支五千石莊田再加一千頃以示眷酬改修光宗實録甲寅以殿工加恩輔臣及部院卿寺並進爵有差毁江南江西等書院田土變價三千一十七兩以助大工壬戌工部尚書薛貞請加賜魏忠賢第宅命於己給一萬九千兩外更給三萬五千兩以示優禮元臣至意周應秋請再叙殿工十一月壬申宴外國使於左闕門乙亥畢自嚴罷戊寅以修孝陵功加恩魏忠賢三等廕子姪一人錦衣指揮僉事世襲丁亥南京地震己丑賜魏良卿寧國公鐵劵袁可立致仕以劉廷元為南京兵部尚書參贊機務閔洪學為南京右都御史癸巳宣甘鎮捷加恩魏忠賢三等廕弟姪一人錦衣指揮使以殿閣工成升授各監官匠及效勞委官王引直等共九百六十五人逮房可壯楊嘉祚追贓十二月己亥朔魏忠賢彚奏三年緝獲功廕弟姪一人錦衣指揮使世襲楊寰孫雲鶴許顯純皆加太子太保辛丑以山海關工成廕忠賢族姪希聖錦衣指揮同知復以秋防功廕忠賢甥馮繼先錦衣指揮同知戊申南京地震以范濟世為南京工部尚書辛酉起張鶴鳴仍以太子太傅為兵部尚書兼都察院右都御史總督雲貴川廣軍務兼督糧餉巡撫貴州偏沅以商周祚為南京工部尚書豫蔡復一祭葬癸丑給田爾耕孫繼華指揮僉事全俸時方二嵗潯州六斗窠賊胡扶紀等作亂殺守備蔡人龍把總鄧養等總督商周祚以聞戊辰李思誠削籍嵗暮行大祫禮告太廟旌表孝義節烈七年春正月己巳朔上御門受賀乙亥命中官凃文輔總督太倉銀庫崔文升總督漕運河道李明道提督通倉魏忠賢捐銀三萬餉遼廕弟姪一人錦衣指揮使世襲辛巳月犯軒轅大星甲申雲南定邉縣風雷雹霧橫漲漂沒鶴慶府鎮姚所石屏雲龍二州俱地震千崖宣撫司大星飛隕戊子南京地震盜入桃源縣劫庫縱囚庚寅信王疏辭景府地租銀兩優詔從之辛卯徐縉芳遣戍裁減三王之國公費二月己亥王之臣乞病歸庚子信王出府成婚甲辰命總督登津鎮守海外等處便宜行事中官胡良輔等移鎮皮島仍給敕諭關防丙午再叙寧逺修城功廕魏忠賢弟姪一人錦衣指揮使丁未賜寧國公魏良卿肩輿逮遵化道耿如杞丙辰命代世子鼎渭嗣為王丁巳瑞王常浩惠王常潤桂王常瀛俱之國擢劉志選為南京都察院右僉都御史提督操江己未以史永安為兵部右侍郎兼都察院右僉都御史總督三邉三月辛未我兵圍鐵山壬申豐城侯李承祚奏開採珠池銅礦不許戊寅我兵下安州旋攻黃山堡庚辰以雲南平定武尋之復宣捷午門丁亥以韓日纘為南京禮部尚書戊子我兵攻朝鮮庚寅命魏忠賢所廕指揮使俱改尚寶丞夏四月丁酉朔親享太廟銀定矮木諸部犯邉擊却之斬首百八十級下王之寀于北鎮撫司戊戌上傳諭太常寺時享太廟牷牲不潔著令嚴處飭行工部主事吕下問激變黃山士民回籍聽勘己亥馮嘉會卒以王之臣為兵部尚書辛丑暖泉等部入犯禦却之擒獲阿班歹等歸功魏忠賢叙廕辛亥程正已遣戍壬子以隆德殿工成廕魏忠賢弟姪一人為指揮使癸丑刑部侍郎王之寀死于北鎮撫司李宗延卒范濟世罷以張璞為南京户部尚書五月丙寅朔安南入貢庚辰松套諸部合騎入犯禦却之辛巳我兵圍錦州壬午封銀礦洞口以三藩役竣廕魏忠賢弟姪一人為錦衣指揮使擢張曉為兵部尚書兼右副都御史總督宣大山西等處軍務插漢諸部入犯總兵官姚世卿撫之遂受款乙酉命户部開會計局清天下賦役册及九邉兵籍太學生陸萬齡請祀魏忠賢於國學內以配孔子許之丙戌我兵圍塔山錦州圍解甲午開濮餘孽鄭江等復作亂官兵擊平之六月我兵攻寧逺總兵滿桂禦却之遂奏錦州解圍之捷海冦一官老犯福建銅山等處宣延鎮捷秋七月乙丑朔命魏良卿攝享太廟以宣捷詔諭羣臣總督商周祚奏潯州𠞰蕩功報聞丙寅袁崇煥致仕己巳申禁鄉會試文不得詆毁朝政癸酉上不豫詔遼士子山東鄉試中二名己卯叙錦州功封魏忠賢四嵗孫魏鵬翼為安平伯加少師嵗祿二千一百石賜誥劵壬午戍原任禮部尚書孫慎行於寧夏賜魏鵬翼土田七百頃刑部尚書薛貞以髙攀龍之死由其子世儒不能防間奏戍邉衛移內市於𤣥武門八月甲午朔豐城侯李承祚頌魏忠賢功比中山王請如例封兩公章下兵部丙申霍維華叙寧逺功加恩寧國公魏良卿於見任太子太保上加太師而止尚餘一級統候聖裁上諭嵗增祿米三百石仍給誥劵以彰優禮元勳至意戊戌以三殿告成封魏忠賢弟姪一人為侯世襲大學士黃立極等各進官有差中㫖以崔呈秀為兵部尚書仍兼左都御史庚戌以崔凝秀充總兵官鎮守浙江乙巳召見閣部科道官於乾清宫諭以魏忠賢王體乾恪慎忠貞可與商確大事黃立極等對曰皇上任賢勿二諸臣敢不仰體盛心帝悅丙午頒示東林後徑榜於天下再叙殿工封魏忠賢姪魏良棟為東安侯賜豫如鵬翼餘皆升賞有差是年薊遼總督閻鳴泰順天巡撫劉詔巡按御史倪文煥梁夢環請建魏忠賢祠於西協賜名崇功工部商人建於京師曰崇仁建於通州曰懷德太僕寺少卿何宗聖建於房山曰顯德薊遼總督閻鳴泰巡撫袁崇煥建於寧前曰懋德總督宣大張璞巡撫曹爾楨巡按劉𢎞光建於五臺山曰報功建於太和山曰昭德李若琳建於蕃育曰感恩薛世昌建於松江曰德馨巡宣府秦士文建於宣府曰隆勳總督張璞再建於宣大曰德勳建於鳳陽曰旌德建於建昌曰崇德工部郎中曽國楨建於盧溝橋曰隆恩監生陸萬齡請建於國學春秋祀通政司經歷孫如冽建于宣武門外曰懋勳延綏巡撫朱童䝉建于本鎮曰祝恩武清侯李銘建于崇文門外曰鴻勳總督保定梁世勳建于安定門外曰著愛工部侍郎盧大受建于京師總督閻鳴泰建于景忠山曰廣恩登萊巡撫李嵩巡按李精白建于泰山曰隆熹並嶽又寧海祠曰景仁蓬萊閣曰流鴻總督遼餉户部尚書黃運泰保定巡撫張鳳翼提督學政李蕃巡按倪文煥建于河間曰仰德建于天津曰感仁上林院監丞張永祚各建三祠曰存仁曰洽恩曰永恩五軍都督府等衙門建于京師曰德芳曰茂勳河南巡撫郭增光巡按鮑竒謨建于開封曰戴德江北曰瞻德巡撫張鳳翼建于真定曰旌勳巡撫大同張翼明建于赤城曰崇功總河侍郎李從心漕運侍郎郭尚友等建于濟寧曰表勳巡鹽御史許其孝建于揚州一曰瞻恩一曰流恩湖廣巡撫姚宗文鄖陽巡撫梁應澤巡按溫臯謨建于武昌曰隆仁承天曰𢎞惠均州曰戴恩總督三邉史永安巡撫胡廷美巡按莊謙建于太白山曰𢡟彞楚王華奎建于髙冠山鳳皇嶺之陽亦曰隆仁直𨽻提學御史李蕃再建於河間題曰九千嵗山西巡按李燦然會同巡撫牟志䕫建于河東曰褒勳福府承奉建于洛陽蘇州巡撫建于虎丘曰普惠李實建于杭之西湖請以百户沈尚文等世守之賜額曰普德施鳳來記其事張瑞圖書而刻諸石時生祠遍天下皆請賜額淮安曰瞻德崇文門曰廣仁濟寧曰昭德河南曰成德山西曰報功大同曰嘉德登萊曰報德房山曰顯德陜西曰祝恩徽州曰崇德通州曰懷仁昌平亦立二祠曰崇仁曰彰德密雲曰崇功林衡署曰永愛江西最後曰隆德獨福建竟未有請者甲寅帝大漸傳㫖肆赦二十二日乙卯崩於乾清宫年二十三遺詔以皇五弟信王嗣皇帝位十月庚子上尊諡曰達天闡道敦孝篤友章文襄武靖穆莊勤哲皇帝廟號熹宗明年三月葬德陵外史氏曰熹宗天資剌謬而性多淫巧酷嗜匠作目營心運為之既成復毁又喜馳馬試劍手格狐兔而為笑樂以是逆奄伺其所好日供斫削之事俾無刻暇一切章奏皆不及覽遂致太阿下移羣凶在列屠戮忠良放逐賢正使天下囂然喪其亷耻之心竟有奉忠賢以竊窺神器者而帝惛然罔覺乃至三案之事身所諄諄告誡焉者亦任其翻倒而莫之知安望其能整齊庶政乎天禍人國生此不才而破壞天下至于不可收拾俾愍皇帝承之蓋亦不幸而逢其會矣余作是稿皆以下東林諸賢于北鎮撫司為文後同事者悉改為詔獄余以為不然夫詔獄者天子之獄也北鎮撫司雖曰天子之獄實逆璫私有者也烏可以天子之獄而斃諸賢良乎余故悉仍其舊至于災異例另有志故同事者刪之然當此君昏臣逆之時不附以災變則依然光天化日之中也何足以警後世之君臣乎余故亦仍其舊至于祠璫諸臣同事恐得罪其子孫之有力者盡刪其姓名余謂史以直筆為正古者史官屢殺而屢書故其人其文傳之千古也夫明著其姓名正使其孝子慈孫百世不能改而為惡者懼矣即令其子孫見之亦兢兢焉惟善是圗而思幹蠱焉若竟去之何異張瑗疏奏璫壟之碑盡沒于永㝎河工而俾奸人之子若孫反得揚眉吐氣何以示勸懲耶余故悉仍其舊云東林列傳卷末下
