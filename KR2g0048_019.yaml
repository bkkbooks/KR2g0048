body:
  text: 東林列傳卷十九江陰陳鼎撰明楊時喬傳楊時喬字宜遷江西上饒人弱冠舉進士授工部主事抽分杭州先是𣙜關稅者以增入為能取商浮故額時喬相天時豐歉為經度地宜深涸為紀順人情願惡為規曲盡其方無幾時課皆足又恐法不經久乃獻議於朝請稅銀止據日收數盡行起解不得拘泥以前數取盈庶上不病國下不病民朝議韙之遂著為南關𣙜事書垂永久升禮部員外郎遷尚寶司丞以病歸萬厯十四年起南京太僕寺丞轉尚寶司再以病歸二十年補原官歷通政時留都異學繁興故參政羅汝芳作俑其徒推為聖人建祠祀之時喬抗疏曰佛氏之學其説主戒律輪回因果慈悲福田利益粗淺僅惑庸衆自單傳直指一入則賢知髙明者信之然猶自為一説不與儒者混為一途自汝芳借孔子言仁孝言人心倡言人心見性成佛髙談渺論曰吾學直捷不煩修為曰吾道廣大無所障礙謂傳注為支離謂經書為糟粕謂躬行實踐為腐迂謂人倫物理為幻妄謂紀綱法度為桎梏謂禮義亷耻為虛偽惟一了此心市金可攫處子可摟蕩檢踰間皆為率性總為無傷反道亂德取俗傷化此正古人所必闢者而新學小生轉益信從立祠聚衆禍將何極乞敇所司拆毁散遣以彰明風教詔從之歷吏部右侍郎三十二年尚書李戴致仕署部事時喬棲止銓署盡絶請托會大察京官閣臣沈一貫移書欲留錢夢臯等其餘黨中璫皆有所庇左都御史溫純不從夢臯等取中旨留用反攻純吏部員外賀燦然忽疏參純並夢臯等謂吏科共事察典且為臺長溫純惜藉非銓臣夾持吏垣力爭臺長得行一意得毋盡廢公而行私乎時喬駁之曰臣與純同事一體私則皆私如謂果由於純是徇私固私也臣徇純私尤私也徇私為人臣大惡如有之其應斥尤在純上至夾持之説臣實不知所夾持者何事適以重臣同事二心之罪臣始事倉卒未能先幾和調後事因循未能力圖鎮定以致羣倫喧囂事局未竣職掌謂何乞並罷臣以為不恭任事者之戒不報當是時輔臣弄權言路縱肆尚賴時喬力持之不為所撓又請復開行取又立疏壅之法簡汰頑鈍署部事五年號為清平時省垣競進皆自擬正升閏升重內輕外時喬謂今日越法易後日守格難誓不徇情壞法自某始故升補必要於例又特疏請用詿誤官范鐫等一百十人遷謫官鄒元標等一百九十人以疾請告不允卒於官篋無寸絲至不能殮四司佽助之以畢大事時喬天性淡泊久處田畝歷官強半家居至少宰方從事於官猶不攜家蔬食緼袍清苦甚於寒畯造詣剛方不為勢要所奪贈吏部尚書諡端潔歿後天啓間魏逆用事以時喬曾薦元標等乃列黨人榜中追奪贈諡至崇禎改元乃復外史氏曰當清流之厄於姦輔舉朝一空矣非先生為之置辨朝廷其孰知之哉讀其薦剡曰門户之見彼姦佞借之以傾正人耳在朝廷不可以門户而不辨其賢不肖也夫講學諸臣所以明倫紀也非所以樹黨而害朝政也縱曰樹黨亦君子之黨矣必無害於國家也烏可不明辨而槩以黨人目之乎其言愷切如此而沈一貫欲害同輔立黨以攻一時賢者斥逐殆盡繼之者遂承其衣鉢大嘻諸賢乃有講學之攻而清流受禍矣惜乎先生年不副德卒使諸賢淪落無盡殆有天意存焉鄒維璉傳鄒維璉字德輝江西新昌人萬厯三十五年進士初授延平推官孤介有大節一刺不通巡撫袁一驥嘗以私怨羅織下屬維璉多所匡救不肯枉法獻諛監司又欲為一驥立生祠維璉立阻之以是得抗倨聲久不調凡八年始行取至京師不赴權貴人或招之維璉曰寧失臺省不可失吾節也待命闕下又二年始除南京職方主事值遼事急條上時政格不行已進員外郎以憂去天啓三年起補職方郎中即上疏請去債帥之弊言邊帥結納津要皆乞貸於素封之家而責償於卒伍壞武備而裂封疆病實在此臣謂中外薦典寧簡無濫寧崇實效無採虛譽則舉刺公而將帥不敢營薦居間絶而將帥不能求遷庶不至剝軍以償債則軍法可行虛冒可杜僥幸去而真才勸疆場其有起色乎疏入報可時有宋明時者自言能役神兵討賊刑部主事談謙益薦之於朝將大用維璉復抗疏言將帥必求得人左道不可破賊乞敕當事諸臣鑒古酌今毋惑神説以貽天下後世笑吏部尚書趙南星見其疏深嘉之南星素知維璉清方有為及為冡宰欲大飭銓政請於朝得就近調補司官上許之於是南星移維璉於稽勳司踰月復改考功故事銓司無一省兩人者時南昌吳羽文已為考功主事人多以非例責維璉謂當引去而給事傅櫆已潛通魏忠賢故因事羅織東林首欲攻維璉以撼南星又日迫羽文使行羽文遂杜門求去不許維璉亦求去南星恚上言司官不為用請旨詰責以尊朝廷維璉乃入視事會左副都御史楊漣劾忠賢二十四大罪魏大中繼之諸臺省部寺彈章疊上忠賢初亦窘甚傅櫆陽上疏自明不附忠賢而實隂搆忠賢趣成汪文言之獄忠賢以有外助遂矯旨責漣沽直罰魏大中俸並責諸臣瀆擾廷臣駭然咸惴惴危懼維璉乃上疏曰臣觀今日天下亦脊脊多事矣全恃君側肅清朝政修明庶可支將傾之厦奈何有厰監魏忠賢積惡內廷又增腹心一大患也忠賢罪狀罄竹莫書憲臣楊漣首發其惡讀者感憤至於泣下臣謂討賊之典當不踰日乃皇上護庇忠賢惟恐傷之且有督過楊漣沽直之旨皇上豈真是非舛誤而輕祖宗天下於一擲乎夫從古大惡大姦每借小忠小信以獻媚及其罪惡既盈慘禍立見歷觀往代明驗昭然今忠賢罪狀已彰即不請死於皇上之前亦宜亟辭厰務移住間宅以示天下悔過之意或可保其天年不當再聽姦人布置挺而走險以求必勝不然天怒人怨皇上即不肯割忠賢天下倘有代為割棄者忠賢萬死不足惜其如國事何哉臣願皇上煥發優詔奬勵直臣下忠賢法司定罪或赦而不誅亦令謝事庶人言可息宗社可保矣疏入忠賢復矯旨切責維璉既非言官亦來瀆擾維璉知勢不可為乃告病張訥遂希忠賢旨疏劾維璉削奪為民尋下獄謫戍貴州崇禎初忠賢敗起南太僕少卿五年由僉都御史巡撫福建維璉至閩疆察吏安民禦倭弭盜竭力匡救時艱至廢寢食然與政府不合謂其黨東林也明年值紅夷之亂攻閩之霜山維璉檄鄭芝龍急擊之芝龍以粵寇未靖自引兵至福寧與戰後期不至而紅夷復操大艘突入中左焚我戰艦官軍多死傷者維璉乃還福州趣發餉給漳泉募戰士犒有功授諸將方略以陸兵截嶺道布水兵阻諸港乘小舟出奇擊賊諸將皆奮芝龍自福寧來亦誓死戰斬獲無算賊遂棄中左入大洋維璉因上疏劾芝龍縱夷之罪芝龍方有內援上先入其言下部議維璉罪亡何賊復犯石灣海澄同安諸處維璉皆擊走之先後捷上復自劾不能平賊為芝龍所誤而吏議已下竟奪維璉官是時維璉方大集舟師自漳州調發諸軍至銅山與賊遇苦戰凡八晝夜大敗之生擒酋長數十人焚其舟艦器械略盡捷聞上命止論將士功維璉破賊班師還福州始知罷官因上疏自明不報遂解組歸久之卒維璉撫閩三年山𠞰海戰頗有成算大有功於閩乃為政府以門户讒抑中外惜之外史氏曰厯泰啓禎之間廷臣所稱東林君子者知有君臣大義同道一心而已安有所謂門户之見者哉逮小人挾邪説以攻造門户之名加之不欲使其吐氣究其禍之始者江陵先兆其萌蘖而後則沈一貫之忮沈鯉命其私人康丕揚錢夢臯等立幟以攻其後朱賡王錫爵沈㴶溫體仁周延儒陳演輩皆奉其衣鉢而直至國亡德輝先生在廷侃侃為公家也孰知姦人遂以門戶讒之俾明主竟惛然莫宗亦以為門户不可不破也於是斥逐之放流之而不容清流一日安於其位卒致寇滿天下廊廟無人覆其宗社而止焉噫小人之心何心哉孫瑋傳孫瑋字以貞陜西渭南人登萬厯五年進士由行人考選給事中以母病不候旨竟歸降桃源縣主簿纍遷至保定巡撫嚴法令剔蠧弊節浮費廣儲蓄摧強扶弱民賴以安時滹沱水溢從𨽻勸瑋乘船以避瑋不可擇署中稍髙處居之曰水至此惟有死耳水僅及牀足而止衆服其持重遷兵部侍郎轉户部總督倉場升兵部尚書管左都御史事瑋清亷不受餽遺督倉管察皆有聲譽又性忠純敢直言極諫會星變因上疏其略曰陛下有綏惠之仁而奉行者無愛民之實政陛下有綜核之智而任事者無體國之實心如吏治清矣而闒茸庸流齷齪小輩未盡汰也財用節矣而冗食積蠧冒賞積姦未盡革也苞苴風息而營謀干進者尚多驛傳費省而尅剝取媚者猶衆北邊稱貢矣而邊民之困於飢寒者無投石超距之歡廣寇稱平矣而生靈之斃於干戈者有玉石俱焚之慘蠲租之詔屢下而以掊克為能者竭澤而漁欽恤之命屢頒而以摶擊為事者向隅而泣諸若此類上干天和惟陛下猛力回心朝乾夕惕仍敕諭各衙門崇尚本實洗滌舊染大臣懷翼翼小心之忠小臣持蹇蹇匪躬之節所謂應天以實不以文者在此疏入報聞會應天巡按荆養喬與督學御史熊廷弼相訐朝議欲獨罷養喬瑋按法兩斥之楚人之論紛起纍疏乞歸至二十四疏溫旨慰留是年七月出城待命十月乃允歸天啓元年起南京吏部尚書明年改北刑部未任再升北吏部尚書仍掌左都御史事時朝政漸亂閹寺擅權屢以母老乞歸不允尋卒於官方瑋未卒之前一日效古人尸諫遺疏上陳謂今天災迭見民不聊生內而城社可憂外而牖户未固法紀凌遲人心瓦解陛下欲圖治平莫如固結人心欲固結人心莫如汲用善類如輔臣劉一燝憲臣鄒元標尚書周嘉謨王紀孫慎行盛以𢎞鍾羽正侍郎曹于汴詞臣文震孟科臣侯震暘臺臣江秉謙寺臣滿朝薦部臣徐大相等並老成丰度蹇諤英姿而匏落林泉跧伏草野陛下若聽臣言漸次簡擢必能任昭德塞違之責效拾遺補闕之長振飭紀綱提醒聾瞶以為陛下收拾人心尤望陛下寡欲以保聖躬勤學以進主德優容以廣言路明斷以攬大權天意可回民志可定疏入上竟不報贈太保未幾魏忠賢用事斥為東林黨人矯旨削奪為民瑋聲色貨利一無所嗜當官守法務在鋤抑強梗不為瑣屑科條居常恂訥寡言及當大謀議衆相視莫敢發獨守經據古片言取決而於取豫去就尤嚴兩辭冡宰堅請投間以名分定儲皇之位蓋老成正直君子也崇禎初復原官諡莊毅外史氏曰余稽漢制御史大夫與丞相位埒也其可屈指者周昌之強項貢禹之清直薛廣德之敢言尚矣先生不必盡有之而持躬束行從容養重進而議於朝廷退而議於草野者又何多遜也迹其尸諫一疏勤勤懇懇嗚呼古大臣所謂以人事君者先生其庶幾乎李繼貞傳李繼貞字徵尹太倉人萬厯癸丑進士授大名府推官舉卓異升工部主事調兵部副山東典試發策以漢唐閽寺為問時魏璫焰方熾指謗訕調官尋革職崇禎元年起補武選司改職方嚴法紀絶賕賂債帥不得通饋遺有營刺者抑之造御覽册先戰功次列督撫薦因召對具言武臣難知狀又言邊事弊在有查點無訓練上顧曰惟爾稍有執對曰臣無寸長惟苞苴情面自分斷絶上善之四年延綏大飢繼貞上疏請賑曰皇上以數十萬金錢而活數十萬生靈福澤莫大焉活數十萬生靈而農桑復業所獲賦稅不止數十萬金錢也利益莫大焉彼地斗米銀四錢發銀不如發粟之有濟宜先發四五萬金用董摶霄人運之法就近糴粟輸至軍前更敕直省援納事例及贖鍰俱輸粟入邊酌量腳價低昂其直使輸者稍有饒益則輸必多可以撫飢可以賞功而依賊之民必散賊不就降必就縛耳會延撫洪承疇秦帥杜文煥請撤王承恩還鎮繼貞疏覆不獨王承恩宜還鎮延綏即楊騏亦當還鎮固原不獨二將宜還鎮其部下兵亦宜隨之西還使之殺賊賊平乃許歸秦中撫鎮既得西來兵將之助勇氣自倍賊當消沮而後可𠞰撫並用撫非撫賊撫我飢民之從賊者已從賊者雖多猶有限未從賊而勢必從賊者無限當此斗米四錢之日慈父不能有其子而能禁其束手就斃乎宜如神廟四十四年特遣御史賑荒東省之法必得三十萬石之粟以往盡心賑濟賊就撫者給以耕種推誠安插如此則民之己化為賊者還化為民而將化為賊者永不為賊賊勢漸孤必有斬元惡以獻者疏入上乃令王承恩還鎮遣御史吳甡以十萬金往賑而藩王以下捐助五萬金粟麥二萬石然所救不及十之一七月因遣楊嘉謨還鎮繼貞再疏爭之曰前賑臣攜十萬金往度一金一人止可活十萬人而斗米七錢亦止可活五十日耳皇上宜敕賑臣回奏十萬金果足乎不則當早沛恩膏雖內帑不宜惜也繼貞嘗語人曰賊初起得十萬金便可濟吾爭之經年始見從今賊勢己十倍於前非三十萬石不可主上以國用匱乏慎惜金錢雖下手詔命專使所齎止此如以杯水救車薪庸有濟乎後卒如其言五年登萊兵變總督議主撫仍以官兵駐登城繼貞持不可請調關外兵解登圍亂乃定繼貞在部久邊事益練習先幾料得失瞭若指掌權幸以請托不遂嗾論之解任亡何起補尚寶司卿旋改北五月轉順天府丞甫十日特升兵部左侍郎都察院右僉都御史撫天津津故水陸衝嵗給遼關永薊餉一百二十餘萬石繼貞作三運接次無後期率僚佐練軍實開屯田五萬一千頃嵗收榖數萬斛城中地瀉鹵相地鑿渠井得給飲軍民大安舊制遼餉中米豆一頃每嵗召賣於各州縣陸運至遼墊解等費十倍本色餉司葉廷桂侵牟不可算繼貞繩以法遂結厰衛隂中之會劉應國兵失利詭言津登兵後期論罷已上念繼貞不置即家拜兵部右侍郎疾亟具疏辭復下南京操江巡撫之命命下繼貞已卒天下惜之繼貞負幹略以孤立得主知三黜三起居家逺權勢蕭然若寒士所著有津門草雪虹閣集外史氏曰當先生之忤璫也幾有詔獄之禍矣嘗自懷鴆毒以俟緹騎曰吾不能若楊左堪𫾣朴也幸而熹宗即崩不然殃及之矣至其經濟非當時諸臣可及奈何權幸之不容遂使三仕三黜不得大展徒為天下所惜耳張三謨傳張三謨字緯典平定人性至孝母歿廬墓三年哀痛無虛日郡邑旌為孝子弱冠舉於鄉即負笈往師髙邑趙南星南星一見語人曰張子正人也館於家者十年講學論道晝夜不輟天啓二年成進士授行人時南星為冡宰魏黨方齮齕之人莫敢近三謨獨比屋往來不少避凡三使秦楚汝陽得免禍崇禎元年選授御史首上疏排逆黨評隲諸臣品行劾李魯生去之因旱陳言極論楊維垣議論邪遁張朴張訥表裏為姦奉旨勘議又疏言治亂大關在輔弼臺諫各得其職閣臣盡心輔導票擬一切務以成就君德符合輿論或有所失許言官不時爭執惟當就事論事固不得為輕浮詆毁之言以傷大臣之體亦不得凡因小言輒求引去務秉虛公以成休容之風上深是之二年巡按福建海寇李之奇就擒與有功焉差竣掌道不快於三謨欲出之上曰張三謨才守可原他無錯著回道管事明年丁父艱七年服闋補原官上目擊時艱一疏憂國事將壞欲圖共挽其責首輔溫體仁尤切上嘉納之或語體仁曰張御史一疏公不第當認過且當下拜不當嗛之也體仁佯懌之會冡宰缺上召諸臣面舉吏部侍郎張捷乃舉呂純如吏科盧兆龍同科道諸臣合奏純如名在逆案不可用捷力言其賢且為訟寃三謨復奏廷推冡宰甚重即果事非逆案亦論昭雪何與廷推純如生平賢否姑且勿論業己身負重纍何以服人捷再三奏倘有不效臣甘認罪三謨言天下事豈堪嘗試捷語遂塞退復補牘爭之事得寢八年巡按順永保河九年掌河南道熱審平反甚多有寶鈔活羊之賜御史詹爾選直言觸上怒下獄命三謨看議從輕忤旨降行人司正十一年升光祿寺丞尋遷大理寺丞署印務上罪司寇劉之鳳欲置大辟三謨議當戍上駁之或曰何為寬人危己朝廷之法從朝廷而已三謨作色曰爾知法為朝廷之法不知法為天下萬世之法乎執議如初上怒鐫三級十二年進少卿明年升順天府尹大理寺卿十五年內閣謝升得罪嚴旨議處臺省新進阿首輔意欲置之死三謨獨曰聖怒即不可逭但故相薛國觀賜死未久不一年而殺兩相臣如國體何於是悉從末減不數月有枚卜之典三謨與房可壯宋玫與焉閣臣陳演以舊憾銜可壯隂激上怒遂與冡宰李日宣掌科章正宸掌道張煊同逮下獄南北言官交章申救放歸卒於家外史氏曰思陵之朝忠直之臣如緯典先生者亦多也皆置不用而用溫體仁陳演輩諂諛之徒者是何肺肝耶邦之傾覆不亦宜乎毛士龍李守俊列傳毛士龍字禹門宜興人萬厯癸丑進士授杭州府推官以賢能著擢刑科給事中過同里何士晉寓適楊漣至士龍從未識漣避屏後聞漣語慷慨激烈知其非庸人也即往拜定交自是每事與楊左相左右羣小嫉之內官劉朝以盜宮下獄時魏忠賢用事朝夤緣內宣士龍嚴為指參旨中寢既而朝以閣援得脫典禁兵嗾忠賢害士龍適蘇有五人擊殺緹騎之變忠賢懼乃變計離其籍而殺之先戍士龍於平陽隨而逮之士龍乃挈妻子潛遁深山中璫敗乃免崇禎登極得復其官李守俊字念敬由進士授髙要令兩入秋闈皆稱得人以治行擢户部主事司榷九江未及期而課足即放關通舶免其稅商人德之為立祠以祀焉歷官至司道天啓五年遷廣西布政時天下藩司皆為逆璫建祠守俊耻不赴任璫使御史田景新劾守俊黨髙攀龍削奪聽勘崇禎改元補廣西布政召對改湖廣左布政卒於官櫬過九江父老相率攜雞酒泣奠曰放關一事目中不可復覩矣外史氏曰禹門先生與漢之張儉其行徑何異哉嗟乎漢與明之亡也以用宦寺而逐清流同一軌焉奈何後世君王信任宦官甘之如石蜜而忘其毒甚於虺蛇也耶念敬先生放關一事膾炙人口至今商民追思不置萬厯崇禎間用宦官司榷天下元氣剝削盡矣蓋關稅一重則百貨俱昂凡民間日用布帛菽粟無不倍價而細民重困咸思為盜此中原所以塗炭也元耶律楚材柄國濟益甚多至稅課長二悉用士人嘗語人曰不讀書人見小而貪利罔知亷耻俾司錢榖必至劫掠平民者矣及其卒悉更其所用者曰類人類人者同類之人也斥士人為異路異路者不同道者也一切財賦鹽𣙜之司士人不得望見焉而平章省路津要之官所用非人交相徇庇上下征利直至民窮財盡人人思亂而朝廷不知卒亡天下而後已嗟乎元與明用小人與民爭利而亡又同一軌也蔣允儀傳蔣允儀字聞韶宜興人萬厯進士初授桐鄉令以亷明著調繁嘉興邑困於賦役由田不均之故也允儀乃作均田法上之當事民乃得蘇以最擢御史抵任即劾王紹徽姦貪狀紹徽革職時魏逆竊柄允儀於冬至節上扶陽抑隂疏言賢士大夫陽也宦官宮妾隂也忠賢怒矯旨切責奪俸出按三秦盡釐諸弊秦民大安回道後京師傳言魏璫嗾上親征哈利慎部因巡狩各塞允儀乃上疏曰古帝王之用巡狩者因與民分土人各有君而生殺豫奪皆由諸侯大主虛尊全無繫屬若非五載一巡守遐陬僻壤君德厚涼人情苦樂孰得而知且黎庶何由仰而歸德陳詩觀風廷見耆老以示四方知有共主而操生殺賞罰之權諸侯之命繫焉而不敢肆志於吾民也後代四海一家天子一尊矣一命之吏廢置皆由朝廷又何必巡守以重勞焉至於哈利慎部朗素貴英入犯不過命一良將帥三軍往征可耳又何必天子側身戎馬哉疏入不報然親征之説遂止既而王紹徽賂忠賢起為都御史嗾門人蘇兆先劾允儀為東林渠魁削籍歸時李應升被逮下北鎮撫司寄詩允儀曰與君夙昔為兄弟意氣寧論杯酒間他日蒙恩弛黨禁老親稚子待君看允儀得詩垂涕曰正恐我亦不免一逮耳崇禎改元起掌河南道遷太僕少卿轉巡撫鄖陽密疏唐藩不軌上因撤其護衛移撫襄陽因守道徐景麟誤傷官兵株及允儀亦被逮論戍後以護陵功推屯田都御史未任卒著有淡香園文集行世外史氏曰先生洞悉巡幸之禍而力沮其謀蓋鑒於秦漢隋代及武宗也九邊之官吏軍民幸矣夫大舜五載一巡守國不費而民不勞良由兵衛少而征求寡也若秦皇帝後車萬乘漢武帝旌旗蔽空隋煬帝舳艫千里豈不用民力乎當煬帝之出也宦官之株求侍從之需索閭閻之鋪張行宮之供奉牛羊雞犬日以萬計所過地方燈樓綵市陸離相接倡優龍陽之供奉有司以千百集矣大臣小吏乃至縉紳子弟及監生生員富商巨賈皆命進骨董以為敬行宮帷幔多置麗人以待幸於時百官無不竭力拮據剜肉醫瘡是以有賄寺宦者賂嬪妃者購左右者以求升遷餽送侍衛黃衣貨賂宰相九卿揭債借帑以邀榮寵扈從大小臣工皆飽囊果槖盈船滿載以歸而海內窮矣盜賊安得不起乎先生之疏所係豈小也哉東林列傳卷十九
