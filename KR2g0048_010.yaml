body:
  text: 東林列傳卷十江隂陳鼎撰明施邦曜傳施邦曜字爾韜號四明其先烏程人宋慶元間有名宿者仕為餘姚令因家焉邦曜舉萬厯四十年浙江鄉試四十一年賜進士明年授順天府武學教授天啓元年升工部營繕主事四年為雲南考試官歸晉員外郎時魏忠賢用事諸曺郎皆奔走其門圗速化會三殿工興工部諸司尤捷徑也邦曜獨不往忠賢怒詔令毁撤北堂為五日限以困之俄而暴風拔屋得免又詔依嘉靖舊式作獸吻其式無從得邦曜方召工役勾稽夢若有神告之者明日發地得吻則嘉靖中所用之餘也忠賢遂不能難然迄無異擢稍遷屯田司郎中太監凃文輔奉命督戶工二部邦曜恥為之屈亟請外出為漳州知府盜劉香李魁竒橫海上邦曜獲香母縶而誘之香卒就擒魁竒援鄭芝龍故事請撫邦曜謂巡撫鄒維璉曰閩蠧一之已甚其可再乎卒與維璉討平之其為地方深慮如此歷擢福建按察司副使布政司參政四川按察使入為光祿寺卿通政使時崇禎中也少詹事黃道周以言楊嗣昌奪情事逮詔獄太學生凃仲吉上書訟之書抵銀臺門邦曜大署其副封曰書上無益然此論不可不存上知其副封署語怒并奪邦曜官歸踰年再召為南京通政使赴京師陛見陳學術吏治用兵財用四事帝改容納焉出都三日命中使召還曰南京無事留此為朕效力吏部推邦曜刑部右侍郎帝曰邦曜清執可左副都御史時崇禎十七年正月距國難時僅數旬矣邦曜見警日急語本兵張縉彥厲兵固守飛檄勤王縉彥殊泄泄邦曜叱之而去遺書家人曰吾以身報國無哀吾死至三月十九日在東長安門聞帝已崩慟哭曰君殉社稷矣臣子無半䇿匡時惟有一死耳即解帶自經僕人趨救之厲聲曰爾輩安知大義時賊滿街巷不獲還邸舍遂命僕取砒霜雜燒酒即途中飲之九竅血裂而死邦曜少好王守仁書以理學文章經濟三分其集而讀之及劉宗周講學蕺山邦曜往復叩擊乃得程朱正學焉魯時升者同邑同年生也官庶吉士歿京邸邦曜手治含斂且以女妻其子嘗買一婢命灑掃至東隅捧篲凝視而泣怪而問之曰此先人任御史宅也兒時曽墮環兹地對之不覺悽愴耳邦曜憫焉即分嫁女之資擇士人而歸之其見義必為如此我朝賜諡忠愍外史氏曰莊烈皇帝英明之主也若使先生執中樞之柄猶可拒賊寇不至即亡耳雖然小人紛紛於朝而欲使君子得行其志是必不可得之數也天而已矣金育洞張羅彥張羅俊尹洗列傳金育洞字鶴沖完縣人萬厯乙卯鄉薦攻學又二十年至崇禎甲戌成進士授中書舍人以理學自任與東林聲氣相通辛巳召對陳漕弊擢御史上疏請寬畿內征徭言兵事請飭大法按諸將帥觀望取敗者又請恩詔請召東林廢斥諸臣乞寬復社之獄謂標榜譏評誠處士之大戒而語言文字非盛世所深求愛惜人才培養士氣惟上幸留意言多採用既而當按甘肅以全秦事急改命按秦留三年乃代方是時總督孫傳庭練兵於秦廷議催戰之檄屢下育洞疏爭謂秦兵驕悍將跋扈倉卒出戰勝負未可知禍若延秦秦亡而天下去矣疏奏不允傳庭潰賊入關中甲申春李建泰受命督師育洞監軍賊已北向畿輔育洞同張羅彥等定計守郡城傾家招士率姪振孫等死守城陷建泰以令箭來招育洞叱罵折其箭赴三皇廟井死妻王氏及從子肖孫婦陳氏婢桂春皆死振孫素負氣節城守多殺賊至是衣其銀鎧金胄佩劍大呼曰城頭殺賊將者我金振孫也橫劍殺賊數十人力竭被執不屈賊支解之育洞僅存一幼子張羅彥字仲美號二酉清苑人崇禎戊辰進士由行人厯吏部文選司郎中光祿寺少卿與黃道周文震孟善庚辰謫歸羅彥剛果有氣槩少從父都督僉事純臣厯行間習兵事家居城守郡中輒推羅彥主之給事中時敏奉敕過城下夜半呼門不納敏怒劾羅彥擅司城鑰詔勿問李自成陷全陜而東紳士或爭為亂首相與稱仁頌義曰迎真主羅彥聞之不勝憤與兄羅俊計今久無保督新太守未至鎮帥又盡挈其兵以去我鄉紳猶不主其事奈天子何於是約署印同知邵宗元合官紳士民望闕拜誓為死守計鄉兵僅二千捐私財激以忠義會真定兵反殺巡撫人心愈危羅彥壅兩城門示必死衆始定賊劉方亮既下河間欲北向京師聞保定城守遂移兵向保定適李建泰兵至建泰有二志故以勒餉激散其衆獨以百餘人入而劉方亮亦至城下使人誘降羅彥曰是必斃其來誘者始絶觀望懸重賞購先擊者人爭用炮擊賊賊怒攻城羅彥密遣人突出擊之賊敗益衆攻具城下大詬曰霸占城者張羅彥也聞都城不守羅彥氣益厲賊百道急攻纍日夜不能破賊傷衆方亮自戮其禆將數人期必拔而建泰陰與賊約項上插白旗為號舉火城西南隅馳殺鄉兵城上亂而賊入羅彥知不可為急歸家悉驅婦女宋氏錢氏等入井題官爵姓名井亭上自書忠字於面縊死張羅俊字元美羅彥兄也同生兄弟六人不析産少娶雙瞽女終身不置妾年五十登崇禎癸未進士家居候選與弟羅彥等倡郡人城守撰守城日記擒誘降賊於東門督鄉兵擊賊者皆羅俊也城既陷獨出衆中擊賊賊仆羅俊憤甚扼賊之吭而齕其面嚼一耳賊乃共前擊殺羅俊弟羅善縣學生羅輔崇禎癸未武進士多力善射城破巷戰矢盡下馬提刀截殺甚衆賊共圍擊戕之張氏闔門男女同盡者二十三人尹洗字宇新安肅人天啓二年進士授祥符令未仕補蒲圻調繁洛陽治行稱最擢禮科給事中以忤璫出福建建寧參政時罷歸家居保定府會賊圍城洗分守北門城破被執賊將劉方亮欲屈之慘辱備至會有僧善方亮者數為洗乞免洗厲聲曰我大明都給事也吾城人人皆樂死彼刑餘之夫武辨巾幗輩且義不茍活而我獨生乎正悔多此一日不死耳賊怒縳至西郊殺之洗全家自焚死太監方正化拔刀上馬顧謂左右曰朝廷謂吾忠勇命吾視師此城吾力不能守雖死亦負忠勇矣且朝廷三百年天下半壞於吾輩宦官之手吾當以一死稍稍為奴儕生色耳躍馬大呼殺賊與大寧都司劉忠嗣郡人參將賀秉鉞等各奮勇巷戰殺驍賊數百人力盡而死官紳婦女閣室自盡者以百數閭巷良家婦死者不可勝紀賊衆嚙指相向歎曰使天下各城如保定者數區吾儕安能徜徉中原以速得志如此哉外史氏曰鶴沖先生以監軍莫由遂志憑城效死幾致殄宗仲美昆季以及宇新非守土臣也發憤拒賊不共戴天區區抱一木於大厦既傾之後驅全家以殉之此豈有為而為哉忠義之誠油然不可遏也嗟乎彼督輔稽顙而廢臣奮臂有壯士不以守四方而投之草野邦之傾覆有自來矣邵宗元傳邵宗元字景康號又芝徐州碭山人少在東林講學長於京師與黃道周劉宗周為忘年交由貢士官保定同知甲申賊趨保定時新知府萊人何復字見元者未至宗元攝府印圍將合復始至以印讓宗元曰吾已誓死而入勿以臨敵易主搖衆心也因大會諸生講見危授命章衆益奮總監方正化者嘗守保定有功素善張羅彥因以識宗元與復京師既破賊射書城上約降云國亡矣誰與守李建泰得之以示正化曰宜為一城生靈計得一用印文字可免正化泣不應復曰太守未嘗有印也即有印太守必不為此用乃召宗元宗元顧視其肘曰曩者何公讓印而元不辭焉為城守先在我耳今事急且與印同死即何公爭亦不與肯送閣下印降書乎元江南老貢生下吏薄祿不肯北面事賊公大臣受重任不圖報萬一乃為人趣降獨不念皇帝親祖正陽門以武鄉晉公相期者乎建泰語塞其從卒欲兵之宗元擲印地上拔佩刀自擬左右力持之為綰其印宗元慟哭去城陷日何復親燃西洋炮立炮前自轟死宗元挈印投城下賊獲之欲奪其印不肯授大罵死手猶持印不解賊斷兩指取印去時邑典史沙潤民原平涼通判張維綱邠州知州韓東明祭酒孫從度壬午舉人高涇孫從範劉會昌張爾暈等皆死焉外史氏曰景康護持其印至死不釋見元自火闔郡就義如歸賊舉其尸五日莫能盡語云燕趙多義烈之士信哉賀仲軾傳賀仲軾字景瞻河南獲嘉人資質朴魯讀書外無他嗜登萬厯三十八年進士知醴泉縣俗刁悍力清諸弊治聲最著外艱服闋補青浦冠紳之藪竿牘無虛日仲軾一切屛絶士子季有考月有課砥礪名行不專以文尚歲徴漕粟悉貯於倉粟雜糅責在民加耗抑勒責在軍軍民咸稱其平修海瑞祠為文以見志入為刑部主事遷郎中時部郎湯道衡被誣下詔獄仲軾具疏申救得釋出為鎮江知府丹陽薑志禮以少卿忤璫罷歸為尚書趙南星獄辭連及部劄行提而未奉旨仲軾白撫臣曰志禮為四品京卿不奉旨孰敢擅提若今日奉時局異日以辱天子之卿責狀何辭以解守正得禍所不恤也卒不應亡何遷陜西西寧道副使璫私人銜之劾奏鐫秩遂引病乞歸起補武德兵備所屬營衛勵精操練信賞罰清占役蓄火藥屹然巨鎮寇不敢犯御史袁化中與楊左同死璫禍蠲俸葬之丁繼母艱歸崇禎十七年春冦薄都城河北郡縣皆置偽官仲軾撫心太息曰人臣大節難虧讀書貴有實用此吾自靖時也兄子行素曰叔父無官守可不死不如詣闕直陳死君父前仲軾念道梗即行且不達死小盜手與自經溝瀆何異而偽官要仲軾入城仲軾大怒曰賊敢見我乎謂子姪曰道二仁與不仁而已矣出此入彼再無中立平生功力視此一日况河北千里名區豈可無一忠臣乎呼妻恭人王氏妾李氏張氏王氏曰汝皆當死吾不忍手刃願從死者隨吾不願者不汝強也即登樓取酒與子姪輩飲子姪出即扃戶自縊妻妾俱相隨以次自盡是日也天忽晝晦烈風折木發屋人以為忠烈所感仲軾孝友剛直本於天性深湛經術而尤肆力於春秋作春秋歸義悉破諸儒牽強附會之説以求合先聖筆削之意首嚴春王正月之辨而於弒君篡國中外名分考據精詳辨駁明切後之學春秋者皆取衷焉又著柏園初草冬官記事八卦等集八十餘卷多自得語同時西華理鬯和字寒石舉於鄉本姓李恥與自成同姓因更姓理學問該博與仲軾友好登高慷慨悲歌人莫能測亂後航海而死外史氏曰余閲姦人七録多載先生謂其為東林黨人也然卒不遇逆璫之害者以點將録無名耳嗚呼闔門盡節大河以北千里增光矣非東林人物不能也沈雲祚傳沈雲祚字子凌太倉人幼頴悟絶倫弱冠即同其父謁高攀龍於東林求程朱正學得主靜主敬之理而歸輒以聖賢自勵崇禎庚辰成進士授華陽知縣先是蜀中有猺黃賊作亂秦纘勳者石砫土司秦良玉之族也潛伏內地為賊耳目後被擒在獄夜半殺獄卒逸去吏請閉城大索雲祚曰無庸易獲耳潛遣人告土司土司果擒賊至已斷其手足指矣吏驚以為神雲祚曰吾籌之熟矣賊踰獄必走歸石砫秦夫人方以勦冦效節朝廷其肯為逋逃主乎於是立決殺之十七年正月張獻忠破夔門而入成都大震雲祚請見蜀王陳守禦之䇿不納乃以言激內江王曰人無愚智皆知賊勢猖獗成都必危今蜀府貨財山積不早捐之募死士東向殺賊一旦豖突疆場軍民奔竄誰為王守此府庫者且獨不見周楚之己事乎內江王聞言心動入告蜀王王終以祖制辭五月賊陷重慶縱火燒劫數百里煙焰不絶城中一日數驚大雨雹雷震宫殿火器局無故自焚蜀王始懼悔不用雲祚言稍出財召募而賊已薄城下矣雲祚知事不支慷慨與僚屬誓死曰事至此吾輩與城存亡他非所知也巡撫龍文光總兵劉佳胤率兵三千從川北來佳胤出戰敗還時城濠枯賊謀渡濠登城文光急遣郫縣令趙嘉煒決都江大堰注錦江以益濠水甫至城已破賊四面火攻北角樓崩守陴者迸散蜀王與諸妃嬪沈於井內江王至淥從之文光佳胤投浣花溪死雲祚與御史劉之渤推官劉士斗俱被執幽於大慈寺絶粒半月不死賊使其黨饋以食誘之降雲祚忽從衆中躍起大罵指其口曰吾有口食賊肉耳豈食賊粟哉賊相顧錯愕奔告獻忠遂與之渤士斗同遇害初之渤與崇慶知州王勵精皆賊同里人或疑之至是之渤不屈而勵精聞省城陷朝服望北闕拜書文山孔曰成仁數語於壁舉火自焚一時同死者蜀府長史鄭安民內江教諭姚思孝太常卿尹伸給事中吳宇英雲南按察使莊祖誥東流知縣乾曰貞工部主事蔡如蕙禮部員外李含乙及進士王起莪舉人江龍騰而前所遣郫令趙嘉煒方決堰卒遇賊射之赴水死其子慶麒自家走萬里求父尸三年不獲遇堰夫向應泰告以死處為安家三渡口遂招魂壘土葬焉而雲祚殉難時有幼子荀蔚方五嵗友人匿之山中得脫越二十年始歸外史氏曰蜀稱天險可守者也乃當時封疆大臣無一為桑土計者卒致冦來如入無人之境假使蜀王早聽子凌之言豫為藩籬之計何至一敗塗地而貽禍於通省生靈耶前朝天下之禍於蜀為最豈由風俗之惡而天降大罰乎抑亦人謀之不臧歟後之君子圖蜀者其當思有以丕變之庶幾人心正而風俗淳彼蒼不至頻降大罰也天道好善而惡淫有世道之責者其思之周鑣雷縯祚合傳周鑣字仲馭金壇人幼孝友及長性剛介不阿舉崇禎元年進士歷官至禮部儀制司員外郎亷潔自持非義不取與執政素不合小人皆惡之及歸閉門不見一客研窮程朱正學有以白沙新建之説告者輒掩耳而不欲聞曰吾將洗耳於江流也甲申李賊陷北都愍皇帝殉社稷鑣痛哭三日夜淚盡繼之以血及福王立南都召諸舊臣鑣以三朝舊典力阻定䇿遂忤權姦當賊相馬士英當國特薦起從逆賊臣阮大鋮大鋮素惡東林諸賢作正續蝗蝻録有十八羅漢五十三參善財童子七十二賢聖菩薩又蠅蚋録有八十八活佛三百六十五天王五百尊阿羅漢共千有餘人皆海內賢良欲盡殺之以空天下遂首逮鑣及雷縯祚下獄矯旨賜死鑣僕某既殮亦縊死主棺旁縯祚字介公太湖人崇禎庚午鄉科纍官山東武定僉事道歷任以清正著所至有善政至今民猶思之不置焉或曰鑣與縯祚死之夕而士英大鋮已陰具表獻南都於我朝矣我師不納乃遁外史氏曰南都之亡也物怪人妖疊起如大悲之假皇帝童氏之假皇后王之明之假太子三假擾而南都遂亡嗟乎如南都不敗天下之善人無噍類矣豈特仲馭介公兩先生哉嘗聞之父老云阮大鋮誓師江上衣素蟒圍碧玉見者訝為梨園裝束錢謙益為禮部以艷妓為妻之栁隱者冠插雉尾戎服佩刀跨騎而入國門覩者以為明妃出塞嗚呼大兵大禮皆如娼優排場之戲豈非人妖物怪乎欲國之不亡不可得也史可法傳史可法字憲之號道鄰大興人生而聰穎異常數歲時短衣無火寒涕交頥然好誦讀受書輒求益數倍常兒稍長從師林公為師執蓋行道中惟謹抵客舍侍立移日不敢動弱冠受知於督學御史左光斗光斗善知人奬拔無遺善畿士至今思之謂前後百年無及者既首擢可法第一次盛某第二謂人曰盛可一榜史其綸扉之人乎戊辰成進士可法為人軀小貌劣不稱其衣冠語不能出口然有大志好經世方略初授陜西西安府推官時洪承疇才略過人在陜大得軍民心可法亦效之治聲日起召為戶部雲南司主事歷員外掌戶科尋升安池兵備道江西右參議兼僉事協理勦冦軍務才望益著擢都察院右僉都御史巡撫安徽亷公勤果信賞必罰將士皆為用命提軍數與賊戰賊輒奔潰當是時史都堂之兵號稱強在軍中與士卒同甘苦臨陳以身先之矢必死所衣布袍遍書己姓名曰戰殁後可易識也丁父憂讀書城外素冠麻絰遇者不知其為貴人或竊聽其誦書朗朗多匡濟天下語亦不知其何書也服闋後起總督漕運侍郎瀕河豪戶多竊引水漕易涸可法繩以法漕賴以濟尋晉南京兵部尚書時天下岌岌人才盡矣東南半壁力不能支進督師閣部出鎮維揚嘗致書京師當事以見志曰可法荷朝廷重祿國士知遇愧不能以死報徒靦顔人世為國家三百年社稷計耳主憂臣辱主辱臣死可法之志決矣至於一人之節輕闔城之命重非敢以草草報也城破當亂軍中拔劍自剄揚州知府任民育同知曲從直通判吳道隆江都前令周志畏吳道正新知縣羅伏龍縣丞王志瑞監軍督餉道王纘爵黃鉉職方何剛施鳯儀兵部侍郎張伯鯨衛胤文及紳襟等共七十餘人俱死之可法既死不得其尸維揚士人以衣冠葬之於梅花嶺昭忠節也外史氏曰先生當傾覆之天而欲以一手擎之其志則壯其心可悲矣何也於時國賊馬阮在朝方以芟夷正人君子為事直以天下國家付之或有或無之間誰為先生繼其後者乎而先生張空弮冒白刃孑然一身一手以與天爭不亦悲乎吳爾塤傳吳爾塤字介子號以白浙江嘉興石門人弱冠舉於鄉出編修衛胤文之門三年成進士當崇禎十六年之秋時闖賊已破西安獻賊亦破武昌國事大壞爾塤選授庶吉士恆以國恤為念十七年春李自成渡河入晉大學士范景文薦爾塤對德政殿問守禦䇿爾塤請遣間使於西邊土司李魯祁三姓假之重職使起兵牽制賊鋒以待援兵未及行而京師破爾塤與海寧人祝淵南歸見督師史可法於揚州誓從討賊因與淵訣拔佩刀斷一指令歸遺父母賊讐未雪誓不還矣可法乃令爾塤招撫河南諸土寨擒勦自成偽署官辛苦跋涉於荆榛中聞維揚被圍入見可法相對痛哭城陷可法死爾塤亦死焉舊嘗輯史傳死節諸人各繫以贊名曰仁書及是死難如其志云後棺遭燬祝淵所攜一指家人遂以葬外史氏曰天啓間逆璫毁東林書院高景逸先生移建於錫城東門內璫敗講學者復盛先生每歲春夏必攜笥笈讀書聽講於中嘗語同志曰大丈夫不能深造聖賢之域亦當效聖賢或忠或孝之一節以成仁可謂久要不忘者矣龔廷祥傳龔廷祥字伯興號佩潛無錫人家貧歲獲館穀以奉二親父歿居喪盡禮事母至孝嘗逰馬世竒門甚敬其為人曰吾所賞者不獨以文也崇禎癸未成進士受知於房考劉理順深器重之未選國變聞劉公及馬公俱殉難京師廷祥設兩公位為文以祭北面舉酒以竹如意擊石歌罷失聲哭一如謝翺祭文信國狀自以未得死所不敢死南渡後補選授中書謂所親曰吾半生食貧今又冷署不能具肥甘輕暖之奉少博老母歡奈何或答之曰古人以孝養不以祿養廷祥曰父母以此教子則可人子惡得為是言聞者歎服已得封差候禮部銀牌未給未出都北師渡江廷祥痛哭而言曰吾今得死所矣且曰吾不死恐負劉公及馬先生時有解之者曰子官不過中書任不過月餘子未有死責且家有老母未可死也廷祥曰有諸孫在爰手書寄其子曰此時惟捐軀以見志而已但思一見母而不得肝腸寸裂血淚滿襟汝等須善事之緘付家人越日乃具衣冠别文廟大呼劉公馬先生曰吾今得從逰於地下矣遂登武定橋投秦淮河而逝時乙酉五月某日也外史氏曰道學者何忠孝節義是也能忠孝節義乃為真道學觀先生孝親若此忠君又若此忠孝真矣是之謂真道學彼徒資口舌者吾斯未能信也徐汧傳徐汧字九一長洲人少孤貧事節母朱至孝諸生時即以名節自任嘉善魏給事大中被逮過吳門汧慕其忠直以內子簪珥質二十金贈之周順昌聞而嘆曰國家養士三百年如徐生者真嵗寒松柏也崇禎戊辰成進士選庶吉士上不次用人散館親試拔置第三授編修遂召對平臺説書便殿汧發言愷切上心器之有意擢用而汧逺權勢甘淡薄告假家居為園於廬之旁中有垂栁二株遂以陸慧曉事名二株園焉時與門生子弟講課文藝奬借後進恆若不及庚辰分較禮闈得孫廷銓高爾儼薑垓胡周鼒數人皆為名臣歷官詹事府少詹事甲申賊陷京師帝殉社稷汧遂謝賔客去聲伎日夜涕泣朔望朝服北嚮而哭會南中議立福藩諸公彈冠相慶汧獨蹙然曰相無王導謝安將非祖逖陶侃區區新造之江左分門别戶燕雀處堂其能旦夕安乎吾惟有一死以報十七年故主耳每指園中池謂人曰此吾止水也乙酉五月汧知金陵失守往鄉掃墓還投於虎丘之新塘橋下而卒子枋壬午舉人隱居不仕以書畫名外史氏曰明事至甲申不可為矣而當時諸公猶思仿南宋之故轍欲偏安一隅奈何有君如此有相如彼而欲思苟延不亦妄乎此先生所以與南社俱亡而不忍再見飄海沈舟之事也袁繼咸傳袁繼咸字季通江西宜春人生而英異有膽氣人號虎孩兒稍長砥志節天啓五年成進士授行人奉使致祭壽陽王禮成贈以王所乘名馬不受既而因餉李應升黃尊素於獄璫怒欲并殺之繼咸曰吾行吾友道耳若以一杯羮而殺朝廷一官遍廊廟皆可殺矣會有解於璫者乃免崇禎三年擢廣東道御史疏請辨君子小人進退之介不阿權貴以會試監臨坐纍謫南行人司副轉禮部儀制主事歷員外郎部曹無言責南禮部主事周鑣以建言得罪輒為疏救六年主試廣東尋遷山西提學未出都內臣張彛憲總理戶工二部事怙勢凌轢責覲官齎册蒲伏惟大同知府蔡屏周長揖諸郎吏多屈辱繼咸瞋目曰士氣盡矣疏請維亷恥振氣節言諸臣行已有恥必不媚璫取容今未覲天子之光而先屈膝內臣非獨喪士氣亦傷國體此臣所為太息也乃若諫官以言為職古者宰相上殿則諫官隨之惟不言則有墨刑諫而被刑非盛世事近見科臣李世祺以論輔臣溫體仁降罰非祖宗選用諫官初意恐不當杜諫諍之口長從諛大臣之風時以蹇諤稱抵山西校士嚴明士多嚮學巡撫吳甡首薦之以忤巡按御史張孫振被誣逮問三晉諸生傅山等追送伏闕訟寃者千餘人孫振蓋嘗屬以私牘者也至是繼咸發之以聞乃更逮孫振復繼咸官分守武昌吕賊倡亂峽山用方略削平功在蘄黃間改加巡道監軍十三年升淮揚道副使尤多摘發性倔強與督鹽中貴楊顯名抗禮顯名陽薦其才請加敕兼視鹽事實抑之受節制也卒倔強如故遂坐免流賊張獻忠冦湖廣督師楊嗣昌檄為監軍禦之纍升僉都御史撫治鄖陽數困賊十四年二月賊襲陷襄陽而繼咸實分治鄖軍為部議所托復逮繫謫戍明年薦起總理河北屯田大帥左良玉初軍襄陽襄郢連敗引踞安池間轉餉不繼兵寖為暴上下數百里江帆中斷繼咸徑趨小孤山致書良玉聲大義復告都御史李邦華檄移川黔餉銀十餘萬餉之左兵由是不暴掠然不肯一戰帝特命閣部吳甡視師始議設督府九江扼吳楚吭於是以繼咸總督諸軍事時聞獻賊圍武昌疾馳趨良玉西援見浮尸蔽江下指謂良玉曰大將軍忍見此乎良玉面發赤又正色讓之曰大將軍功多罪亦不少朝廷不督過之一歲兩遣中使宣諭開國徐中山所未有也奈何不圗報稱良玉左右以他辭為解繼咸叱曰人孰無死張睢陽死賀蘭進明亦死吾行矣寧為睢陽死不為賀蘭生良玉大慚始進師繼咸犒以牛酒鼓勇敗賊收復武昌賊走嶽州亡何吳甡坐逗留罷復改繼咸屯田會獻賊陷長沙袁州新總督吕大器與左良玉不相能軍中大閧聞於朝乃罷大器復移繼咸督九江軍良玉挈兵還湖廣福王立進封良玉寧南侯氣益張繼咸始終導以忠義良玉報書曰吾上不負天子下不負朋友然繼咸之再為總督也雖以宿望見推兵事多掣肘不盡由己出乙酉四月聞獻賊南渡繼咸集郝效忠等三將守九江而自統副將往援袁吉聞良玉反兵東下復旋九江先是馬士英專擁立功下偽太子獄外人傳疑洶洶良玉內懼賊逼聲言救太子掃清君側約繼咸會於舟中言及太子事大哭袖出太子密諭劫諸將盟繼咸正色曰密諭從何來先帝舊德不可忘今上新恩亦不可負良玉大恚勉成賔主禮已議定駐軍候旨矣繼咸歸集諸將城樓灑泣曰晉陽之甲春秋所惡義不可同亂也亡何良玉兵夜入城縱火大肆淫掠內外軍皆亂繼咸正冠帶將就死為黃澍諫阻出城面責良玉良玉疾方劇望城中火光拊胸曰吾負江督吾負江督遂嘔血卒其子夢庚祕不發喪諸將推為帥移舟東中朝皆疑繼咸良玉同反而南都時已破諸鎮多納欵繼咸勸夢庚旋師不聽繼咸為效忠紿赴其軍將及湖口而夢庚效忠降於我朝遂執繼咸北去館內院至明年三月終不屈乃殺之臨刑色不變初繼咸被拘舟中賦詩見志有曰衰年奉二老一死酬至尊從容文山節誰招燕市魂云云奏議有六栁堂集多散軼不傳外史氏曰袁臨侯前代之文文山也其死也事相類所謂從容就義者是耶嗚呼前朝之失由於宰輔之貪墨自葉韓兩君子之後無一善者敗壞已至不可名言矣乃馬阮復繼而決裂之與封疆大吏何尤哉東林列傳卷十
