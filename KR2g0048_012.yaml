body:
  text: 東林列傳卷十二江隂陳鼎撰明黄道周傳黄道周字㓜平福建鎮海衞人家貧業農事親以孝聞年二十四始發憤讀書遂竆博奧之學鉤深致遠髙自標置天啟二年舉進士選庶吉士授翰林院編修時在翰林者多雍容養望道周乃作矯輕警惰文以諷之同列皆欽重焉遼事方急中左寧遠相繼陷没島帥毛文龍自詡鎮江之捷當闗者欲藉之收覺華島以窺寧右漸圖河西上其議於朝當發兵餉數百萬道周獨決其非策已而文龍卒無成魏忠賢用事道周拂衣歸崇禎元年起原官明年遼督袁崇煥殺毛文龍道周前固策文龍不足恃至是獨撫膺謂闗門之禍自此始亡何我兵大入薄京師帝震怒卽軍中逮袁崇焕究主者崇焕言由閣臣錢龍錫上并械繫之獄具當龍錫死道周聞之嘆曰安可使明主有殺輔臣名上疏救之謂督臣受劍制閫外僨事誤國雖磔裂莫贖輔臣坐論綸扉遙度邊事一不當輒坐死後之閣臣必且長顧却慮不敢任邊事邊臣亦得以瑕罅閣臣摭單詞片語為質是使綸扉之内割邊疆為殊域也陛下卽位甫三載閣臣受重譴者九人矣一代之間寧有幾宰輔陛下卽欲整齊羣下敷求言功不過倣虞廷故事令諸廷臣各陳時政考詢屢省因而澄之何材不服卽欲威柄獨運操縱海宇但乗輯瑞之期綱舉數條别貴賤輕重親渙德音嘉與更始使天下噩然仰誦神武何必囹圄僨盈孤卿駢首使四方傳者咸謂朝廷獄吏甚貴士紳甚賤乎疏入上大怒降詔切責道周不為挫復疏言前代戮輔臣惟漢武帝之於劉屈㲠我世宗之於夏言千六百年僅見此爾皆非嘉事也然武帝以英偉之略動若風霆世宗以淵穆之識同符造化雖有芟除不損大業今震疊方殷拯援未及養兵多年物力已殫謀臣顧慮未有一決即殺一龍錫無益於邊計徒隳士氣而傷大體且陛下以兵躪畿輔赫然為誅督臣縶卿貳斥郎曹已過當矣而閣臣又且不免庶僚相對容頭顧身無復伏波朱勃趙王貫髙之誼即國家緩急何所賴此全軀掩口為者臣故不自量欲歴疆場觀要害一當荷戈横原草為纍輔減罪近臣雪恥此臣所大願也上益怒竟削籍然龍錫亦竟得減死道周旣家居益著書講學臺省交章論薦九年擢右中允時帝頗矜英察值四海多故疾羣臣結黨行私敗國事臨朝歎咤憂形於色首輔温體仁輒言災眚兵戈皆郡邑無狀所致非重治無以懲後屢起大獄而上以為能益信之道周上言天下神器為之有道簿書刀筆非所以繩削天下之具也陛下當法先王内以至仁憂其臣庻外以至明至武奠其封疆引吉甫召虎之倫躬贊大業齷齪瑣人何足共圖大計乎夫郡邑之吏猶之坌土所應不過數十里之内非所以廣召祲氛天下隂陽風化皆視當宁之心氣與二三元老刻責自勵而已奈何使草土臣庶市其怨色乎體仁見而銜之明年遷少詹事兼侍讀學士偕閣臣入對便殿問以用人理財策道周據古今條對甚切上亦名重之呼先生者三道周旣負重名天下望以為相而性戇直好面折廷諍雖屢被譴訶不恤也中夜讀書至宋臣真德秀傳拊几歎曰古人立朝一月三十六封事而吾儕黙然已乎是時楊嗣昌奪情用為兵部尚書而宣大總督盧象昇丁艱嗣昌薦陳新甲代之亦自喪中起復道周儒者念國家卽乏人奈何數以墨衰從事貽後世笑慨然思論之仰視熒惑逆行太白晝見嗣昌所籌冦事滋失策顯謂馮元飈等天象如此此人必誤國宜率同列固爭乃為數劄子論邊事冦事其一糾嗣昌新甲未上也會上傳部院舉閣員元飈謂枚卜無出道周上者疏入或觸忤旨勿下其所知謂之曰公得政所挽囘者大奈何必以口舌爭即輕宰相獨不為天下計乎道周因而暫止已而上竟相嗣昌等五人道周不與焉上素知道周學行以其性偏執非救時相故後之道周亦非以不相少有觖望特恨為同列所誤不早擊嗣昌竟就初稿為三疏以進上之相嗣昌疑非朝士意道周又衆所推而出身强諫憚其辭直欲以理折服因召對羣臣詰道周曰朕聞無所為而為者謂之天理有所為而為者謂之人欲爾三疏適當枚卜不用之時可謂無所為乎道周奏天人只義利之别為利者以功名爵祿私之已此是人欲為義者以天下國家為心卽是天理臣三疏皆爲天下國家綱常名教不為一己功名爵祿所以自信其無所為上問何為先時不言道周曰先時猶可不言至簡用後不得不言臣今日不言更無進言之日且如髙官厚爵誰則不樂臣緘黙數時亦可偷升斗之祿但所惜者千古之綱常天下之名教耳奏未畢嗣昌出奏曰道周説綱常二字臣不生空桑豈不知有父母臣聞命之初瀝血控辭而明旨迫切不敢不倉皇奔命道周品行學術為人所宗臣意必有持正之言可以使臣終制而去不謂其疏中自謂不如鄭鄤臣始歎息絶望禽獸知母而不知父鄤杖母禽獸不如道周又不如彼尚何綱常之可言道周隨奏大臣聞言義當引退使小臣得盡其言漢唐故事諫官論執政者執政皆出聴諌官對仗讀彈文臣雖非言官未有大臣跪在上前爭辯不容臣盡言者嗣昌曰臣為綱常名教不容不剖陳但委覺非體道周實係清品為人望所歸望皇上放臣歸里道周曰臣生平恥言人過今日在上前與嗣昌口角亦失體臣知為天下後世留此綱常名教天理人心而已上曰對君有體何至潑罵汚詆大臣道周曰臣何敢潑罵疏中只有兩句説公子開方不省其親管仲比之貑狗李定不持繼母服當時比之人梟此兩句是臣過激亦惟遇明主始敢直言宋臣司馬光云臣若有所專司則有所不言如為論思之臣則無不可言者今臣為侍從論思之臣與嗣昌比肩事上不比詆毁大臣臣二十躬耕手胼足胝四十喪親負土成墳誠不忍見奪情之事上曰旣如此何又説不如鄭鄤道周曰章子棄於通國孟子不失禮貌孔子自云辭命不如宰予臣謂文章不如鄭鄤上曰章子是不得於父豈鄭鄤杖母之比爾言不如鄭鄤正是朋比道周曰衆惡必察劉摰謂人奈何避於權勢使主上不知是非上曰陳新甲諳練軍情今為邊疆多事不得不用嗣昌薦舉甚多不止新甲一人爾謂其走邪徑托捷足豈朕一人不知威福予奪盡出臣下乎道周曰臣不識陳新甲但人心正則行徑皆正心邪則行徑皆邪今新甲在蜀聞命已兩三月又辭謝往復動須八九月新甲未得來盧象昇不得去使新甲可以來則盧象昇可以不去上曰陳新甲服將滿盧象昇父死在途如何不教他去又指疏曰疏中破非常之格以奉不祥之人試問何為是奉冠婚是吉禮喪禮是凶禮凶對吉而言是説禮非説人人皆有父母父母皆有年老之時是人皆凶人皆不祥之人矣道周曰禮三年之喪君命不過其門援琴之後始稱釋吉未釋吉前則孝子自謂凶人不祥之人古者兵禮鑿凶門而出故奪情在疆外用凶禮則可在朝中則不可上曰自謂是孝子哀毁自謙豈真是凶真是不祥人旣可用何分内外道周曰臣見嗣昌二年來今日是墨衰明日是墨衰不知何日丁艱何日起復我朝自李賢奪情前後五十餘人多在邊疆惟白圭曾坐司馬堂翁萬達以尚書除左司馬亦自陳以去向使嗣昌在邊疆則可在司馬則不可在司馬則可在政府則不可使嗣昌一人為之猶可又呼羣引類使成奪情世界則不可上曰孔子誅少正卯當時亦稱聞人惟行僻而堅言偽而辯不免君子之誅今人心有所為借綱常名教大題目來道其私正此類也道周曰少正卯欺世盜名心術不正臣心正行無不正無一毫之私臣今日不盡言則臣負陛下陛下今日殺臣則陛下負臣上斥之曰汝讀書有年止學得一佞口耳道周叩頭起復跪奏臣請為上分别忠佞二字夫人臣在君上之前獨立敢言者為佞豈䜛諂面諛者為忠耶忠佞不分則邪正不明何以致治上曰不是輕以佞字加汝問汝這邊遁在那邊非佞而何羣臣見上變色皆戰慄流汗緹校在殿下惴惴將有所縳上終以儒者優容之奪六級降江西按察使照磨十三年巡撫解學龍薦之上以其黨並逮問至京廷杖下獄户部主事葉廷秀太學生凃仲吉疏救皆予杖刑部主事吳文熾以訊問遲緩亦杖六十部議道周永戍烟瘴上以為未盡尚書劉澤深堅執如初乃得請十五年上御講筵偶言岳飛事嘆曰安得將如岳飛者而用之輔臣周延儒曰岳飛自是名將然其破金人事史或多溢辭卽如黄道周之為人傳之史冊不免曰其不用也天下惜之上黙然甫還宫即傳㫖復官明年遣祭南海遂歸十七年北都陷福王立召道周至南京見馬阮用事拂衣去唐王在福建用為吏部尚書兼大學士鄭芝龍跋扈道周引祖訓抑之有隙乃自請出師駐廣信芝龍齮齕之無兵無餉手書告身以忠義激發募衆萬餘人出衢州為婺源令所誘至明堂里兵潰被執至南京死焉外史氏曰嗟乎明旣亡矣而先生猶踉蹌以圖恢復不亦難乎假使南渡以來馬阮卽死而任先生以國或者李綱趙鼎庶幾再見於南明而社稷或可茍延於江左奈何馬阮不死又欲誅戮東林期於斬草除根而後快則先生危矣至唐王再起已死之灰焉能復燃乎先生曰一息尚存也烏容已耶所謂鞠躬盡瘁死而後已者其先生歟顧錫疇傳顧錫疇字九疇崑山人幼至孝穎悟異常年十二為諸生申時行特加器重曰名位不在吾輩下十三應試南闈魏國徐時雨一見驚異以女妻焉萬厯己未成進士選翰林院庶吉士授檢討天啟甲子典福建試時魏璫方恣闈題以無父無君斥之發策首以人之貴賤為問而謂色授氣使者為甚賤不可昵及為程策曰朱紫雜沓於貂璫金組艷奕於婦寺㑹内閣魏廣微以請托不從同邑顧秉謙以聯宗不應傅成其罪遂與江西主考丁乾學廣東主考陳子壯同時被譴乙丑降調丙寅削籍崇禎初召用陞贊善歴諭德遷國子監祭酒奏復積分舊制釐正從祀位號有從祀議言十哲中宜進有若南宫适而降予求先儒中宜進諸葛亮狄仁傑范仲淹也有近儒應從祀議謂吕柟羅欽順髙攀龍顧憲成馮從吾也有梅福應從祀議以追封聖裔之論始於福也有從祀儒者不應稱名議或子之或字之也有從祀兩廡位次議以瞿九思年表為可從也旣請終養歸卽家遷少詹詹事尋陞禮部左侍郎請上孝仁太后諡定東宫出閣諸儀三推枚卜㑹楊嗣昌奪情入相錫疇在禮有違言嗣昌疏論流冦宜撫不宜𠞰有樂天者保天下及善戰服上刑二語錫疇抗言此諸侯交隣事稱引不倫益與嗣昌牴牾遂摭其部中事以駙馬王昺蠲助不及額部從輕擬久已留中者忽下革職為民越三年起為南京禮部𢎞光時進尚書首疏請遣使北行祭告陵園奠安帝后梓宫訪求東宫二王的耗又請復建文景泰年號諡讓皇帝廟號惠宗景皇帝廟號代宗及贈諡開國功臣李善長等遜國忠臣方孝孺等正德諫臣蔣欽等忤奄諸臣左光斗等殉難諸臣范景文等并長洲諸生許琰順天布衣湯文瓊廟祀京師又擬諡文震孟劉一燝諸臣追削温體仁原諡人皆韙之與馬士英忤請祀海歸遭父喪金陵不守錫疇扶服南行至福州唐藩有使相之拜錫疇以守制力辭不許出駐温州江心寺招徠豪傑以圖大舉會有總兵賀君堯者縱卒殺掠浙東錫疇劾禠其職賀卽率部衆圍寺錫疇大罵曰汝為國家大帥不思忠國愛民恢復封疆日事淫掠其如天道何卽抽刀自剄賊以其尸投之江中温人覓之三日乃得殮外史氏曰余少遊永嘉愛江心寺之勝而館焉日與温之父老訪求故蹟因知先生之死甚詳父老以為有文文山之志故勒碑於信國之祠焉嗟乎明祚已亡而猶思收拾餘燼以圖復燃難矣然在先生豈肯甘心身在乎此所以寧死於劍刃而不願終於牀第也陳潛夫傳陳潛夫字元倩錢塘人家貧瓠落日旰或不再食然好大言駴俗人亦莫能善也聞諸君子於無錫東林講程朱之道乃泛舟問學焉崇禎丙子舉孝廉十六年除開封府推官輒抗疏言時勢請天子召對不報時闖賊旣蹂躪河南以是年入闗踞秦中且出師窺晉而中州八郡開封歸德汝寧南陽在大河之南彰德衞輝懷慶及開封屬縣封丘原武在河以北河北未經破傷諸持節使者皆居之委河南不守而河南村落豪傑結土寨自固犬牙其間無所屬賊署偽官數十人鎮撫之人心不甚為用潛夫至封丘飛章上聞言河南尚有可圖之勢河北實有累卵之危願請重兵守覃懷遏賊勿使下而身自渡汴梁聯絡號召復通郡之地疏上未及報會故總兵陳永福降賊其子陳德為巡撫麾下軍尉以其衆譟縳巡按御史蘇京去變起倉卒人人不知所為潛夫曰此獨倡叛軍未盡變也乃募民兵千人張勞軍旗幟鼓行而前請巡撫秦所式及鎮將許定國卜從善等以兵會欲往招其衆設計擒德而巡撫業解任辭不肯與二鎮將遂潰而南潛夫度德旣西大賊旦夕且至力不能抗遂奉周籓渡河封丘人涕泣襁負而從者千餘家潛夫理舟楫濟之三日始畢時崇禎十七年正月也初汴梁東西土寨數百相攻殺無已婁道一者最驍猾狼跋潛夫乃單騎率二三吏士步行從傳呼直造其營道一大驚延入座拜跪稍如禮潛夫勉以忠義相勞苦道一叩頭聴命授以告身為偏裨簪花絳衣遊行諸縣赫奕朝廷將也遠近山寨聞之以次爭降附於是軍聲大振聞都城陷士卒皆縞素出師邀擊賊將德於栁園大破之會賊敗走秦中氣方沮喪繞河上下數百里豪傑爭來投誠中原數州震動六月傳露布江南時福王立南都方經理江淮度中原不可問而自撫按鎮將以下皆鼠竄去誰復知有封疆計者及見潛夫檄大竒之廷論恢復功授巡按河南監軍監察御史潛夫入陛見倡議恢𠞰之策大要謂四鎮之兵不下數十萬人而齊魯汴豫尚皆按堵如故陛下誠分命藩鎮一軍出潁壽一軍出淮徐馬首北向則人心思奮汴梁一路臣聯絡素定旬日可集十餘萬人與藩鎮之兵相為援應左提右挈則河南五郡可以盡復五郡旣復畫河為固南連荆楚西控秦闗北臨趙衞上之恢復可望下之亦江淮永安此今日之至計也如因循玩廢而曰吾且禦之堂皇之内臣恐江淮亦未可恃也而相馬士英方條列恩怨論餽遺多寡别玉聲金色法書圖畫之真贗聞潛夫言第佯應之不為理潛夫心傷國計之不立門户之不破社稷將亡而羣心日潰急上疏爭之士英疾怒之凡所請兵餉乞隨征文武官吏及聯絡戰守諸大計率不相應故將許定國者棲睢陽城中殘卒千人刼掠自食潛夫謂定國懦且叵測不可任士英故留定國河干而以私親越其杰為巡撫事事牽制之其杰刻隘失衆心且不習其豪傑諸寨兵莫肯為用而雎陽許定國自以宿將不得比諸大鎮内懷觖望時與興平伯髙傑部將相仇殺初四鎮跋扈不臣及史可法視師激勵之稍感動而傑尤敬愛可法潛夫與深相結傑益感奮願為前行統兵而北要潛夫與俱謂吾此行必且破潼闗梟李賊之首收全秦以報天子潛夫謂傑公方出師而許鎮有二心議其後不除之不可傑曰吾直折箠使之何害及至雎陽定國負弩矢郊迎盛宫館偉儲張延入城為好會傑欲以信義服之駐兵城外數十里身輕騎赴會潛夫力諫不從旣就館相與㰱血盟盟已語潛夫吾旦夕移營儀封先生先為芻糧計潛夫立起行是夕傑醉卧定國引壯士刺殺之傑兵旣無主遂燔雎陽散入秦郵湖中為盜自是無復有言西伐者矣而是時士英旣與可法嫌聞傑死心利之北向酌酒賀而獨忌潜夫持使節喜事别遣御史代潛夫而潛夫適以憂去初有婦童氏詣吏自言福王妃也久相失今聞王在金陵為天子吾亦欲南耳廣昌伯劉良佐具禮送之南潛夫之歸也至壽州見車馬儀衞甚盛傳呼曰皇后來皇后來官吏夾道伏謁潛夫亦朝之行宫而帝方謂元妃旣亡採淑女錢塘大昏禮在旦夕叱童氏妄自言抵之獄士英嗾臺諫交章劾潛夫以去國按臣挾妖婦嫚朝廷又指睢陽之變為釁起潛夫命金吾緹騎即家逮繫下獄五月我師下金陵潛夫間道歸航海至會稽魯王監國拜太僕寺少卿明年我師下紹興潛夫書絶命詞攜其妻孟氏及孟氏娣妾於潛夫者也至小赭村之化龍橋拜母弟及諸親戚與辭訣拊孟氏姊娣令先下度氣絶乃自沈時順治三年五月三十日也年三十七其弟麗明祚明晉明以栁棺殮之潛夫為人駿快遇事嚄唶立㫁倜儻好持髙節不知者詆為誕妄不謂於天下事能有樹也其在汴時太史劉理順汴人也燕都陷理順死之潛夫為建祠請廕捐金賻其諸子其好義類如此外史氏曰先生一佐郡卑吏當國破亡獨能聯絡所部豪杰成軍河上氣吞虓闞又結悍將之心而願為之用功雖無成然觀其倡議畫䇿向使與陶侃祖逖輩共功名安在無尺寸効哉楊廷樞傳楊廷樞字維斗蘇州籍無錫人嘉靖丙辰進士楊成之嫡孫也為諸生即以理學氣節自命嘗與文震孟姚希孟兩人談經論史及古今情事每遇忠孝節義輒欷歔慷慨為之嘆息不置至於奸邪叛亂之徒未嘗不目眥髪䜿必欲殺之而後快及魏閹亂政毒陷正人一日緹騎南下至吳門逮周順昌人情洶洶有格殺校尉一事廷樞與文震亨實倡之繼與婁東張溥金沙周鑣同邑錢禧輩訂復社文章滿天下名曰國表四方名公卿日以社藝相質後學來問字者踵相接其實為斯文作干城為世道人心作砥柱非徒從事於聲氣間也是時東林之後復社聿興説者共疑為顧髙諸公復起云崇禎庚午舉江南第一廷樞為孝㢘與吳門同榜許元溥陸坦鄭敷教皆人品端方人稱四孝廉其一言一動為世矜式自當道以迄有司無不式廬下訪折節就教然足跡不至公庭亦不妄發一函凡有闗於國家因革與夫生民利弊者雖百口陳之萬言達之勿靳也以是當世益重之學者尊之如泰山北斗朝野望之亦如景星鳳凰云其後屢上春官不第乙酉國變避居光福山中勿復問人間事矣居亡何忽有兵徒自山中來者呼曰奉憲卽縳之去繫之舟乃餓五日不死因於舟中賦詩十二首作家書以遺其孤而死外史氏曰先生當國亡時潛身草莽中仰天泣血處之無可奈何而已及其被難從容就義有古人之風焉嗚呼殺身成仁安在其非孔孟之道乎祝淵林垐列傳祝淵字開美海寧人崇禎間舉孝廉弱冠篤志正學居常自省其過輒入曲室面壁跪不起至流涕自撾其律身嚴厲皆類此壬午上計偕會科臣熊開元姜埰言事獲罪憲臣劉宗周疏救之上怒不測廷臣無敢言者淵戴儒冠慨然上書其略曰臣聞主聖則臣直是切直之言人臣所願効而難遇其主人君所樂聞而不易得之下憲臣劉宗周戇直性成忠孝天授皇上賜之罷斥臣亦不為宗周惜而所惜者宗周以戇直而斥繼之者必懲之為淟涊宗周以迂執而斥繼之者必懲之為便捷淟涊便捷之徒安所不至夫平日有犯顔敢諫之忠臨難始有仗節赴義之槪士氣卑靡至今極矣冦亂以來開門揖冦者有之靦顔偷生者有之坐視君父之急遷延不進者有之此皆戀爵禄怖生死脂韋蓄縮之一念為之爾若宗周不惜軀命觸忤雷霆之威此其孤忠激烈言卽不當陛下亦宜優容之書奏切責下所司議奪南宫試而宗周亦罷歸先是淵固未識宗周至是乃從之學宗周雖斥罷帝含怒未釋於是遣官校即官逮淵究主使意在宗周淵就逮於府環而觀者數千人皆大聲歎息流涕故事逮罪人以駕帖時以票旨無駕帖例不合諸生因疑之大譁亂挺而起者數十百人校俱驚匿淵曉以大義衆乃解散好義或有氣力者爭投以金及援救之牘淵歎曰使我以利死死有餘恨即以利生生益有餘恨凡一金之餉一言之援非利乎吾知有義而已悉麾之既就道諸校搜其裝惟周易莊子及先人小像一幅甲申正月入詔獄卽訊搒掠備至淵抗言曰男兒死耳安有身上書受指他人者二月京師圍急放獄囚淵得出已城陷太常同里吳麟徴死之方死語其家曰待祝孝廉來淵至相與語麟徴乃死淵裂所卧衾二三丈斂之飯含醊祭之儀雖處變亂一如禮朝宿櫬側者旬日間闗涉險持其喪歸會福王立淵詣金陵請竟前獄不許復抗疏請誅奸輔納言見之大驚佯諾曰上卒匿不上當是時淵義甚髙名震天下一時賢士大夫爭慕之願一識其面以為榮宗周復出為憲臣淵痛時事日潰亂勸之奉身引退其明年閏六月淵曰吾分當死遂不食死越二日宗周亦絶粒而卒林垐字子野福清人崇禎十六年進士授海寧令垐以文章負盛名比至官澹靜簡木不務科指下咸易之聞邑人祝淵因救劉宗周下獄即周恤其家甫一月燕京信至金陵未立東南所在變起邑鎮李刀三故大家奴素桀驁乗間煽諸毒怨於諸大家者揭竿起而已隂陽搆兵其間通邑震恐以狀聞然不敢誦言刀三垐得狀漫置不問徐降牒云旦日詣鄉約所講約比至則數千人擁而噪垐又漫不置可否衆益易之謂令固摸稜耳安能處大事耶刀三顧身在事外狎遊而嬉居有頃召衆講鄉約未半卒密縳刀三至庭下人皆大驚垐徐起問庭下人吾自下車廉此人奸狀罪當死衆謂若何咸應聲曰當死遂立命健卒杖殺之合鎮大驚人人股栗垐從篋中出一紙曉通衢元兇旣除餘悉不問衆歡呼釋兵一邑安堵於是威名大震垐惠愛人然持法嚴明有力者撼之屹如山岳是時江右雖茍安顧亂萌所在竊發而寧獨大治性淡泊無嗜欲厨傳蕭然不知肉食吏伺其乏啗以金垐張兩手眎之曰若睒我十指骨相從何處受金耶明年四月聞我師將至解綬去去之日城守衞士挾垐給餉一年環署而譁垐冠帶坐堂上召譁者曰吾此刻未出城門吾頭可㫁吾法不可扞衆乃改請一季垐曰必得首者治以法乃可衆乃推為首三人垐序而責之始給餉三月籍庫藏上之府事畢出城去其威信服人至此民提筐擔罌以蔬菓茗醖追泣送者百餘里不絶抵侯官會唐王稱制授吏部郎與黄道周為一人交唐王去江西而魯王監國由海入閩毅往從之告其父曰兒當死久矣守海寧棄城池當死扈從駐潭州不能隨當死今不死失人臣之分貽父母之羞乃苴履負戈率先戰死於陣年四十二外史氏曰余旣悲開美之死於不食而又悲子野之死於戰場死不同而其志則一皆可悲也嗟乎士君子願立名節然非堅識毅力欲其當險不撓難己方子野之謝海寧而歸也人以為不死矣孰知二年之後竟死其死也不為聲名意氣而然也分也開美疏救念臺歸乃從學念臺逡巡謝曰前日之舉得無小過乎開美請曰何哉念臺曰意氣乎聲名乎開美憮然請益自是學日進嗟乎意氣聲名之偽其病中於人心可以無辨乎二君子之死也分也不為意氣聲名之累也夫方逢年傳方逢年字書田遂安人舉天啓二年進士選翰林院庶吉士授編修四年遣主湖廣鄉試是歲以外艱去當逢年之往湖廣也魏忠賢方亂政逢年發策試諸生以上下泰交為問其程策出極言屢傳中旨非是中間指斥宦寺至舉漢之常侍唐之北司寓比擬語最激切見者太息稱善忠賢知而恚甚有旨降三級調外逢年在翰林為大學士葉向髙及鄭以偉所引重復與同年倪元璐交善每以學行相淬勵及用文字重忤忠賢聲望大振中外俱以東林正人目之而忠賢内銜次骨雖已被謫猶未厭也南京御史徐復陽希指再借科場事論劾有旨牽連逢年削籍副逢年主試者給事中章允儒亦并得罪莊烈帝即位詔起故官歴左中允累至右庶子充經筵講官崇禎七年擢南京祭酒召為少詹事進禮部右侍郎又充重修光熹二宗實錄副總裁先是三朝要典一書作者悉禀忠賢逆黨私意誣詆賢士大夫無得免者實錄亦率倣此帝旣命毁要典至是復刋定實錄逢年毅然握筆一切是非賢否絶不茍徇由是羣小益側目矣十一年以禮部尚書兼東閣大學士入内閣是時天下多事帝急需賢才輔政所遴諸閣臣類多不循故例偕逢年入者為楊嗣昌程國祥蔡國用范復粹四人均以外僚得䝉眷注而逢年獨起家翰林舉朝遂稱為異數為人公廉不受請屬餽遺既素號東林黨友而性復端重於是同官劉宇亮薛國觀嫉之論事每不相能咸思乗間擠之未及發會軍興後先諸犯官所輸贓贖銀征解患不如額科臣上奏以過刑部官帝覽大怒頗疑尚書劉之鳳私庇罪人欲予重辟其疏適屬逢年擬旨逢年以為是皆人産並盡歴歲且久遠不當株坐親黨且之鳳無預不得已姑擬遣戍以上帝見所擬愈怒奉詔詰責竟以閒住去而之鳳亦遂不免逢年居閣中僅七月數見嫉於同官不能大有所施設己又去非其罪中外以是惜之逢年顧歎曰時勢方棘某菲才得遂弛責幸矣閲六年福王即位仍復故官致仕南和伯方一元疏薦不報我師下浙江值避地天台吏民推之城守兵敗被執與方國安乞降已而以蠟丸書通閩事洩被誅始逢年任禮部詔諸大臣保舉人才力薦按察使同縣汪喬年幹略可大用又無錫馬世竒亦所取門下士也世竒有重名稱逢年髙第弟子其後喬年官總制侍郎世竒官編修相繼殉節死所善尚書倪元璐亦死世乃以知人頌逢年云外史氏曰先生以東林賢者而與嗣昌輩賊臣同事其能久於相位乎然先生去而國事益不可問矣卒以一死而殉其亦不愧東林也夫吳鍾巒傳吳鍾巒字巒穉號霞舟武進人始讀王守仁傳習錄悦之繼讀釋氏壇經聞養生家言又皆悦之及受業於顧憲成亟賞其文每課試必列第一載從髙攀龍游聞其講論始悟向來所悦之皆非學術一軌於至正一時名彦如繆昌期馬世竒輩相得甚歡而李應昇則從鍾巒學者也迨應昇謁選鍾巒賦水竹居詩送之其詞曰有水有水亦云其清不因撓濁不隨決行靜則照物動則資生之子之遠爾心是旌有竹有竹亦云其菁干霄玉幹戛風金聲中以虚貴節以方名之子之遠爾德是成有居有居亦云其珍寵賂不入毁譽不聞澹焉虚止超然寡倫之子之遠勗哉維寅後應昇被逮抵郡寓鍾巒家乃與議論今昔又以讀易袖珍本眎之曰毋亂方寸旣以貢試入都門黄道周負重望在詞林一見喜曰吾雅慕李仲達恨不得見今見霞舟如見仲達矣相與講論竟日而别年五十八由光州學博連舉進士是為崇禎甲戌選長興令抵任靖盜安民暇則與諸生講德考業吳越諸士爭師事之丙子分考浙闈得士錢肅樂等己卯中使崔璘以巡察鹽糧出其見郡縣體與撫按同輒矢志不肯屈膝遂中蜚語罷歸家居讀易朝夕不輟時四郊多壘士爭談經濟鍾巒曰不明於死生必不能忠義不知忠義必無經濟作勸學説與同志砥礪焉周延儒再相招之出不應辛巳詔湔除外任叅罰各官補紹興府照磨居一年量移桂林府推官甲申六月聞國變痛絶復蘇曰馬素修必死已而果然是年冬擢禮部主客司主事以清獄未行乙酉七月抵南雄聞南都復潰留不進自是轉徙閩浙兩粤間辛卯八月渡海入昌國衞城至九月二日我師至積薪自焚於文廟左廡樓下年七十五全家俱死著有周易卦説大學衍註霞舟攜卷語錄雜著藏於家學者稱霞舟先生外史氏曰先生幼以理學氣節自負不肯作齷齪兒嘗曰大丈夫不能為大聖大賢亦當作忠臣義士豈可依囘庸碌哉故其理學氣節迥然直峙於兩間道南之遺緒至先生而益光矣曾櫻傳曾櫻字仲含江西峽江人萬厯朝進士官民部出為常州太守清操正氣聞於海内其治行為天下第一嘗過東林書院與髙攀龍諸君子講論道德鄉士大夫羣推重之奉為主席天啓丙寅逆閹盜柄羣小搆煽矢集東林矯旨拆毁符檄旁午伐屋撤垣勢如風雨又適當攀龍沈淵時破巢取卵邑令吳某繫攀龍長子世儒至常州櫻見之驚謂吳曰若欲使忠臣子孫必為豺虎所魚肉耶遂匿世儒不使出越數日官旗受吳門五人之厄過梁溪不復大恣而世儒得倖免皆櫻力也已而奉旨勘問院道勘語皆有攀龍與上年被逮諸臣同惡相濟等語府詳獨以同朝共事四字易之後擢為副使道累官至藩臬罷歸林下不復出矣後逆璫指為東林黨人矯旨削籍至桂王稱號廣西召拜大學士國亡殉難外史氏曰當逆璫勢焰熏天地炙日月天下騷然賢人君子夜無安枕白晝道路以目吳懷賢以稱頌楊大洪二十四罪疏劉洞初以詩箑寓譏刺皆被殺於時清流重足而立當道者趨之如蟻或畏之如虎先生介然獨立周旋忠臣義士使覆巢之下得有完卵非東林人物無此擔當也東林列傳卷十二
