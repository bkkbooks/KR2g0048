body:
  text: 東林列傳卷四江陰陳鼎撰明繆昌期李應昇列傳繆昌期字當時先為常熟人後徙江陰自諸生至鄉舉皆困塲屋而文名籍甚萬厯四十一年成進士年五十矣大學士葉向高主試以宿望選翰林院庶吉士是時常熟令楊漣以考選候補與徃來密稱石交方昌期之未入都也無錫顧憲成高攀龍闢講堂於東林庵昌期私謂人曰諸君有意立名黨錮道學之禁殆將合矣旣登朝而羣小攻東林甚急還觀其所為皆附時相走私門惡清流清議為己害昌期雖未心許東林而惡攻者滋甚徃徃盱衡扼腕形於顔色朝論遂以東林目之昌期亦弗顧也四十三年五月梃擊事起廵城御史劉廷元阿後宫以風癲蔽其獄提牢主事王之宷抉摘主謀御史劉光復主廷元議疏攻省垣之右提牢者有無貪首功視為奇貨等議昌期憤甚語人曰一御史以風癲二字出脫亂臣賊子一御史以奇貨元功抹殺忠臣義士而主風癲者切齒嗾工科給事中劉文炳論劾昌期移疾歸明年内計羣小欲逞志於昌期掌院學士劉一燝力持之而止歸里七年熹宗初補原官主湖廣省試以趙高仇士良發策語觸忌者明年陞左春坊左贊善册封建德王又二年陞左諭德先是逆閹横殺光廟伴讀王安逐首輔劉一燝而葉向高召至昌期於葉師生也又相善迎謂曰内傳不可奉顧命大臣不可逐公三朝老臣當以去就爭之力遏其漸無令中人手滑向高迂其言頷之而已趙南星為冢宰素重昌期時高攀龍楊漣左光斗等澄汰流品辨别邪正昌期每預其議朝右皆側目方楊漣二十四罪疏之未上也昌期謂光斗曰内無張永外無楊一清一不中而國家從之可僥倖乎漣與光斗不聽僉疑草稿出於昌期疏入外廷尚倚向高為助一日向高言於内閣曰此䜿在君側小心一旦去之不易得昌期勃然曰誰為此言者可斬也向高色變而起號於人曰西谿殺我西谿昌期號也又廣寧陷昌期欲有所爭於向高語未合昌期詫曰果爾公非削國之相即亡國之相矣向高氣結幾暈絶向高名寛大而不能受昌期之好盡言亦過戅矣自是口語籍籍流聞大内與草奏之説相應而禍不可解矣旣而向高去韓爌為首輔亦雅意嚮之然忠賢銜之切矣未幾爌亦去正人次第削奪當漣出都門昌期持具徃送㑹推掌南翰林院忠賢遣小璫至閣厲聲曰繆昌期仍留之送客遂罷歸旣而璫矯㫖削籍旋逮問方被逮時妻子不得訣别縣令岑之豹促令就道昌期曰早知此矣與應山同事應與應山同禍應山謂楊漣也逮至下鎭撫獄許顯純叱曰你係江南第一才子何為與楊漣同謀昌期曰楊漣職司風紀某係詞臣平素交好同謀是實且某旣為詞臣是是非非應得執筆為皇上謀為二祖十宗謀死無悔也草疏是實顯純厲聲拷掠慘毒備至死之夕狀甚秘外人莫得知歛之日十指墮落捧掬置兩袖中葢逆璫以草奏故屬獄吏加梏拲焉其他苦毒又可知也卒年六十五崇禎初復原官贈詹事府詹事兼翰林院侍讀學士予祭葬諡文貞李應昇字仲達號次見江陰人生而頴敏出就外傅過目不忘習戴記師命其自解柝疑剖微宿儒不及萬厯丙辰成進士謁選授江西南康司理應昇律己清嚴公庭如水出其緒餘陶鑄多士紫陽白鹿洞書院久廢應昇為興復之立館舍招集人士旬有小㑹月有大㑹㑹期親詣洞宿與諸生質疑問難推明紫陽之教一時從遊學者千里應之其成名於世者指不勝屈尋擢福建道御史時鄒元標孫瑋高攀龍後先總憲雅與應昇善應昇又善章奏凡屬國家大政必就商確有大奏議必托代草應昇望重西臺為宵小所忌每入朝上殿中涓為之側目會逆璫擅權應昇草疏十六事欲上矣為楊漣所先故繼楊而劾璫者應昇也萬燝廷杖應昇徃朝房視之又上疏申救人甚為之危魏廣微驕恣失儀應昇出袖中彈文持論侃侃讀者吐舌以為禍且不測初擬廷杖一百賴首輔韓爌救免僅奪俸二奸銜恨必欲殺之有工部主事曹欽程者以貪著察處時欲夤縁速化應昇條陳疏中言墨吏破甑如鷹思攫欲著為定例勿復轉民牧以防其肆虐欽程遂恨入骨而無其因迨攀龍叅崔呈秀疏實出應昇手呈秀偵知赴席暮夜候謁長跪求解應昇不為動於是欽程迎合呈秀疏論應昇其畧云應昇專為東林䕶法疏中屢作含沙隠語以排擠正人惟急援其東林大教主高攀龍驟躐要津冀得藉以為所欲為於是號召其黨黄尊素等俱為論賢不論資俸之説顯背明旨俾攀龍不數月之亞卿而忽躋總憲重地疏上得旨奪職應昇歸足不入城築落落齋閉戸靜修絶不與聞外事適聞魏大中被逮泣告親友轉貸百金贈之復與高攀龍書云學問之途茫茫望洋古人云不得於朝則山林而已今山林席地恐復相煎見六君子之慘酷不免惻惻廢箸心如懸旌矣未幾羅織周起元一案緹騎到常應昇慷慨就道士民執香送者以萬計兒童婦女聞之無不流涕至京下鎭撫獄拷掠備至大呼二祖列宗以死崇禎初贈太僕寺卿福王立諡忠毅初應昇父鵬翀與吳縣洞庭山人朱鳳翔字古庭者為莫逆交應昇以其盛德奉為執友及應昇被逮鳳翔卽破産揮千金尾舟北上為之百計斡旋奈璫燄正熾禍幾不測鳳翔勿顧也獄中一切為之措置及應昇死家道中落鳳翔卽割其原置江陰田兩頃予之其好義如此吳人至今誦焉外史氏曰西谿先生戇於汲長孺而文章過之長孺見容於漢武而西谿見殺於逆璫此漢之所以興而明之所以亡也仲達先生立朝侃侃致小人側目欲殺之者不獨崔魏也嗟乎先生之死生關乎國家之存亡者也天旣生崔魏以亡明矣而先生必欲存之是逆天矣天可逆乎此其所以見殺也噫周宗建黄尊素列傳周宗建字季侯吳江人萬厯四十一年進士授武康知縣改調仁和以卓異擢監察御史天啟改元夏四月京師大雨雹於是魏忠賢用事宗建疏謂四月正陽之月京房易傳當燠而雹害正不誅兹謂養賊近見朝廷處分章奏始於害正之漸遂糾忠賢目不識丁衷懷叵測為禍國家大可寒心疏入會天子方御請筵講甫竟忠賢恚甚摘疏中語指示閣臣問此何等語也葉向高從容曰言官也何可深究忠賢色稍解始得免及奉聖夫人之再入宮也給事中侯震暘力諌不聽宗建復疏爭語尤危切有詔奪俸三月忠賢故與客氏比益憾宗建不釋隂與私人戸科給事中郭鞏謀逐宗建鞏引其黨借内察欲盡逐東林諸臣乃竄宗建姓名其中宗建聞而歎曰網羅旣成禍不逺矣吾固不惜死遂上疏并糾鞏大略謂數月以來熊德陽江秉謙斥矣侯震暘及王紀滿朝薦又斥矣鄒元標馮從吾及文震孟又斥矣今且欲并孫愼行盛以𢎞而逐之摘瓜抱蔓正人重足舉朝各愛一死無敢為陛下言者故鞏横行愈甚奸謀愈深旣有忠賢為之指撝有客氏為之操縱有劉朝等為之爪牙而外復有鞏等蛾附蠅集内外交通驅除善類天下事尚忍道哉因請誅忠賢鞏甚力忠賢恚且懼乃率劉朝等環泣帝前且乞自髠欲以激帝怒帝果責宗建囘奏宗建申請不為屈擬予廷杖復以向高救詔改奪俸一年至是凡再奪俸矣客謂宗建盍少休乎宗建奮曰幸不死杖下此上恩也上實生我其敢不以死報於是忠賢將遣劉朝分率内操諸中官廵視榆林各邊以犒軍為名議旣定剋期降詔宗建亟陳内官典兵有三不可九害狀且曰漢中常侍之竊政也遂致黄巾之禍唐北司之擅權也遂馴藩鎭之禍宋童貫之頻年用兵也遂釀五國城之禍本朝王振劉瑾亦然皆已事明鑒不可不深慮而預防也疏入不報然其事竟寢已宗建巡按湖廣丁外艱歸是時忠賢益恣横無所忌其黨亦日熾都御史楊漣左光斗輩交章訟於朝凡所指摘必援宗建前疏忠賢由是益追憾工部主事曹欽程誣劾贓罪旣得旨削籍尋復與周起元等俱被逮下詔獄前後坐贓銀萬三千餘兩搒掠無虛日宗建偃臥不能出聲鎭撫官許顯純詬曰若尚能説魏公不識丁字否出片紙付獄吏宗建遂死獄中是歲六年六月也明年莊烈帝卽位以廷臣言命贈太僕寺卿予特祠福王時追諡忠端崇禎時我師薄京師狥地至遷安曩宗建所糾郭鞏者其縣人也方以忠賢黨被斥怨望上大帥書求内附我師退語頗聞上莊烈皇帝大怒逮至論死黄尊素字眞長餘姚人也七世祖墀與同邑陳子方死建文之難尊素登萬厯丙辰進士授寧國府推官時湯賓尹為宣黨魁聲燄懾天下官其地者必受牽挽尊素至賓尹輙自歛飭有大姓置私獄殺人尊素黥其僮客六七人一郡股栗入為山東道御史請留用鄒元標馮從吾劉宗周請復召對言御門講筵徒循故事講官未嘗獻規主上未嘗發問鋪節文具以治憂患相併之天下庸有濟乎先是中朝分為兩黨遞相勝負其權在政府臺諌天啟初小人之勢稍絀其黠者遂欲借内廷以除異已時閹人魏忠賢與阿母客氏勢漸盛於是導之使盡收内廷之權依為城社而始與外搆四年二月京師地震尊素上言皇上臨御數年漸有厭薄言官之意章疏留中考選稽閣宮府之事稍稍忌諱言官遂有剽竊皮毛以塞責者此端斷不可開也阿保重於趙嬈禁旅近於唐末蕭牆之憂慘於敵國毫末不扎將尋斧柯今以此言入告似為不急浸淫不止異日有欲進言而不敢有欲聞言而不得者矣亡何小人搆成内外之勢銅崩洛應尊素惕然謂同志曰吾輩如處漏舟亦惟衣袽自戒母自為敵國也百弩環舍尚爾勃豀亡無日矣吏掌垣缺出序屬劉𢎞化次阮大鋮魏大中大鋮方省覲聞𢎞化奉使乃不待假滿迫遽入京㑹吏部推陞工科周士樸大鋮疑故出此缺以置己因潛通内廷格士樸疏不下得掌吏垣朝論囂然大鋮遂請告吏部以大中代之大鋮由是讐大中及僉院左光斗時冢宰趙南星變通銓政調職方鄒維璉於銓部江右臺省以不諮訪同鄉起爭事權維璉出疏過激臺省皆讐之維璉為尊素房師大鋮嘗自托君子故尊素極力排解其間然卒不能得二憾交作而汪文言之獄起汪文言者任俠自喜嘗客司禮王安光宗登極諸善政皆文言所指授諸君子以此多之不吝容接給事中傅櫆與逆閹養子傅應星稱兄弟逆閹亦視之如子二憾乃使借文言興大獄劾左光斗魏大中交通文言把持國政下文言鎭撫司鍜鍊以文致左魏獄急時大中知尊素深沉有大計片紙屬曰事急矣勿殺義士尊素與掌衛事劉僑畫策爰書一無連染獄遂解羣小愕然六月副院楊漣劾忠賢二十四大罪初商之尊素尊素曰公不見楊邃菴之除劉瑾乎有張永以為内主故不勞而功成公今爭以口舌是手摶彪虎也一擊不中禍貽之國矣雖然我不可以不和因上言臣前者災異一疏微言之而遽奉嚴旨亦知表裏之奸已成而道路之間以目今忠賢諸不法狀旣經暴露夫小人為惡徃徃畏主知懼人言則尚有悚惕及其已知之將皇上視為習聞熟見之事更復何懼人言哉始猶與士大夫為仇繼將以皇上為注此時不惟臺諌折之不足卽干戈取之亦難為力矣時劾閹者紛然羣小導閹廷杖以脅言者工部郎萬燝杖死尊素言律例所載雖叛逆十惡應死者猶且反覆於廷議鞫訊之間今以披肝瀝膽之臣子枉死於壅閉之左右必且忻忻相告曰吾儕借天子之尊今而後可以立威可以箝口矣不知輕用皇上之威顚倒在一時而長留殺諫之名貽譏在萬世他日有秉董狐之筆者書曰某年月日萬燝以言事死其奈之何進此廷杖之說者必曰祖制不知二正之朝王振劉瑾為之世廟之時張孚敬與嚴嵩為之神廟初年張居正為之實非祖宗意也萬燝之杖也適與雨雹㑹六科廊之火也適與杖林御史㑹何其呼吸相應若此意者臣工之誠不足動主天意為之震聳乎疏上後又倡率臺省㑹於東閣謂此後有傳旨廷杖者閣中當輒封還不可奉行閹人聞之競前恣口横詈閣臣俯首不發一語尊素毅然曰絲綸之地司禮非奉命不得至若等何為羣閹愕眙而去尊素因謂楊漣曰公一日在位則忠賢一日不相容國事愈决裂矣不如去以殺其禍漣以為然遷延不能决以至削籍始去魏廣微父閹得相魏大中因其大享不至將糾之尊素曰不可今大勢已去君子小人之名無過為分别則小人尚有牽顧猶可一二分救也若政府明與之合惟所欲為耳不聼廣微喟然嘆曰諸公薄人於險吾能操刀而不割哉遂甲乙宦籍惎忠賢曰此東林黨人皆與公為難者也忠賢納之終熹宗世其竄殺不出此晉人欲用郭尚友為廵撫冡宰趙南星惡其賂遺未允尊素曰水火之釁深吾儕禍且不逺盍稍留晉人自助南星謀於吏垣大中終以應祥易之御史陳九疇言應祥為大中座主以此得晉撫於是中旨盡逐要路之人而時局大變矣尊素亦以茶馬出京人第服其清言勁論不知其憂深慮逺彌縫於機失謀乖之際者一一皆左契也五年曹欽程論之削籍其冬訛言繁興謂尊素欲用織造太監李實為張永已秘授以計忠賢聞之大懼刺事至江南四輩漫無影響沈演欲自為功貽書忠賢曰事有跡矣於是忠賢日譙訶李實取其印信本去而逮旨下葢文言初獄原為左魏設不意尊素能出之故於諸君子中尤忌尊素焉緹騎至蘓州為蘇民箠死失駕帖尊素萬里投獄獄中與周順昌周宗建李應昇繆昌期講道不輟謂門人徐石麒曰吾於此不減黄霸之受尚書也忠賢使許顯純誣贓拷掠一日應昇困甚尊素拷竟次及應昇尊素請代拷顯純詰之尊素曰吾忍見李公負病受楚毒乎顯純愍然為之改容臨害時向闕叩頭復南向謝父母賦詩一章而卒年四十三六年閏六月朔日也後贈太僕寺卿諡忠端外史氏曰嗟乎兩先生死而明亡矣其後莊烈茍延十有七年者祖宗之餘烈耳假令季侯眞長不死東南有繼起者相輔石齋或可存孤兒寡婦於一隅也二公死而善人絶矣余故曰明之亡也不待甲申也萬燝劉鐸合傳萬燝字元白江西新建人萬厯丙辰進士居官素有聲性倔强尚氣節遇事敢言時為工部屯田司郎中與東林在朝諸賢交相徃還最宻其同年友劉鐸知揚州尤稱夙好嘗遺書使鐸之東林㑹講曰我以京宦覊縻不得與此斯文之盛足下咫尺梁溪可坐失機㑹耶人生於世不聞至道枉讀書置身科第如入寶山空手而還人莫不笑之也朝聞夕死學者素願可因循自委乎未幾燝以言事忤璫矯旨廷杖政府救不得竟死杖下舉朝為之痛鐸字洞初江西廬陵人與燝同鄉同年故燝相切勉勵如此鐸得書卽請假飛棹過無錫與東林諸君子講學有所得而還語其子及門人曰讀書自有向上路至於功名科第此其事之末者矣汝曹第以文辭為進身之計而不求聖賢至道縱富貴而至將相則亦管晏之流耳烏能曵履而登孔孟之堂哉逆璫旣殺六君子緹騎四出以鐸詩箑譏刺逮下鎭撫司死之揚民聞之為之罷市巷哭者七日夕崇禎初贈燝太僕寺少卿諡忠貞鐸贈太僕寺少卿外史氏曰當逆璫初熾時韓葉在朝猶有所憚而元白竟以言事死杖下於是滿朝震動以為宰相不足恃也而披靡焉及洞初之死又當炎燄蔽日之時天昬地黑不足以云世界矣而有明於此亦卽亡矣嗚呼丁乾學吳裕中吳懷賢合傳丁乾學字天行宛平籍浙江山隂人萬厯己未進士少同父寄居京師數歲知孝弟之道卽能竭力以事父母為人端方不茍言笑所徃來者皆東林賢士大夫在翰林中人以師範推之見逆璫勢燄而大臣若魏廣微者阿附特甚不禁太息流涕仰天哭嗚嗚不已家人不知以為忽得狂疾也他日㑹於朝堂以正言諷廣微廣微怒謂其私人曰丁檢討舉動如此想不欲保首領耶為我廉其所為入告上公而誅之月餘邏者無所得廣微怒密令錦衣僉事高守謙率中官數十人毆殺之時乾學以主試策問譏刺逆璫已降謫在第矣吳裕中字磊石江夏人亦己未進士在京師與乾學比屋而寓每朝退兩人必促膝談心見時事日壞徃徃叫號呼天時為江西道御史敢言以直聲著廣微惡之入譖於璫適裕中糾輔臣丁紹軾謟諛不法逆璫怒矯旨杖死闕下吳懷賢徽州人嘉興籍以貢生授中書因稱道楊漣二十四罪疏廣微邏得入告逆璫逮獄拷死乾學等旣被殺株及家人追贓被掠而死者數十人崇禎初乾學贈翰林院侍讀學士裕中贈太僕寺少卿懷賢贈工部主事外史氏曰當逆璫肆虐而廣微助𦦨天下正人消磨殆盡矣茍有人心者不得不疾首痛心也况三先生稱忠義者乎自必徵色發聲而忿之恨之矣此其所以見殺也周起元夏之令列傳周起元字仲先福建海澄人萬厯二十入年鄉試第一明年舉進士選浮梁知縣以能稱三十三年調繁南昌四十年授湖廣道御史㑹攻東林講學之議起起元駁之大犯時忌四十五年出為桂平道參議值柳慶大荒監司郡邑官皆罷去藩臬缺員屬起元攝事言於上官曰荒盜並告先急救荒而徐議弭盜於是請動支次年兵餉之半分官買米水陸立兵民遞運法以米給其糈所過之地凡夫馬兵徒之費皆以米支給候扣工銀扺庫有饑民求食者卽令保甲編號運米逐日給米於是兵民䕶官米不異已物猺獞賊夾岸耽視竟不敢肆掠復隨在設糜厰全活甚衆然後密除劇盜之不受撫者地方以寧顧單騎冐風霧染瘴疫垂絶士民皆為祈祝或曰民之所祝天必祐之果愈四十八年遷四川副使未任值議留邊道奉旨留用加叅政銜遷新設通州道時募兵出關又廣寧潰兵散歸節制撫鎭監司率被兵噪有客兵田景坤等擁衆相殺起元督兵緝拿首兇畿地始安天啟三年陞太僕寺少卿尋陞右僉都御史巡撫應天疏裁織造濫額歴叅織監李實酷取料銀踰冒四萬兩實又誣陷蘓州同知楊姜起元三疏申救比璫燄方張矯旨削姜官而起元危矣四年江南大水寸稼不登起元疏災傷之苦請行蠲賑乃先檄所屬設處官銀江楚貿米平糶濟饑又疏漕粮改折均平之議吳民賴之後疏劾蘓松道臣朱童䝉㑹權璫搆怒降旨削籍六年李實疏誣起元魏忠賢矯旨差錦衣衞官旂逮問未至之前起元展拜祖祠宿祠下夢北獄甚熾自亦被逮備極刑楚寐中大呼汝專權弄政凌辱忠良欺我皇上耶時子彦陞卧側急呼醒起元曰我將逮矣及緹騎至漳起元慨然就道郡士民爭醵金帛助緹騎所需扺闕下入北鎭撫司獄璫黨許顯純酷刑慘加遂斃於獄好義者爭助之得扶櫬歸崇禎元年贈兵部左侍郎夏之令字伯先光州人萬厯丁未進士拜四川道御史以直言忤崔魏并逆璫之令與周朝瑞袁化中三人同年中最為莫逆每見時事日非璫𦦨日熾無不扼腕椎心仰天泣血也旣而正人俱斥朝廷一空又逆璫矯詔興大獄緹綺四出三人皆先後下鎭撫司拷掠慘備之令大呼高皇帝而死天下哀之崇禎初贈太僕少卿初廣微阿璫作東林㸃將録進之曰殺公者此輩人也於是忠賢决意盡殺之方其秉燭開單時至起元等六人忽怪風滅燭空中隱隱呼寃者再廣微怒命婢復燃燭操筆曰我不寃汝汝將寃我矣竟書之而六人死外史氏曰從來滅亡之朝必有大奸以芟夷君子君子者國之元氣也未有元氣喪而四體不受病者也兩先生皆國之元氣一且斬絶此有明之所以不振歟東林列傳卷四
