body:
  text: 東林列傳卷三江陰陳鼎撰明楊漣左光斗列傳汪文言楊漣字文孺號大洪湖廣應山人萬歷丁未成進士授常熟縣令是時東林大興每遇講會必至無錫與顧憲成高攀龍諸君子探性理之要詢治道之原政暇即與邑之士子相勉勵講道論德無虛日每問民疾苦徒行阡陌間以是遍知閭里利病稱當代神君云五載舉循良第一在省垣四方貨賄不敢窺其門及條奏天下大計言邊事必大壞宜更置經略擇可以辦遼者藴義生風抗論薄俗其風裁峻拔所謂以利刃齒朽腐也當神宗寢疾光宗不得入侍漣率百官問疾請閣臣宿閣中引宋文潞公訶內侍故事為例傳語伴讀王安力請太子入侍夜無輕出光宗諒暗奉遺詔下考選撤閹稅出諸章奏留中者皆漣一人之力也封后議起人情洶洶漣上疏力爭且請遺詔中首舉册立又同諸大臣上疏乞願謹內臣奉皇長子居慈慶宮有機在防微事在愼始一疏光宗閲奏語太子曰此汝忠臣目屬者久之光宗賓天漣趣閣部大臣趨乾清宫閽人格不令入攘臂大詬閽人却遂得入慟哭急請見太子三四始出諸臣呼萬歲閣臣劉一燝韓爌奉太子兩手出乾清宫暫御慈慶宫時選侍猶踞乾清不肯出漣抗論於朝房於掖門於殿廷者日以十數叱小豎於麟趾門者一叱閣臣方從哲及大閹於朝者再選侍乃移一號殿而太子復還乾清宫移宫之日奮髯呌呼聲徹御座上亦語近侍曰鬍子官真忠臣也移宫既定漣乃即始末上疏優詔歎嘉羣小恚甚誣以交關司禮思中傷之漣於是引疾歸未幾起都察院左副都御史漣力引東林諸正人以進羣小側目會逆璫恣橫漣上二十四大罪疏忠賢大懼宰相魏廣微璫之義兒也進謀曰東林必殺公忠賢怖且恚亦曰東林殺我於是遂以漣為東林黨人云急徵楊漣坐故經略熊廷弼贓拷死崇禎即位贈恤有加諡忠烈漣性剛介於人無所容獨於其友陳愚為莫逆交每閲邸報聞國是蠱壞朝鮮正人未嘗不拊膺歎曰主上深居所煬竈多矣以故漣所為及擊姦諸疏皆自陳君慫恿之其攻魏閹一疏則出自繆昌期手筆也左光斗字共之南直桐城人生之夕月宿在斗父遂以名之又自號浮丘生九歲能屬文十四作瑞麥賦長益豪邁負氣聚書數千卷獨好觀古節俠諸傳記既而翻然求程朱之學以自勉曰是可以安身立命也登萬厯三十五年進士官中書舍人擢御史初入臺即論輔臣方從哲兵部尚書黃嘉善不職狀又捕治姦胥冒官者百餘人權貴皆畏之同臺推以為鋒奉命視京畿屯政光斗曰國家歲仰東南漕運由北人不知興水利屯田積粟也因上三因十四議疏條析水道令民倣其意以時蓄泄便田作民遂大饒時諸中官有侵屯事者輒奏請按治大璫劉朝矯東宫旨索戚畹絶莊手封還之不與改北直督學立文藝騎射二科拔其尤者入兼材録嘗識大學士史可法於諸生中數引與論古今事曰此國器也會光宗崩李選侍居乾清宫邀封皇太后聲言垂簾稱制給事中楊漣與諸大臣會議疏請移宫選侍不為動光斗特疏爭之曰內廷之有乾清宫猶外廷之有皇極殿也惟皇上御天惟皇后配天得居之今大行皇帝升遐選侍既非嫡母生母之列而儼然居正宫殿下反居慈慶不得守几筵行大禮典制乖舛名分倒置臣竊惑之且李氏侍先皇無脫簪雞鳴之德即貴妃之命亦在彌留之際其意可知况行於先皇則伉儷之名猶可行於殿下則尊卑之稱有斷斷不可者倘及今不決必借撫養之名行專制之實武后之禍將再見於今誠有不忍言者矣疏入選侍與內奄李進忠謀詰疏中武后等語且召之光斗曰天子耳目之官非天子宣不敢奉因語楊漣曰光斗命盡於此矣選侍不移宫光斗亦不立螭頭下也漣數叱中官使回奏光斗得免越二日而進忠盜藏事覺詞連選侍父選侍始倉卒移宫諸中官將羅織之光斗復出仁義兼盡一疏謂選侍移宮以後自當存其大體捐其小過不宜以進忠等妄有株連又言光宗年號或議削去及改紀明年為非是先帝雖一月御天何忍言削若明年新君御極仍以大行年月頒朔則又不可當以萬厯末年八月為泰昌元年且引唐睿宗順宗為比衆從之彌月之間定諸大計皆漣與光斗後先倡議焉於是天下稱楊左居亡何遷大理寺丞進少卿踰年升都察院左僉都御史時楊漣為右副都高攀龍為左都趙南星為吏部尚書並執法不阿而光斗與吏科魏大中尤以峭直見忌逆璫魏忠賢方用事亦心惡其不相下也羣小失志者遂爭趨附相齮齕勢橫不可制楊漣首疏忠賢二十四大罪以示光斗光斗力贊之璫銜刺骨而先是逆黨阮大鋮謀掌吏科又為光斗所屏而與大中姦相魏廣微之失儀也大中糾之於是二憾交作刑科傅櫆者憸人也遂劾中書汪文言交通併及大中光斗等以應璫時在廷多正人光斗得不坐及大中以謝應祥事被斥南星攀龍罷光斗憤吒愈甚度與璫不並立密草三十二斬罪疏劾忠賢未奏而事泄適吏部侍郎陳于廷會推冢臣疏上逆賢矯旨切責謂此次會推仍用趙南星私人喬允升馮從吾等顯是陳于廷楊漣左光斗抗旨徇情箝制衆正光斗遂與二人俱削籍去自是銓司臺省正人絶迹矣時天啓四年十一月也明年逆璫大興詔獄謀逮治在籍諸人置之死楊漣以書來訣勸令自裁光斗奮然曰死何恨哉但人臣即死當歸命君父伏刀輦轂下而先時擇便如懼死何會其弟光先試禮部先一月馳歸白其謀光斗嘆曰吾苦無以慰二親耳豈畏死者因置酒為親壽數稱説范滂别母及本朝楊兵部繼盛西市事語慷慨家人皆泣下莫能仰視既而謂其弟曰吾不能為孝子矣日束裝候緹騎至未幾御史梁夢環復追論汪文言遂以移宫逮光斗及漣等六人下鎮撫獄復坐受熊廷弼贓二萬兩蓋姦黨欲以移宫重其罪以坐贓速其罪耳當選侍移宫時光斗仁義兼盡之疏與賈繼春之揭同上是未嘗不欲安選侍也廷弼撫遼光斗曽䇿其必敗具疏力爭及再起而廷弼益驕朝議至欲據前言者以謝熊光斗又疏持不可廷弼甚恨之置對時廷弼抗言楊左嘗欲殺我是豈為我營脫者時姦黨許顯純等悉置不問光斗等六人遂駢死獄中是夕長虹亘天桐城有大星隕如斗明年愍皇帝誅璫贈都察院左副都御史尋加太子少保廕一子豫祠諡忠毅初光斗之下北司也厰衛陰列卒偵伺獄甚祕雖子弟親識莫敢嚮邇有舉人孫竒逄者獨走千里詣獄視之請行間客氏以免光斗弗許乃與鹿太公正密醵金為助正太常卿善繼父也時諸左多匿其家亦不懼八郡諸生聞之曰此殆為前督學公故皆願出死力從之而光斗已斃獄矣於是天下以楊左之死比漢陳竇且多兩義士也汪文言者南直徽州府人以監生工書授中書舍人遊於公卿間以節概著一時賢士大夫樂與之交曽客內監王安安固賢者光廟時凡善政舉行文言力贊之無不聽也而璫遂目為東林之黨會起大獄欲羅織諸賢首以文言下鎮撫欲借以傾攀龍於時正人力為調護又賴吳錦衣者持之得免既而逆璫令御史梁夢環復論文言交通狀以移宫事逮楊漣左光斗等下鎮撫獄坐熊廷弼贓二萬兩文言百苦備嘗諸慘俱受膚無寸完而死焉外史氏曰天欲亡明也故生逆璫以戕忠良忠良盡而明運絶語曰善人國之經紀也有經紀斬而國不亡者乎吾觀楊左之死而知天已絶明矣周朝瑞袁化中列傳周朝瑞字思永號衡台山東臨清州人萬厯丁未進士由給事中遷太僕卿性剛介不阿居官以清節著在朝侃侃昌言羣小皆憚之時鄒元標趙南星在京師設館與天下名宿講孔孟之學朝瑞與同年友夏之令皆預焉會有攻之者朝瑞輒大聲疾呼曰講學者二祖列宗之教也今攻之殆欲攻二祖列宗耶於是朱童蒙等諸小人皆銜之入骨嗾魏廣微言於逆璫魏忠賢下詔獄拷掠死崇禎初贈大理寺正卿諡忠毅袁化中字熙宇山東武定州人萬歷丁未進士幼有至性能事親以道居官飲氷茹蘗不染苞苴人亦不敢以非義干拜河南道御史以直言忤璫下鎮撫獄百慘俱備大呼列祖諸宗而死死之夕獄中鬼哭神號忽大風作衆鬼􅐝鎮撫司用刑胥投諸厠獄卒奔往救得免越三日皆死崇禎立詔贈太僕寺少卿諡忠愍外史氏曰甚矣逆璫之毒過於虎狼吾不知其是何肺肝也彼君子者逆似與有不共戴之讐焉兩先生因直言而殺身而破家而流離其子孫猶不足以快其心者何耶魏大中周順昌列傳朱祖文朱陛宣五人魏大中字孔時號廓園浙江嘉善人性狷介為諸生貧甚居湫巷數椽不蔽風雨舌耕不足自給怡然負笈從高攀龍遊即以正學相勸勉萬厯丙辰成進士筮仕行人每奉檄遐征減厨傳却贈遺嚴考最入工科搏擊無所避權貴斂手踰年高邑趙南星為大冡宰知大中清操卓識每事咨之其所薦引皆海內人望癸亥轉禮科時乞恤贈者濫甚大中引會典悉裁之忌者益怒甲子晉吏科都給事中以激揚流品為己任發露餽遺仕路益肅既而大中與楊漣左光斗首擊逆璫南北各衙門交章應之尋值晉撫員缺廷推謝應祥故屬佳品然出南星意大中不知也忌者彈之遂得旨降調旋逐南星攀龍正人之禍如火燎原不復可撲滅矣乙丑夏璫矯旨逮大中是日雷電交作風吼水立士民擁之泣送者數萬人郡邑長咸涕下氓𨽻莫不掩面過姑蘇周順昌盤桓舟中者幾日夜過無錫高攀龍送之高橋而别至常州知府曽櫻見之潸然淚下大中顔色不變慰之曰死於王家男兒常事何必爾爾櫻捐俸金百金大中堅持不受曰譬如婺婦孀居數十年垂死中偶動一念便屬失節簀華而皖不敢以此易也逮至京下鎮撫獄搒掠備至誣贓三千三百金大中歷官十年貧不減諸生時五日一訊訊加全刑雖戚友捐助者衆卒不能如額竟死於獄崇禎初贈太常寺卿諡忠節子學洢奉遺骨旦暮哀號水漿不入以死人謂父死忠子死孝其魏氏一門之謂歟周順昌字景文吳縣人萬厯癸丑進士授福州府推官時稅監高宷橫斂虐民激變劫巡撫匿私署為質民情洶洶不測順昌仗義抗宷衆始解散上聞撤宷歸順昌以清直得最擢吏部主事謝絶請託人不敢干以私請假還里葺舊居數椽讀書其中順昌素與璫忤天啓甲子忠賢竊政羅織忠良順昌每閲邸報輒發憤嘆息適嘉善魏大中被逮過吳順昌獨往欵語纍日臨别涕泗許女字其孫買舟遠送校尉呵止之順昌張目叱曰若不知世間有不畏死男子耶若曹歸語而忠賢吾即故吏部周順昌也御史倪文煥詗得之誣劾順昌貪橫歸道潞河舟重漏發白金浮露矯旨削奪順昌曰求仁得仁正吾今日事吾何憾哉繼而內臣李實疏參緹騎至知縣陳文瑞其門人也懷牒詣順昌泣下順昌曰吾辦逮久矣此特意中事毋效楚囚對泣顔色不變令請順昌入治裝舉家號慟順昌笑曰無事亂人懷也顧案上有素榜徐曰此龍樹庵僧屬我書者我向許之今日不了亦一負心事乃題小雲栖三字後識年月投筆而起改囚服出門順昌居鄉素有名士民哀憤聚以萬計爇香呼寃聲徹十餘里擁撫按車請疏留議日中不決旗尉素驕橫擲銀鐺厲聲曰東厰拿人鼠輩何敢爾於是顔佩韋等大呼曰吾等謂天子詔耳東厰何得逮官即前奮擊尉斃一人餘俱踰牆走脫順昌曰是益重吾罪也知府冦愼委曲調護士民乃安或有勸順昌自裁者順昌嘆曰豫小臣也豈敢引大臣不辱之義乎固知此行必死死見高皇帝請殛元凶以肅清朝廷此願畢矣乃間行赴詔獄拷掠慘毒抗詈不屈許顯純捶其齒盡落順昌噀血濺其面詈益厲因觸石碎首其夜為獄卒顔紫所害崇禎元年贈太常寺卿諡忠介而參順昌之倪文煥都人所傳百叩御史也家居維揚白晝見五人嚴裝仗劍容狀甚厲馳入中堂已而旌旗衛從數十人導尊官來登座冠服儼然文煥大懼率妻孥叩頭祈哀庭下石井欄自起舞空中良久墜地聲如霹靂乃騰空去亡何文煥以黨逆伏誅順昌之逮也有友朱祖文朱陛宣皆能周旋患難以及於死稱二朱先生祖文字完天世襲蘇州衛指揮讀書為諸生幼孤母守節未旌祖文恆痛念之順昌先未識祖文因文震孟言其母苦節順昌聞而憐之慨然白當事題表部牒下郡祖文始知感泣誓為順昌死及順昌被逮祖文度此行必無全理願相隨視其後事遂詣同宿公廨中夜從容謂順昌曰公灑然就道良善然事未可知脫有緩急誰可告者吾當先往為地順昌首肯良久曰徐銀臺如珂肝膽如雪必能相濟顧侍御宗孟新入臺中意氣不薄可與計事此外則定興之鹿善繼吳橋之范景文熱腸急難皆可告者祖文遂别去先走都下比順昌未至有中以滅門事者如珂力辨而解至槖饘之事宗孟已先為之所矣已而懸賕數千祖文私幸旦夕告完或得緩死百計丐貸都門不足則走定興定興不足則走吳橋單騎冒暑間關千餘里逗留數十日捃托稍就而順昌已斃獄矣畢命之日祖文夜宿野店有聲魂然至京微服僻處偵察動靜每一感慟聞者悽惻竟以勞悴憤悶發病死陛宣字德升萬厯壬子舉人少無師以父燾為師無一刻離膝下四上公車試畢不待放榜亟馳歸乙丑之後途中心動扺家母病遽卒陛宣摧痛不已至丁卯秋父病幾殆陛宣竟謝北上逾年父殁毁瘠不支當順昌被逮時親故多避匿陛宣念少同學又同鄉舉晨夕省視依依不去左右逮開讀之變逆黨使人偵視往來狀人或為之危陛宣怡然自若僅而獲免殁後門人私諡孝介姚希孟曰天生孝介以配忠介作諡議崇禎甲戌御史祁彪佳特疏表章贈翰林院待詔祀金鄉書院五人者蘇州府顔佩韋楊念如馬傑沈揚周文元五義民也當天啓丙寅魏閹以緹騎逮周吏部順昌大索金錢拘吏部宿縣署一時賢士大夫率先倡義斂資以送民之號泣請命者不下數千人校尉李國本因舉械擊諸號泣之民中有一人急持提械之尉而捽之者顔佩韋也四人遂躍出執尉問此旨從何出尉曰實魏上公命於是五人共言擊持偽旨者一尉捽梁上驚墮而死即李國本也是日又逮浙江黃侍御尊素來姑蘇驛需折夫馬百金五人復至驛毆之燬其舟五人謀曰我輩拚死為國除害合以千衆下武林殺稅使焚其府然後自囚請死雖寸磔有餘快佩韋曰不可吾儕小人死何足惜吳中賢士大夫尚多倘置我輩而反借此以傾諸賢是我輩纍之也於是止中丞毛一鷺逢璫意令御史搜捕渠魁五人挺身自投曰渠魁脅從皆我也無妄波及御史大笑曰爾陷吏部死官大人小我為吏部死百姓小人大猶豫再三竟擬大辟處決不敢違中丞也五人臨刑時意氣自若談笑以死斷頭置城上數月顔色不變有賢士大夫發金購五人之脰而函之卒與尸合後二年璫授首乃毁其半塘之生祠以為五人墓爰立碑曰五人之墓五人民也不曰民而曰人衆詞也書人以其義故人之也此春秋之書法也題碑者誰冏卿吳默也作碑記者誰太史張溥也外史氏曰吾聞廓園先生被逮之日雷電交作大雨如注平地水深三四尺士民匍匐水中泣送者以萬計蓼洲先生之逮則舉國若狂而五人冒死以逞中朝聞之皆失色噫天怒於上矣人怨於下矣而崔魏乃竟怡然不畏耶顧大章傳弟大韶顧大章字伯欽常熟人與弟大韶孿生並負異才大章通經術諳掌故慨然有經世志萬厯三十五年舉進士授泉州府推官移病免歸改常州府儒學教授時朝士各持門戶相指摘大章慨然曰黨議已成須有以解之昔賈彪不入顧厨之目西行以解其難吾忍坐視耶補國子監博士廣文官冷非世所指名棋酒謔浪與朝士相周旋天啓二年典試廣西還朝值葉向高與劉一燝微嫌大章及繆昌期卒善解之遷刑部主事歷員外郎明習法律手批口決多老吏所不及時遼瀋相繼陷臺省搜捕姦細棄市無虛日繫二百餘人飢寒瘐死存者五十餘大章請於尚書王紀曰以一身易五十人命猶甘之况一官乎即日論讞罪二人餘皆移大理縱遣紀歎息善之於是原參臺省皆不悅杜茂者故𨽻登萊巡撫陶朗先麾下以冒餉逃匿僧舍為邏卒所獲兵部尚書張鶴鳴行邊劾茂與佟卜年約李永芳謀叛獄已具矣紀以問大章大章曰招謂卜年令河間茂匿廨舍三月偕卜年二僕往來永芳所具有本末顧不知二僕姓名何也夫謀反大事同行數千里豈有不詢姓名者茂之誣服無疑紀曰善然則何以處卜年大章曰卜年雖非叛然與佟養真同族坐叛族流三千里可也未幾紀去官侍郎楊東明署事謂卜年實首惡每歲令人拜金世宗墓當伏誅大章曰此語何從聞之東明曰聞之人言大章曰刑部奏事有審得某人云云無聞得某人云云也東明大驚方進奏急止之已而又欲坐卜年死大章爭之曰律反族不同謀不同居者止期親論斬餘不坐東明作色曰謀反夷三族寧論期親大章曰公所言者漢法員外所執者大明律也從容檢律以進東明默然慚愧而止後卜年竟以夜半內傳促死獄中至今寃之當廣寧之失也經略熊廷弼與巡撫王化貞議戰守不合致敗至是並逮下獄大章時已調禮部王紀重其才留之屬以大獄大章謂誅心則廷弼雖末減論事則化貞實罪魁兩人不當同科時以為允楊漣等皆主之大章意蓋惜廷弼之才議貰之以責後效然卒定廷弼辟者大章也會王紀疏攻魏忠賢璫黨謂疏出大章手思有以陷之御史楊維垣遂劾大章受廷弼賂為營脫大章疏辨曰當時會鞫者二十八人各出已見始議定辟臣何嘗釋廷弼哉廷弼行賄應行於釋罪之人不應行於定辟之人反覆論辨甚悉遂引疾歸羣小憾之次骨嗾忠賢興大獄謀殺楊漣左光斗魏大中等逮汪文言下獄以其言為徵拷掠無所得聚而謀曰經撫之獄顧大章引八議議熊廷弼廷弼楚人也大章楊左之黨也以鬻獄坐顧以關通坐楊左則一網盡矣大章時已出為陜西按察使副使矯旨逮繫與漣等六人並下鎮撫獄五人先後拷死移大章刑部擬罪大章慷慨對簿曰某奉旨送法司據招定罪豈容復辨辨則抗旨不辨則欺本心欺法司且欺天下後世亦欺皇上也不抗即欺無一而可且五人者既死矣借大章以實五人之招是大章既自誣服又代五人誣服何以見五人地下乎明公能雪此案萬代瞻仰不然有鎮撫司原案在復何言法司環坐愕眙莫敢異同也已而復移送北司大章歎曰汪文言猶能為貫高我獨不能乎吾不可再辱矣乃呼酒與弟訣别趣和藥飲之不死雉經而卒初六人下獄獄中神祠木忽生黃芝視之六瓣也獄卒以賀大章歎曰芝瑞物也而困於獄吾六人其以此終乎卒之前數日手指重傷援筆作自敘筆記訣别書凡數千言酒酣慨然曰自唐虞至今才四千年吾年五十已得八十分之一不可謂不壽雖凶終不猶愈於死牖下乎又為偶語曰故作風波翻世道長留日月照人心曰此他日祠聯也愍皇帝即位戮逆璫更定先朝爰書白其寃贈太僕寺少卿大章性豪邁欲入解黨禍卒嬰其難至今人猶哀之初大章死之夕大風雷雨如注逆璫外舍及廣微寓宅瓦俱飄盡樹木盡拔去郭城外三十里椅桌隨之室內為之一空其妻妾被衣立雨中隱隱望見旌旗羽蓋金牌燈火如按察副使狀者行其屋上而廣微曰我為宰相內倚魏公如天之德何妖鬼之為祟乃爾耶姦惡之不畏天如此大韶字仲恭與兄大章孿生連袂出遊人不能辨其少長大章舉進士死璫難大韶以理學名老於諸生頭蓬不櫛衣垢不浣潦倒折拉每引鏡自詫曰顧仲恭乃如許少治詩義竟陵鍾惺稱為有明第一長益肆力於學六經諸史百家內典之書靡不研極其論詩謂詩有齊韓魯三傳毛傳出而三家廢鄭箋多與毛異唐宋諸儒多與毛鄭異朱子盡掃毛鄭概以鄭衛為淫風世儒謂其不會小序之意如伐木鴛鴦諸章是也今欲刋定一書當用毛傳為主毛必不可通然後用鄭鄭必不可通然後用朱毛鄭朱皆不可通然後網羅羣説而以己意衷之其論禮記謂自宋以前為禮經之學者惟知鄭注孔疏無所是非宣和間三代器物間出學者援以證漢人之謬而陳氏集説出焉未有集説以前學者之患在於疑而不能明既有集説以後學者之患又在於明而不能疑不可不深維而自得也其論周禮則地官之原隰裸物小司徒之上中下地以及鄉師鄉老州長之名秩春官大宗伯之天産地産春官之世婦夏官馬質之旬內外司爟之出火內火冬官之量豆氊案以及匠人營國皆援經據傳考古徵今以訂補注疏之闕而小戴記多正又作五帝世系辨正蘇明允太玄論駁蘇轍洪範五事説辨李翺五木經縱橫浩汗不下數萬言又謂太玄可以不作欲追廢桓談張衡於千載之上大韶既自負才敏傑然有志於當世衰老病廢發為文章以自慰嘉定程孟陽稱之曰李文饒之流也嘗作竹籖傳又作虱賦嘻笑謔浪刺譏時政晚年焚棄其稿自定二十二篇為最善云外史氏曰塵客先生文章道義理學氣節固已表表人世母煩致論也至其不再辱而自經則皎然合乎道矣仲恭隱居著書不櫛不沐而至老死推其心亦可悲也已東林列傳卷三
