body:
  text: 東林列傳卷二江隂陳鼎撰明邵寶傳邵寶字國賢無錫人年十九學於江浦莊㫤㫤深器之成化二十年舉進士授知許州其治以興起教化為務月朔㑹諸生於學宫講明義利公私之辨正穎考叔祠墓改魏文帝廟以祠漢愍帝曰帝不稱獻而稱愍從昭烈所諡也州有巫言龍骨出地中為禍福寶取骨毁於庭杖巫而遣之尤急民事躬課農種倣朱子社倉立積散法行計口澆田法以備凶荒𢎞治七年入為戸部員外郎崇王奏乞正陽鎮抽分課銀帝欲與寶謂侍郎劉大夏曰正陽畿輔地制不以封豈可使藩府收其商課如以春秋許田之義明白論列上宜聴從且課以救荒設非舊額宜革去大夏以其議上帝從之歴本部郎中遷江西接察司副使提調學校至則率諸生釋菜周元公祠修白鹿書院學舍以處來學者其教以致知力行為本先行檢而後文藝江西俗好隂陽家言有數十年不葬父母者寶為令生員不葬親者不得與試於是相率舉葬以千計寧王宸濠索詩文峻却之後宸濠敗有司校勘獨無寶跡遷浙江按察使再遷右布政司與鎮守太監勘處州銀礦寶曰費多獲少勞民傷財慮生他變卒奏寢其事進湖廣左布政司正德四年擢都察院右副都御史總督漕運時劉瑾擅政寶議事至京絶不與通平江伯陳熊漕帥也賂瑾少瑾憾之一日昧爽遣校尉數輩追寶至左順門曰行逮汝張綵曹元二尚書自内出私語寶曰内執政謂君第劾平江則無後命矣寶曰平江功臣之後督漕未久無大過不知所劾二人黙然去越三日給事中劾熊并劾寶狥庇遂逮熊下詔獄勒寶致仕瑾誅起巡撫貴州尋遷户部右侍郎進左侍郎命兼左僉都御史處置粮運及㑹勘通州城濠歸奏俱稱旨先是寶為布政司時以母老乞歸養格於例不得至是再請詔許歸省抵家又疏終養始報可世宗即位起南京禮部尚書再疏辭命有司以禮存問母喪闋請致仕不允時寶門人桂萼以議禮驟貴虚揆席以招之不赴尋卒贈太子太保諡文莊寶三歲而孤事母過氏至孝母疾為奏告天願減已算延母年時甫十歲終養歸嘗得疾左手不仁猶朝夕侍親側不懈生平潛心理學躬行實踐而不肯居道學名嘗曰願為真士夫不為假道學舉南畿受知於李東陽為詩文典重和雅以東陽為宗至於原本經術粹然一出於正所著學史簡端二錄巡撫吳廷舉上於朝其定性書説漕政舉要容春勿藥諸集又若干卷晚自號二泉學者稱二泉先生家居以造就鄉黨人材為急無錫故有東林書院為宋楊時講學處後廢寶與其門人華雲讀書其地乃搆精舍仍名曰東林講學其間厥後東林之教盈天下實自寶始又建五賢祠於學之東祀楊龜山以喻樗尤袤李祥蔣重珍配祀萬厯甲辰顧憲成髙攀龍重修東林書院建道南祠亦以楊龜山主祀羅從彦及喻樗尤袤李祥蔣重珍胡珵配之而以寶從祀焉外史氏曰先生為東林發軔者也豈特真士夫哉遡其居官所行之政在在皆合於道視學江右所得之士君子濟濟不趨瑾不附萼卒以身退及居林下又創東林講學以造就鄉黨人材旣而顧髙輩出揭其遺風流韻遂至賢良忠義盈滿天下可謂真道學矣豈特真士夫而已哉顧憲成傳弟允成孫樞顧憲成字叔時無錫人自父學徙居涇里又號涇陽少夐悟從師講養心莫善於寡欲前請曰竊以為寡欲莫善於養心心為主欲為役主强則役拱伏矣十歲讀韓昌黎諱辨每遇其父名輒諱之然不可勝諱鬱鬱不樂師詰之故以告其父曰昔唐韓安王諱忠語其子曰汝諱我是忘忠也忠可忘乎忘忠則我可忘也自是遂不諱其父告憲成曰學之不可忘亦猶忠也憲成謹受教家貧不能延師就學隣塾歸必篝燈誦讀恒至達旦其舉業之文垂髫已震踔一時矣稍長即從事理學萬厯四年舉鄉試第一八年成進士授户部主事時大學士張居正病朝士羣禱於神憲成獨不可同官代之署名憲成使人塗滅之居正死改吏部主事請告歸讀易春秋者三年補驗封司主事十五年大計京朝官時都御史辛自修掌計事執政盡喪其私人人皆恚之時工部尚書何起鳴被劾起鳴訐自修以媚執政給事中陳與郊承風旨並論二人實庇何而攻辛於是自修起鳴並罷并責四御史糾起鳴者憲成上疏言何起鳴訐辛自修旣罷自修謝之矣而又降四御史是欲緘天下之口也語侵閣臣并責大臣言當各務自反有旨切責謫桂陽州判至則日與諸生講學稍遷處州府推官丁母憂服除補泉州府推官舉公廉第一擢吏部考功司主事吏部從無出而復入者從人望也㑹有詔三皇子並封王憲成倡四司上言曰皇上因祖訓立嫡之條欲暫令三皇子並封王以待有嫡立嫡無嫡立長臣等伏而思之待之一言有大不可者太子天下之本豫定太子所以固本也是故有嫡立嫡無嫡立長就見在論嫡之有無是也待將來之有無非也皇上動稱祖訓祖訓所載立嫡待嫡之條意各有主與建儲之事判然不𩔖皇上第以其合於己意援而附之為遵祖訓乎為悖祖訓乎其不可一也我朝建儲家法東宫不待嫡元子不並封廷臣言之甚詳皇上以其不合於已槪置弗省豈皇上之創見有加列聖之上乎其不可二也有天下者稱天子天子之元子稱太子天子繫乎天也君與天一體也太子繫乎父也父與子一體也主鬯承祧於是乎在不可得而爵也今欲並封三王元子之封何所繫乎無所繫則難乎其為名有所繫則難乎其為實其不可三也皇上亦曰權宜云爾夫權宜者不得已而行之也元子為太子諸子為藩王於理為順於分為稱於情為安有何不得已而然乎耦尊均大逼所由生而姑任之其不可四也皇上以祖訓為法子孫以皇上為法皇上不難創其所無後世詎難襲其所有自是而往幸皆有嫡可也不然是無東宫也又幸而如皇上之英明可也不然凡皇子皆東宫也毋乃啓萬世之大患乎其不可五也皇后與皇上共承宗祧期於宗祧得人而已皇上之元子諸子即皇后之元子諸子恭妃皇貴妃不得而私之統於尊也豈必如輔臣王錫爵之請須拜皇后為母而後稱子哉皇上何不㫁以大義而為此區區其不可六也况始者奉旨少待二三年而已俄改於二十年又改於二十一年然猶可以歲月期也今曰待嫡是未可以歲月期矣命方布而忽更意屢遷而愈緩皇上何以謝天下其不可七也自並封之命下叩閽上封事者不可勝數至里巷小民亦聚族而竊議是孰使之然哉人心之公也而皇上猶責輔臣以擔當錫爵夙夜趨召正欲為國家定此大事排羣議而順上旨豈所謂擔當必積誠感悟納皇上於無過之地乃真擔當耳不然皇上且不能如天下何而况錫爵哉其不可八也皇上神明天縱信非溺寵狎昵之比而不諒者見影而疑形聞響而疑聲即臣等亦有不能為皇上解者皇上盛德大業比隆三五而乃來此意外之紛紛不亦惜乎其不可九也伏願皇上反觀長慮無違成憲無拂輿情無爽初命使皇元子早正儲位皇第三子皇第五子各就王爵父父子子君君臣臣兄兄弟弟宗廟之福社稷之慶悉在是矣憲成又貽書錫爵反覆辨論其後並封之議卒寢二十一年内計吏部尚書孫鑨考功郎中趙南星盡黜執政私人憲成實左右之南星奉旨罷憲成疏請同罷不報時鄒元標已轉南刑部求去有旨放之去憲成力勸錫爵疏留勉從之及冡宰孫鑨罷推代者時趙用賢以侍郎署吏部事錫爵囑推禮部尚書羅萬化萬化翰林也又其同氣錫爵欲用為冡宰盡攬其權以歸政府憲成曰往者内閣之推不專在翰林今已專據之矣而復兼冡宰是翰林之外虛無人矣此決不可用賢以告錫爵錫爵大恚然其議遂格而陳有年尚書吏部矣及憲成典選有㑹推閣臣之命吏部舉七人以山隂王家屏為首而萬化不與焉錫爵恚甚揚言曰羅君推冡宰曰非翰林所宜今推内閣何又不可耶復以屬有年有年不聽而劾萬化者疏又至於是罷有年削憲成籍給事中逯中立上疏力救並見黜先是憲成見羣賢播棄日多思漸相汲引非錫爵意也值其假沐而推孟一脈王德新輒得旨錫爵佯喜謂之曰此機甚佳自此益急推舉欲以激上怒又委過焉自憲成去而懷忠持正者充塞林下矣是時其弟允成亦得罪歸里與兄日集羣賢講學取孔孟程朱之書而闡明之髙明者聞之可入始學者聞之不駭旣又得先輩邵寶所修楊時東林祠遺址於東林庵旁闢為東林書院大㑹吳越之士講習其中歲有㑹月有紀而東林之名滿天下矣三十六年起南京光祿寺少卿疏辭不就又推順天府丞命不下再陪推左僉都御史時孫丕揚再起為冡宰矣先是二十三年丕揚以冡宰掌外察黜督學馬猶龍及叅政丁此吕等侍郎沈思孝爭之强丕揚不聽疏逮此吕羅致之遣戌而死以是並不悦思孝而又有人言思孝欲奪其位及淮揚巡撫李三才亦其所不悦至是廷臣力攻三才憲成為移書政府及丕揚謂三才在淮揚能制税璫不敢動安民弭亂之功甚大其人磊落非暮夜受金者又言思孝猶龍之賢丕揚曰吾巳容之矣旣而一二攻三才者稍侵憲成憲成惟自反不與稽也又其甚者以東林為詬厲物論喧豗是非錯互於憲成何與哉方憲成之再入銓曹也趙南星亦被罪尚書孫鑨亦奪俸三月憲成與李復陽同疏申救不報而允成等皆貶官亡何憲成亦削籍大抵錫爵之謀也而當錫爵再被召憲成猶惓惓望之所上葉向髙孫丕揚書期其破囂錄善去私效忠蓋其憂天下之深愛國之至不暇計其言之可否也至其論學首辯陽明無善無惡心之體一語其時管志道亦設講於三吳主一貫三教而實入於禪憲成謂釋氏三藏十二部五千四百八十卷一言以蔽之曰無善無惡然辯四字於告子易辯四字於釋氏難以告子之見性粗釋氏之見性微也辯四字於釋氏易辯四字於陽明難在釋氏自立空宗在吾儒隂壞實教也又曰自古聖人教人為善去惡而已為善為其固有也去惡去其本無也本體如是工夫如是其致一而已矣陽明豈不教人為善去惡乎然旣曰無善無惡而又曰為善去惡學者執其上一語不得不忽下一語也至於忽下一語其上一語雖欲無弊不可得矣羅念庵曰終日言本體不説工夫纔拈工夫便是外道使陽明再生亦當攢眉王塘翁曰心意知物皆無善無惡學者以虚見為實悟必憑此語如服鴆毒豈不殺人然則陽明再生目擊兹弊將有摧心扼腕不能一日安者何但攢眉已乎其維持正學皆此𩔖也萬厯四十年卒年六十三殁後十五年猶以黨人奪職崇禎初贈吏部左侍郎諡端文所著有涇臯藏稿小心齋劄記大學通考質言東林㑹語商語還經錄証性編桑梓錄諸書弟允成字季時號涇凡舉萬厯十一年㑹試十四年廷試對策切直有曰内寵將盛羣小將逞語侵鄭貴妃讀卷官覽之大驚抑置第三甲時御史房寰疏詆南京右都御史海瑞允成不勝憤合同榜進士彭遵古諸壽賢具疏曰人貪則畏人攻其貪未有執已之貪而攻人之廉者夫欲天下人為寰甚易為瑞甚難寰身享貪饕之利而詆瑞為欺世盜名臣等之所痛心也得旨削籍久之廷臣薦允成學行授南康府教授以母病謝不赴母憂服除補保定府教授累遷禮部儀制司主事三王並封議起允成與同官張納陛等力陳不可考功郎中趙南星被譴復疏救謫光州判官立朝僅六十日允成謝光州歸與兄憲成講學東林每以狂狷自處疾世之為鄉愿而託於中行者卒年五十四天啓初贈尚寶司丞憲成孫樞天啓中舉人以學行聞於世外史氏曰先生昆季有絶人之才而用其全力於學恪守程朱力闡性善之旨居官雖未究其用而所與天子宰相爭是非者皆宗社大計晚年倡道東林引掖後學四方賢士爭歸之或亦有附以為名髙而忌者遂目之為黨其後爭三案者攻魏忠賢者大率東林之人於是小人之害君子更以東林為名門户相攻二三十年未已要自天啓以迄崇禎之末其間忠節之士接踵而出不可謂非講學之力也當先生之始事不過二三同志闡明絶學豈嘗欲樹壇坫標榜清流及乎應和旣廣其徒頗以操持國是鑒别流品於是朋黨之禍起視漢之東京幾無以異焉髙景逸先生云自孟子以來得朱子千四百年間一折衷也自朱子以來得顧子又四百年間一折衷也則其所學之正直接程朱者矣髙攀龍傳華允誠髙攀龍字存之號景逸無錫人年二十五聞顧憲成講學始志於學萬厯十七年成進士其舉㑹試吏部考功員外郎趙南星所取士也授行人司行人時四川按察司僉事張世則疏詆程朱傳註獻所著大學初義請頒學宫一改章句之舊攀龍上言略曰臣維自昔儒者説經不無異同而是非不容乖謬今以程朱大賢謂其學曰不能誠意謂其教曰誤人為是耶為非耶我太祖髙皇帝即位之初首立太學命許存仁為祭酒一宗朱氏之學令學者非五經孔孟之書不讀非濂洛闗閩之學不講成祖文皇帝益張而大之命儒臣輯五經四書大全及性理全書頒布天下饒州儒士朱季友詣闕上書專詆周程張朱之説上覽而怒曰此儒之賊也命有司聲罪杖遣悉焚其所著書曰毋誤後人於是邪説屏息迨今二百餘年庠序之所教制科之所取一稟於是不意今日乃有世則者肆然欲變祖宗之制率天下而背之也且自世廟以前雖有訓詁詞章之習而天下多實學自穆廟以來率多穿鑿虚幻之談而弊不知所終使世則之言一倡人人得自騁其私浮詞邪説充塞天下二祖列宗之教蕩然掃地矣朝廷是之二十年冬奉詔南京謁孝陵時大學士王錫爵再起當國癸巳京察孫鑨為吏部尚書趙南星為考功主計所排斥與相臣忤而臺省長官恥不得與於是言者論謫南星孫鑨罷郎中于孔兼主事顧允成薛敷教等力爭皆謫而吏部侍郎趙用賢亦被論將併去之都御史李世達疏救復為戸部郎中楊應宿所攻遂與用賢俱去吏部為之一空明年攀龍使歸即上疏論其事語侵輔臣又言楊應宿借不附吏部之名致阿徇内閣之實反謂近世一種小人專以抗閣臣為風裁附吏部為得計其為説愈佞而其為害愈深閣臣不當隂除異已鋤善𩔖以空人國疏入應宿再劾南星等賍私而言攀龍與選郎顧憲成為姻此疏其阿吏部之實也時言官多佐内閣攻銓司御史吳𢎞濟獨抗章謂攀龍為君子正論應宿為小人邪説有旨㑹勘𢎞濟遂奪職攀龍謫廣東揭陽縣典史二十二年七月攀龍取道浙閩以達揭陽遂渡錢塘登嚴光釣臺所至亦講學不輟尋入武彞謁蔡元定祠憩朱熹精舍益以道學為己任抵揭陽潮之人士皆從之游經其指授皆知向學及歸學益有得自築室漆湖之上曰水居時讀書習靜其中又與顧憲成修復東林書院祀宋儒楊時偕諸同志以道學相切劘海内士大夫之賢者聞其名皆尊東林從者日衆後邪臣遂指之為門戸四十年憲成卒攀龍乃專講席徘徊家居三十年名益重天啓改元起為光祿寺丞二年進本寺少卿時禮部尚書孫慎行追論紅丸歸罪舊輔方從哲下廷臣㑹議攀龍謂從哲交通國戚表裏為姦心不知有君無逃首惡之罪議甚峻轉太常寺少卿復上疏略曰禮部尚書孫慎行論舊輔方從哲一疏闗係甚大隄防甚遠從哲之罪非止紅丸其最大者交結鄭國泰父子所以謀先帝者不一始以張差之梃繼以美姝之進終以文昇之藥從哲力左右之培植其為鄭者誅鋤其不為鄭者一時若狂知有鄭而已此賊臣也討賊則為陛下之孝而説者乃曰為先帝隠諱則為孝此大亂之道也又如戎政尚書黄克纘論李選侍一事陛下念聖母則宣布選侍之罪念皇考則優待選侍以禮義盡仁至而説者乃曰為聖母隠諱則為孝明如聖諭以為假託忠如楊漣以為居功人臣避居功必且甘居罪君父有急袖手旁觀此大亂之道也若惑其説孝不知其孝不孝以為大孝忠不知其忠不忠以為大忠事有不辨於至微貽禍於無竆者皆如此類如方從哲鄭養性豈容一日不討尚令居輦轂下耶疏入傳旨髙攀龍誣朕不孝當重譴閣臣葉向髙力救免是時持異議者甚衆給事中王志道首疏附和攀龍又遺書責之曰人臣為國當杜漸防微懲前毖後不宜為亂賊逭誅為君父種禍也夫以青宫紫禁之中忽有荆軻聶政之入於飲食男女之内行其斧斤鳩毒之謀皆意想所不及而實中外所共知此而諱之是為亂賊設䕶身之符若更加之正人以誣謗不幾為亂賊立箝口之法乎皇祖威福在手妙於調停是皇祖身上事皇考仁孝根心妙於隠忍是皇考身上事皇上祖考在念妙於處分是皇上身上事若夫執大義守法紀君仇必報君賊必討是臣子身上事上下相維並行不悖今但言孝經尊親而不言春秋討賊言主上父子之親不言臣下君臣之義言主上一時之權不言宇宙萬世之經使亂臣賊子聞之而喜忠臣義士聞之而懼一喜一懼之間所係世道人心豈其微哉時從哲雖得免議而天下以為三案是非非斯言不能折也五月陞太常寺少卿時御史鄒元標馮從吾建首善書院於京師攀龍時與講會方鄭之黨憎而且懼給事中朱童蒙因疏訐東林目為朋黨於是元標等皆去位攀龍隨乞休不允進刑部右侍郎時魏忠賢用事羣小爭附而趙南星為吏部尚書不附忠賢都御史缺廷推屬攀龍攀龍謂師生不當分掌部院徒為攻門戸者藉口力辭不得旣就職首劾罷忠賢私人崔呈秀先是副都御史楊漣劾忠賢二十四大罪漣亦東林人於是羣小合謀嗾忠賢曰東林必殺公適會推山西巡撫以謝應祥名上御史陳九疇誣劾部院徇私有旨切責遂與南星俱罷歸數月忠賢呈秀勢益張修怨益力五年四月詔獄起欲以汪文言賍坐攀龍賴吳錦衣者持之得免八月又詔毁東林書院攀龍乃移祀楊時於道南祠戌南星逮楊漣魏大中等殺之而削攀龍職方大中之就逮也過無錫攀龍操舟送之髙橋羣小知之益怒令織造太監李實劾周順昌等攀龍與焉緹騎將至有偵其事以告者是日攀龍謁道南祠作告龜山先生文焚之歸與二門生一弟酌後園池上聞官旂已至吳門逮順昌笑曰吾視死如歸今果然矣晚復與家人飲夜半信益急乃整衣至書齋謂諸子曰吾稍料理為就道計姑暫退遂作字二紙鏁篋中復入與夫人語而出二孫侍取所封紙置几上示之曰明日以此付官旂毋先發因扄戸移時不聞聲諸子排戸入一燈熒然發所封紙則遺表也云臣雖削奪臣係大臣大臣受辱則辱國故北面叩頭從屈平之遺則君恩未報願結來生臣攀龍垂絶書乞使者執此以報皇上復有别友書云僕得從李元禮范孟博遊矣一生學問至此亦稍得力諸子惶駭奔池畔則已沈死衣冠端立如平生年六十五先是就逮諸臣皆具極刑斃詔獄不辱者攀龍一人而已崇禎元年詔褒䘏死事諸臣贈太子少保兵部尚書諡忠憲廕一子攀龍生負重望以直道不容於時雖位列九卿立朝未及數載至其䕶善類擊奸黨蓋孤忠自許死而後已者今世傳其書有異端辨困學記周易孔義春秋孔義髙子遺書編輯朱子要語皆本主敬格致之説嘗謂人曰善學孔子者無如朱子故所學為得其正與顧憲成鄒元標馮從吾輩齊名裒然東林之冠論者謂有明理學名儒如陳獻章之灑落胡居仁之主敬薛瑄之實踐王守仁之超悟攀龍殆兼有之而無其弊門人華允誠字汝立號鳳超無錫人天啓二年進士少受易於錢一本及長從攀龍聞主靜之學攀龍入朝允誠從攀龍與人書曰僕一路受鳳超之益整齊嚴肅殆若性成故居之甚安授工部都水司主事崇禎初進員外郎改兵部職方司員外郎感時事上三大可惜四大可憂疏直糾大學士温體仁吏部尚書閔洪學閣部朋比阿黨市權奉旨切責令囘奏因盡發洪學諸交通狀帝知允誠忠實僅奪俸未幾請終養歸大學士周延儒再召頗以收攬清流為名邀允誠一見固不往福王稱號江南起為吏部驗封司員外郎見時事不可為告歸在官僅十三日未幾南都亡遂匿不出後以不薙髪故同其從孫尚濂被執俱死焉外史氏曰東林自顧涇陽先生於萬厯二十二年會推閣臣罷歸與同邑髙景逸劉本孺安我素諸君子講學之所一時清流趨之如市而東林之名遂滿天下推其名髙之故始於爭立國本一請再請乃至三請屢請而不允甚而嚴逐之遠竄之旣而廷杖累累流血滿庭而爭之益力當時政府不相濟而相軋於是遂目爭者為黨人一斥不復沈一貫隂為賊害恃權求勝受黜者身去而名髙東林君子之譽沸宇内尊其言為清議即中朝亦以其是非為低昻門庭愈峻而求進者愈衆甚矣學之不可不講也學不講則聖道不明而人心蔽廉恥喪焉當其講學之意原以發明人心道心綱常倫理出則致君澤民斥邪扶正以剛介節烈為重以禮義廉恥為貴故胥天下而化焉於是廟廊之上或以清流自負者小人輒忌之嫉之擠以汚垢之秩曰毋使其耀口或㸃鹽𣙜之役者必攢眉蹙額環妻子而流涕曰自兹不可以為人矣故莅任必矯其廉潔顧以自贖然腥羶之名卒不可洗遂負没齒之恨每罷官歸里者若破車罷馬殘書數簏鄉黨卒以為賢願與約婚姻結金蘭相與往還不倦若歸有餘貲買田宅髙棟宇即親弟姪亦鄙以為貪夫至於親戚朋友老死不相往來宗族父老之嚴者拒不令入家廟曰恐辱吾祖宗也曰吾祖宗亦羞見汝此等貪夫也由是深山竆谷雖黄童白叟婦人女子皆知東林為賢販夫䜿子或相誚讓輒曰汝東林賢者耶何其清白如是耶至今農夫野老相傳以為口實猶諜諜不休焉自涇陽先生救淮撫之書出而東林之禍萌未幾妖書獄起梃擊案興而君子小人有不容之勢矣乃至摧遏正人必欲一網打盡辛亥京察孫丕揚主之於是攻東林者起矣丁巳京察鄭繼之主之則盡攻東林者矣世之所謂清流者驅除殆盡時臺諫有齊楚浙三方鼎峙之號士大夫有清譽者莫不垂首喪氣焉迨光宗即位葉向髙劉一燝執政鄒元標趙南星周嘉謨馮從吾輩皆班九卿一時清流稍有起色奈諸君子持論太嚴於是爭紅丸爭移宫而東林之禍熾矣及夫熹宗委命閹寺熊王之獄既成楊左之禍遂烈又假三案以媒孽東林而正人君子幾無噍類説者謂漢家黨錮四十年而黄巾起黨錮始解然無補於漢室之亡東林亦四十餘年而闖賊犯闕門戸乃敗更無救於明社之墟噫是何言歟崔魏煽逆不有楊左諸君則趙髙問鼎矣闖賊渫血不有范景文李邦華倪元璐劉理順馬世竒諸公則河岳䝉羞乾坤削色矣東林自爭立儲以來趨義如騖王錫爵等依違熒惑於上與諸君子相左及崔魏播虐魏廣微附和勾結諸君子必欲芟惡除奸如農夫之務去草而蹈禍益深崇禎之朝宰相如温體仁周延儒楊嗣昌等容悦取媚覆餗貽譏而諸君子以綱常名教自任始終矛盾天下事不可為矣東林初起者為顧為髙為鄒為趙繼之者為楊為左再繼之文震孟姚希孟最後則馬世竒輩皆節義文章足以驚天地動鬼神者也攻之者始為沈一貫繼則亓詩教宮應震吳亮嗣劉廷元趙興邦韓浚湯賓尹韓敬等其後則朱童䝉喬應甲傅櫆傅繼教傅應星陳良訓張訥曹欽程霍維華潘汝楨范濟世崔呈秀魏廣微徐大化楊炳陳序倪文煥石三畏顧天埈顧鼎臣梁夣環岳駿聲楊所修康丕揚周應秋薛貞楊維垣等又繼以温薛張陳最後者為馬為阮而天下亡矣嗚呼東林非亡明者攻東林者亡之也哀哉東林列傳卷二
